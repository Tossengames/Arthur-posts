<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilateral ASMR</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(function() {
  "use strict";

  // ---------- Canvas setup ----------
  // Locked to a fixed 1920x1080 internal resolution regardless of the actual
  // browser viewport/window size. This guarantees the exported recording is
  // exactly 16:9 with no letterboxing/black bars from an aspect-ratio
  // mismatch during the ffmpeg scale step.
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 1920;
  const H = 1080;
  canvas.width = W;
  canvas.height = H;

  function resize() {
    // canvas internal resolution is fixed; CSS just scales it to fill
    // whatever the actual window size is, letterbox-free either way since
    // we control aspect ratio at the source.
  }
  window.addEventListener('resize', resize);

  // ---------- Speed / size config ----------
  const SPEED_MIN = 900;
  const SPEED_MAX = 1500;
  const RADIUS_MIN = 80;
  const RADIUS_MAX = 300;

  function rand(min, max) { return min + Math.random() * (max - min); }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---------- Color / contrast system ----------
  // Background is either "dark" or "bright" mode, chosen randomly per cycle.
  // Ball always hard-contrasts: dark bg -> light/bright ball, bright bg -> black ball.
  function hsl(h, s, l) { return `hsl(${h}, ${s}%, ${l}%)`; }

  let bgMode = 'dark'; // 'dark' | 'bright'
  let bgHue = rand(0, 360);
  let bgBase = pickBgColor();
  let ballColor = pickBallColor();
  let useGradient = false;
  let gradientHue = bgHue;

  function pickBgColor() {
    if (bgMode === 'dark') {
      return hsl(bgHue, rand(20, 45), rand(6, 13));
    } else {
      return hsl(bgHue, rand(30, 60), rand(82, 93));
    }
  }
  function pickBallColor() {
    if (bgMode === 'dark') {
      // bright/light ball, hue complementary-ish for pop
      const h = (bgHue + 150 + rand(0, 60)) % 360;
      return hsl(h, rand(65, 95), rand(65, 82));
    } else {
      // bright bg -> ball is black (per spec)
      return hsl(0, 0, 4);
    }
  }

  let bgFrom = bgBase, bgTo = bgBase, bgBlend = 1;
  let ballFrom = ballColor, ballTo = ballColor;

  function rotatePalette() {
    bgMode = Math.random() < 0.5 ? 'dark' : 'bright';
    bgHue = rand(0, 360);
    gradientHue = bgHue;
    useGradient = Math.random() < 0.35;
    bgBase = pickBgColor();
    ballColor = pickBallColor();
  }

  function triggerPaletteShift() {
    bgFrom = currentBg();
    ballFrom = currentBall();
    rotatePalette();
    bgTo = bgBase;
    ballTo = ballColor;
    bgBlend = 0;
  }

  function parseHsl(str) {
    const m = str.match(/hsl\(([-\d.]+),\s*([\d.]+)%,\s*([\d.]+)%\)/);
    return [parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3])];
  }
  function lerpHsl(strA, strB, t) {
    const a = parseHsl(strA), b = parseHsl(strB);
    let dh = b[0] - a[0];
    if (dh > 180) dh -= 360;
    if (dh < -180) dh += 360;
    const h = (a[0] + dh * t + 360) % 360;
    const s = lerp(a[1], b[1], t);
    const l = lerp(a[2], b[2], t);
    return hsl(h, s, l);
  }
  function currentBg() { return lerpHsl(bgFrom, bgTo, bgBlend); }
  function currentBall() { return lerpHsl(ballFrom, ballTo, bgBlend); }

  let lastPaletteChange = performance.now();
  const PALETTE_INTERVAL = 14000;

  // ---------- Audio ----------
  let audioCtx = null;
  let masterGain = null;
  let audioUnlocked = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(audioCtx.destination);
  }

  let noiseBuffer = null;
  function getNoiseBuffer() {
    if (noiseBuffer) return noiseBuffer;
    const bufSize = audioCtx.sampleRate * 2;
    noiseBuffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    return noiseBuffer;
  }

  // ---------- Whoosh (exact same approach as the reference script) ----------
  // Continuous filtered-noise bed. Pan/gain/filter are driven by
  // setTargetAtTime with a short time constant, fed by REAL raw measured
  // speed (pixels/frame-ish) computed directly from position deltas each
  // frame in updateMotion — not a scripted/eased speed profile. This exactly
  // mirrors the reference script's setWhoosh() behavior.
  let wN = null, wG = null, wP = null, wF = null;

  function startWhoosh() {
    if (!audioCtx) return;
    if (wN) { try { wN.stop(); } catch (e) {} }
    const sr = audioCtx.sampleRate, len = sr * 4;
    const buf = audioCtx.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    wN = audioCtx.createBufferSource();
    wN.buffer = buf;
    wN.loop = true;
    wF = audioCtx.createBiquadFilter();
    wF.type = 'bandpass';
    wF.frequency.value = 480;
    wF.Q.value = 1.0;
    wG = audioCtx.createGain();
    wG.gain.value = 0.85;
    wP = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
    wN.connect(wF);
    wF.connect(wG);
    if (wP) { wG.connect(wP); wP.connect(masterGain); } else { wG.connect(masterGain); }
    wN.start();
  }

  function stopWhoosh() {
    if (wN) { try { wN.stop(); } catch (e) {} wN = null; }
  }

  // xFrac: 0..1 horizontal position. spd: raw measured px/frame-ish speed.
  function setWhoosh(xFrac, spd) {
    if (!wP || !wG || !audioCtx) return;
    wP.pan.setTargetAtTime(clamp(xFrac * 2 - 1, -1, 1), audioCtx.currentTime, 0.04);
    wG.gain.setTargetAtTime(clamp(0.35 + spd * 0.055, 0.35, 1.6), audioCtx.currentTime, 0.04);
    if (wF) wF.frequency.setTargetAtTime(300 + spd * 22, audioCtx.currentTime, 0.04);
  }

  // Discrete percussive "scratch" hit — fired only at the actual moment the
  // ball's direction reverses (a real kinematic event), exact same approach
  // as the reference script's playScratch().
  let scCool = 0;
  function playScratch(freq, vol) {
    if (!audioCtx) return;
    try {
      const sr = audioCtx.sampleRate, len = Math.floor(sr * 0.07);
      const buf = audioCtx.createBuffer(1, len, sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const e = Math.pow(1 - i / len, 0.5);
        d[i] = (Math.random() * 2 - 1) * e;
      }
      const src = audioCtx.createBufferSource();
      const f = audioCtx.createBiquadFilter();
      const g = audioCtx.createGain();
      f.type = 'bandpass';
      f.frequency.value = freq;
      f.Q.value = 1.6;
      g.gain.value = Math.min(0.65, vol);
      src.buffer = buf;
      src.connect(f);
      f.connect(g);
      g.connect(masterGain);
      src.start();
      src.stop(audioCtx.currentTime + 0.09);
    } catch (e) {}
  }

  // ---------- Lightsaber-style SFX (independent new layer, does not touch whoosh) ----------
  // A low sustained "hum/idle" tone always quietly present, like a saber
  // powered on, which swells brighter and more "electric" as the ball moves
  // faster (like a saber swing), using a detuned dual-oscillator hum plus a
  // resonant bandpass filter that opens up with speed for that zzzip brightness.
  let saberNodes = null;

  function startSaber() {
    if (!audioCtx) return;
    stopSaber();

    const now = audioCtx.currentTime;

    // low hum: two slightly detuned oscillators for a subtle beating/thickness
    const humA = audioCtx.createOscillator();
    const humB = audioCtx.createOscillator();
    humA.type = 'sawtooth';
    humB.type = 'sawtooth';
    humA.frequency.value = 65;
    humB.frequency.value = 65 * 1.008; // slight detune

    // low-pass to keep the hum warm/rounded, not buzzy
    const humFilter = audioCtx.createBiquadFilter();
    humFilter.type = 'lowpass';
    humFilter.frequency.value = 320;
    humFilter.Q.value = 0.5;

    // bright "electric swell" layer: filtered noise that opens up with speed
    const swellSrc = audioCtx.createBufferSource();
    swellSrc.buffer = getNoiseBuffer();
    swellSrc.loop = true;

    const swellFilter = audioCtx.createBiquadFilter();
    swellFilter.type = 'bandpass';
    swellFilter.frequency.value = 1200;
    swellFilter.Q.value = 4;

    const humGain = audioCtx.createGain();
    humGain.gain.value = 0.0001;

    const swellGain = audioCtx.createGain();
    swellGain.gain.value = 0.0001;

    const panner = audioCtx.createStereoPanner();
    panner.pan.value = 0;

    humA.connect(humFilter);
    humB.connect(humFilter);
    humFilter.connect(humGain);
    humGain.connect(panner);

    swellSrc.connect(swellFilter);
    swellFilter.connect(swellGain);
    swellGain.connect(panner);

    panner.connect(masterGain);

    humA.start(now);
    humB.start(now);
    swellSrc.start(now);

    // gentle fade-in to the quiet idle hum level
    humGain.gain.linearRampToValueAtTime(0.035, now + 1.2);

    saberNodes = { humA, humB, humFilter, swellSrc, swellFilter, humGain, swellGain, panner };
  }

  function stopSaber() {
    if (saberNodes) {
      const { humA, humB, swellSrc, humGain, swellGain } = saberNodes;
      const now = audioCtx.currentTime;
      try {
        humGain.gain.cancelScheduledValues(now);
        humGain.gain.setValueAtTime(humGain.gain.value, now);
        humGain.gain.linearRampToValueAtTime(0.0001, now + 0.2);
        swellGain.gain.cancelScheduledValues(now);
        swellGain.gain.setValueAtTime(swellGain.gain.value, now);
        swellGain.gain.linearRampToValueAtTime(0.0001, now + 0.2);
        humA.stop(now + 0.25);
        humB.stop(now + 0.25);
        swellSrc.stop(now + 0.25);
      } catch (e) {}
      saberNodes = null;
    }
  }

  function updateSaber(normX, speedNorm) {
    if (!saberNodes || !audioCtx) return;
    const now = audioCtx.currentTime;
    const { humFilter, swellFilter, humGain, swellGain, panner } = saberNodes;

    // pan follows the ball too, so this layer is also bilateral
    const rawPan = clamp(normX * 2 - 1, -1, 1);
    panner.pan.linearRampToValueAtTime(rawPan, now + 0.04);

    // idle hum stays quietly present always (never fully silent, like a
    // saber that's switched on) — small variation with speed for life
    const humTarget = 0.03 + speedNorm * 0.02;
    humGain.gain.linearRampToValueAtTime(humTarget, now + 0.08);
    humFilter.frequency.linearRampToValueAtTime(300 + speedNorm * 260, now + 0.08);

    // bright electric "zzzip" swell: opens up only as speed increases,
    // this is the part that actually sounds like a fast swing/movement
    const swellCurve = Math.pow(speedNorm, 2.2);
    const swellTarget = swellCurve * 0.16;
    swellGain.gain.linearRampToValueAtTime(swellTarget, now + 0.05);
    swellFilter.frequency.linearRampToValueAtTime(900 + speedNorm * 3200, now + 0.05);
    swellFilter.Q.value = 3 + speedNorm * 5;
  }

  function playTransitionTick() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(320, now);
    osc.frequency.exponentialRampToValueAtTime(120, now + 0.18);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.25, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.3);
  }

  // "pong" SFX for wall/edge bounces in sideToSide and upDown motion.
  // Slight random pitch + volume variation each hit so it's not identical every time.
  function playPongSfx(panValue) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const panner = audioCtx.createStereoPanner();

    osc.type = 'sine';
    const baseFreq = rand(360, 460); // slight random pitch each hit
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.55, now + 0.09);

    const peakGain = rand(0.22, 0.34); // slight random volume each hit
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(peakGain, now + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

    panner.pan.value = clamp(panValue, -1, 1);

    osc.connect(g);
    g.connect(panner);
    panner.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  // sparkle/blip SFX synced to flash
  function playFlashSfx() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    const baseFreq = rand(900, 1500);
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.8, now + 0.06);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.18, now + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.2);
  }

  // ---------- Binaural brainwave tone ----------
  // A pair of pure tones, one per ear, differing by a small "beat" frequency
  // known to sit in relaxation-associated brainwave ranges. One is picked at
  // random when audio starts and held fixed for the whole session/video —
  // requires stereo headphones to perceive the beat.
  const BRAINWAVE_BANDS = [
    { name: 'Delta', min: 1.5, max: 4 },   // deep relaxation / sleep
    { name: 'Theta', min: 4,   max: 8 },   // deep meditation, calm
    { name: 'Alpha', min: 8,   max: 12 },  // relaxed, calm focus
  ];
  const CARRIER_FREQ = 136.1; // low, gentle carrier tone ("OM" frequency, common in ambient/ASMR use)

  let chosenBand = BRAINWAVE_BANDS[randInt(0, BRAINWAVE_BANDS.length - 1)];
  let beatHz = rand(chosenBand.min, chosenBand.max);

  let brainwaveNodes = null;

  function startBrainwaveTone() {
    if (!audioCtx || brainwaveNodes) return;

    const leftOsc = audioCtx.createOscillator();
    const rightOsc = audioCtx.createOscillator();
    leftOsc.type = 'sine';
    rightOsc.type = 'sine';
    leftOsc.frequency.value = CARRIER_FREQ;
    rightOsc.frequency.value = CARRIER_FREQ + beatHz;

    const leftPan = audioCtx.createStereoPanner();
    const rightPan = audioCtx.createStereoPanner();
    leftPan.pan.value = -1;
    rightPan.pan.value = 1;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.0001;
    // subtle: sits underneath the whoosh/SFX layer, not competing with it
    const targetGain = 0.045;

    leftOsc.connect(leftPan);
    rightOsc.connect(rightPan);
    leftPan.connect(gain);
    rightPan.connect(gain);
    gain.connect(masterGain);

    const now = audioCtx.currentTime;
    leftOsc.start(now);
    rightOsc.start(now);
    gain.gain.linearRampToValueAtTime(targetGain, now + 2.5); // gentle fade-in

    brainwaveNodes = { leftOsc, rightOsc, gain };
  }

  function stopBrainwaveTone() {
    if (!brainwaveNodes || !audioCtx) return;
    const { leftOsc, rightOsc, gain } = brainwaveNodes;
    const now = audioCtx.currentTime;
    try {
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(gain.gain.value, now);
      gain.gain.linearRampToValueAtTime(0.0001, now + 1.2);
      leftOsc.stop(now + 1.3);
      rightOsc.stop(now + 1.3);
    } catch (e) {}
    brainwaveNodes = null;
  }

  // ---------- Motion system ----------
  const PATTERNS = ['sideToSide', 'upDown', 'circular', 'diagonal', 'freeform'];

  let state = {
    pattern: null,
    t0: 0,
    duration: 0,
    baseSpeed: 0,
    speed: 0,
    radius: 0,
    radiusMode: 'static',
    radiusStart: 0,
    radiusEnd: 0,
    params: {},
    x: 0, y: 0,
    prevX: 0, prevY: 0,
    vx: 0, vy: 0,
    flashUntil: 0,
    flashActive: false,
    nextFlashCheck: 0,
    blurry: false,
    // transition blend: smoothly morphs from old actual position into the
    // new pattern's computed path position, instead of snapping
    transFrom: { x: 0, y: 0 },
    transStart: 0,
    transDuration: 550, // ms
  };

  const trail = []; // {x,y,radius}
  const MAX_TRAIL = 6;

  const margin = () => Math.max(state.radius + 10, 60);

  function pickPatternParams(pattern) {
    const m = margin();
    const p = {};
    switch (pattern) {
      case 'sideToSide':
        p.y = rand(m, H - m);
        break;
      case 'upDown':
        p.x = rand(m, W - m);
        break;
      case 'circular':
        p.cx = rand(W * 0.3, W * 0.7);
        p.cy = rand(H * 0.3, H * 0.7);
        p.radiusOrbit = Math.min(W, H) * rand(0.22, 0.42);
        p.clockwise = Math.random() < 0.5;
        p.angle0 = rand(0, Math.PI * 2);
        break;
      case 'diagonal':
        p.a = { x: m, y: m };
        p.b = { x: W - m, y: H - m };
        if (Math.random() < 0.5) {
          p.a = { x: W - m, y: m };
          p.b = { x: m, y: H - m };
        }
        break;
      case 'freeform':
        p.points = [];
        const nPts = randInt(3, 5);
        for (let i = 0; i < nPts; i++) {
          p.points.push({ x: rand(m, W - m), y: rand(m, H - m) });
        }
        break;
    }
    return p;
  }

  function newRadiusPlan() {
    const modes = ['static', 'static', 'grow', 'shrink', 'pulse'];
    const mode = modes[randInt(0, modes.length - 1)];
    const r1 = rand(RADIUS_MIN, RADIUS_MAX);
    let r2 = r1;
    if (mode === 'grow') r2 = rand(r1, RADIUS_MAX);
    if (mode === 'shrink') r2 = rand(RADIUS_MIN, r1);
    if (mode === 'pulse') r2 = rand(RADIUS_MIN, RADIUS_MAX);
    return { mode, r1, r2 };
  }

  function startNewPattern(forcedPattern) {
    const pattern = forcedPattern || PATTERNS[randInt(0, PATTERNS.length - 1)];
    const rp = newRadiusPlan();

    // capture where the ball actually is right now (rendered position),
    // so we can smoothly blend from here into the new pattern's path
    state.transFrom.x = state.x;
    state.transFrom.y = state.y;
    state.transStart = performance.now();

    state.pattern = pattern;
    state.t0 = performance.now();
    state.duration = rand(5200, 8200); // longer segments so a 30s clip shows fewer, calmer transitions
    state.baseSpeed = rand(SPEED_MIN, SPEED_MAX);
    state.speed = state.baseSpeed;
    state.radiusMode = rp.mode;
    state.radiusStart = rp.r1;
    state.radiusEnd = rp.r2;
    state.radius = rp.r1;
    state.params = pickPatternParams(pattern);
    state.phase = 0;
    state.blurry = Math.random() < 0.3;
    state._lastCyclePos = undefined;
    state._lastGoingUp = undefined;

    // pathX/pathY track the "ideal" position along the new pattern;
    // state.x/y (the rendered position) blend toward these during the transition
    if (pattern === 'diagonal') {
      state.pathX = state.params.a.x;
      state.pathY = state.params.a.y;
    } else if (pattern === 'freeform') {
      state.pathX = state.params.points[0].x;
      state.pathY = state.params.points[0].y;
      state.segIndex = 0;
    } else if (pattern === 'circular') {
      state.angle = state.params.angle0;
      state.pathX = state.params.cx + Math.cos(state.angle) * state.params.radiusOrbit;
      state.pathY = state.params.cy + Math.sin(state.angle) * state.params.radiusOrbit;
    } else if (pattern === 'sideToSide') {
      state.pathX = margin();
      state.pathY = state.params.y;
    } else if (pattern === 'upDown') {
      state.pathX = state.params.x;
      state.pathY = margin();
    }
    state.prevX = state.x;
    state.prevY = state.y;

    // no transition tick sound anymore — this single pattern runs for the whole video
    if (audioUnlocked) {
      startWhoosh();
      startSaber();
    }
  }

  // Called when the current pattern's timed segment finishes. Keeps the same
  // motion type (no switching) but refreshes speed/radius/params so the loop
  // doesn't feel robotic, blending smoothly rather than jumping.
  function restartSamePattern() {
    startNewPattern(state.pattern);
  }

  function updateRadius(progress01) {
    if (state.radiusMode === 'static') {
      state.radius = state.radiusStart;
    } else if (state.radiusMode === 'pulse') {
      const cycles = 2.5;
      const s = (Math.sin(progress01 * Math.PI * 2 * cycles) + 1) / 2;
      state.radius = lerp(state.radiusStart, state.radiusEnd, s);
    } else {
      state.radius = lerp(state.radiusStart, state.radiusEnd, progress01);
    }
  }

  function pingPong(value, length) {
    if (length <= 0) return 0;
    const period = length * 2;
    let v = value % period;
    if (v < 0) v += period;
    return v <= length ? v : period - v;
  }

  let lastFrameTime = performance.now();

  function updateMotion(now, dt) {
    const elapsed = now - state.t0;
    const progress01 = clamp(elapsed / state.duration, 0, 1);
    updateRadius(progress01);

    // physics-like speed easing: slow at start/end of pattern segment, faster mid-travel.
    // shaped by a sine ease so it accelerates out then decelerates in.
    const easeShape = Math.sin(progress01 * Math.PI); // 0 at ends, 1 at middle
    const speedFactor = 0.55 + easeShape * 0.75; // ranges ~0.55x to ~1.3x base
    state.speed = state.baseSpeed * speedFactor;

    state.prevX = state.x;
    state.prevY = state.y;

    const dist = state.speed * dt;

    // drive the "ideal" path position (pathX/pathY) for the current pattern
    switch (state.pattern) {
      case 'sideToSide': {
        state.phase += dist;
        const span = W - 2 * margin();
        const cyclePos = pingPong(state.phase, span);
        state.pathX = margin() + cyclePos;
        state.pathY = state.params.y;
        // detect wall hit: cyclePos reverses direction at 0 or span
        if (state._lastCyclePos !== undefined) {
          const goingUp = cyclePos > state._lastCyclePos;
          if (state._lastGoingUp !== undefined && goingUp !== state._lastGoingUp) {
            const hitLeft = cyclePos < span / 2;
            if (audioUnlocked) playPongSfx(hitLeft ? -1 : 1);
          }
          state._lastGoingUp = goingUp;
        }
        state._lastCyclePos = cyclePos;
        break;
      }
      case 'upDown': {
        state.phase += dist;
        const span = H - 2 * margin();
        const cyclePos = pingPong(state.phase, span);
        state.pathY = margin() + cyclePos;
        state.pathX = state.params.x;
        // detect wall hit (top/bottom): pan follows the ball's x (center-ish),
        // still gives a bilateral-flavored pong even for vertical motion
        if (state._lastCyclePos !== undefined) {
          const goingUp = cyclePos > state._lastCyclePos;
          if (state._lastGoingUp !== undefined && goingUp !== state._lastGoingUp) {
            const normX = clamp(state.pathX / W, 0, 1);
            if (audioUnlocked) playPongSfx(normX * 2 - 1);
          }
          state._lastGoingUp = goingUp;
        }
        state._lastCyclePos = cyclePos;
        break;
      }
      case 'circular': {
        const orbitCirc = 2 * Math.PI * state.params.radiusOrbit;
        const dAngle = (dist / orbitCirc) * 2 * Math.PI * (state.params.clockwise ? 1 : -1);
        state.angle += dAngle;
        state.pathX = state.params.cx + Math.cos(state.angle) * state.params.radiusOrbit;
        state.pathY = state.params.cy + Math.sin(state.angle) * state.params.radiusOrbit;
        break;
      }
      case 'diagonal': {
        state.phase += dist;
        const a = state.params.a, b = state.params.b;
        const full = Math.hypot(b.x - a.x, b.y - a.y);
        const cyclePos = pingPong(state.phase, full);
        const t = cyclePos / full;
        state.pathX = lerp(a.x, b.x, t);
        state.pathY = lerp(a.y, b.y, t);
        break;
      }
      case 'freeform': {
        let remaining = dist;
        let guard = 0;
        while (remaining > 0 && guard < 20) {
          guard++;
          const pts = state.params.points;
          const cur = { x: state.pathX, y: state.pathY };
          const target = pts[(state.segIndex + 1) % pts.length];
          const segDist = Math.hypot(target.x - cur.x, target.y - cur.y);
          if (segDist < 0.001) {
            state.segIndex = (state.segIndex + 1) % pts.length;
            continue;
          }
          if (remaining >= segDist) {
            state.pathX = target.x;
            state.pathY = target.y;
            state.segIndex = (state.segIndex + 1) % pts.length;
            remaining -= segDist;
          } else {
            const t = remaining / segDist;
            state.pathX = lerp(cur.x, target.x, t);
            state.pathY = lerp(cur.y, target.y, t);
            remaining = 0;
          }
        }
        break;
      }
    }

    // blend rendered position (state.x/y) toward the ideal path position.
    // right after a pattern switch this eases from the old actual position
    // into the new path, so there's never a hard teleport/jump-cut.
    const transElapsed = now - state.transStart;
    if (transElapsed < state.transDuration) {
      const tProg = clamp(transElapsed / state.transDuration, 0, 1);
      const eased = 1 - Math.pow(1 - tProg, 3); // ease-out cubic, smooth settle
      state.x = lerp(state.transFrom.x, state.pathX, eased);
      state.y = lerp(state.transFrom.y, state.pathY, eased);
    } else {
      state.x = state.pathX;
      state.y = state.pathY;
    }

    // velocity for squash/stretch + trail direction
    state.vx = (state.x - state.prevX) / Math.max(dt, 0.0001);
    state.vy = (state.y - state.prevY) / Math.max(dt, 0.0001);

    // REAL, MEASURED speed this frame, expressed as pixels-per-frame (not
    // per-second) to match the reference script's tuning exactly — it
    // computes spd = hypot(dx,dy) directly between frames at ~60fps, so we
    // convert our dt-based velocity back into that same per-frame scale.
    const rawSpeedPerFrame = Math.hypot(state.x - state.prevX, state.y - state.prevY);

    // direction-change "scratch" hit: fires a short percussive sound the
    // instant the ball's horizontal direction actually reverses — exact
    // same trigger condition as the reference script's dX!==lastDirX check.
    // Scoped away from sideToSide/upDown since those already have their own
    // dedicated wall-hit pong sound (avoids double-firing at the same moment).
    const usesPongInstead = (state.pattern === 'sideToSide' || state.pattern === 'upDown');
    if (!usesPongInstead) {
      const dirX = state.vx >= 0 ? 1 : -1;
      if (state._lastDirX !== undefined && dirX !== state._lastDirX && rawSpeedPerFrame > 2.5 && state._scratchCooldown <= 0) {
        if (audioUnlocked) playScratch(rand(280, 1100), rand(0.10, 0.40));
        state._scratchCooldown = randInt(3, 10);
      }
      state._lastDirX = dirX;
      if (state._scratchCooldown > 0) state._scratchCooldown--;
    }

    // push trail sample
    trail.push({ x: state.x, y: state.y, radius: state.radius });
    if (trail.length > MAX_TRAIL) trail.shift();

    if (progress01 >= 1) {
      // one motion runs for the entire video — just restart this same
      // pattern's timing/radius plan instead of picking a new motion,
      // so it keeps going smoothly forever with no mid-video switch
      restartSamePattern();
      return;
    }

    if (now > state.nextFlashCheck) {
      state.nextFlashCheck = now + rand(600, 1800);
      if (Math.random() < 0.35) {
        state.flashActive = true;
        state.flashUntil = now + rand(90, 180);
        if (audioUnlocked) playFlashSfx();
      }
    }
    if (state.flashActive && now > state.flashUntil) {
      state.flashActive = false;
    }

    const normX = clamp(state.x / W, 0, 1);
    // rawSpeedNorm (0..1-ish) still used for the saber layer's speed reactivity
    const rawSpeedNorm = clamp(rawSpeedPerFrame / 30, 0, 1.4);
    if (audioUnlocked) {
      setWhoosh(normX, rawSpeedPerFrame);
      updateSaber(normX, rawSpeedNorm);
    }
  }

  // ---------- Render ----------
  function render(now) {
    if (now - lastPaletteChange > PALETTE_INTERVAL) {
      lastPaletteChange = now;
      triggerPaletteShift();
    }
    if (bgBlend < 1) {
      bgBlend = clamp(bgBlend + 0.01, 0, 1);
    }

    const bg = currentBg();

    if (useGradient) {
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
      const [h, s, l] = parseHsl(bg);
      const centerL = bgMode === 'dark' ? Math.min(l + 10, 20) : Math.max(l - 8, 70);
      grad.addColorStop(0, hsl(h, s, centerL));
      grad.addColorStop(1, bg);
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = bg;
    }
    ctx.fillRect(0, 0, W, H);

    // trail: smooth tapered line following the recent path, short + subtle
    if (trail.length >= 2) {
      const ballC = currentBall();
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 1; i < trail.length; i++) {
        const t0 = trail[i - 1];
        const t1 = trail[i];
        const progress = i / trail.length; // 0 (oldest) -> 1 (newest)
        ctx.globalAlpha = progress * 0.22;
        ctx.strokeStyle = ballC;
        ctx.lineWidth = t1.radius * (0.5 + progress * 0.35);
        ctx.beginPath();
        ctx.moveTo(t0.x, t0.y);
        ctx.lineTo(t1.x, t1.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    // squash & stretch based on speed/direction
    const speed = Math.hypot(state.vx, state.vy);
    const speedNorm = clamp(speed / (SPEED_MAX * 1.3), 0, 1);
    const stretchAmount = 1 + speedNorm * 0.14; // elongate along travel (slight)
    const squashAmount = 1 - speedNorm * 0.08;  // compress perpendicular (slight)
    const angle = Math.atan2(state.vy, state.vx);

    ctx.save();
    ctx.translate(state.x, state.y);
    ctx.rotate(angle);
    ctx.scale(stretchAmount, squashAmount);

    const ballFill = state.flashActive ? '#ffffff' : currentBall();

    if (state.blurry) {
      // cheap soft-edge look: draw a few translucent expanding rings using
      // shadowBlur (GPU-cheap) instead of ctx.filter blur (very expensive
      // per-frame and the main cause of recording lag)
      ctx.shadowColor = ballFill;
      ctx.shadowBlur = 34 + speedNorm * 20;
      ctx.globalAlpha = 0.55;
      ctx.beginPath();
      ctx.arc(0, 0, state.radius * 1.04, 0, Math.PI * 2);
      ctx.fillStyle = ballFill;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.shadowColor = ballFill;
    ctx.shadowBlur = state.flashActive ? 60 : 22;
    ctx.beginPath();
    ctx.arc(0, 0, state.radius, 0, Math.PI * 2);
    ctx.fillStyle = ballFill;
    ctx.fill();
    ctx.restore();
  }

  function loop(now) {
    const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
    lastFrameTime = now;

    updateMotion(now, dt);
    render(now);
    requestAnimationFrame(loop);
  }

  // ---------- Init / Session control ----------
  // startSession() fully resets everything: new palette, new pattern, new
  // ball size/motion, cleared trail — as if the page was closed and reopened.
  // Called once on load, and again on every tap (after the very first tap,
  // which is reserved for unlocking audio per browser autoplay rules).
  function startSession() {
    trail.length = 0;

    state.x = W / 2;
    state.y = H / 2;
    state.pathX = state.x;
    state.pathY = state.y;
    state.transFrom.x = state.x;
    state.transFrom.y = state.y;
    state._lastDirX = undefined;
    state._scratchCooldown = 0;

    lastPaletteChange = performance.now();
    rotatePalette();
    bgBase = pickBgColor();
    ballColor = pickBallColor();
    bgFrom = bgBase; bgTo = bgBase; bgBlend = 1;
    ballFrom = ballColor; ballTo = ballColor;

    startNewPattern();

    if (audioUnlocked) {
      startWhoosh();
      startSaber();
    }
  }

  lastFrameTime = performance.now();
  startSession();
  requestAnimationFrame(loop);

  // unlock audio on first user interaction anywhere, silently
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startWhoosh();
    startSaber();
    startBrainwaveTone();
    window.removeEventListener('pointerdown', unlockAudio);
    window.removeEventListener('keydown', unlockAudio);
  }
  window.addEventListener('pointerdown', unlockAudio);
  window.addEventListener('keydown', unlockAudio);

  // Tapping the screen fully restarts the session — new pattern, new ball
  // color/size, cleared trail — as if the page were closed and reopened.
  // The very first tap still only unlocks audio (handled above); this
  // listener fires on every tap including that first one, but startSession()
  // re-running immediately after unlock on the first tap is fine/expected.
  window.addEventListener('pointerdown', function() {
    startSession();
  });

  // ---------- Recording (for headless capture -> mp4 -> Facebook) ----------
  // Exposes window.startRecording/stopRecording/forceFinalize/getRecordingBase64
  // so an external Selenium script can drive recording the same way as the
  // Japan Facts reel. Captures the existing canvas directly (no DOM overlay
  // to composite here) plus the Web Audio master bus.
  let _recorder = null;
  let _recChunks = [];
  let _recDest = null;
  window._recActive = false;
  window._recordingDone = false;
  window._recordingBlob = null;

  window.startRecording = function(fps) {
    fps = fps || 30;
    try {
      // make sure audio is running and unlocked before we start capturing
      unlockAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      window._recActive = true;
      window._recordingDone = false;
      window._recordingBlob = null;
      _recChunks = [];

      const videoStream = canvas.captureStream(fps);

      let combined = videoStream;
      if (audioCtx && masterGain) {
        _recDest = audioCtx.createMediaStreamDestination();
        masterGain.connect(_recDest);
        combined = new MediaStream([
          ...videoStream.getVideoTracks(),
          ..._recDest.stream.getAudioTracks()
        ]);
      }

      const mimeCandidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
      ];
      const mime = mimeCandidates.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

      _recorder = new MediaRecorder(combined, {
        mimeType: mime,
        videoBitsPerSecond: 8000000,
        audioBitsPerSecond: 192000
      });
      _recorder.ondataavailable = function(e) {
        if (e.data && e.data.size > 0) _recChunks.push(e.data);
      };
      _recorder.onstop = function() {
        window._recActive = false;
        try { if (_recDest) masterGain.disconnect(_recDest); } catch (e) {}
        window._recordingBlob = new Blob(_recChunks, { type: 'video/webm' });
        window._recordingDone = true;
      };
      _recorder.start(200);
      console.log('Recording started');
    } catch (e) {
      console.error('startRecording error:', e);
    }
  };

  window.stopRecording = function() {
    try {
      if (_recorder && _recorder.state !== 'inactive') _recorder.stop();
    } catch (e) {}
  };

  window.forceFinalize = function() {
    window._recActive = false;
    if (_recChunks.length > 0 && !window._recordingDone) {
      window._recordingBlob = new Blob(_recChunks, { type: 'video/webm' });
      window._recordingDone = true;
    }
  };

  window.getRecordingBase64 = function() {
    return new Promise(function(resolve, reject) {
      const check = function() {
        if (!window._recordingBlob) { setTimeout(check, 100); return; }
        const r = new FileReader();
        r.onloadend = function() { resolve(r.result.split(',')[1]); };
        r.onerror = reject;
        r.readAsDataURL(window._recordingBlob);
      };
      check();
    });
  };

  // expose for parity with reference script conventions
  window.AC = null;
  Object.defineProperty(window, 'AC', {
    get: function() { return audioCtx; }
  });
})();
</script>
</body>
</html>
