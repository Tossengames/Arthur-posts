<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASMR</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{width:100vw;height:100vh;overflow:hidden;background:#000;}canvas{position:fixed;inset:0;width:100%;height:100%;}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,CX,CY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
resize();
function rnd(a,b){return a+Math.random()*(b-a);}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ─── AUDIO ────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
AC.resume().catch(()=>{});
['touchstart','click'].forEach(e=>document.addEventListener(e,()=>{if(AC.state==='suspended')AC.resume();},{once:true}));
const MG=AC.createGain();MG.gain.value=0.85;MG.connect(AC.destination);
const RD=AC.createMediaStreamDestination();MG.connect(RD);

let _wN=null,_wN2=null,_wG=null,_wP=null;
function startWhoosh(vol){
  try{if(_wN)_wN.stop();}catch(e){}
  try{if(_wN2)_wN2.stop();}catch(e){}
  try{
    const sr=AC.sampleRate,len=sr*4;
    const mkN=(freq,q,g)=>{
      const buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
      const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
      const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;
      const gain=AC.createGain();gain.gain.value=(vol||1)*g;
      src.connect(f);f.connect(gain);return{src,gain};
    };
    const h=mkN(480,1.0,0.85),l=mkN(150,1.2,0.40);
    _wG=h.gain;
    _wP=AC.createStereoPanner?AC.createStereoPanner():null;
    if(_wP){h.gain.connect(_wP);l.gain.connect(_wP);_wP.connect(MG);}
    else{h.gain.connect(MG);l.gain.connect(MG);}
    h.src.start();l.src.start();
    _wN=h.src;_wN2=l.src;
  }catch(e){}
}
function setWhoosh(xFrac,spd,baseVol){
  if(!_wG||!AC)return;
  if(_wP)_wP.pan.setTargetAtTime(Math.max(-1,Math.min(1,xFrac*2-1)),AC.currentTime,0.04);
  _wG.gain.setTargetAtTime(Math.max((baseVol||0.5)*0.4,Math.min((baseVol||0.85)*1.6,(baseVol||0.85)*0.4+spd*0.05)),AC.currentTime,0.04);
}
function stopWhoosh(){try{if(_wN)_wN.stop();}catch(e){}try{if(_wN2)_wN2.stop();}catch(e){}_wN=null;_wN2=null;}

let _bL=null,_bR=null,_pads=[];
function startBinaural(base,hz,vol){
  stopBinaural();
  try{
    const m=AC.createChannelMerger(2);
    const oL=AC.createOscillator(),gL=AC.createGain();oL.type='sine';oL.frequency.value=base;gL.gain.value=vol||0.20;oL.connect(gL);gL.connect(m,0,0);
    const oR=AC.createOscillator(),gR=AC.createGain();oR.type='sine';oR.frequency.value=base+(hz||0);gR.gain.value=vol||0.20;oR.connect(gR);gR.connect(m,0,1);
    m.connect(MG);oL.start();oR.start();_bL=oL;_bR=oR;
  }catch(e){}
}
function stopBinaural(){try{if(_bL)_bL.stop();}catch(e){}try{if(_bR)_bR.stop();}catch(e){}_bL=null;_bR=null;}
function startPad(freqs,vol){
  stopPad();
  (freqs||[]).forEach(f=>{try{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.05,t+2);o.connect(g);g.connect(MG);o.start();_pads.push(o,g);}catch(e){}});
}
function stopPad(){_pads.forEach(n=>{try{n.stop&&n.stop();}catch(e){}});_pads=[];}

function playScratch(freq,vol,pan){
  try{
    const sr=AC.sampleRate,len=Math.floor(sr*0.07),buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const e=Math.pow(1-i/len,0.5);d[i]=(Math.random()*2-1)*e;}
    const src=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();
    f.type='bandpass';f.frequency.value=freq;f.Q.value=1.6;g.gain.value=Math.min(0.65,vol);
    const p=pan!==undefined&&AC.createStereoPanner?AC.createStereoPanner():null;
    src.buffer=buf;src.connect(f);f.connect(g);
    if(p){g.connect(p);p.pan.value=Math.max(-1,Math.min(1,pan));p.connect(MG);}else g.connect(MG);
    src.start();src.stop(AC.currentTime+0.09);
  }catch(e){}
}
function playPong(freq,vol,pan){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    const p=pan!==undefined&&AC.createStereoPanner?AC.createStereoPanner():null;
    o.type='sine';o.frequency.value=freq;
    const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(g);if(p){g.connect(p);p.pan.value=pan;p.connect(MG);}else g.connect(MG);
    o.start(t);o.stop(t+0.2);
  }catch(e){}
}
function playFlash(vol,freq){
  try{
    const sr=AC.sampleRate,len=Math.floor(sr*0.06),buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const e=Math.pow(1-i/len,2.0);d[i]=(Math.random()*2-1)*e;}
    const src=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();
    f.type='highpass';f.frequency.value=freq||800;g.gain.value=Math.min(0.8,vol||0.4);
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(MG);src.start();src.stop(AC.currentTime+0.07);
  }catch(e){}
}

// ─── RECORDING ────────────────────────────────────────
let _mr=null,_rc=[],_rb=null;
window._recordingDone=false;
window.startRecording=function(fps){
  try{
    _rc=[];_rb=null;window._recordingDone=false;AC.resume().catch(()=>{});
    const vs=cv.captureStream(fps||30),at=RD.stream.getAudioTracks();
    const ms=new MediaStream([...vs.getVideoTracks(),...at]);
    const mt=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _mr=new MediaRecorder(ms,{mimeType:mt,videoBitsPerSecond:8000000});
    _mr.ondataavailable=e=>{if(e.data&&e.data.size>0)_rc.push(e.data);};
    _mr.onstop=()=>{_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;};
    _mr.start(200);
  }catch(e){console.error(e);}
};
window.stopRecording=function(){try{if(_mr&&_mr.state!=='inactive')_mr.stop();}catch(e){}};
window.forceFinalize=function(){try{if(_rc.length>0&&!window._recordingDone){_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;}}catch(e){}};
window.getRecordingBase64=function(){return new Promise((res,rej)=>{const chk=()=>{if(!_rb){setTimeout(chk,100);return;}const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(_rb);};chk();});};

// ─── DRAW HELPERS ─────────────────────────────────────
function drawBall(bx,by,r,h,s,l,gh,gs,gl){
  if(r<1)return;
  const col=`hsl(${h},${s}%,${l}%)`;
  const glow=ctx.createRadialGradient(bx,by,r*0.1,bx,by,r*2.0);
  glow.addColorStop(0,`hsla(${gh},${gs}%,${gl}%,0.30)`);glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(bx,by,r*2.0,0,Math.PI*2);ctx.fill();
  const bg=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.05,bx,by,r);
  bg.addColorStop(0,'rgba(255,255,255,0.60)');bg.addColorStop(0.5,col);bg.addColorStop(1,`hsl(${gh},${gs}%,${gl}%)`);
  ctx.fillStyle=bg;ctx.shadowColor=col;ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.72)';ctx.beginPath();ctx.arc(bx-r*0.28,by-r*0.28,r*0.20,0,Math.PI*2);ctx.fill();
}
function drawTrail(trail,r,h,s,l){
  for(let i=1;i<trail.length;i++){
    const p=trail[i],pp=trail[i-1],frac=i/trail.length;
    ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${frac*0.50})`;
    ctx.lineWidth=r*0.3+frac*r*0.9;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(pp.x,pp.y);ctx.lineTo(p.x,p.y);ctx.stroke();
  }
}
function mkBall(){
  const h=rndInt(0,359),s=rndInt(55,95),l=rndInt(45,72);
  const gh=(h+40)%360,gs=s,gl=Math.min(85,l+18),th=(h+20)%360;
  const ts=s,tl=l;
  // DOUBLED BALL SIZE
  const base=Math.min(W,H)*rnd(0.076,0.160);
  return{h,s,l,gh,gs,gl,th,ts,tl,base,
    pulsing:Math.random()<0.5,minR:base*rnd(0.50,0.78),maxR:base*rnd(1.15,1.60),pulseSpd:rnd(0.04,0.16)};
}
function getBR(b,tf){if(!b.pulsing)return b.base;return b.minR+(b.maxR-b.minR)*(0.5+Math.sin(tf*b.pulseSpd)*0.5);}

const WAVES=[
  {name:'Alpha 10Hz',help:'Relaxed & calm',base:200,hz:10,pad:[130,196,261]},
  {name:'Theta 6Hz',help:'Deep relaxation',base:180,hz:6,pad:[108,162,216]},
  {name:'Alpha 8Hz',help:'Stress relief',base:210,hz:8,pad:[132,198,264]},
  {name:'432 Hz',help:'Natural harmony',base:432,hz:0,pad:[216,324,432]},
  {name:'528 Hz',help:'Healing tone',base:528,hz:0,pad:[264,396,528]},
  {name:'Schumann',help:'Earth resonance',base:185,hz:7.83,pad:[111,166,222]},
];

// ─── UI DISABLED (transparent background) ──────────────
function drawUI(l1,l2,wl,dark){/* DO NOTHING */}

// ─── SCENE 1: SMOOTH FOLLOW ───────────────────────────
function scene1(){
  const wave=pick(WAVES),b=mkBall(),pat=mkPat();
  let tf=0,trail=[];let cx=0.5,cy=0.5,pcx=0.5,pcy=0.5;
  startWhoosh(0.9);startBinaural(wave.base,wave.hz,0.20);startPad(wave.pad,0.050);
  return {run(){
    tf++;const tgt=pat.getTarget();pcx=cx;pcy=cy;
    cx+=(tgt.x-cx)*pat.ls;cy+=(tgt.y-cy)*pat.ls;
    const spd=Math.hypot((cx-pcx)*W,(cy-pcy)*H);setWhoosh(cx,spd,0.9);
    trail.push({x:cx*W,y:cy*H});if(trail.length>42)trail.shift();
    ctx.clearRect(0,0,W,H);
    const r=getBR(b,tf);drawTrail(trail,r,b.th,b.ts,b.tl);drawBall(cx*W,cy*H,r,b.h,b.s,b.l,b.gh,b.gs,b.gl);
  }};
}

// ─── SCENE 2: PONG BOUNCE ────────────────────────────
function scene2(){
  const b=mkBall(),ang=rnd(0.3,1.2),baseSpd=rnd(4.0,11.0);
  let vx=Math.cos(ang)*baseSpd,vy=Math.sin(ang)*baseSpd;
  let cx=W/2,cy=H/2,tf=0,trail=[];
  const hasBg=Math.random()<0.6,b2=mkBall();b2.h=(b.h+150+rndInt(-30,30)+360)%360;b2.gh=(b2.h+40)%360;
  const bgPat=mkPat();let bgCx=0.5,bgCy=0.5,bgPcx=0.5,bgPcy=0.5;
  const accel=Math.random()<0.4,accelAmt=rnd(0.002,0.008);let accelDir=1;
  const basePitch=rnd(200,600),baseVol=rnd(0.12,0.30);
  startWhoosh(0.6);
  return {run(){
    tf++;const r=getBR(b,tf),pad=r;
    cx+=vx;cy+=vy;
    if(cx-pad<0){cx=pad;vx=Math.abs(vx);playPong(basePitch*rnd(0.6,1.8),Math.min(0.6,baseVol*rnd(0.5,1.4)),(cx/W)*2-1);}
    if(cx+pad>W){cx=W-pad;vx=-Math.abs(vx);playPong(basePitch*rnd(0.6,1.8),Math.min(0.6,baseVol*rnd(0.5,1.4)),(cx/W)*2-1);}
    if(cy-pad<0){cy=pad;vy=Math.abs(vy);playPong(basePitch*rnd(0.6,1.8),Math.min(0.6,baseVol*rnd(0.5,1.4)),(cx/W)*2-1);}
    if(cy+pad>H){cy=H-pad;vy=-Math.abs(vy);playPong(basePitch*rnd(0.6,1.8),Math.min(0.6,baseVol*rnd(0.5,1.4)),(cx/W)*2-1);}
    if(accel){const cs=Math.hypot(vx,vy);if(cs>baseSpd*1.8)accelDir=-1;if(cs<baseSpd*0.4)accelDir=1;const ns=cs*(1+accelAmt*accelDir);vx=vx/cs*ns;vy=vy/cs*ns;}
    if(hasBg){const bp=bgPat.getTarget();bgPcx=bgCx;bgPcy=bgCy;bgCx+=(bp.x-bgCx)*0.06;bgCy+=(bp.y-bgCy)*0.06;}
    setWhoosh(cx/W,Math.hypot(vx,vy),0.6);
    trail.push({x:cx,y:cy});if(trail.length>38)trail.shift();
    ctx.clearRect(0,0,W,H);
    if(hasBg){ctx.save();ctx.globalAlpha=0.35;drawBall(bgCx*W,bgCy*H,getBR(b2,tf),b2.h,70,60,b2.gh,70,75);ctx.restore();}
    drawTrail(trail,r,b.th,b.ts,b.tl);drawBall(cx,cy,r,b.h,b.s,b.l,b.gh,b.gs,b.gl);
  }};
}

// ─── SCENE 3: SCRATCH ────────────────────────────────
function scene3(){
  let b=mkBall(),pat=mkPat();
  let patDur=rndInt(600,1800),patTimer=0;
  let cx=0.5,cy=0.5,pcx=0.5,pcy=0.5,scCool=0,lastDX=0,tf=0,trail=[];
  startWhoosh(0.85);
  return {run(){
    tf++;patTimer++;
    if(patTimer>=patDur){patTimer=0;patDur=rndInt(600,1800);pat=mkPat();if(Math.random()<0.3)b=mkBall();}
    const tgt=pat.getTarget();pcx=cx;pcy=cy;
    cx+=(tgt.x-cx)*pat.ls;cy+=(tgt.y-cy)*pat.ls;
    const spd=Math.hypot((cx-pcx)*W,(cy-pcy)*H);setWhoosh(cx,spd,0.85);
    const dX=cx>pcx?1:-1;scCool--;
    if(dX!==lastDX&&spd>2.5&&scCool<=0){playScratch(rnd(280,1100),rnd(0.10,0.40));scCool=rndInt(3,10);}
    lastDX=dX;trail.push({x:cx*W,y:cy*H});if(trail.length>38)trail.shift();
    ctx.clearRect(0,0,W,H);
    const r=getBR(b,tf);drawTrail(trail,r,b.th,b.ts,b.tl);drawBall(cx*W,cy*H,r,b.h,b.s,b.l,b.gh,b.gs,b.gl);
  }};
}

// ─── SCENE 4: DUAL SCRATCH ───────────────────────────
function scene4(){
  let bL=mkBall(),bR=mkBall();bR.h=(bL.h+150+rndInt(-30,30)+360)%360;bR.gh=(bR.h+40)%360;bR.th=(bR.h+20)%360;
  let patL=mkHalfPat('left'),patR=mkHalfPat('right');
  let pdL=rndInt(600,1800),pdR=rndInt(600,1800),ptL=0,ptR=0;
  let cxL=0.25,cyL=0.5,pcxL=0.25,pcyL=0.5;
  let cxR=0.75,cyR=0.5,pcxR=0.75,pcyR=0.5;
  let dxL=0,dxR=0,scL=0,scR=0,tf=0;
  let trailL=[],trailR=[];
  startWhoosh(0.85);
  return {run(){
    tf++;ptL++;ptR++;
    if(ptL>=pdL){ptL=0;pdL=rndInt(600,1800);patL=mkHalfPat('left');if(Math.random()<0.3)bL=mkBall();}
    if(ptR>=pdR){ptR=0;pdR=rndInt(600,1800);patR=mkHalfPat('right');if(Math.random()<0.3)bR=mkBall();}
    const tL=patL.getTarget();pcxL=cxL;pcyL=cyL;cxL+=(tL.x-cxL)*patL.ls;cyL+=(tL.y-cyL)*patL.ls;
    const spdL=Math.hypot((cxL-pcxL)*W,(cyL-pcyL)*H);
    const ndxL=cxL>pcxL?1:-1;scL--;if(ndxL!==dxL&&spdL>2.5&&scL<=0){playScratch(rnd(280,1000),rnd(0.10,0.38),-0.85);scL=rndInt(3,10);}dxL=ndxL;
    trailL.push({x:cxL*W,y:cyL*H});if(trailL.length>35)trailL.shift();
    const tR=patR.getTarget();pcxR=cxR;pcyR=cyR;cxR+=(tR.x-cxR)*patR.ls;cyR+=(tR.y-cyR)*patR.ls;
    const spdR=Math.hypot((cxR-pcxR)*W,(cyR-pcyR)*H);
    const ndxR=cxR>pcxR?1:-1;scR--;if(ndxR!==dxR&&spdR>2.5&&scR<=0){playScratch(rnd(280,1000),rnd(0.10,0.38),0.85);scR=rndInt(3,10);}dxR=ndxR;
    trailR.push({x:cxR*W,y:cyR*H});if(trailR.length>35)trailR.shift();
    setWhoosh((spdL>spdR?cxL:cxR),Math.max(spdL,spdR),0.85);
    ctx.clearRect(0,0,W,H);
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.setLineDash([6,10]);ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,H);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    const rL=getBR(bL,tf),rR=getBR(bR,tf);
    drawTrail(trailL,rL,bL.th,bL.ts,bL.tl);drawBall(cxL*W,cyL*H,rL,bL.h,bL.s,bL.l,bL.gh,bL.gs,bL.gl);
    drawTrail(trailR,rR,bR.th,bR.ts,bR.tl);drawBall(cxR*W,cyR*H,rR,bR.h,bR.s,bR.l,bR.gh,bR.gs,bR.gl);
  }};
}

// ─── SCENE 5: LIGHT BALL ─────────────────────────────
function scene5(){
  const bH=rndInt(0,359),bS=rndInt(0,100),bL2=rndInt(72,96);
  const half=Math.min(W,H)*0.5,base=half*0.90;
  // DOUBLED LIGHT BALL SIZE
  let minR=base*rnd(1.40,1.76);
  let maxR=base*rnd(2.16,2.40);
  let pulseSpd=rnd(0.015,0.060),pulsePhase=rnd(0,Math.PI*2);
  let curM=mkLightPat(),mDur=rndInt(600,1800),mTimer=0;
  let cx=0.5,cy=0.5,pcx=0.5,pcy=0.5,scCool=0,lastDX=0,tf=0;
  startWhoosh(1.0);
  return {run(){
    tf++;mTimer++;if(mTimer>=mDur){mTimer=0;mDur=rndInt(600,1800);curM=mkLightPat();}
    const tgt=curM.getTarget(cx,cy);pcx=cx;pcy=cy;
    const lspd=tgt.lerp||0.15;cx+=(tgt.x-cx)*lspd;cy+=(tgt.y-cy)*lspd;
    const bx=cx*W,by=cy*H,spd=Math.hypot((cx-pcx)*W,(cy-pcy)*H);
    setWhoosh(cx,spd,1.0);
    const dX=cx>pcx?1:-1;scCool--;if(dX!==lastDX&&spd>1.5&&scCool<=0){playScratch(rnd(250,900),rnd(0.08,0.35));scCool=rndInt(5,18);}lastDX=dX;
    const r=minR+(maxR-minR)*(0.5+Math.sin(tf*pulseSpd+pulsePhase)*0.5);
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(bx,by,0,bx,by,r*1.6);
    g.addColorStop(0.00,'rgba(255,255,255,1.00)');g.addColorStop(0.06,'rgba(255,255,255,0.96)');
    g.addColorStop(0.20,`hsla(${bH},${bS}%,${bL2}%,0.90)`);g.addColorStop(0.50,`hsla(${bH},${bS}%,${Math.max(40,bL2-20)}%,0.50)`);
    g.addColorStop(0.82,`hsla(${bH},${bS}%,${Math.max(20,bL2-40)}%,0.14)`);g.addColorStop(1.00,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,r*1.6,0,Math.PI*2);ctx.fill();
  }};
}

// ─── SCENE 6: FLASH LIGHT ────────────────────────────
function scene6(){
  const modes=['strobe','single','flicker','slow_pulse','burst'];
  const flashMode=pick(modes);
  const fH=rndInt(0,359),fS=rndInt(0,100),fL=rndInt(85,100);
  let brightness=0,lx=0.5,ly=0.5;
  const motPat=mkFlashPat();
  const ms={timer:0};
  if(flashMode==='strobe'){ms.interval=rndInt(4,18);ms.onF=rndInt(1,5);ms.on=false;}
  else if(flashMode==='single'){ms.phase='dark';ms.darkDur=rndInt(20,90);ms.holdDur=rndInt(5,40);ms.fadeDur=rndInt(10,50);}
  else if(flashMode==='flicker'){ms.interval=rndInt(2,8);ms.minB=rnd(0.0,0.3);}
  else if(flashMode==='slow_pulse'){ms.spd=rnd(0.012,0.040);ms.minB=rnd(0.0,0.15);ms.t=0;}
  else{ms.phase='dark';ms.darkDur=rndInt(40,120);ms.burstCount=0;ms.burstMax=rndInt(3,10);ms.burstInterval=rndInt(2,8);}
  startWhoosh(0.0);
  return {run(){
    ms.timer++;
    if(flashMode==='strobe'){
      if(!ms.on&&ms.timer>=ms.interval){ms.timer=0;ms.on=true;playFlash(rnd(0.2,0.6),rnd(500,1500));}
      else if(ms.on&&ms.timer>=ms.onF){ms.timer=0;ms.on=false;}
      brightness=ms.on?1.0:0.0;
    } else if(flashMode==='single'){
      if(ms.phase==='dark'){brightness=0;if(ms.timer>=ms.darkDur){ms.phase='flash';ms.timer=0;playFlash(rnd(0.3,0.7),rnd(400,1200));}}
      else if(ms.phase==='flash'){brightness=1.0;if(ms.timer>=3){ms.phase='hold';ms.timer=0;}}
      else if(ms.phase==='hold'){brightness=1.0;if(ms.timer>=ms.holdDur){ms.phase='fade';ms.timer=0;}}
      else if(ms.phase==='fade'){brightness=1.0-ms.timer/ms.fadeDur;if(ms.timer>=ms.fadeDur){ms.phase='dark';ms.timer=0;brightness=0;ms.darkDur=rndInt(20,90);}}
    } else if(flashMode==='flicker'){
      if(ms.timer>=ms.interval){ms.timer=0;ms.interval=rndInt(1,10);brightness=Math.random()<0.7?rnd(ms.minB,1.0):ms.minB;if(brightness>0.6)playFlash(rnd(0.1,0.35),rnd(600,2000));}
    } else if(flashMode==='slow_pulse'){
      ms.t+=ms.spd;brightness=ms.minB+(1-ms.minB)*(0.5+Math.sin(ms.t)*0.5);
    } else {
      if(ms.phase==='dark'){brightness=0;if(ms.timer>=ms.darkDur){ms.phase='burst';ms.timer=0;ms.burstCount=0;}}
      else if(ms.phase==='burst'){if(ms.timer%ms.burstInterval===0){brightness=1.0;playFlash(rnd(0.2,0.6),rnd(400,1400));ms.burstCount++;if(ms.burstCount>=ms.burstMax){ms.phase='dark';ms.timer=0;ms.darkDur=rndInt(40,120);ms.burstMax=rndInt(3,10);brightness=0;}}else brightness=Math.max(0,brightness-0.25);}
    }
    const tgt=motPat.fn();lx+=(tgt.x-lx)*0.12;ly+=(tgt.y-ly)*0.12;
    if(_wG)_wG.gain.setTargetAtTime(brightness*0.9,AC.currentTime,0.04);
    if(_wP)_wP.pan.setTargetAtTime(Math.max(-1,Math.min(1,lx*2-1)),AC.currentTime,0.04);
    ctx.clearRect(0,0,W,H);
    if(brightness>0.001){
      const bx=lx*W,by=ly*H,rv=Math.min(W,H)*0.75;
      const g=ctx.createRadialGradient(bx,by,0,bx,by,rv);
      const col=fS===0?'rgba(255,255,255,':`hsla(${fH},${fS}%,${fL}%,`;
      g.addColorStop(0.00,col+(brightness*1.00)+')');g.addColorStop(0.10,col+(brightness*0.95)+')');
      g.addColorStop(0.35,col+(brightness*0.65)+')');g.addColorStop(0.60,col+(brightness*0.28)+')');
      g.addColorStop(0.82,col+(brightness*0.08)+')');g.addColorStop(1.00,col+'0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      if(brightness>0.5){const hot=ctx.createRadialGradient(bx,by,0,bx,by,Math.min(W,H)*0.22);hot.addColorStop(0,`rgba(255,255,255,${(brightness-0.5)*2*0.88})`);hot.addColorStop(1,'transparent');ctx.fillStyle=hot;ctx.fillRect(0,0,W,H);}
    }
  }};
}

// ─── PATTERN GENERATORS ──────────────────────────────
function mkPat(){
  const type=rndInt(0,6);
  if(type===0){
    const cx=rnd(0.25,0.75),cy=rnd(0.25,0.75),rx=rnd(0.14,0.38),ry=rnd(0.12,0.32);
    const dir=Math.random()<0.5?1:-1,spd=rnd(0.025,0.070);let t=rnd(0,Math.PI*2);
    return{label:'Circle',ls:rnd(0.10,0.22),getTarget(){t+=spd*dir;return{x:cx+Math.cos(t)*rx,y:cy+Math.sin(t)*ry};}};
  }
  if(type===1){
    const cy=rnd(0.25,0.75),yw=rnd(0.02,0.10),spd=rnd(0.055,0.130);let t=0;
    return{label:'Side to Side',ls:rnd(0.15,0.30),getTarget(){t+=spd;return{x:0.5+Math.sin(t)*0.44,y:cy+Math.sin(t*2.1)*yw};}};
  }
  if(type===2){
    const cx=rnd(0.25,0.75),xw=rnd(0.02,0.09),spd=rnd(0.055,0.130);let t=0;
    return{label:'Up Down',ls:rnd(0.15,0.30),getTarget(){t+=spd;return{x:cx+Math.sin(t*1.7)*xw,y:0.5+Math.sin(t)*0.42};}};
  }
  if(type===3){
    const aUp=Math.random()<0.5,gR=Math.random()<0.5,sy=rnd(0.35,0.65),ey=rnd(0.35,0.65),pY=aUp?rnd(0.06,0.22):rnd(0.78,0.94);
    let t=0;const spd=rnd(0.015,0.045);
    return{label:'Arch',ls:rnd(0.08,0.20),getTarget(){t=(t+spd)%1;const u=t,sx=gR?0.04:0.96,ex=gR?0.96:0.04,mx=(sx+ex)/2;return{x:(1-u)*(1-u)*sx+2*(1-u)*u*mx+u*u*ex,y:(1-u)*(1-u)*sy+2*(1-u)*u*pY+u*u*ey};}};
  }
  if(type===4){
    const bCX=rnd(0.30,0.70),bCY=rnd(0.30,0.70),bRX=rnd(0.18,0.35),bRY=rnd(0.14,0.28);
    const bS=rnd(0.012,0.028)*(Math.random()<0.5?1:-1),sR=rnd(0.05,0.14),sS=rnd(0.045,0.130)*(Math.random()<0.5?1:-1);
    let bT=rnd(0,Math.PI*2),sT=rnd(0,Math.PI*2);
    return{label:'Orbital',ls:rnd(0.10,0.22),getTarget(){bT+=bS;sT+=sS;return{x:Math.max(0.02,Math.min(0.98,bCX+Math.cos(bT)*bRX+Math.cos(sT)*sR)),y:Math.max(0.02,Math.min(0.98,bCY+Math.sin(bT)*bRY+Math.sin(sT)*sR)};}};
  }
  if(type===5){
    let tx=rnd(0.1,0.9),ty=rnd(0.1,0.9),timer=0,iv=rndInt(3,10);
    return{label:'Aggressive',ls:rnd(0.28,0.48),getTarget(){timer++;if(timer>=iv){timer=0;iv=rndInt(3,10);tx=rnd(0.05,0.95);ty=rnd(0.05,0.95);}return{x:tx,y:ty};}};
  }
  // type===6 figure8
  let t=rnd(0,Math.PI*2);const spd=rnd(0.04,0.10);
  return{label:'Figure8',ls:rnd(0.12,0.25),getTarget(){t+=spd;return{x:0.5+Math.sin(t)*0.42,y:0.5+Math.sin(t*2)*0.22};}};
}

function mkHalfPat(side){
  const xl=side==='left'?0.01:0.51,xh=side==='left'?0.49:0.99,xm=(xl+xh)/2;
  const cl=x=>Math.max(xl,Math.min(xh,x));
  const type=rndInt(0,4);
  if(type===0){
    const cy=rnd(0.25,0.75),yw=rnd(0.01,0.06),spd=rnd(0.09,0.22);let t=0;
    return{label:'Side Sweep',ls:rnd(0.28,0.48),getTarget(){t+=spd;return{x:cl(xm+Math.sin(t)*(xh-xm)*0.88),y:cy+Math.sin(t*2)*yw};}};
  }
  if(type===1){
    const cx=cl(rnd(xl+0.04,xh-0.04)),xw=rnd(0.01,0.04),spd=rnd(0.08,0.20);let t=0;
    return{label:'Up Down',ls:rnd(0.28,0.48),getTarget(){t+=spd;return{x:cl(cx+Math.sin(t*1.5)*xw),y:0.5+Math.sin(t)*0.42};}};
  }
  if(type===2){
    const cx=xm,cy=rnd(0.30,0.70),rx=Math.min((xh-xm)*0.82,0.17),ry=rnd(0.12,0.28);
    const dir=Math.random()<0.5?1:-1,spd=rnd(0.06,0.14);let t=rnd(0,Math.PI*2);
    return{label:'Circle',ls:rnd(0.25,0.42),getTarget(){t+=spd*dir;return{x:cl(cx+Math.cos(t)*rx),y:cy+Math.sin(t)*ry};}};
  }
  if(type===3){
    let tx=xm,ty=0.5,timer=0,iv=rndInt(4,14);
    return{label:'Chaos',ls:rnd(0.28,0.50),getTarget(){timer++;if(timer>=iv){timer=0;iv=rndInt(3,12);tx=cl(rnd(xl+0.02,xh-0.02));ty=rnd(0.05,0.95);}return{x:tx,y:ty};}};
  }
  // type===4 arch
  const aUp=Math.random()<0.5,pY=aUp?rnd(0.06,0.22):rnd(0.78,0.94);let t=0;const spd=rnd(0.025,0.060);
  return{label:'Arch',ls:rnd(0.22,0.40),getTarget(){t=(t+spd)%1;const u=t,sx=xl+0.03,ex=xh-0.03,mx=(sx+ex)/2;return{x:cl((1-u)*(1-u)*sx+2*(1-u)*u*mx+u*u*ex),y:0.5+Math.sin(u*Math.PI*2)*(aUp?-0.32:0.32)};}};
}

function mkLightPat(){
  const type=rndInt(0,4);
  const bl=(cx,cy,base)=>{const d=Math.hypot(cx-0.5,cy-0.5);return Math.max(0.05,Math.min(0.95,base*(1.0+(0.70-d)*2.2)));};
  if(type===0){
    const bx2=rnd(0.30,0.70),xw=rnd(0.01,0.04),spd=rnd(0.065,0.140);let t=rnd(0,Math.PI*2);const base=rnd(0.10,0.18);
    return{getTarget(cx,cy){t+=spd;return{x:bx2+Math.sin(t*0.5)*xw,y:0.5+Math.sin(t)*0.48,lerp:bl(cx,cy,base)};}};
  }
  if(type===1){
    const by2=rnd(0.30,0.70),yw=rnd(0.01,0.04),spd=rnd(0.065,0.140);let t=rnd(0,Math.PI*2);const base=rnd(0.10,0.18);
    return{getTarget(cx,cy){t+=spd;return{x:0.5+Math.sin(t)*0.48,y:by2+Math.sin(t*0.6)*yw,lerp:bl(cx,cy,base)};}};
  }
  if(type===2){
    const ocx=rnd(0.30,0.70),ocy=rnd(0.30,0.70),rx=rnd(0.20,0.40),ry=rnd(0.18,0.36);
    const dir=Math.random()<0.5?1:-1,spd=rnd(0.040,0.090);let t=rnd(0,Math.PI*2);const base=rnd(0.10,0.18);
    return{getTarget(cx,cy){t+=spd*dir;return{x:Math.max(0.01,Math.min(0.99,ocx+Math.cos(t)*rx)),y:Math.max(0.01,Math.min(0.99,ocy+Math.sin(t)*ry)),lerp:bl(cx,cy,base)};}};
  }
  if(type===3){
    const aUp=Math.random()<0.5,gR=Math.random()<0.5,sy=rnd(0.30,0.70),ey=rnd(0.30,0.70),pY=aUp?rnd(0.04,0.18):rnd(0.82,0.96);
    let t=0;const spd=rnd(0.030,0.070);const base=rnd(0.10,0.18);
    return{getTarget(cx,cy){t=(t+spd)%1;const u=t,sx=gR?0.02:0.98,ex=gR?0.98:0.02,mx=(sx+ex)/2;return{x:(1-u)*(1-u)*sx+2*(1-u)*u*mx+u*u*ex,y:(1-u)*(1-u)*sy+2*(1-u)*u*pY+u*u*ey,lerp:bl(cx,cy,base)};}};
  }
  // chaos
  const wps=[()=>({x:rnd(0.01,0.07),y:rnd(0.05,0.95)}),()=>({x:rnd(0.93,0.99),y:rnd(0.05,0.95)}),()=>({x:rnd(0.05,0.95),y:rnd(0.01,0.07)}),()=>({x:rnd(0.05,0.95),y:rnd(0.93,0.99)}),()=>({x:rnd(0.40,0.60),y:rnd(0.40,0.60)}),()=>({x:rnd(0.10,0.90),y:rnd(0.10,0.90)})];
  let tx=0.5,ty=0.5,timer=0,iv=rndInt(6,22);const base=rnd(0.12,0.22);
  return{getTarget(cx,cy){timer++;if(timer>=iv){timer=0;iv=rndInt(5,20);const w=pick(wps)();tx=w.x;ty=w.y;}return{x:tx,y:ty,lerp:bl(cx,cy,base)};}};
}

function mkFlashPat(){
  const type=rndInt(0,3);
  if(type===0){const spd=rnd(0.04,0.10);let t=rnd(0,Math.PI*2);return{fn(){t+=spd;return{x:0.5+Math.sin(t)*0.44,y:0.50};}};}
  if(type===1){const spd=rnd(0.04,0.10);let t=rnd(0,Math.PI*2);return{fn(){t+=spd;return{x:0.50,y:0.5+Math.sin(t)*0.40};}};}
  if(type===2){const spd=rnd(0.04,0.10);let t=rnd(0,Math.PI*2);return{fn(){t+=spd;return{x:0.5+Math.cos(t)*0.38,y:0.5+Math.sin(t)*0.34};}};}
  const wps=[()=>({x:rnd(0.05,0.95),y:rnd(0.05,0.95)}),()=>({x:rnd(0.02,0.10),y:rnd(0.05,0.95)}),()=>({x:rnd(0.90,0.98),y:rnd(0.05,0.95)})];
  let tx=0.5,ty=0.5,timer=0,iv=rndInt(15,45);
  return{fn(){timer++;if(timer>=iv){timer=0;iv=rndInt(12,40);const w=pick(wps)();tx=w.x;ty=w.y;}return{x:tx,y:ty};}};
}

// ─── 3-MINUTE LOOPING SESSION ─────────────────────────
const SCENE_FNS=[scene1,scene2,scene3,scene4,scene5,scene6];
let SESSION=null,TF=0,RAF=null;
const SCENE_DURATION = 20 * 60; // 20 seconds per scene
const TOTAL_DURATION = 180 * 60; // 180 seconds = 3 minutes

function startSession(){
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  stopBinaural();stopPad();stopWhoosh();TF=0;
  // Start with a random scene
  const SceneFn = pick(SCENE_FNS);
  SESSION = SceneFn();
  loop();
}

function loop(){
  RAF=requestAnimationFrame(loop);
  TF++;
  
  // Run current scene
  SESSION.run();
  
  // Check if current scene should end (after 20 seconds)
  if (TF % SCENE_DURATION === 0 && TF < TOTAL_DURATION) {
    // Clean up current scene's audio
    stopWhoosh();
    stopBinaural();
    stopPad();
    
    // Start a new random scene
    const SceneFn = pick(SCENE_FNS);
    SESSION = SceneFn();
  }
  
  // Fade out at the end
  if (TF >= TOTAL_DURATION - 90) {
    const a = (TF - (TOTAL_DURATION - 90)) / 90;
    ctx.fillStyle = `rgba(0,0,0,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, W, H);
  }
  
  // Stop at 3 minutes
  if (TF >= TOTAL_DURATION) {
    stopBinaural();
    stopPad();
    stopWhoosh();
    window.stopRecording();
    cancelAnimationFrame(RAF);
    RAF = null;
  }
}

window.addEventListener('DOMContentLoaded',()=>{resize();startSession();});
cv.addEventListener('click',()=>startSession());
cv.addEventListener('touchstart',e=>{e.preventDefault();startSession();},{passive:false});
window.addEventListener('resize',()=>resize());
</script>
