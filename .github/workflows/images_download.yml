name: Google Image Downloader

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Comma-separated keywords to search for images'
        required: true
        default: 'nature, animals'
      image_count:
        description: 'Number of images to download per keyword'
        required: true
        type: number
        default: 5

jobs:
  download-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install simple-image-download

      - name: Download images
        env:
          KEYWORDS: ${{ github.event.inputs.keywords }}
          IMAGE_COUNT: ${{ github.event.inputs.image_count }}
        run: python download_script.py

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-images
          path: downloaded_images/
          retention-days: 7