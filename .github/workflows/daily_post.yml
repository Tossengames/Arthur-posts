name: Daily Arthur Post

on:
  schedule:
    # Runs four times a day, optimized for USA audience engagement:
    # 13:00 UTC (9 AM ET / 6 AM PT)
    # 17:00 UTC (1 PM ET / 10 AM PT)
    # 21:00 UTC (5 PM ET / 2 PM PT)
    # 01:00 UTC (9 PM ET / 6 PM PT - next day's UTC)
    - cron: '0 13,17,21,1 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  post_to_facebook:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Use the latest Python 3.x version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run python post.py
      run: python post.py
      env:
        # These are your secrets, stored in GitHub Repository Secrets
        # Make sure these are set up in your repository settings:
        # Settings -> Secrets and variables -> Actions -> New repository secret
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
