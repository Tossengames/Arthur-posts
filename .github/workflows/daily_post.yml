name: Arthur's Daily Camping Post

on:
  schedule:
    # Runs every day at 07:00 UTC.
    # This time can be adjusted using cron syntax.
    # Example: '0 7 * * *' means at 07:00 AM UTC daily.
    # For New Cairo (EEST is UTC+3), 07:00 UTC is 10:00 AM EEST.
    # Use crontab.guru to help set your desired schedule.
    - cron: '0 7 * * *' 
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  post_to_facebook:
    runs-on: ubuntu-latest # The type of virtual machine to run the job on

    steps:
    - name: Checkout repository
      # This action checks out your repository's code, making it available to the workflow.
      uses: actions/checkout@v4

    - name: Set up Python
      # Configures the Python environment on the runner.
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # You can change this to '3.10', '3.11', or '3.12' if preferred

    - name: Install dependencies
      # Installs the Python libraries required by your post.py script.
      run: |
        python -m pip install --upgrade pip
        pip install requests # 'requests' library is used for all API calls

    - name: Create temporary images directory
      # Creates the directory where Pixabay images will be temporarily stored before posting.
      run: |
        mkdir -p temp_images 

    - name: Generate and Post with Arthur
      # This is the core step that executes your Python script.
      # Environment variables are securely passed from your GitHub Secrets.
      env:
        # These names must exactly match the names of the secrets you set in GitHub.
        # The PIXABAY_KEY environment variable name now matches the secret name directly.
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }} # Corrected environment variable name
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      run: |
        python post.py

    - name: Cleanup temporary images
      # Removes the temporary directory and downloaded images after the script finishes,
      # ensuring a clean state for the next run.
      run: |
        if [ -d "temp_images" ]; then
          rm -rf temp_images
        fi
