name: RSS to Facebook Poster

on:
  schedule:
    # Runs at 8AM, 12PM, 4PM, 8PM UTC (4 posts daily)
    - cron: '0 8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      feed_choice:
        description: 'Which feed to post?'
        required: true
        default: 'auto'
        type: choice
        options:
        - auto
        - crunchyroll
        - mangaupdates

jobs:
  post-rss:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests google-generativeai beautifulsoup4
    
    - name: Run appropriate RSS script
      env:
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Determine which script to run
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [ "${{ inputs.feed_choice }}" = "crunchyroll" ]; then
            python crunchyroll_rss.py
          elif [ "${{ inputs.feed_choice }}" = "mangaupdates" ]; then
            python mangaupdates_rss.py
          else
            echo "Skipping manual run with auto selection"
          fi
        else
          # Automated schedule - alternate between feeds
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ] || [ "$HOUR" = "16" ]; then
            echo "Running Crunchyroll feed"
            python crunchyroll_rss.py
          else
            echo "Running MangaUpdates feed"
            python mangaupdates_rss.py
          fi
        fi