name: 🌀 Post Bilateral ASMR Reel to Facebook

on:
  workflow_dispatch:
  schedule:
 #   - cron: "0 18 * * *"

jobs:
  post:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-asmr-v1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Cache pip and ChromeDriver
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-asmr-v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager requests

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record and Post to Facebook
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, requests, base64
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          ts         = os.environ.get("TS", "test")
          webm_file  = f"/tmp/asmr_{ts}.webm"
          mp4_file   = f"/tmp/asmr_{ts}.mp4"
          html_path  = os.path.abspath("asmr2.html")
          fb_token   = os.environ.get("FB_PAGE_TOKEN")
          fb_page_id = os.environ.get("FB_PAGE_ID")

          RECORD_SECONDS = 30

          if not fb_token or not fb_page_id:
              raise RuntimeError("FB_PAGE_TOKEN or FB_PAGE_ID secret is missing/empty")

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)

          print("Starting Chrome...")
          driver = webdriver.Chrome(
              service=Service(ChromeDriverManager().install()), options=opts
          )
          driver.set_window_size(1920, 1080)
          driver.set_script_timeout(120)

          print(f"Loading file://{html_path}")
          driver.get(f"file://{html_path}")

          print("Waiting for scene to load (3s)...")
          time.sleep(3)

          print("Unlocking audio + starting recording...")
          driver.execute_script(f"""
              document.body.click();
              window.startRecording(30);
          """)

          print(f"Recording {RECORD_SECONDS} seconds...")
          time.sleep(RECORD_SECONDS)

          print("Stopping recording...")
          driver.execute_script("window.stopRecording();")
          time.sleep(1)
          driver.execute_script("window.forceFinalize();")
          time.sleep(1)

          for _ in range(30):
              done = driver.execute_script("return window._recordingDone;")
              if done:
                  print("Recording finalised.")
                  break
              time.sleep(0.4)
          else:
              driver.quit()
              raise RuntimeError("Recording failed to finalise")

          print("Extracting base64...")
          b64 = driver.execute_async_script("""
              var done = arguments[0];
              window.getRecordingBase64().then(done).catch(function(e){ done(null); });
          """)
          driver.quit()
          print("Browser closed.")

          if not b64:
              raise RuntimeError("Failed to get base64 data")

          with open(webm_file, 'wb') as f:
              f.write(base64.b64decode(b64))
          print(f"WebM: {os.path.getsize(webm_file)/1024/1024:.1f} MB")

          print("Converting to MP4...")
          result = subprocess.run([
              "ffmpeg", "-y", "-i", webm_file,
              "-c:v", "libx264", "-preset", "fast", "-crf", "18",
              "-b:v", "10M", "-maxrate", "15M", "-bufsize", "20M",
              "-pix_fmt", "yuv420p", "-vf", "scale=1920:1080:flags=lanczos",
              "-c:a", "aac", "-b:a", "192k", "-ar", "48000",
              "-movflags", "+faststart", mp4_file
          ], capture_output=True, text=True)

          if not os.path.exists(mp4_file) or os.path.getsize(mp4_file) < 10000:
              print("ffmpeg stderr:", result.stderr[-2000:])
              raise RuntimeError("mp4 conversion failed")

          os.remove(webm_file)
          print(f"mp4: {os.path.getsize(mp4_file)/1024/1024:.1f} MB")

          captions = [
              "fast asmr stimulation 🎧 #asmr #asmrsounds #relax #relaxation #calm #soothing #tingles #asmrtriggers #stressrelief #chill #focus #meditation #destress #mindfulness #satisfying #asmrcommunity",
              "bilateral asmr for a calmer mind 🌀 #asmr #asmrsounds #relax #relaxation #calm #soothing #tingles #asmrtriggers #stressrelief #chill #focus #meditation #destress #mindfulness #satisfying #asmrcommunity",
              "headphones on, let it flow 🎧 #asmr #asmrsounds #relax #relaxation #calm #soothing #tingles #asmrtriggers #stressrelief #chill #focus #meditation #destress #mindfulness #satisfying #asmrcommunity",
              "asmr to help you unwind ✨ #asmr #asmrsounds #relax #relaxation #calm #soothing #tingles #asmrtriggers #stressrelief #chill #focus #meditation #destress #mindfulness #satisfying #asmrcommunity",
              "quick asmr reset for your day 🎧 #asmr #asmrsounds #relax #relaxation #calm #soothing #tingles #asmrtriggers #stressrelief #chill #focus #meditation #destress #mindfulness #satisfying #asmrcommunity",
          ]
          description = random.choice(captions)

          print("Posting to Facebook...")
          with open(mp4_file, 'rb') as f:
              response = requests.post(
                  f"https://graph-video.facebook.com/v18.0/{fb_page_id}/videos",
                  data={"description": description, "access_token": fb_token},
                  files={"source": (os.path.basename(mp4_file), f, "video/mp4")}
              )

          print(f"Facebook response: {response.status_code}")
          print(response.text)
          if response.status_code == 200:
              print(f"Posted! Video ID: {response.json().get('id')}")
          else:
              raise RuntimeError(f"Post failed: {response.text}")

          os.remove(mp4_file)
          print("Done!")
          PYEOF
        env:
          TS:            ${{ env.TS }}
          DISPLAY:       ":99"
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}