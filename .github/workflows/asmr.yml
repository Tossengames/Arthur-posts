name: 🧠 Post ASMR Eye Movement to Facebook

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-asmr-v3

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Cache pip and ChromeDriver
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-asmr-v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager requests

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 390x844x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record and Post to Facebook
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, requests, base64
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          ts         = os.environ.get("TS", "test")
          webm_file  = f"/tmp/asmr_{ts}.webm"
          mp4_file   = f"/tmp/asmr_{ts}.mp4"
          html_path  = os.path.abspath("asmr.html")
          fb_token   = os.environ.get("FB_PAGE_TOKEN")
          fb_page_id = os.environ.get("FB_PAGE_ID")

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=390,844")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--disable-translate")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)
          opts.add_experimental_option("mobileEmulation", {
            "deviceMetrics": {"width": 390, "height": 844, "pixelRatio": 1.0},
            "userAgent": "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1"
          })

          print("Starting Chrome...")
          driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()), options=opts
          )
          driver.set_window_size(390, 844)
          driver.set_script_timeout(60)

          print(f"Loading file://{html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(2)

          # Force audio context to start
          driver.execute_script("""
            if (typeof initAudio === 'function') initAudio();
            if (typeof AC !== 'undefined' && AC) AC.resume();
          """)
          time.sleep(1)

          driver.execute_script("window.startRecording(30);")
          print("Recording started — waiting ~10s...")

          for _ in range(40):
            done = driver.execute_script("return window._recordingDone;")
            if done:
              print("Page signalled done")
              break
            time.sleep(0.5)
          else:
            print("Timeout — force finalizing")
            driver.execute_script("window.stopRecording();")
            time.sleep(2)
            driver.execute_script("window.forceFinalize();")
            time.sleep(2)

          done = driver.execute_script("return window._recordingDone;")
          if not done:
            driver.quit()
            raise RuntimeError("Recording failed to finalize")

          print("Extracting video...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64().then(done).catch(function(e){ console.error(e); done(null); });
          """)
          driver.quit()
          print("Browser closed")

          if not b64:
            raise RuntimeError("Failed to get base64")

          with open(webm_file, 'wb') as f:
            f.write(base64.b64decode(b64))
          print(f"Webm: {os.path.getsize(webm_file)/1024/1024:.1f} MB")

          print("Converting to mp4...")
          result = subprocess.run([
            "ffmpeg", "-y", "-i", webm_file,
            "-c:v", "libx264", "-preset", "slow", "-crf", "16",
            "-pix_fmt", "yuv420p", "-vf", "scale=390:844:flags=lanczos",
            "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
            "-movflags", "+faststart", mp4_file
          ], capture_output=True, text=True)

          if not os.path.exists(mp4_file) or os.path.getsize(mp4_file) < 10000:
            print("ffmpeg stderr:", result.stderr[-2000:])
            raise RuntimeError("mp4 conversion failed")

          os.remove(webm_file)
          print(f"mp4: {os.path.getsize(mp4_file)/1024/1024:.1f} MB")

          captions = [
            "follow the circle with your eyes 👁 alpha waves playing to calm your brain 🎧 try it with headphones",
            "your nervous system needs this today 🌀 follow the ball and just breathe... theta waves doing the work 💆",
            "eye movement + binaural beats = actual relaxation 🧠 follow the circle and feel your shoulders drop 👁",
            "tried this before bed and knocked out in minutes 💤 alpha waves + eye tracking just follow the ball 🌙",
            "if you're anxious rn just watch this 👁 follow the circle... your brain starts to slow down on its own 🌀",
            "the whoosh sound tracks where the ball is 🎧 left ear left side right ear right side follow with your eyes 👁",
            "10 seconds of real relaxation 🌀 binaural beats + smooth movement just follow 👁",
            "follow the ball and do nothing else 👁 theta waves are slowing your brain down right now 💆",
            "your eyes follow the circle your brain chills 🧠 alpha waves for stress relief 🎧 try with headphones",
            "10 seconds just follow the circle 👁 binaural beats in both ears calming your nervous system 🌀",
          ]
          description = random.choice(captions)

          print("Posting to Facebook...")
          with open(mp4_file, 'rb') as f:
            response = requests.post(
              f"https://graph-video.facebook.com/v18.0/{fb_page_id}/videos",
              data={"description": description, "access_token": fb_token},
              files={"source": (os.path.basename(mp4_file), f, "video/mp4")}
            )

          print(f"Facebook: {response.status_code}")
          print(response.text)
          if response.status_code == 200:
            print(f"Posted! ID: {response.json().get('id')}")
          else:
            raise RuntimeError(f"Post failed: {response.text}")

          os.remove(mp4_file)
          print("Done!")
          PYEOF
        env:
          TS:            ${{ env.TS }}
          DISPLAY:       ":99"
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}