name: stickman-battle-post

on:
  workflow_dispatch:
    inputs:
      battle_type:
        description: "Battle type (1v1, 2v1, 3way, random)"
        required: false
        default: "random"
      stage:
        description: "Stage (space, volcano, ruins, storm, floating, random)"
        required: false
        default: "random"
  schedule:
    - cron: "0 19 * * *"

jobs:
  battle-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc jq \
            libcairo2-dev libpango1.0-dev \
            libglib2.0-dev pkg-config python3-dev python3-pip
          pip install manim numpy --quiet

      - name: generate-battle
        id: anim
        env:
          BATTLE_INPUT: ${{ github.event.inputs.battle_type || 'random' }}
          STAGE_INPUT:  ${{ github.event.inputs.stage || 'random' }}
        run: |
          python3 << 'PYEOF'
          import os, random, json

          BATTLE = os.environ.get("BATTLE_INPUT","random").strip().lower()
          STAGE  = os.environ.get("STAGE_INPUT","random").strip().lower()

          BATTLES = ["1v1","2v1","3way"]
          STAGES  = ["space","volcano","ruins","storm","floating"]
          if BATTLE == "random": BATTLE = random.choice(BATTLES)
          if STAGE  == "random": STAGE  = random.choice(STAGES)

          FIGHTER_COLORS = ["RED","BLUE","GREEN","YELLOW","PURPLE","ORANGE","TEAL","PINK","WHITE","GOLD"]
          ABILITIES      = ["kamehameha","teleport","giant_ball","ground_slam"]
          ENDINGS        = ["ko_explosion","beam_struggle","last_standing"]

          def make_fighter(name):
              return {
                  "name": name,
                  "color": random.choice(FIGHTER_COLORS),
                  "ability": random.sample(ABILITIES, k=random.randint(2,4)),
                  "power": random.randint(60,100),
              }

          if BATTLE == "1v1":
              fighters = [make_fighter("Fighter1"), make_fighter("Fighter2")]
          elif BATTLE == "2v1":
              fighters = [make_fighter("Hero"), make_fighter("Ally"), make_fighter("Boss")]
          else:
              fighters = [make_fighter("Red"), make_fighter("Blue"), make_fighter("Green")]

          ending = random.choice(ENDINGS)
          winner_idx = random.randint(0, len(fighters)-1)

          cfg = {
              "battle": BATTLE, "stage": STAGE,
              "fighters": fighters, "ending": ending,
              "winner": winner_idx,
              "duration": random.randint(10,15),
          }
          with open("/tmp/battle_config.json","w") as f:
              json.dump(cfg, f)
          print(f"Battle config: {json.dumps(cfg, indent=2)}")
          PYEOF

          cat << 'MANIM_EOF' > /tmp/battle_manim.py
          from manim import *
          import json, math, random, numpy as np

          with open("/tmp/battle_config.json") as f:
              cfg = json.load(f)

          BATTLE   = cfg["battle"]
          STAGE    = cfg["stage"]
          FIGHTERS = cfg["fighters"]
          ENDING   = cfg["ending"]
          WINNER   = cfg["winner"]
          DURATION = cfg["duration"]

          # ── Color map ──────────────────────────────────────────────────────────
          CMAP = {
              "RED":RED,"BLUE":BLUE,"GREEN":GREEN,"YELLOW":YELLOW,
              "PURPLE":PURPLE,"ORANGE":ORANGE,"TEAL":TEAL,
              "PINK":PINK,"WHITE":WHITE,"GOLD":GOLD,
          }
          AURA_COLORS = {
              "RED":"#ff1744","BLUE":"#00b0ff","GREEN":"#00e676",
              "YELLOW":"#ffd600","PURPLE":"#d500f9","ORANGE":"#ff6d00",
              "TEAL":"#1de9b6","PINK":"#f50057","WHITE":"#ffffff","GOLD":"#ffc400",
          }

          # ── Stick Fighter ──────────────────────────────────────────────────────
          class Fighter(VGroup):
              def __init__(self, color=WHITE, scale=1.0, flip=False, **kwargs):
                  super().__init__(**kwargs)
                  s  = scale
                  f  = -1 if flip else 1
                  c  = color
                  sw = 5

                  self.head   = Circle(radius=0.22*s, color=c, stroke_width=sw).shift(UP*1.45*s)
                  self.neck   = Line(UP*1.23*s, UP*1.05*s, color=c, stroke_width=sw)
                  self.torso  = Line(UP*1.05*s, UP*0.15*s, color=c, stroke_width=6)
                  self.pelvis = Line(UP*0.15*s + LEFT*0.18*s*f, UP*0.15*s + RIGHT*0.18*s*f,
                                    color=c, stroke_width=5)

                  self.u_arm_l = Line(UP*0.85*s, UP*0.45*s + LEFT*0.45*s*f,  color=c, stroke_width=sw)
                  self.f_arm_l = Line(UP*0.45*s + LEFT*0.45*s*f,
                                      UP*0.05*s + LEFT*0.80*s*f,  color=c, stroke_width=sw)
                  self.u_arm_r = Line(UP*0.85*s, UP*0.45*s + RIGHT*0.45*s*f, color=c, stroke_width=sw)
                  self.f_arm_r = Line(UP*0.45*s + RIGHT*0.45*s*f,
                                      UP*0.05*s + RIGHT*0.80*s*f, color=c, stroke_width=sw)

                  self.u_leg_l = Line(UP*0.15*s + LEFT*0.18*s*f,
                                      DOWN*0.65*s + LEFT*0.28*s*f, color=c, stroke_width=sw)
                  self.l_leg_l = Line(DOWN*0.65*s + LEFT*0.28*s*f,
                                      DOWN*1.45*s + LEFT*0.22*s*f, color=c, stroke_width=sw)
                  self.u_leg_r = Line(UP*0.15*s + RIGHT*0.18*s*f,
                                      DOWN*0.65*s + RIGHT*0.28*s*f, color=c, stroke_width=sw)
                  self.l_leg_r = Line(DOWN*0.65*s + RIGHT*0.28*s*f,
                                      DOWN*1.45*s + RIGHT*0.22*s*f, color=c, stroke_width=sw)
                  self.foot_l  = Line(DOWN*1.45*s + LEFT*0.22*s*f,
                                      DOWN*1.52*s + LEFT*0.52*s*f, color=c, stroke_width=sw)
                  self.foot_r  = Line(DOWN*1.45*s + RIGHT*0.22*s*f,
                                      DOWN*1.52*s + RIGHT*0.52*s*f, color=c, stroke_width=sw)

                  self.eye_l = Dot(UP*1.50*s + LEFT*0.07*s,  radius=0.04*s, color=c)
                  self.eye_r = Dot(UP*1.50*s + RIGHT*0.07*s, radius=0.04*s, color=c)

                  self.add(
                      self.head, self.neck, self.torso, self.pelvis,
                      self.u_arm_l, self.f_arm_l, self.u_arm_r, self.f_arm_r,
                      self.u_leg_l, self.l_leg_l, self.u_leg_r, self.l_leg_r,
                      self.foot_l, self.foot_r, self.eye_l, self.eye_r,
                  )

          # ── VFX Library ────────────────────────────────────────────────────────
          def make_aura(pos, color_hex, radius=0.9, layers=4):
              aura = VGroup()
              for i in range(layers):
                  r = radius + i*0.28
                  a = 0.35 - i*0.07
                  ring = Circle(radius=r, color=color_hex, stroke_width=max(1,5-i))
                  ring.set_opacity(a)
                  ring.move_to(pos)
                  aura.add(ring)
              return aura

          def make_ki_particles(pos, color_hex, n=18):
              particles = VGroup()
              for _ in range(n):
                  ang = random.uniform(0, TAU)
                  r   = random.uniform(0.3, 1.4)
                  p   = Dot(point=pos + r*np.array([math.cos(ang), math.sin(ang), 0]),
                            radius=random.uniform(0.04, 0.12), color=color_hex)
                  p.set_opacity(random.uniform(0.5, 1.0))
                  particles.add(p)
              return particles

          def make_energy_beam(start, end, color_hex, width=0.22):
              beam = VGroup()
              core  = Line(start, end, stroke_width=width*80, color=WHITE)
              core.set_opacity(0.95)
              glow1 = Line(start, end, stroke_width=width*160, color=color_hex)
              glow1.set_opacity(0.45)
              glow2 = Line(start, end, stroke_width=width*260, color=color_hex)
              glow2.set_opacity(0.18)
              beam.add(glow2, glow1, core)
              return beam

          def make_energy_ball(pos, color_hex, radius=0.45):
              ball = VGroup()
              for r, a in [(radius*2.2, 0.10),(radius*1.6, 0.18),(radius*1.1, 0.35),(radius, 0.85)]:
                  c = Circle(radius=r, fill_color=color_hex, fill_opacity=a, stroke_width=0)
                  c.move_to(pos)
                  ball.add(c)
              core = Circle(radius=radius*0.45, fill_color=WHITE, fill_opacity=0.95, stroke_width=0)
              core.move_to(pos)
              ball.add(core)
              return ball

          def make_shockwave(pos, color_hex):
              rings = VGroup()
              for i in range(5):
                  r = Circle(radius=0.3 + i*0.55, color=color_hex, stroke_width=max(1,6-i))
                  r.set_opacity(0.7 - i*0.12)
                  r.move_to(pos)
                  rings.add(r)
              return rings

          def make_explosion(pos, color_hex, scale=1.0):
              exp = VGroup()
              for _ in range(22):
                  ang = random.uniform(0, TAU)
                  r   = random.uniform(0.2, 1.8*scale)
                  tip = pos + r * np.array([math.cos(ang), math.sin(ang), 0])
                  line = Line(pos, tip, stroke_width=random.uniform(2,6), color=color_hex)
                  line.set_opacity(random.uniform(0.6,1.0))
                  exp.add(line)
              core = Circle(radius=0.5*scale, fill_color=WHITE, fill_opacity=0.95, stroke_width=0)
              core.move_to(pos)
              ball = Circle(radius=1.0*scale, fill_color=color_hex, fill_opacity=0.55, stroke_width=0)
              ball.move_to(pos)
              exp.add(ball, core)
              return exp

          def make_ground_crack(pos, color_hex="#aaa"):
              cracks = VGroup()
              for _ in range(7):
                  ang = random.uniform(-PI*0.15, PI*0.15) + random.choice([0, PI])
                  segs = random.randint(3,5)
                  cur  = np.array(pos)
                  for _ in range(segs):
                      ang  += random.uniform(-0.4, 0.4)
                      dist  = random.uniform(0.2, 0.55)
                      nxt   = cur + dist * np.array([math.cos(ang), math.sin(ang)*0.4, 0])
                      line  = Line(cur.tolist(), nxt.tolist(), stroke_width=random.uniform(1,3),
                                   color=color_hex)
                      line.set_opacity(0.8)
                      cracks.add(line)
                      cur = nxt
              return cracks

          def make_impact_flash(color_hex):
              flash = Rectangle(width=16, height=9, fill_color=color_hex, fill_opacity=0.55,
                                stroke_width=0)
              return flash

          def make_speed_lines_h(origin, n=14, direction=LEFT):
              lines = VGroup()
              for _ in range(n):
                  ox = random.uniform(-0.2, 0.2)
                  oy = random.uniform(-1.5, 1.5)
                  length = random.uniform(0.6, 2.0)
                  start  = origin + np.array([ox, oy, 0])
                  end    = start + length * np.array([direction[0], direction[1], 0])
                  ln = Line(start, end, stroke_width=random.uniform(1,3), color=WHITE)
                  ln.set_opacity(random.uniform(0.2, 0.55))
                  lines.add(ln)
              return lines

          def make_hp_bar(fighter_data, pos, width=3.0):
              bar_bg = Rectangle(width=width, height=0.22, fill_color="#333", fill_opacity=0.9,
                                 stroke_width=1, stroke_color=WHITE)
              bar_bg.move_to(pos)
              color  = AURA_COLORS.get(fighter_data["color"], "#ffffff")
              bar_fg = Rectangle(width=width, height=0.22, fill_color=color, fill_opacity=1,
                                 stroke_width=0)
              bar_fg.move_to(pos)
              bar_fg.align_to(bar_bg, LEFT)
              name_txt = Text(fighter_data["name"], font_size=18, color=WHITE, weight=BOLD)
              name_txt.next_to(bar_bg, UP, buff=0.05)
              return VGroup(bar_bg, bar_fg, name_txt), bar_fg

          # ── Stage builders ─────────────────────────────────────────────────────
          def make_stage_space():
              bg = VGroup()
              sky = Rectangle(width=16, height=9, fill_color="#000010", fill_opacity=1, stroke_width=0)
              bg.add(sky)
              rng = np.random.RandomState(7)
              for _ in range(220):
                  sx = rng.uniform(-8, 8); sy = rng.uniform(-4.5, 4.5)
                  star = Dot([sx,sy,0], radius=rng.uniform(0.02,0.06), color=WHITE)
                  star.set_opacity(rng.uniform(0.3,1.0))
                  bg.add(star)
              # Nebula blobs
              for nx,ny,nc in [(-3,2,"#1a0050"),(2,-1,"#002a4a"),(5,1,"#300010")]:
                  neb = Circle(radius=1.8, fill_color=nc, fill_opacity=0.35, stroke_width=0)
                  neb.move_to([nx,ny,0])
                  bg.add(neb)
              platform = Ellipse(width=10, height=0.8, fill_color="#1a1a2e", fill_opacity=1,
                                 stroke_color="#4444aa", stroke_width=3)
              platform.move_to([0,-3.0,0])
              bg.add(platform)
              return bg

          def make_stage_volcano():
              bg = VGroup()
              sky = Rectangle(width=16, height=9, fill_color="#1a0500", fill_opacity=1, stroke_width=0)
              bg.add(sky)
              # Lava glow at horizon
              glow = Rectangle(width=16, height=2.0, fill_color="#ff3d00", fill_opacity=0.22,
                               stroke_width=0)
              glow.move_to([0,-2.5,0])
              bg.add(glow)
              # Volcano silhouette
              vol = Polygon([-4,-4.5,0],[-1.5,1.2,0],[1.5,1.2,0],[4,-4.5,0],
                            fill_color="#0d0d0d", fill_opacity=1, stroke_width=0)
              bg.add(vol)
              # Lava flow
              lava = Polygon([-0.8,1.2,0],[0.8,1.2,0],[1.8,-4.5,0],[-1.8,-4.5,0],
                             fill_color="#ff6d00", fill_opacity=0.7, stroke_width=0)
              bg.add(lava)
              # Floating rocks platform
              for rx,rw in [(-3.0,2.2),(0,2.8),(3.0,2.2)]:
                  rock = Ellipse(width=rw, height=0.5, fill_color="#2d2d2d", fill_opacity=1,
                                 stroke_color="#ff3d00", stroke_width=2)
                  rock.move_to([rx,-2.8,0])
                  bg.add(rock)
              ground = Rectangle(width=16, height=1.5, fill_color="#1a0500", fill_opacity=1,
                                 stroke_width=0)
              ground.move_to([0,-4.25,0])
              bg.add(ground)
              return bg

          def make_stage_ruins():
              bg = VGroup()
              sky = Rectangle(width=16, height=9, fill_color="#0a0a0f", fill_opacity=1, stroke_width=0)
              bg.add(sky)
              # Broken buildings
              ruins_data = [
                  (-6.0,-1.0,1.2,4.0),(-4.5,-1.8,0.8,2.8),(-3.0,-0.5,1.0,5.0),
                  ( 3.0,-1.5,1.0,3.5),( 4.5,-0.8,0.9,4.2),( 6.0,-1.2,1.2,3.8),
              ]
              for rx,ry,rw,rh in ruins_data:
                  r = Rectangle(width=rw, height=rh, fill_color="#1a1a22", fill_opacity=1,
                                stroke_color="#333344", stroke_width=1)
                  r.move_to([rx, ry+rh/2-4.5, 0])
                  bg.add(r)
                  # Broken top
                  chip = Polygon(
                      [rx-rw/2, ry+rh/2-4.5+rh*0.3, 0],
                      [rx+rw/2, ry+rh/2-4.5+rh*0.3, 0],
                      [rx+rw/2+0.2, ry+rh/2-4.5+rh*0.45, 0],
                      fill_color="#0a0a0f", fill_opacity=1, stroke_width=0
                  )
                  bg.add(chip)
              ground = Rectangle(width=16, height=1.8, fill_color="#111118", fill_opacity=1,
                                 stroke_width=0)
              ground.move_to([0,-3.6,0])
              bg.add(ground)
              # Cracks in ground
              for _ in range(5):
                  cx = random.uniform(-6,6)
                  cr = make_ground_crack([cx,-3.0,0], "#333344")
                  bg.add(cr)
              return bg

          def make_stage_storm():
              bg = VGroup()
              sky = Rectangle(width=16, height=9, fill_color="#0a0a14", fill_opacity=1, stroke_width=0)
              bg.add(sky)
              # Storm clouds
              for cx,cy in [(-5,2.5),(-1,3.2),(3,2.8),(6,2.0)]:
                  for ox,oy,cr in [(0,0,1.1),(0.8,0.3,0.85),(-0.7,0.2,0.8),(0.2,-0.3,0.75)]:
                      cl = Circle(radius=cr, fill_color="#1a1a2a", fill_opacity=0.92, stroke_width=0)
                      cl.move_to([cx+ox, cy+oy, 0])
                      bg.add(cl)
              # Lightning bolts
              for lx in [-4.0, 1.5, 5.0]:
                  pts = [[lx,3.5,0]]
                  cy  = 3.5
                  while cy > -2.0:
                      cy  -= random.uniform(0.4,0.8)
                      lx  += random.uniform(-0.4, 0.4)
                      pts.append([lx, cy, 0])
                  for i in range(len(pts)-1):
                      bolt = Line(pts[i], pts[i+1], stroke_width=random.uniform(2,5),
                                  color="#ffffaa")
                      bolt.set_opacity(0.7)
                      bg.add(bolt)
              ground = Rectangle(width=16, height=1.8, fill_color="#080810", fill_opacity=1,
                                 stroke_width=0)
              ground.move_to([0,-3.6,0])
              bg.add(ground)
              return bg

          def make_stage_floating():
              bg = VGroup()
              sky = Rectangle(width=16, height=9, fill_color="#000820", fill_opacity=1, stroke_width=0)
              bg.add(sky)
              rng = np.random.RandomState(13)
              for _ in range=180:
                  sx = rng.uniform(-8,8); sy = rng.uniform(-4.5,4.5)
                  star = Dot([sx,sy,0], radius=rng.uniform(0.02,0.05), color=WHITE)
                  star.set_opacity(rng.uniform(0.2,0.9))
                  bg.add(star)
              # Floating islands
              islands = [(-4.5,-2.5,3.5,0.6,"#2d4a1e"),
                         ( 0.0,-2.8,4.5,0.7,"#1e2d4a"),
                         ( 4.5,-2.5,3.2,0.6,"#4a2d1e")]
              for ix,iy,iw,ih,ic in islands:
                  isle = Ellipse(width=iw, height=ih, fill_color=ic, fill_opacity=1,
                                 stroke_color="#aaaaff", stroke_width=2)
                  isle.move_to([ix,iy,0])
                  bg.add(isle)
                  bottom = Ellipse(width=iw*0.9, height=ih*2, fill_color="#111122",
                                   fill_opacity=0.7, stroke_width=0)
                  bottom.move_to([ix, iy-ih*0.8, 0])
                  bg.add(bottom)
              return bg

          STAGE_BUILDERS = {
              "space": make_stage_space, "volcano": make_stage_volcano,
              "ruins": make_stage_ruins, "storm": make_stage_storm,
              "floating": make_stage_floating,
          }

          GROUND_Y = -2.8

          # ── MAIN BATTLE SCENE ──────────────────────────────────────────────────
          class BattleScene(Scene):
              def construct(self):
                  self.camera.background_color = BLACK

                  # Stage
                  bg = STAGE_BUILDERS[STAGE]()
                  self.add(bg)

                  # Build fighters
                  figs     = []
                  fig_data = []
                  n        = len(FIGHTERS)

                  positions = {
                      1: [[-3.5, GROUND_Y, 0], [ 3.5, GROUND_Y, 0]],
                      2: [[-4.0, GROUND_Y, 0], [-2.0, GROUND_Y, 0], [ 3.5, GROUND_Y, 0]],
                      3: [[-4.5, GROUND_Y, 0], [ 0.0, GROUND_Y, 0], [ 4.5, GROUND_Y, 0]],
                  }
                  pos_list = positions.get(n, positions[2])

                  for i, fd in enumerate(FIGHTERS):
                      c    = CMAP.get(fd["color"], WHITE)
                      flip = i > 0
                      fig  = Fighter(color=c, scale=0.95, flip=flip)
                      fig.move_to(pos_list[i])
                      figs.append(fig)
                      fig_data.append({"color": c, "color_name": fd["color"],
                                       "aura_hex": AURA_COLORS.get(fd["color"],"#ffffff"),
                                       "abilities": fd["ability"], "hp": 1.0,
                                       "name": fd["name"], "pos": pos_list[i]})
                      self.add(fig)

                  # HP bars
                  hp_bars  = []
                  hp_fills = []
                  bar_positions = {
                      2: [[-5.0, 3.8, 0], [2.0, 3.8, 0]],
                      3: [[-6.0, 3.8, 0], [-1.0, 3.8, 0], [3.5, 3.8, 0]],
                  }
                  bpos = bar_positions.get(n, bar_positions[2])
                  for i, fd in enumerate(fig_data):
                      bar_grp, bar_fill = make_hp_bar(FIGHTERS[i], bpos[min(i,len(bpos)-1)])
                      hp_bars.append(bar_grp)
                      hp_fills.append(bar_fill)
                      self.add(bar_grp)

                  # Stage title
                  stage_title = Text(
                      f"⚔️  {STAGE.upper()} ARENA  ⚔️",
                      font_size=28, color=YELLOW, weight=BOLD
                  )
                  stage_title.to_edge(UP, buff=0.08)
                  self.add(stage_title)

                  # ── ACT 1: POWER UP ──────────────────────────────────────────
                  self.play(stage_title.animate.set_opacity(0.7), run_time=0.3)

                  for i, (fig, fd) in enumerate(zip(figs, fig_data)):
                      aura = make_aura(fig.get_center(), fd["aura_hex"])
                      pts  = make_ki_particles(fig.get_center(), fd["aura_hex"])
                      self.add(aura, pts)
                      self.play(
                          aura.animate.scale(1.4).set_opacity(0),
                          pts.animate.scale(2.0).set_opacity(0),
                          fig.animate.scale(1.08),
                          run_time=0.55,
                          rate_func=rush_from,
                      )
                      self.remove(aura, pts)
                      self.play(fig.animate.scale(1/1.08), run_time=0.2)

                  # Power up flash
                  flash = make_impact_flash("#ffffff")
                  self.add(flash)
                  self.play(flash.animate.set_opacity(0), run_time=0.18)
                  self.remove(flash)

                  # ── ACT 2: CLASH / DASH ───────────────────────────────────────
                  # Fighters dash toward each other
                  f0   = figs[0]
                  f1   = figs[1] if n > 1 else figs[0]
                  fd0  = fig_data[0]
                  fd1  = fig_data[1] if n > 1 else fig_data[0]
                  mid  = np.array([0.0, GROUND_Y, 0])

                  speed_l = make_speed_lines_h(np.array(fd0["pos"]) + RIGHT*0.5, direction=RIGHT)
                  speed_r = make_speed_lines_h(np.array(fd1["pos"]) + LEFT*0.5,  direction=LEFT)
                  self.add(speed_l, speed_r)

                  self.play(
                      f0.animate.move_to(mid + LEFT*1.2),
                      f1.animate.move_to(mid + RIGHT*1.2),
                      speed_l.animate.set_opacity(0),
                      speed_r.animate.set_opacity(0),
                      run_time=0.45,
                      rate_func=rush_into,
                  )
                  self.remove(speed_l, speed_r)

                  # Clash impact
                  clash_exp = make_explosion(mid, fd0["aura_hex"], scale=1.1)
                  clash_sw  = make_shockwave(mid, fd0["aura_hex"])
                  flash2    = make_impact_flash(fd0["aura_hex"])
                  self.add(flash2, clash_exp, clash_sw)
                  self.play(
                      flash2.animate.set_opacity(0),
                      clash_exp.animate.scale(1.8).set_opacity(0),
                      clash_sw.animate.scale(2.5).set_opacity(0),
                      f0.animate.shift(LEFT*0.8).rotate(0.25),
                      f1.animate.shift(RIGHT*0.8).rotate(-0.25),
                      run_time=0.5,
                      rate_func=rush_from,
                  )
                  self.remove(clash_exp, clash_sw, flash2)

                  # Ground cracks from impact
                  cracks = make_ground_crack(mid.tolist(), "#aaaacc")
                  self.add(cracks)

                  # HP drain from clash
                  self.play(
                      hp_fills[0].animate.stretch_to_fit_width(3.0*0.75).align_to(hp_bars[0][0], LEFT),
                      hp_fills[1 % len(hp_fills)].animate.stretch_to_fit_width(3.0*0.72).align_to(
                          hp_bars[1 % len(hp_bars)][0], LEFT),
                      run_time=0.4,
                  )

                  # ── ACT 3: ABILITY SHOWCASE ───────────────────────────────────
                  # Each fighter uses a random ability
                  for i, (fig, fd) in enumerate(zip(figs, fig_data)):
                      ability = random.choice(fd["abilities"])
                      opp_idx = (i + 1) % n
                      opp     = figs[opp_idx]
                      opp_fd  = fig_data[opp_idx]

                      if ability == "kamehameha":
                          # Charge pose
                          self.play(
                              fig.u_arm_l.animate.rotate(-PI*0.6, about_point=fig.torso.get_top()),
                              fig.u_arm_r.animate.rotate(-PI*0.6, about_point=fig.torso.get_top()),
                              fig.f_arm_l.animate.rotate(-PI*0.3, about_point=fig.u_arm_l.get_end()),
                              fig.f_arm_r.animate.rotate(-PI*0.3, about_point=fig.u_arm_r.get_end()),
                              run_time=0.35, rate_func=smooth,
                          )
                          # Charge ball
                          charge = make_energy_ball(fig.get_center() + RIGHT*1.0*(1 if i==0 else -1),
                                                    fd["aura_hex"], radius=0.3)
                          self.add(charge)
                          self.play(charge.animate.scale(1.8), run_time=0.4, rate_func=smooth)

                          # Fire beam
                          beam_start = fig.get_center() + RIGHT*1.2*(1 if i==0 else -1)
                          beam_end   = opp.get_center()
                          beam = make_energy_beam(beam_start, beam_end, fd["aura_hex"])
                          self.remove(charge)
                          self.add(beam)
                          self.play(
                              beam.animate.set_opacity(0.9),
                              opp.animate.shift(RIGHT*1.2*(1 if i==0 else -1)).rotate(0.35),
                              run_time=0.45, rate_func=rush_into,
                          )
                          # Beam explosion on target
                          hit_exp = make_explosion(opp.get_center(), opp_fd["aura_hex"], scale=0.9)
                          hit_sw  = make_shockwave(opp.get_center(), fd["aura_hex"])
                          flash3  = make_impact_flash(fd["aura_hex"])
                          self.add(flash3, hit_exp, hit_sw)
                          self.play(
                              flash3.animate.set_opacity(0),
                              hit_exp.animate.scale(2.0).set_opacity(0),
                              hit_sw.animate.scale(2.8).set_opacity(0),
                              beam.animate.set_opacity(0),
                              run_time=0.5, rate_func=rush_from,
                          )
                          self.remove(beam, hit_exp, hit_sw, flash3)
                          # HP drain
                          new_w = max(0.15, hp_fills[opp_idx].width - 0.85)
                          self.play(
                              hp_fills[opp_idx].animate.stretch_to_fit_width(new_w).align_to(
                                  hp_bars[opp_idx][0], LEFT),
                              run_time=0.3,
                          )
                          # Reset arms
                          self.play(
                              fig.u_arm_l.animate.rotate(PI*0.6, about_point=fig.torso.get_top()),
                              fig.u_arm_r.animate.rotate(PI*0.6, about_point=fig.torso.get_top()),
                              fig.f_arm_l.animate.rotate(PI*0.3, about_point=fig.u_arm_l.get_end()),
                              fig.f_arm_r.animate.rotate(PI*0.3, about_point=fig.u_arm_r.get_end()),
                              run_time=0.25,
                          )

                      elif ability == "teleport":
                          # Flash out
                          tp_flash = make_impact_flash(fd["aura_hex"])
                          self.add(tp_flash)
                          self.play(tp_flash.animate.set_opacity(0), fig.animate.set_opacity(0),
                                    run_time=0.2)
                          # Reappear behind opponent
                          behind = opp.get_center() + LEFT*1.5*(1 if i==0 else -1)
                          fig.move_to(behind)
                          self.play(fig.animate.set_opacity(1), run_time=0.15)
                          self.remove(tp_flash)
                          # Combo hits
                          for _ in range(3):
                              hit_flash = make_impact_flash(fd["aura_hex"])
                              self.add(hit_flash)
                              self.play(
                                  hit_flash.animate.set_opacity(0),
                                  opp.animate.shift(RIGHT*0.4*(1 if i==0 else -1)),
                                  run_time=0.18, rate_func=rush_into,
                              )
                              self.remove(hit_flash)
                          exp = make_explosion(opp.get_center(), fd["aura_hex"], scale=0.7)
                          self.add(exp)
                          self.play(exp.animate.scale(1.8).set_opacity(0), run_time=0.35)
                          self.remove(exp)
                          new_w = max(0.15, hp_fills[opp_idx].width - 0.7)
                          self.play(
                              hp_fills[opp_idx].animate.stretch_to_fit_width(new_w).align_to(
                                  hp_bars[opp_idx][0], LEFT),
                              run_time=0.25,
                          )

                      elif ability == "giant_ball":
                          # Raise both arms and charge huge ball overhead
                          self.play(
                              fig.u_arm_l.animate.rotate(-PI*0.9, about_point=fig.torso.get_top()),
                              fig.u_arm_r.animate.rotate( PI*0.9, about_point=fig.torso.get_top()),
                              run_time=0.35, rate_func=smooth,
                          )
                          giant = make_energy_ball(fig.get_center() + UP*1.8,
                                                   fd["aura_hex"], radius=0.65)
                          self.add(giant)
                          aura2 = make_aura(fig.get_center(), fd["aura_hex"], radius=1.1)
                          self.add(aura2)
                          self.play(
                              giant.animate.scale(1.5),
                              aura2.animate.scale(1.6).set_opacity(0),
                              run_time=0.5, rate_func=smooth,
                          )
                          self.remove(aura2)
                          # Throw — giant ball flies to opponent
                          self.play(
                              giant.animate.move_to(opp.get_center()).scale(0.7),
                              run_time=0.4, rate_func=rush_into,
                          )
                          massive_exp = make_explosion(opp.get_center(), fd["aura_hex"], scale=1.6)
                          massive_sw  = make_shockwave(opp.get_center(), fd["aura_hex"])
                          full_flash  = make_impact_flash(fd["aura_hex"])
                          self.add(full_flash, massive_exp, massive_sw)
                          self.play(
                              full_flash.animate.set_opacity(0),
                              massive_exp.animate.scale(2.2).set_opacity(0),
                              massive_sw.animate.scale(3.0).set_opacity(0),
                              opp.animate.shift(RIGHT*1.8*(1 if i==0 else -1)).rotate(PI*0.6),
                              run_time=0.6, rate_func=rush_from,
                          )
                          self.remove(giant, massive_exp, massive_sw, full_flash)
                          new_w = max(0.15, hp_fills[opp_idx].width - 1.1)
                          self.play(
                              hp_fills[opp_idx].animate.stretch_to_fit_width(new_w).align_to(
                                  hp_bars[opp_idx][0], LEFT),
                              run_time=0.3,
                          )
                          self.play(
                              fig.u_arm_l.animate.rotate(PI*0.9, about_point=fig.torso.get_top()),
                              fig.u_arm_r.animate.rotate(-PI*0.9, about_point=fig.torso.get_top()),
                              run_time=0.25,
                          )

                      elif ability == "ground_slam":
                          # Jump up
                          self.play(fig.animate.shift(UP*1.5), run_time=0.3, rate_func=smooth)
                          # Slam down
                          self.play(fig.animate.shift(DOWN*1.5), run_time=0.25, rate_func=rush_into)
                          # Shockwave from ground
                          slam_pos = fig.get_center()
                          slam_sw  = make_shockwave(slam_pos, fd["aura_hex"])
                          slam_cr  = make_ground_crack(slam_pos.tolist(), fd["aura_hex"])
                          slam_exp = make_explosion(slam_pos, fd["aura_hex"], scale=0.85)
                          ground_f = make_impact_flash(fd["aura_hex"])
                          self.add(ground_f, slam_sw, slam_cr, slam_exp)
                          self.play(
                              ground_f.animate.set_opacity(0),
                              slam_sw.animate.scale(3.5).set_opacity(0),
                              slam_exp.animate.scale(2.0).set_opacity(0),
                              opp.animate.shift(UP*0.8 + RIGHT*1.0*(1 if i==0 else -1)),
                              run_time=0.55, rate_func=rush_from,
                          )
                          self.remove(slam_sw, slam_exp, ground_f)
                          # Opponent falls back down
                          self.play(opp.animate.shift(DOWN*0.8), run_time=0.3, rate_func=bounce)
                          new_w = max(0.15, hp_fills[opp_idx].width - 0.8)
                          self.play(
                              hp_fills[opp_idx].animate.stretch_to_fit_width(new_w).align_to(
                                  hp_bars[opp_idx][0], LEFT),
                              run_time=0.3,
                          )

                  # ── ACT 4: ENDING ─────────────────────────────────────────────
                  winner_fig = figs[WINNER]
                  loser_figs = [f for i,f in enumerate(figs) if i != WINNER]
                  loser_fds  = [fig_data[i] for i in range(n) if i != WINNER]

                  if ENDING == "ko_explosion":
                      # Winner charges final shot
                      final_ball = make_energy_ball(
                          winner_fig.get_center() + UP*0.5,
                          fig_data[WINNER]["aura_hex"], radius=0.8
                      )
                      self.add(final_ball)
                      self.play(final_ball.animate.scale(1.6), run_time=0.5, rate_func=smooth)
                      # Fire at all losers
                      for lf, lfd in zip(loser_figs, loser_fds):
                          self.play(
                              final_ball.animate.move_to(lf.get_center()),
                              run_time=0.35, rate_func=rush_into,
                          )
                          ko_exp = make_explosion(lf.get_center(), fig_data[WINNER]["aura_hex"], scale=1.8)
                          ko_sw  = make_shockwave(lf.get_center(), fig_data[WINNER]["aura_hex"])
                          ko_fl  = make_impact_flash(fig_data[WINNER]["aura_hex"])
                          self.add(ko_fl, ko_exp, ko_sw)
                          self.play(
                              ko_fl.animate.set_opacity(0),
                              ko_exp.animate.scale(2.5).set_opacity(0),
                              ko_sw.animate.scale(3.5).set_opacity(0),
                              lf.animate.rotate(PI*1.2).shift(DOWN*1.5).set_opacity(0.2),
                              hp_fills[loser_fds.index(lfd)].animate.stretch_to_fit_width(0.05).align_to(
                                  hp_bars[loser_fds.index(lfd)][0], LEFT
                              ) if lfd in loser_fds else lf.animate,
                              run_time=0.65, rate_func=rush_from,
                          )
                          self.remove(ko_exp, ko_sw, ko_fl)
                      self.remove(final_ball)

                  elif ENDING == "beam_struggle":
                      loser_fig = loser_figs[0]
                      # Both charge beams facing each other
                      beam_mid  = np.array([0.0, GROUND_Y + 0.5, 0])
                      beam_w    = make_energy_beam(winner_fig.get_center(),
                                                   beam_mid, fig_data[WINNER]["aura_hex"], width=0.3)
                      beam_l    = make_energy_beam(loser_fig.get_center(),
                                                   beam_mid, loser_fds[0]["aura_hex"], width=0.3)
                      clash_pt  = make_energy_ball(beam_mid, "#ffffff", radius=0.55)
                      self.add(beam_w, beam_l, clash_pt)
                      # Struggle — clash point shifts toward loser
                      self.play(
                          clash_pt.animate.move_to(beam_mid + RIGHT*0.8*(1 if WINNER==0 else -1)),
                          beam_w.animate.set_opacity(1.0),
                          beam_l.animate.set_opacity(0.6),
                          run_time=0.7, rate_func=smooth,
                      )
                      self.play(
                          clash_pt.animate.move_to(loser_fig.get_center()),
                          run_time=0.4, rate_func=rush_into,
                      )
                      final_exp = make_explosion(loser_fig.get_center(),
                                                 fig_data[WINNER]["aura_hex"], scale=2.0)
                      big_sw    = make_shockwave(loser_fig.get_center(),
                                                 fig_data[WINNER]["aura_hex"])
                      big_fl    = make_impact_flash(fig_data[WINNER]["aura_hex"])
                      self.add(big_fl, final_exp, big_sw)
                      self.play(
                          big_fl.animate.set_opacity(0),
                          final_exp.animate.scale(2.8).set_opacity(0),
                          big_sw.animate.scale(4.0).set_opacity(0),
                          loser_fig.animate.rotate(PI).shift(DOWN*2.0).set_opacity(0.15),
                          run_time=0.7, rate_func=rush_from,
                      )
                      self.remove(beam_w, beam_l, clash_pt, final_exp, big_sw, big_fl)

                  elif ENDING == "last_standing":
                      for lf in loser_figs:
                          # Rapid combo
                          for _ in range(4):
                              hit_f = make_impact_flash(fig_data[WINNER]["aura_hex"])
                              self.add(hit_f)
                              self.play(
                                  hit_f.animate.set_opacity(0),
                                  lf.animate.shift(RIGHT*0.5*(1 if WINNER==0 else -1)),
                                  run_time=0.14, rate_func=rush_into,
                              )
                              self.remove(hit_f)
                          # Final uppercut
                          self.play(
                              lf.animate.shift(UP*2.2).rotate(PI*0.8),
                              run_time=0.4, rate_func=smooth,
                          )
                          self.play(
                              lf.animate.shift(DOWN*2.2 + RIGHT*0.8).rotate(PI*0.4).set_opacity(0.15),
                              run_time=0.45, rate_func=rush_into,
                          )
                          crash_exp = make_explosion(lf.get_center(), fig_data[WINNER]["aura_hex"])
                          crash_cr  = make_ground_crack(lf.get_center().tolist())
                          self.add(crash_exp, crash_cr)
                          self.play(crash_exp.animate.scale(2.0).set_opacity(0), run_time=0.45)
                          self.remove(crash_exp)

                  # ── WINNER CELEBRATION ────────────────────────────────────────
                  # Drain all loser HP bars to zero
                  for i in range(n):
                      if i != WINNER:
                          self.play(
                              hp_fills[i].animate.stretch_to_fit_width(0.05).align_to(
                                  hp_bars[i][0], LEFT),
                              run_time=0.3,
                          )

                  winner_aura = make_aura(winner_fig.get_center(),
                                          fig_data[WINNER]["aura_hex"], radius=1.2, layers=5)
                  winner_pts  = make_ki_particles(winner_fig.get_center(),
                                                   fig_data[WINNER]["aura_hex"], n=30)
                  self.add(winner_aura, winner_pts)

                  winner_text = Text(
                      f"🏆  {FIGHTERS[WINNER]['name']}  WINS!",
                      font_size=52, color=YELLOW, weight=BOLD
                  )
                  winner_text.move_to([0, 1.5, 0])
                  winner_text.set_opacity(0)
                  self.add(winner_text)

                  self.play(
                      winner_aura.animate.scale(1.5).set_opacity(0),
                      winner_pts.animate.scale(2.5).set_opacity(0),
                      winner_fig.animate.scale(1.12),
                      winner_text.animate.set_opacity(1),
                      run_time=0.7, rate_func=smooth,
                  )
                  self.remove(winner_aura, winner_pts)

                  # Victory pose — arms raised
                  self.play(
                      winner_fig.u_arm_l.animate.rotate(-PI*0.85, about_point=winner_fig.torso.get_top()),
                      winner_fig.u_arm_r.animate.rotate( PI*0.85, about_point=winner_fig.torso.get_top()),
                      winner_text.animate.scale(1.1),
                      run_time=0.5, rate_func=smooth,
                  )

                  # Fireworks burst
                  for _ in range(3):
                      fw_pos = np.array([random.uniform(-4,4), random.uniform(0,3), 0])
                      fw_c   = random.choice(list(AURA_COLORS.values()))
                      fw     = make_explosion(fw_pos, fw_c, scale=0.7)
                      self.add(fw)
                      self.play(fw.animate.scale(2.0).set_opacity(0), run_time=0.4)
                      self.remove(fw)

                  self.wait(0.4)

          MANIM_EOF

          echo "Rendering battle with Manim..."

          FPS_VAL=30
          manim -o stickman_battle.mp4 \
                --fps $FPS_VAL \
                -r 1280,720 \
                --format mp4 \
                -q h \
                /tmp/battle_manim.py BattleScene

          MANIM_OUT=$(find /root /home -name "stickman_battle.mp4" 2>/dev/null | head -1)
          [ -z "$MANIM_OUT" ] && MANIM_OUT=$(find . -name "stickman_battle.mp4" 2>/dev/null | head -1)
          cp "$MANIM_OUT" /tmp/stickman_battle_final.mp4
          echo "✅ Battle rendered!"

          SCENE_VAL=$(python3 -c "import json; cfg=json.load(open('/tmp/battle_config.json')); print(cfg['battle']+'_'+cfg['stage']+'_'+cfg['fighters'][cfg['winner']]['name'])")
          echo "scene_name=$SCENE_VAL" >> "$GITHUB_OUTPUT"

      - name: pick-caption
        id: caption
        run: |
          INFO="${{ steps.anim.outputs.scene_name }}"
          WINNER_NAME=$(echo "$INFO" | cut -d'_' -f3)
          HOOKS=(
            "Nobody expected THAT ending 💥⚡ #StickMan #DragonBall #Fight #Shorts"
            "${WINNER_NAME} just said GOODNIGHT 🌙💢 #StickMan #Battle #Satisfying #Shorts"
            "The beam struggle was INSANE 🔥🔥 #StickMan #EnergyBeam #Shorts"
            "POV: you picked the wrong fight 😤💀 #StickMan #Fighter #Shorts"
            "This is what 1000 push-ups look like 🤜💥 #StickMan #Anime #Shorts"
          )
          IDX=$(( RANDOM % ${#HOOKS[@]} ))
          echo "caption=${HOOKS[$IDX]}" >> "$GITHUB_OUTPUT"

      - name: post-to-facebook
        timeout-minutes: 5
        env:
          PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION:    ${{ steps.caption.outputs.caption }}
        run: |
          FILE="/tmp/stickman_battle_final.mp4"
          API="https://graph.facebook.com/v19.0"
          echo "Posting battle to Facebook..."
          RESPONSE=$(curl -s -X POST "${API}/${PAGE_ID}/videos" \
            -F "description=${CAPTION}" \
            -F "source=@${FILE}" \
            -F "access_token=${PAGE_TOKEN}")
          echo "FB response: $RESPONSE"
          VIDEO_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Post failed"; echo "$RESPONSE"; exit 1
          fi
          echo "✅ Posted! Video ID: $VIDEO_ID"

      - name: upload-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stickman-battle-${{ steps.anim.outputs.scene_name }}-${{ github.run_number }}
          path: /tmp/stickman_battle_final.mp4
          retention-days: 30