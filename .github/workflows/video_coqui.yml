name: Generate Anime Video xx

on:
  schedule:
   # - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:       # Allow manual triggering

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Prevents hanging

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Cache pip dependencies
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/generate-anime-video.yml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Cache Coqui TTS models so they don’t download every run
    - name: Cache TTS models
      uses: actions/cache@v3
      with:
        path: ~/.local/share/tts
        key: ${{ runner.os }}-coqui-tts

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libimage-exiftool-perl espeak-ng

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai==0.5.0 requests==2.31.0 pillow==10.3.0 TTS==0.22.0

    - name: Create output directory
      run: mkdir -p generated_videos

    - name: Run video generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Set safe paths for FFmpeg
        export FFMPEG_SAFE_PATHS=1
        python make_vid.py --gemini-key "$GEMINI_API_KEY"

    - name: Upload generated video
      uses: actions/upload-artifact@v4
      with:
        name: generated-video
        path: generated_videos/*.mp4
        if-no-files-found: ignore

    - name: Upload generated assets
      uses: actions/upload-artifact@v4
      with:
        name: generated-assets
        path: generated_videos/
        if-no-files-found: ignore