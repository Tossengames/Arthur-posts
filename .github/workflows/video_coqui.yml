name: Generate Anime Video x

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:       # Allow manual triggering

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Set timeout to 30 minutes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libimage-exiftool-perl espeak-ng

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests pillow TTS

    - name: Create output directory
      run: mkdir -p generated_videos

    - name: Run video generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Set safe paths for FFmpeg
        export FFMPEG_SAFE_PATHS=1
        python make_vid.py --gemini-key "$GEMINI_API_KEY"

    - name: Upload generated video
      uses: actions/upload-artifact@v4
      with:
        name: generated-video
        path: generated_videos/*.mp4
        if-no-files-found: ignore

    - name: Upload generated assets
      uses: actions/upload-artifact@v4
      with:
        name: generated-assets
        path: generated_videos/
        if-no-files-found: ignore