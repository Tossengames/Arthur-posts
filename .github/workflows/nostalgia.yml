name: nostalgia-half-split

on:
  workflow_dispatch:
  schedule:
  #  - cron: "0 19 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        run: sudo apt-get update -qq && sudo apt-get install -y jq bc

      - name: find-video
        id: vid
        run: |
          set -e
          # Categories that are verified to have direct video files
          QUERIES=("Vintage_video" "Historical_films" "Old_New_York" "1990s_videos" "1980s_videos")
          
          FOUND=false
          # Try up to 5 times to find a category that isn't empty
          for i in {1..5}; do
            QUERY=${QUERIES[$((RANDOM % ${#QUERIES[@]}))]}
            echo "Attempt $i: Searching Category:$QUERY"
            
            # Use formatversion=2 for cleaner JSON
            LIST_URL="https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:${QUERY}&cmtype=file&cmlimit=50&format=json&formatversion=2"
            RESP=$(curl -sf "$LIST_URL")
            
            # Check if categorymembers exists and has items
            FILE_TITLE=$(echo "$RESP" | jq -r '.query.categorymembers // [] | .[]?.title' | shuf -n 1 || echo "")
            
            if [ -n "$FILE_TITLE" ] && [ "$FILE_TITLE" != "null" ]; then
              echo "Selected: $FILE_TITLE"
              
              # Get info with formatversion=2
              INFO_URL="https://commons.wikimedia.org/w/api.php?action=query&titles=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$FILE_TITLE")&prop=videoinfo&viprop=url|derivatives&format=json&formatversion=2"
              FINAL_RESP=$(curl -sf "$INFO_URL")
              
              # Try to get MP4 derivative first
              VIDEO_URL=$(echo "$FINAL_RESP" | jq -r '.query.pages[0].videoinfo[0].derivatives // [] | .[] | select(.format=="mp4") | .url' | head -1 || echo "")
              
              # Fallback to original if no MP4 transcode found
              if [ -z "$VIDEO_URL" ] || [ "$VIDEO_URL" == "null" ]; then
                VIDEO_URL=$(echo "$FINAL_RESP" | jq -r '.query.pages[0].videoinfo[0].url // empty')
              fi
              
              if [ -n "$VIDEO_URL" ]; then
                DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_URL" 2>/dev/null | cut -d. -f1)
                
                if [[ "$DUR" =~ ^[0-9]+$ ]] && [ "$DUR" -gt 30 ]; then
                  HALF=$(echo "$DUR / 2" | bc)
                  echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
                  echo "video_title=${FILE_TITLE#File:}" >> "$GITHUB_OUTPUT"
                  echo "video_half=$HALF" >> "$GITHUB_OUTPUT"
                  FOUND=true
                  break
                fi
              fi
            fi
            echo "Category empty or file invalid, retrying..."
          done

          if [ "$FOUND" = false ]; then
            echo "Could not find a valid video after 5 attempts."
            exit 1
          fi

      - name: process-parts
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          TITLE="${{ steps.vid.outputs.video_title }}"
          HALF="${{ steps.vid.outputs.video_half }}"
          CLEAN_TITLE=$(echo "$TITLE" | sed 's/\.[^.]*$//' | tr '_' ' ')

          echo "Processing Part 1 (Length: ${HALF}s)..."
          ffmpeg -hide_banner -loglevel error -y -i "$URL" -ss 0 -t "$HALF" \
            -vf "pad=iw:ih+100:0:50:black,drawtext=text='${CLEAN_TITLE}':fontcolor=white:fontsize=24:x=(w-text_w)/2:y=15,drawtext=text='PART 1':fontcolor=yellow:fontsize=32:x=(w-text_w)/2:y=h-45" \
            -c:v libx264 -preset superfast -crf 23 -c:a aac -b:a 128k -movflags +faststart part1.mp4

          echo "Processing Part 2 (Starting at: ${HALF}s)..."
          ffmpeg -hide_banner -loglevel error -y -i "$URL" -ss "$HALF" \
            -vf "pad=iw:ih+100:0:50:black,drawtext=text='${CLEAN_TITLE}':fontcolor=white:fontsize=24:x=(w-text_w)/2:y=15,drawtext=text='PART 2':fontcolor=yellow:fontsize=32:x=(w-text_w)/2:y=h-45" \
            -c:v libx264 -preset superfast -crf 23 -c:a aac -b:a 128k -movflags +faststart part2.mp4

      - name: post-to-facebook
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          API_URL="https://graph.facebook.com/v19.0/${PAGE_ID}/videos"
          TITLE_CLEAN=$(echo "${{ steps.vid.outputs.video_title }}" | tr '_' ' ')

          echo "Posting Part 1..."
          curl -X POST "$API_URL" -F "description=📼 ${TITLE_CLEAN} (Part 1) #Nostalgia" -F "source=@part1.mp4" -F "access_token=${PAGE_TOKEN}"
          
          sleep 15

          echo "Posting Part 2..."
          curl -X POST "$API_URL" -F "description=📼 ${TITLE_CLEAN} (Part 2) #Nostalgia" -F "source=@part2.mp4" -F "access_token=${PAGE_TOKEN}"
