name: nostalgia-video

"on":
  workflow_dispatch:
  schedule:
   # - cron: "0 19 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg bc jq python3

      - name: find-video
        id: vid
        timeout-minutes: 8
        run: |
          set -e
          MAX_DURATION=180
          MIN_DURATION=15
          VIDEO_URL=""

          # General nostalgia terms
          QUERIES=(
            "old cartoon"
            "vintage commercial"
            "retro tv show"
            "classic toy commercial"
            "old movie clip"
            "vintage advertisement"
            "retro game show"
            "old tv intro"
            "classic 80s commercial"
            "vintage public service announcement"
            "old school cartoon"
            "retro 90s commercial"
          )

          for idx in $(seq 0 $((${#QUERIES[@]} - 1)) | shuf); do
            [ -n "$VIDEO_URL" ] && break
            QUERY="${QUERIES[$idx]}"
            echo "Searching: $QUERY"
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$QUERY")

            RESP=$(timeout 15 curl -sf --max-time 15 \
              "https://archive.org/advancedsearch.php?q=${ENCODED}+AND+mediatype%3Amovies&fl[]=identifier,title&rows=40&page=1&output=json" \
              2>/dev/null) || continue

            COUNT=$(echo "$RESP" | jq -r '.response.docs | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue

            for i in $(seq 0 $((COUNT - 1)) | shuf); do
              [ -n "$VIDEO_URL" ] && break
              
              IDENTIFIER=$(echo "$RESP" | jq -r ".response.docs[$i].identifier" 2>/dev/null)
              TITLE=$(echo "$RESP" | jq -r ".response.docs[$i].title" 2>/dev/null)
              [ -z "$IDENTIFIER" ] || [ "$IDENTIFIER" = "null" ] && continue

              # Skip modern/game/political content
              if echo "$TITLE" | grep -qiE "2020|2021|2022|2023|2024|2025|game|gaming|minecraft|fortnite|roblox|trump|biden|news|today"; then
                echo "Skipping modern content: $TITLE"
                continue
              fi

              FILES=$(timeout 10 curl -sf --max-time 10 \
                "https://archive.org/metadata/${IDENTIFIER}/files" 2>/dev/null) || continue

              VURL=$(echo "$FILES" | jq -r '.result[] | select(.name | test("\\.(mp4|MP4|mov|MOV)$")) | .name' 2>/dev/null | head -1)
              [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue

              FULL_URL="https://archive.org/download/${IDENTIFIER}/${VURL}"

              FILE_SIZE=$(timeout 8 curl -sf -I "$FULL_URL" 2>/dev/null | grep -i content-length | awk '{print $2}' | tr -d '\r')
              if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 157286400 ]; then
                echo "Too large, skipping..."
                continue
              fi

              DUR_RAW=$(timeout 20 ffprobe -v error -show_entries format=duration -of csv=p=0 "$FULL_URL" 2>/dev/null | cut -d. -f1)
              [[ "$DUR_RAW" =~ ^[0-9]+$ ]] || continue
              [ "$DUR_RAW" -gt "$MAX_DURATION" ] && continue
              [ "$DUR_RAW" -lt "$MIN_DURATION" ] && continue

              VIDEO_URL="$FULL_URL"
              echo "Found: $TITLE (${DUR_RAW}s)"
              echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
              echo "video_title=$TITLE" >> "$GITHUB_OUTPUT"
            done
          done

          if [ -z "$VIDEO_URL" ]; then
            echo "No valid video found"
            exit 1
          fi

      - name: pick-caption
        id: caption
        run: |
          # Generic captions that work for ANY nostalgia content
          CAPTIONS=(
            "📺 Who else remembers this? Tag someone 👇"
            "😢 Take me back. Tag a friend who grew up with this ✨"
            "📺 Core memory unlocked. Like if you remember 🧠"
            "✨ The good old days. Tag someone who needs to see this 🤍"
            "📺 Don't let this die. Share with a friend 🔄"
            "😭 Why can't we go back? Follow for more nostalgia 🕰️"
            "📺 You had to be there. Tag someone who was 👇"
            "✨ Simpler times. Like if this hit different 🤍"
            "📺 Who else watched this? Comment below 👇"
            "🕰️ Remember when life was this good? Tag a friend ✨"
          )
          IDX=$((RANDOM % ${#CAPTIONS[@]}))
          echo "caption=${CAPTIONS[$IDX]}" >> "$GITHUB_OUTPUT"

      - name: process-video
        timeout-minutes: 12
        run: |
          URL="${{ steps.vid.outputs.video_url }}"

          echo "Downloading video..."
          timeout 300 ffmpeg -hide_banner -loglevel error -y -re -i "$URL" -c copy full.mp4

          if [ ! -f full.mp4 ] || [ ! -s full.mp4 ]; then
            echo "Download failed"
            exit 1
          fi

          echo "Processing video..."
          timeout 600 ffmpeg -hide_banner -loglevel error -y \
            -i full.mp4 \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,drawtext=text='📺 NOSTALGIA':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:fontcolor=white:fontsize=48:x=(w-text_w)/2:y=20,drawtext=text='Follow for more 📺':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf:fontcolor=white:fontsize=32:x=(w-text_w)/2:y=h-60" \
            -c:v libx264 -preset ultrafast -crf 23 -c:a aac -b:a 128k -movflags +faststart final.mp4

          if [ ! -f final.mp4 ] || [ ! -s final.mp4 ]; then
            echo "Processing failed"
            exit 1
          fi

          ls -lh final.mp4

      - name: post-to-facebook
        timeout-minutes: 5
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          set -e
          FILE="final.mp4"
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"

          for attempt in 1 2 3; do
            echo "Facebook post attempt $attempt..."
            
            RESP=$(timeout 60 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
              -F "access_token=${PAGE_TOKEN}" \
              -F "description=${CAPTION}" \
              -F "source=@${FILE}" \
              -F "published=true")
            
            VIDEO_ID=$(echo "$RESP" | jq -r '.id' 2>/dev/null)
            
            if [ -n "$VIDEO_ID" ] && [ "$VIDEO_ID" != "null" ]; then
              echo "Posted! Video ID: $VIDEO_ID"
              exit 0
            fi
            
            echo "Post failed attempt $attempt: $RESP"
            sleep 15
          done
          
          echo "All post attempts failed"
          exit 1