name: nostalgia-post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # Increased for 5-min processing + uploads

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: verify-and-install-deps
        run: |
          # FFmpeg and jq are pre-installed; we just ensure bc is there
          sudo apt-get update -qq
          sudo apt-get install -y bc jq

      - name: find-video
        id: vid
        timeout-minutes: 12
        run: |
          set -e
          MAX_DURATION=300 # 5 Minutes
          MIN_DURATION=15
          VIDEO_URL=""

          QUERIES=(
            "1990s city street footage"
            "1980s television commercial"
            "vintage home video 1980s"
            "1990s technology gadgets"
            "vintage shopping mall"
            "80s arcade footage"
            "90s toy commercials"
            "vintage supermarket 1970s"
            "old airport footage 1980s"
          )

          for idx in $(seq 0 $((${#QUERIES[@]} - 1)) | shuf); do
            QUERY="${QUERIES[$idx]}"
            echo "Searching: $QUERY"
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$QUERY")
            
            # Deep search: 50 rows per query
            RESP=$(timeout 20 curl -sf "https://archive.org/advancedsearch.php?q=${ENCODED}+AND+mediatype%3Amovies&fl[]=identifier,title,date&rows=50&page=1&output=json" 2>/dev/null) || continue
            COUNT=$(echo "$RESP" | jq -r '.response.docs | length' 2>/dev/null) || continue
            [ "$COUNT" -eq 0 ] && continue

            for i in $(seq 0 $((COUNT - 1)) | shuf); do
              IDENTIFIER=$(echo "$RESP" | jq -r ".response.docs[$i].identifier" 2>/dev/null)
              TITLE=$(echo "$RESP" | jq -r ".response.docs[$i].title" 2>/dev/null)
              DATE=$(echo "$RESP" | jq -r ".response.docs[$i].date" 2>/dev/null)
              YEAR=$(echo "$DATE" | cut -c1-4)

              FILES=$(timeout 15 curl -sf "https://archive.org/metadata/${IDENTIFIER}/files" 2>/dev/null) || continue

              # Filter for direct MP4 files
              VURL=$(echo "$FILES" | jq -r '.result[] | select(.name | test("(?i)\\.mp4$") and (test("__ia_thumb")|not)) | .name' 2>/dev/null | head -1)
              [ -z "$VURL" ] || [ "$VURL" = "null" ] && continue

              FULL_URL="https://archive.org/download/${IDENTIFIER}/${VURL}"

              # Probe for duration
              DUR_RAW=$(timeout 15 ffprobe -v error -show_entries format=duration -of csv=p=0 "$FULL_URL" 2>/dev/null | cut -d. -f1)
              
              if [[ ! "$DUR_RAW" =~ ^[0-9]+$ ]]; then continue; fi
              if [ "$DUR_RAW" -gt "$MAX_DURATION" ] || [ "$DUR_RAW" -lt "$MIN_DURATION" ]; then continue; fi

              echo "Found: $TITLE ($YEAR) - $DUR_RAW sec"
              echo "video_url=$FULL_URL" >> "$GITHUB_OUTPUT"
              echo "video_title=$TITLE" >> "$GITHUB_OUTPUT"
              echo "video_year=$YEAR" >> "$GITHUB_OUTPUT"
              echo "video_dur=$DUR_RAW" >> "$GITHUB_OUTPUT"
              exit 0 
            done
          done
          echo "No valid video found." && exit 1

      - name: pick-caption
        id: caption
        run: |
          YEAR="${{ steps.vid.outputs.video_year }}"
          TITLE="${{ steps.vid.outputs.video_title }}"
          HOOKS=("Who remembers this? 👇" "Pure nostalgia. 😍" "The good old days. 🕰️" "This hit different. 😢")
          HOOK="${HOOKS[$((RANDOM % ${#HOOKS[@]}))]}"
          
          # Handle missing dates gracefully
          if [[ "$YEAR" == "null" || -z "$YEAR" ]]; then
            CAPTION="📼 Throwback — ${TITLE} | ${HOOK}"
          else
            CAPTION="📼 ${YEAR} — ${TITLE} | ${HOOK}"
          fi
          echo "caption=${CAPTION} #Nostalgia #Throwback #Vintage" >> "$GITHUB_OUTPUT"

      - name: process-video
        timeout-minutes: 10
        run: |
          URL="${{ steps.vid.outputs.video_url }}"
          YEAR="${{ steps.vid.outputs.video_year }}"
          [[ "$YEAR" == "null" || -z "$YEAR" ]] && LABEL="📼 Throwback" || LABEL="📼 ${YEAR}"

          echo "Downloading..."
          curl -L -o full.mp4 "$URL"

          echo "Applying overlays..."
          # Preset superfast is key for 5-minute high-res clips
          ffmpeg -hide_banner -loglevel error -y -i full.mp4 \
            -vf "pad=iw:ih+100:0:50:black,drawtext=text='${LABEL}':fontcolor=white:fontsize=32:x=(w-text_w)/2:y=10,drawtext=text='Who remembers this?':fontcolor=white:fontsize=22:x=(w-text_w)/2:y=h-40" \
            -c:v libx264 -preset superfast -crf 23 -c:a aac -b:a 128k -movflags +faststart final.mp4

      - name: post-to-facebook
        timeout-minutes: 5
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          # Using source=@ method for reliability with files under 1GB
          curl -X POST "https://graph.facebook.com/v19.0/${PAGE_ID}/videos" \
            -F "description=${CAPTION}" \
            -F "source=@final.mp4" \
            -F "access_token=${PAGE_TOKEN}"
