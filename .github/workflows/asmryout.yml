name: 🧠 Post EMDR Short to YouTube

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 1,3,5"  # Mon Wed Fri 2PM EST

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio
          pip install selenium webdriver-manager google-auth google-auth-oauthlib google-api-python-client
          echo "✅ Done"

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Verify asmry.html
        run: ls -la asmry.html && echo "✅ Found"

      - name: Start display and audio
        run: |
          Xvfb :99 -screen 0 1080x1920x24 -ac &
          sleep 2
          pulseaudio --start --exit-idle-time=-1 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Display ready"

      - name: Record EMDR Short
        run: |
          python3 << 'PYEOF'
          import os, time, base64, sys
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          html_path = os.path.abspath("asmry.html")
          if not os.path.exists(html_path):
            print(f"❌ asmry.html not found at {html_path}")
            sys.exit(1)
          print(f"✅ Found {html_path}")

          webm_file = f"/tmp/emdr_{os.environ.get('TS','test')}.webm"

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1080,1920")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)
          opts.add_experimental_option("mobileEmulation", {
            "deviceMetrics": {"width": 1080, "height": 1920, "pixelRatio": 1.0},
            "userAgent": "Mozilla/5.0 (Linux; Android 12; Pixel 6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36"
          })

          print("🚀 Starting Chrome 1080x1920...")
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(1080, 1920)
          driver.set_script_timeout(90)

          print(f"📄 Loading {html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(3)
          driver.execute_script("if(typeof AC!=='undefined'&&AC)AC.resume().catch(()=>{});")
          time.sleep(1)

          driver.execute_script("window.startRecording(30);")
          print("🎬 Recording — waiting ~22s...")

          for i in range(60):
            done = driver.execute_script("return window._recordingDone;")
            if done:
              print(f"✅ Done at {i*0.5:.0f}s")
              break
            time.sleep(0.5)
          else:
            print("⏰ Timeout — forcing stop")
            driver.execute_script("window.stopRecording();")
            time.sleep(2)
            driver.execute_script("window.forceFinalize();")
            time.sleep(2)

          if not driver.execute_script("return window._recordingDone;"):
            driver.quit()
            print("❌ Recording failed")
            sys.exit(1)

          print("📦 Extracting...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64().then(done).catch(function(e){ console.error(e); done(null); });
          """)
          driver.quit()

          if not b64:
            print("❌ No video data")
            sys.exit(1)

          with open(webm_file, "wb") as f:
            f.write(base64.b64decode(b64))
          size = os.path.getsize(webm_file)
          print(f"✅ Webm: {size/1024/1024:.1f} MB")
          if size < 10000:
            print("❌ Too small")
            sys.exit(1)

          mp4_file = webm_file.replace(".webm", ".mp4")
          import subprocess
          result = subprocess.run([
            "ffmpeg", "-y", "-i", webm_file,
            "-c:v", "libx264", "-preset", "slow", "-crf", "16",
            "-pix_fmt", "yuv420p",
            "-vf", "scale=1080:1920:flags=lanczos",
            "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
            "-movflags", "+faststart",
            mp4_file
          ], capture_output=True, text=True)

          if result.returncode != 0:
            print(f"❌ ffmpeg error:\n{result.stderr[-2000:]}")
            sys.exit(1)

          os.remove(webm_file)
          print(f"✅ mp4: {os.path.getsize(mp4_file)/1024/1024:.1f} MB")

          # Save path for next step
          with open("/tmp/mp4_path.txt", "w") as f:
            f.write(mp4_file)
          PYEOF
        env:
          DISPLAY: ":99"
          TS: ${{ env.TS }}

      - name: Upload to YouTube as Short
        run: |
          python3 << 'PYEOF'
          import os, random, sys
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2.credentials import Credentials

          with open("/tmp/mp4_path.txt") as f:
            mp4_file = f.read().strip()

          if not os.path.exists(mp4_file):
            print("❌ mp4 not found")
            sys.exit(1)

          # ===== SEO OPTIMIZED TITLES =====
          # Short, punchy, keyword-rich (under 60 chars)
          titles = [
            "EMDR Bilateral Stimulation for Anxiety Relief #shorts",
            "Stop Overthinking with EMDR Therapy #shorts",
            "Calm Your Nervous System with EMDR #shorts",
            "Self EMDR Session for Stress Relief #shorts",
            "EMDR Anxiety Relief in 20 Seconds #shorts",
            "Quick EMDR for Stress and Anxiety #shorts",
            "EMDR Bilateral Stimulation - Calm Your Mind #shorts",
            "Anxiety Relief with EMDR Eye Movement #shorts"
          ]

          # ===== SEO OPTIMIZED DESCRIPTIONS =====
          # Detailed, keyword-rich, consistent structure
          descriptions = [
            """Self-guided EMDR bilateral stimulation for anxiety and stress relief. Follow the moving stimulus with your eyes to activate natural brain processing.

          How EMDR works:
          • Bilateral eye movement activates both brain hemispheres
          • Visual tracking promotes nervous system regulation
          • Natural stress processing mechanism

          Benefits of this EMDR session:
          ✓ Reduces anxiety and overthinking
          ✓ Calms the nervous system
          ✓ Promotes emotional regulation
          ✓ Interrupts stress patterns

          🎧 Use headphones for full stereo effect
          👁 Keep head still, follow with eyes only
          🌬 Breathe slowly and naturally

          EMDR therapy is scientifically proven for anxiety, stress, and trauma processing. This self-guided version is for daily wellness and relaxation.

          ⚠️ DISCLAIMER: This is not a substitute for professional therapy. Contains flashing lights. Stop if uncomfortable. Not for photosensitive epilepsy.

          #emdr #bilateralstimulation #anxietyrelief #stressrelief #mentalhealth #emdrtherapy #shorts""",

            """Stop overthinking with EMDR bilateral stimulation. Your brain cannot ruminate while tracking a moving object - this interrupts anxiety patterns instantly.

          This self-guided EMDR session uses bilateral eye movement to:
          • Activate both brain hemispheres
          • Process emotional stress
          • Calm the nervous system
          • Interrupt overthinking loops

          What makes this EMDR session effective:
          ✓ Natural bilateral stimulation
          ✓ Visual tracking for brain activation
          ✓ Stress reduction mechanism

          🎧 Use headphones for full stereo effect
          👁 Follow the moving stimulus with your eyes
          🌬 Let thoughts pass without engaging

          EMDR (Eye Movement Desensitization and Reprocessing) is a proven therapeutic technique for anxiety, PTSD, and emotional regulation.

          ⚠️ DISCLAIMER: Wellness content only. Not professional therapy. Contains flashing lights. Not for photosensitive epilepsy.

          #overthinking #emdr #bilateralstimulation #anxietyrelief #stressrelief #mentalhealth #shorts""",

            """Calm your nervous system with EMDR bilateral stimulation in just seconds. This self-guided session activates your parasympathetic nervous system for deep relaxation.

          How EMDR stimulation works:
          • Bilateral eye movement activates both hemispheres
          • Natural stress processing mechanism
          • Promotes vagal tone and relaxation

          Benefits of this EMDR session:
          ✓ Activates relaxation response
          ✓ Reduces stress hormones
          ✓ Promotes emotional balance
          ✓ Supports nervous system health

          🎧 Use headphones for full experience
          👁 Follow the movement with your eyes
          🌬 Exhale slowly and relax

          EMDR therapy is clinically proven for trauma, anxiety, and stress relief. This self-guided version is for wellness and relaxation.

          ⚠️ DISCLAIMER: Wellness content only. Not medical treatment. Contains flashing lights. Not for photosensitive epilepsy.

          #nervoussystem #emdr #bilateralstimulation #anxietyrelief #stressrelief #vagusnerve #mentalhealth #shorts""",

            """Self-administered EMDR session for everyday stress relief and emotional balance. Use this bilateral stimulation technique whenever you need to calm your mind.

          This EMDR-inspired session provides:
          • Bilateral brain stimulation
          • Natural stress relief
          • Emotional regulation
          • Nervous system calming

          Why EMDR bilateral stimulation works:
          ✓ Activates natural processing
          ✓ Interrupts stress patterns
          ✓ Promotes relaxation
          ✓ Supports mental wellness

          🎧 Use headphones for full stereo effect
          👁 Follow the moving stimulus with your eyes
          🌬 Breathe slowly and relax

          EMDR is a proven therapeutic approach for anxiety, PTSD, and emotional regulation. This self-guided version is for daily wellness.

          ⚠️ DISCLAIMER: Self-guided wellness content. Not professional therapy. Contains flashing lights. Not for photosensitive epilepsy.

          #emdr #selftherapy #anxietyrelief #stressrelief #bilateralstimulation #mentalhealth #shorts""",

            """Quick EMDR bilateral stimulation for instant anxiety relief. This 20-second session helps calm your mind and reduce stress.

          EMDR stimulation benefits:
          • Bilateral eye movement
          • Natural stress processing
          • Nervous system regulation

          🎧 Use headphones
          👁 Follow with your eyes

          ⚠️ DISCLAIMER: Not professional therapy. Contains flashing lights.

          #emdr #anxietyrelief #stressrelief #bilateralstimulation #shorts""",

            """EMDR self-therapy session for stress and anxiety relief. Bilateral stimulation activates your brain's natural calming mechanism.

          This EMDR session helps:
          ✓ Reduce anxiety
          ✓ Calm overthinking
          ✓ Regulate emotions

          🎧 Use headphones
          👁 Follow the movement

          ⚠️ DISCLAIMER: Wellness content only. Not for photosensitive epilepsy.

          #emdr #bilateralstimulation #anxietyrelief #mentalhealth #shorts""",

            """Calm your mind with EMDR bilateral stimulation. This proven technique activates both brain hemispheres for natural anxiety relief.

          EMDR benefits:
          • Stress reduction
          • Emotional regulation
          • Nervous system calm

          ⚠️ DISCLAIMER: Not professional therapy. Contains flashing lights.

          #emdr #bilateralstimulation #anxietyrelief #stressrelief #shorts""",

            """EMDR anxiety relief using bilateral eye movement. Follow the stimulus to activate your brain's natural calming response.

          This EMDR session promotes:
          ✓ Relaxation
          ✓ Stress relief
          ✓ Mental clarity

          🎧 Use headphones for best results

          ⚠️ DISCLAIMER: Wellness content only.

          #emdr #anxietyrelief #bilateralstimulation #stressrelief #shorts"""
          ]

          # ===== COMBINE TITLES AND DESCRIPTIONS =====
          # Randomly select a title and description independently
          title = random.choice(titles)
          description = random.choice(descriptions)
          
          print(f"📹 Title: {title}")
          print(f"📝 Description length: {len(description)} chars")

          creds = Credentials(
            token=os.environ.get("YT_ACCESS_TOKEN"),
            refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ.get("YT_CLIENT_ID"),
            client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)

          request = youtube.videos().insert(
            part="snippet,status",
            body={
              "snippet": {
                "title": title,
                "description": description,
                "tags": [
                  "emdr","emdr therapy","bilateral stimulation","bilateralstimulation",
                  "anxiety relief","stress relief","mental health","overthinking",
                  "nervous system","self therapy","eye movement therapy",
                  "relaxation","emdr treatment","shorts"
                ],
                "categoryId": "26",
                "defaultLanguage": "en"
              },
              "status": {
                "privacyStatus": "public",
                "madeForKids": False,
                "selfDeclaredMadeForKids": False
              }
            },
            media_body=MediaFileUpload(mp4_file, mimetype="video/mp4", resumable=True)
          )

          response = None
          while response is None:
            status, response = request.next_chunk()
            if status:
              print(f"⬆️  {int(status.progress()*100)}%")

          video_id = response.get("id","")
          print(f"✅ Uploaded! https://youtube.com/shorts/{video_id}")
          os.remove(mp4_file)
          PYEOF
        env:
          YT_ACCESS_TOKEN: ${{ secrets.YT_ACCESS_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}