name: 🧠 Post ASMR YouTube Landscape to Facebook

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1,3,5"  # Monday, Wednesday, Friday at 10:00 AM UTC

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-asmr-yt-v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-asmr-yt-v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager google-auth google-auth-oauthlib google-api-python-client requests

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Record and Upload to YouTube
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, random, base64, json, requests
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2.credentials import Credentials

          ts = os.environ.get("TS", "test")
          pixabay_key = os.environ.get("PIXABAY_KEY")
          
          # ─── DOWNLOAD BACKGROUND FOOTAGE FROM PIXABAY ───
          def get_pixabay_video():
              used_videos_file = "used_pixabay_videos.json"
              if os.path.exists(used_videos_file):
                  with open(used_videos_file, 'r') as f:
                      used_ids = json.load(f)
              else:
                  used_ids = []
              
              # Broader search terms - no audio requirement
              search_terms = ["nature", "forest", "rain", "waterfall", "ocean", "mountains", "landscape", "clouds", "sunset", "river", "trees", "green nature"]
              random.shuffle(search_terms)
              
              for term in search_terms[:5]:
                  url = f"https://pixabay.com/api/videos/?key={pixabay_key}&q={term}&per_page=50&video_type=film"
                  try:
                      response = requests.get(url, timeout=30)
                      data = response.json()
                  except:
                      continue
                  
                  if 'hits' not in data:
                      continue
                  
                  hits = data['hits']
                  random.shuffle(hits)
                  
                  for video in hits:
                      video_id = video['id']
                      if video_id in used_ids:
                          continue
                      
                      # Skip if duration too short
                      if video.get('duration', 0) < 5:
                          continue
                      
                      video_url = None
                      for quality in ['large', 'medium', 'small']:
                          if quality in video['videos']:
                              video_url = video['videos'][quality]['url']
                              break
                      
                      if video_url:
                          video_file = f"/tmp/background_{ts}.mp4"
                          print(f"Downloading background ({video.get('duration', 0)}s): {video_url[:100]}...")
                          try:
                              r = requests.get(video_url, stream=True, timeout=60)
                              with open(video_file, 'wb') as f:
                                  for chunk in r.iter_content(chunk_size=8192):
                                      f.write(chunk)
                              
                              used_ids.append(video_id)
                              with open(used_videos_file, 'w') as f:
                                  json.dump(used_ids, f)
                              
                              print(f"Downloaded: {video_file} ({os.path.getsize(video_file)/1024/1024:.1f} MB)")
                              return video_file, True
                          except Exception as e:
                              print(f"Download failed: {e}")
                              continue
              
              print("No suitable video found, using canvas only")
              return None, False
          
          background_file, has_audio = get_pixabay_video()
          
          # ─── SETUP SELENIUM ────────────────────────────────
          webm_file = f"/tmp/asmr_{ts}.webm"
          mp4_file = f"/tmp/asmr_{ts}.mp4"
          final_output = f"/tmp/final_{ts}.mp4"
          html_path = os.path.abspath("asmry.html")

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)

          print("Starting Chrome 1920x1080...")
          service = Service(ChromeDriverManager().install())
          service.start()
          
          driver = webdriver.Chrome(
              service=service, options=opts
          )
          driver.set_window_size(1920, 1080)
          driver.set_script_timeout(600)
          driver.implicitly_wait(10)

          driver.get(f"file://{html_path}")
          print("Waiting for HTML to load...")
          time.sleep(5)  # Wait for HTML to fully load
          
          # Verify function exists
          if not driver.execute_script("return typeof window.startRecording === 'function';"):
              # Try to reload if function missing
              print("startRecording not loaded, reloading...")
              driver.get(f"file://{html_path}")
              time.sleep(5)
              if not driver.execute_script("return typeof window.startRecording === 'function';"):
                  driver.quit()
                  service.stop()
                  raise RuntimeError("startRecording function not loaded - HTML may have errors")
          
          driver.execute_script("if(typeof AC!=='undefined'&&AC)AC.resume().catch(()=>{});")
          time.sleep(2)

          # ─── START RECORDING ──────────────────────────────
          driver.execute_script("window.startRecording(30);")
          print("Recording started (3 minutes with looping scenes + transparent background)...")

          for i in range(400):  # 200 seconds - enough for 3 min + buffer
              if driver.execute_script("return window._recordingDone;"):
                  print(f"Recording complete at {i*0.5:.1f} seconds")
                  break
              if i % 20 == 0:
                  print(f"Recording in progress... {i*0.5:.1f}s")
              time.sleep(0.5)
          else:
              print("Recording timeout, forcing stop...")
              driver.execute_script("""
                  window.stopRecording();
                  window._recordingDone = true;
                  window.forceFinalize();
              """)
              time.sleep(3)

          if not driver.execute_script("return window._recordingDone;"):
              driver.quit()
              service.stop()
              raise RuntimeError("Recording failed to complete")

          print("Retrieving video data...")
          b64 = driver.execute_async_script("""
              var done = arguments[0];
              var attempts = 0;
              var maxAttempts = 60;
              
              function checkRecording() {
                if (window._recordingDone && window._rb) {
                  var reader = new FileReader();
                  reader.onload = function() {
                    done(reader.result.split(',')[1]);
                  };
                  reader.onerror = function() {
                    done(null);
                  };
                  reader.readAsDataURL(window._rb);
                } else if (attempts < maxAttempts) {
                  attempts++;
                  setTimeout(checkRecording, 500);
                } else {
                  done(null);
                }
              }
              checkRecording();
          """)
          
          driver.quit()
          service.stop()

          if not b64:
              raise RuntimeError("No video data received")

          with open(webm_file, 'wb') as f:
              f.write(base64.b64decode(b64))
          
          print(f"Video data saved: {os.path.getsize(webm_file)/1024/1024:.1f} MB")

          # ─── ENCODE TRANSPARENT VIDEO ───────────────────────
          if os.path.getsize(webm_file) < 10000:
              raise RuntimeError("Video file too small - likely corrupt")

          subprocess.run([
              "ffmpeg", "-y", "-i", webm_file,
              "-c:v", "libx264", "-preset", "slow", "-crf", "16",
              "-pix_fmt", "yuva420p",
              "-vf", "scale=1920:1080:flags=lanczos",
              "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
              "-movflags", "+faststart", mp4_file
          ], check=True, timeout=300)
          os.remove(webm_file)
          print(f"Canvas MP4 ready: {os.path.getsize(mp4_file)/1024/1024:.1f} MB")

          # ─── OVERLAY ON BACKGROUND ──────────────────────────
          if background_file and os.path.exists(background_file) and os.path.getsize(background_file) > 10000:
              print("Layering on background footage...")
              
              try:
                  # Extract audio from canvas
                  canvas_audio = f"/tmp/canvas_audio_{ts}.aac"
                  subprocess.run([
                      "ffmpeg", "-y", "-i", mp4_file, "-acodec", "copy", canvas_audio
                  ], check=True, timeout=60)
                  
                  # Overlay with blur and zoom
                  subprocess.run([
                      "ffmpeg", "-y",
                      "-i", background_file,
                      "-i", mp4_file,
                      "-i", canvas_audio,
                      "-filter_complex", 
                      "[0:v]gblur=sigma=10,scale=1920:1080:flags=lanczos,eq=brightness=0.7:contrast=1.1:sat=0.5[bg];[1:v]format=rgba,colorchannelmixer=aa=0.9[overlay];[bg][overlay]overlay",
                      "-map", "0:v:0",
                      "-map", "2:a:0",
                      "-c:v", "libx264",
                      "-crf", "18",
                      "-preset", "slow",
                      "-c:a", "aac",
                      "-b:a", "192k",
                      "-shortest",
                      final_output
                  ], check=True, timeout=300)
                  
                  print(f"Final video ready: {os.path.getsize(final_output)/1024/1024:.1f} MB")
                  os.remove(background_file)
                  os.remove(canvas_audio)
              except Exception as e:
                  print(f"Background overlay failed: {e}, using canvas only")
                  final_output = mp4_file
          else:
              print("No suitable background found, using canvas only")
              final_output = mp4_file

          if final_output != mp4_file and os.path.exists(mp4_file):
              os.remove(mp4_file)

          # ─── UPLOAD TO YOUTUBE ────────────────────────────
          videos = [
              {
                  "title": "EMDR Rapid Eye Movement Therapy ⚡ (Fast Bilateral Stimulation)",
                  "description": """Follow the fast-moving light with your eyes 👁️ to activate your brain's natural stress relief response

          🔹 This technique is inspired by EMDR Therapy (Eye Movement Desensitization and Reprocessing) - used by therapists worldwide to help people process anxiety, trauma, overthinking, and stress
          🔹 The rapid bilateral eye movement activates both hemispheres of your brain, promoting deep relaxation and mental clarity
          🔹 Use headphones for the best binaural experience 🎧

          ⚡ WHY BILATERAL STIMULATION WORKS:
          - Activates parasympathetic nervous system (rest & digest)
          - Reduces amygdala activity (fear center)
          - Helps break anxious thought patterns
          - Promotes emotional regulation

          💬 How do you feel after watching? Comment below!

          👇 SUBSCRIBE for daily EMDR therapy sessions

          #EMDR #BilateralStimulation #EyeMovementTherapy #AnxietyRelief #TraumaHealing #RapidEMDR #BrainHemispheres #StressRelief #ASMR #MentalHealth #NervousSystemReset #PanicAttackRelief #BilateralBeats #Overthinking #CalmMind #HealingFrequency #BrainwaveEntrainment #EMDRTherapy #BilateralMusic #Mindfulness #Meditation #TraumaProcessing #PTSDRecovery #MentalWellness #Relaxation"""
              },
              {
                  "title": "Stop Overthinking Instantly 🧠 (Rapid EMDR Eye Tracking)",
                  "description": """Follow the fast-moving light with your eyes 👁️ to activate your brain's natural stress relief response

          🔹 This technique is inspired by EMDR Therapy (Eye Movement Desensitization and Reprocessing) - used by therapists worldwide to help people process anxiety, trauma, overthinking, and stress
          🔹 The rapid bilateral eye movement activates both hemispheres of your brain, promoting deep relaxation and mental clarity
          🔹 Use headphones for the best binaural experience 🎧

          ⚡ WHY BILATERAL STIMULATION WORKS:
          - Activates parasympathetic nervous system (rest & digest)
          - Reduces amygdala activity (fear center)
          - Helps break anxious thought patterns
          - Promotes emotional regulation

          💬 How do you feel after watching? Comment below!

          👇 SUBSCRIBE for daily EMDR therapy sessions

          #EMDR #BilateralStimulation #EyeMovementTherapy #AnxietyRelief #TraumaHealing #RapidEMDR #BrainHemispheres #StressRelief #ASMR #MentalHealth #NervousSystemReset #PanicAttackRelief #BilateralBeats #Overthinking #CalmMind #HealingFrequency #BrainwaveEntrainment #EMDRTherapy #BilateralMusic #Mindfulness #Meditation #TraumaProcessing #PTSDRecovery #MentalWellness #Relaxation"""
              },
              {
                  "title": "EMDR Therapy for Anxiety Relief 🌿 (Intense Eye Movement Session)",
                  "description": """Follow the fast-moving light with your eyes 👁️ to activate your brain's natural stress relief response

          🔹 This technique is inspired by EMDR Therapy (Eye Movement Desensitization and Reprocessing) - used by therapists worldwide to help people process anxiety, trauma, overthinking, and stress
          🔹 The rapid bilateral eye movement activates both hemispheres of your brain, promoting deep relaxation and mental clarity
          🔹 Use headphones for the best binaural experience 🎧

          ⚡ WHY BILATERAL STIMULATION WORKS:
          - Activates parasympathetic nervous system (rest & digest)
          - Reduces amygdala activity (fear center)
          - Helps break anxious thought patterns
          - Promotes emotional regulation

          💬 How do you feel after watching? Comment below!

          👇 SUBSCRIBE for daily EMDR therapy sessions

          #EMDR #BilateralStimulation #EyeMovementTherapy #AnxietyRelief #TraumaHealing #RapidEMDR #BrainHemispheres #StressRelief #ASMR #MentalHealth #NervousSystemReset #PanicAttackRelief #BilateralBeats #Overthinking #CalmMind #HealingFrequency #BrainwaveEntrainment #EMDRTherapy #BilateralMusic #Mindfulness #Meditation #TraumaProcessing #PTSDRecovery #MentalWellness #Relaxation"""
              },
              {
                  "title": "Bilateral Brain Stimulation 🧠 (Follow the Fast Light)",
                  "description": """Follow the fast-moving light with your eyes 👁️ to activate your brain's natural stress relief response

          🔹 This technique is inspired by EMDR Therapy (Eye Movement Desensitization and Reprocessing) - used by therapists worldwide to help people process anxiety, trauma, overthinking, and stress
          🔹 The rapid bilateral eye movement activates both hemispheres of your brain, promoting deep relaxation and mental clarity
          🔹 Use headphones for the best binaural experience 🎧

          ⚡ WHY BILATERAL STIMULATION WORKS:
          - Activates parasympathetic nervous system (rest & digest)
          - Reduces amygdala activity (fear center)
          - Helps break anxious thought patterns
          - Promotes emotional regulation

          💬 How do you feel after watching? Comment below!

          👇 SUBSCRIBE for daily EMDR therapy sessions

          #EMDR #BilateralStimulation #EyeMovementTherapy #AnxietyRelief #TraumaHealing #RapidEMDR #BrainHemispheres #StressRelief #ASMR #MentalHealth #NervousSystemReset #PanicAttackRelief #BilateralBeats #Overthinking #CalmMind #HealingFrequency #BrainwaveEntrainment #EMDRTherapy #BilateralMusic #Mindfulness #Meditation #TraumaProcessing #PTSDRecovery #MentalWellness #Relaxation"""
              },
              {
                  "title": "Fast EMDR Session 🔥 (Bilateral Stimulation for Stress Relief)",
                  "description": """Follow the fast-moving light with your eyes 👁️ to activate your brain's natural stress relief response

          🔹 This technique is inspired by EMDR Therapy (Eye Movement Desensitization and Reprocessing) - used by therapists worldwide to help people process anxiety, trauma, overthinking, and stress
          🔹 The rapid bilateral eye movement activates both hemispheres of your brain, promoting deep relaxation and mental clarity
          🔹 Use headphones for the best binaural experience 🎧

          ⚡ WHY BILATERAL STIMULATION WORKS:
          - Activates parasympathetic nervous system (rest & digest)
          - Reduces amygdala activity (fear center)
          - Helps break anxious thought patterns
          - Promotes emotional regulation

          💬 How do you feel after watching? Comment below!

          👇 SUBSCRIBE for daily EMDR therapy sessions

          #EMDR #BilateralStimulation #EyeMovementTherapy #AnxietyRelief #TraumaHealing #RapidEMDR #BrainHemispheres #StressRelief #ASMR #MentalHealth #NervousSystemReset #PanicAttackRelief #BilateralBeats #Overthinking #CalmMind #HealingFrequency #BrainwaveEntrainment #EMDRTherapy #BilateralMusic #Mindfulness #Meditation #TraumaProcessing #PTSDRecovery #MentalWellness #Relaxation"""
              }
          ]

          video = random.choice(videos)

          print("Uploading to YouTube...")
          creds = Credentials(
              token=os.environ.get("YT_ACCESS_TOKEN"),
              refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
              token_uri="https://oauth2.googleapis.com/token",
              client_id=os.environ.get("YT_CLIENT_ID"),
              client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)
          request = youtube.videos().insert(
              part="snippet,status",
              body={
                  "snippet": {
                      "title": video["title"],
                      "description": video["description"],
                      "tags": ["emdr therapy", "bilateral stimulation", "eye movement therapy", "anxiety relief", "trauma healing", "rapid emdr", "stress relief", "asmr", "mental health", "nervous system", "panic attack relief", "brain hemispheres", "overthinking", "calm mind", "healing frequency", "brainwave entrainment", "fast emdr", "bilateral eye movement"],
                      "categoryId": "22",
                      "defaultLanguage": "en"
                  },
                  "status": {
                      "privacyStatus": "public",
                      "madeForKids": False,
                      "selfDeclaredMadeForKids": False
                  }
              },
              media_body=MediaFileUpload(final_output, mimetype="video/mp4", resumable=True)
          )
          response = None
          while response is None:
              status, response = request.next_chunk()
              if status:
                  print(f"Upload {int(status.progress()*100)}%")

          print(f"Done! Video ID: {response['id']}")
          os.remove(final_output)
          PYEOF
        env:
          TS:               ${{ env.TS }}
          DISPLAY:          ":99"
          PIXABAY_KEY:      ${{ secrets.PIXABAY_KEY }}
          YT_ACCESS_TOKEN:  ${{ secrets.YT_ACCESS_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}