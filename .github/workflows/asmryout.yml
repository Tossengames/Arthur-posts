name: 🧠 Post ASMR + Nature to YouTube

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-asmr-v7

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.wdm
          key: pip-wdm-asmr-v7

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install selenium webdriver-manager requests google-auth google-auth-oauthlib google-api-python-client

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          pulseaudio --start --exit-idle-time=-1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Download Pixabay nature footage
        run: |
          python3 << 'PYEOF'
          import requests, os, random, subprocess

          key = os.environ.get("PIXABAY_KEY")
          queries = ["rain nature","forest rain","river flowing","ocean waves","mountain landscape","waterfall nature","green forest","calm lake"]
          query = random.choice(queries)
          print(f"Searching Pixabay for: {query}")

          resp = requests.get("https://pixabay.com/api/videos/", params={
            "key": key,
            "q": query,
            "video_type": "film",
            "per_page": 20,
            "safesearch": "true",
            "order": "popular"
          })
          data = resp.json()
          hits = data.get("hits", [])
          if not hits:
            raise RuntimeError("No Pixabay results found")

          # Filter: prefer short clips under 3 min, pick random from top 10
          hits = [h for h in hits if h.get("duration", 999) < 180][:10]
          if not hits:
            hits = data.get("hits", [])[:5]

          hit = random.choice(hits)
          # Pick medium quality to keep file small
          videos = hit.get("videos", {})
          url = (videos.get("medium") or videos.get("small") or videos.get("large") or {}).get("url")
          if not url:
            raise RuntimeError("No video URL found")

          print(f"Downloading: {url}")
          r = requests.get(url, stream=True)
          with open("/tmp/nature_raw.mp4", "wb") as f:
            for chunk in r.iter_content(chunk_size=8192):
              f.write(chunk)

          duration = hit.get("duration", 120)
          start = min(30, duration // 4)
          print(f"Duration: {duration}s  Starting at: {start}s")

          # Trim from 30s, take 2 min, blur + zoom slightly
          subprocess.run([
            "ffmpeg", "-y",
            "-ss", str(start),
            "-i", "/tmp/nature_raw.mp4",
            "-t", "120",
            "-vf", "scale=1920:1080:flags=lanczos,zoompan=z='1.08':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=1920x1080,gblur=sigma=3",
            "-c:v", "libx264", "-preset", "fast", "-crf", "22",
            "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
            "/tmp/nature_bg.mp4"
          ], check=True)
          os.remove("/tmp/nature_raw.mp4")
          print(f"Nature bg ready: {os.path.getsize('/tmp/nature_bg.mp4')/1024/1024:.1f} MB")
          PYEOF
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}

      - name: Record ASMR canvas
        run: |
          python3 << 'PYEOF'
          import os, time, base64
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          html_path = os.path.abspath("asmry.html")
          webm_file = "/tmp/asmr_canvas.webm"

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(1920, 1080)
          driver.set_script_timeout(180)

          driver.get(f"file://{html_path}")
          time.sleep(2)
          driver.execute_script("if(typeof AC!=='undefined'&&AC)AC.resume().catch(()=>{});")
          time.sleep(1)

          driver.execute_script("window.startRecording(30);")
          print("Recording ASMR canvas — 2 minutes...")

          for _ in range(300):
            if driver.execute_script("return window._recordingDone;"): break
            time.sleep(0.5)
          else:
            driver.execute_script("window.stopRecording();")
            time.sleep(2)
            driver.execute_script("window.forceFinalize();")
            time.sleep(2)

          if not driver.execute_script("return window._recordingDone;"):
            driver.quit()
            raise RuntimeError("Recording failed")

          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64().then(done).catch(function(){ done(null); });
          """)
          driver.quit()

          if not b64:
            raise RuntimeError("No video data")

          with open(webm_file, "wb") as f:
            f.write(base64.b64decode(b64))
          print(f"Canvas webm: {os.path.getsize(webm_file)/1024/1024:.1f} MB")
          PYEOF
        env:
          DISPLAY: ":99"

      - name: Merge canvas over nature footage
        run: |
          python3 << 'PYEOF'
          import subprocess, os

          # Convert canvas webm to mp4 with transparency preserved as png pipe
          # Then overlay on nature bg with ffmpeg
          # Mix audio: nature 50% + asmr 50%

          subprocess.run([
            "ffmpeg", "-y",
            "-i", "/tmp/nature_bg.mp4",        # input 0: nature background
            "-i", "/tmp/asmr_canvas.webm",      # input 1: asmr canvas (with audio)
            "-filter_complex",
            # Scale canvas to match, overlay on top of nature
            # Mix audio: nature at 0.5 vol, asmr at 0.5 vol
            "[0:v]scale=1920:1080[bg];"
            "[1:v]scale=1920:1080[fg];"
            "[bg][fg]overlay=0:0[outv];"
            "[0:a]volume=0.5[a1];"
            "[1:a]volume=0.5[a2];"
            "[a1][a2]amix=inputs=2:duration=first[outa]",
            "-map", "[outv]",
            "-map", "[outa]",
            "-c:v", "libx264", "-preset", "slow", "-crf", "16",
            "-pix_fmt", "yuv420p",
            "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
            "-movflags", "+faststart",
            "-t", "120",
            "/tmp/final_asmr.mp4"
          ], check=True)

          os.remove("/tmp/nature_bg.mp4")
          os.remove("/tmp/asmr_canvas.webm")
          print(f"Final video: {os.path.getsize('/tmp/final_asmr.mp4')/1024/1024:.1f} MB")
          PYEOF

      - name: Upload to YouTube
        run: |
          python3 << 'PYEOF'
          import os, random
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2.credentials import Credentials

          mp4_file = "/tmp/final_asmr.mp4"

          videos = [
            {
              "title": "EMDR Eye Movement Therapy for Anxiety Relief | Binaural Beats",
              "description": "follow the moving circle with your eyes to activate your brain's natural stress relief response 👁\n\nthis technique is inspired by emdr therapy — used by therapists to help people process anxiety, overthinking, and stress\n\nbinaural beats playing in background to slow your brainwaves into a calm relaxed state 🎧\n\nuse headphones for best experience\n\n#emdr #anxietyrelief #binaural #brainwaves #stressrelief #asmr #mentalhealth #relax #overthinking #calm"
            },
            {
              "title": "Stop Overthinking in 2 Minutes | Eye Movement + Alpha Waves",
              "description": "your brain can't overthink and follow a moving object at the same time 👁\n\nfollow the circle with your eyes and feel your thoughts slow down\n\nalpha waves (8-12hz) playing to bring your brain into a relaxed focused state\n\nthis is based on bilateral stimulation — the same principle used in emdr therapy\n\n#overthinking #anxietyrelief #alphawave #binaural #asmr #mentalhealth #stressrelief #calm #relax #brainwaves"
            },
            {
              "title": "Binaural Beats Eye Relaxation | Theta Waves for Deep Calm",
              "description": "follow the movement with your eyes and let your mind quiet down 🌀\n\ntheta waves (4-8hz) playing to guide your brain into deep relaxation — the same state you're in just before sleep\n\ngreat for anxiety, stress, insomnia, and mental fatigue\n\nheadphones recommended 🎧\n\n#theta #binaural #deeprelaxation #asmr #insomnia #anxietyrelief #mentalhealth #brainwaves #calm #stressrelief"
            },
            {
              "title": "528hz Healing Frequency + Eye Movement for Stress Relief",
              "description": "follow the light with your eyes while 528hz plays in the background 👁\n\n528hz is known as the dna repair frequency — associated with healing, calm, and reducing cortisol\n\ncombined with smooth eye movement to activate your parasympathetic nervous system\n\n#528hz #healingfrequency #stressrelief #asmr #calm #binaural #mentalhealth #relax #solfeggio #brainwaves"
            },
            {
              "title": "Calm Your Nervous System | Eye Movement + Brainwave Therapy",
              "description": "when you're overwhelmed — just follow the circle 👁\n\nsmooth eye movement activates your vagus nerve and shifts your nervous system from fight-or-flight into rest-and-digest\n\nbrainwave frequencies playing to speed up the process 🎧\n\nno meditation experience needed — just watch and breathe\n\n#nervoussystem #vagusnerve #anxietyrelief #asmr #stressrelief #brainwaves #mentalhealth #calm #relax #binaural"
            },
            {
              "title": "Schumann Resonance 7.83hz | Ground Your Mind and Body",
              "description": "7.83hz — the earth's natural frequency 🌍\n\nalso known as the schumann resonance, this frequency is linked to grounding, calm, and mental clarity\n\nfollow the movement with your eyes while it plays in both ears 🎧\n\n#schumannresonance #grounding #earthfrequency #binaural #asmr #mentalhealth #brainwaves #calm #stressrelief #relax"
            },
            {
              "title": "ASMR Eye Tracking for Anxiety | Bilateral Brain Stimulation",
              "description": "your eyes follow the ball left and right — this bilateral movement activates both sides of your brain 👁\n\nused in emdr therapy to help process trauma, anxiety, and stress\n\nbinaural beats playing to deepen the relaxation effect 🎧\n\n#asmr #bilateral #emdr #anxietyrelief #stressrelief #brainwaves #mentalhealth #calm #binaural #relax"
            },
          ]

          video = random.choice(videos)

          creds = Credentials(
            token=os.environ.get("YT_ACCESS_TOKEN"),
            refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ.get("YT_CLIENT_ID"),
            client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)
          request = youtube.videos().insert(
            part="snippet,status",
            body={
              "snippet": {
                "title": video["title"],
                "description": video["description"],
                "tags": ["emdr","binaural beats","asmr","anxiety relief","stress relief","eye relaxation","brainwaves","alpha waves","theta waves","calm","overthinking","mental health","528hz","schumann resonance","nervous system"],
                "categoryId": "22",
                "defaultLanguage": "en"
              },
              "status": {
                "privacyStatus": "public",
                "madeForKids": False,
                "selfDeclaredMadeForKids": False
              }
            },
            media_body=MediaFileUpload(mp4_file, mimetype="video/mp4", resumable=True)
          )
          response = None
          while response is None:
            status, response = request.next_chunk()
            if status:
              print(f"Upload {int(status.progress()*100)}%")

          print(f"Done! Video ID: {response['id']}")
          os.remove(mp4_file)
          PYEOF
        env:
          YT_ACCESS_TOKEN:  ${{ secrets.YT_ACCESS_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}