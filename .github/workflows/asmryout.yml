name: 🧠 Post ASMR + Nature to YouTube

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio \
            x11-utils x11-xserver-utils mesa-utils
          echo "✅ Dependencies installed"

      - name: Install Python deps
        run: |
          pip install selenium webdriver-manager requests google-auth google-auth-oauthlib google-api-python-client
          echo "✅ Python deps installed"

      - name: Set timestamp
        run: echo "TS=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Verify asmr.html exists
        run: |
          ls -la asmr.html || echo "❌ asmr.html NOT FOUND in repo root"
          echo "✅ File check done"

      - name: Start virtual display and audio
        run: |
          # Kill any existing Xvfb
          pkill Xvfb || true
          pkill pulseaudio || true
          
          # Start Xvfb with proper configuration
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +extension RANDR &
          sleep 3
          
          # Start pulseaudio
          pulseaudio --start --exit-idle-time=-1 || true
          sleep 2
          
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Display and audio started"

      - name: Download Pixabay nature footage
        run: |
          python3 << 'PYEOF'
          import requests, os, random, subprocess, sys

          key = os.environ.get("PIXABAY_KEY")
          if not key:
            print("❌ PIXABAY_KEY secret is missing!")
            sys.exit(1)

          queries = ["rain nature","forest rain","river flowing","ocean waves","mountain landscape","waterfall nature","green forest","calm lake"]
          query = random.choice(queries)
          print(f"🔍 Searching Pixabay for: {query}")

          try:
            resp = requests.get("https://pixabay.com/api/videos/", params={
              "key": key,
              "q": query,
              "video_type": "film",
              "per_page": 20,
              "safesearch": "true",
              "order": "popular"
            }, timeout=30)
            print(f"Pixabay status: {resp.status_code}")
            data = resp.json()
          except Exception as e:
            print(f"❌ Pixabay request failed: {e}")
            sys.exit(1)

          hits = data.get("hits", [])
          print(f"Found {len(hits)} results")
          if not hits:
            print("❌ No results from Pixabay")
            sys.exit(1)

          # Prefer short clips, fallback to any
          short = [h for h in hits if h.get("duration", 999) < 180]
          hits = short[:10] if short else hits[:5]
          hit = random.choice(hits)

          videos = hit.get("videos", {})
          url = None
          for quality in ["medium","small","large","tiny"]:
            url = (videos.get(quality) or {}).get("url")
            if url:
              print(f"Using quality: {quality}")
              break

          if not url:
            print("❌ No video URL in response")
            sys.exit(1)

          print(f"⬇️  Downloading: {url}")
          r = requests.get(url, stream=True, timeout=60)
          with open("/tmp/nature_raw.mp4", "wb") as f:
            for chunk in r.iter_content(chunk_size=8192):
              f.write(chunk)
          raw_size = os.path.getsize("/tmp/nature_raw.mp4")
          print(f"Downloaded: {raw_size/1024/1024:.1f} MB")

          if raw_size < 1000:
            print("❌ Downloaded file too small — download failed")
            sys.exit(1)

          duration = hit.get("duration", 120)
          start = min(30, max(0, duration // 4))
          print(f"Duration: {duration}s  Start offset: {start}s")

          print("🎬 Processing nature footage...")
          result = subprocess.run([
            "ffmpeg", "-y",
            "-ss", str(start),
            "-i", "/tmp/nature_raw.mp4",
            "-t", "125",
            "-vf", "scale=1920:1080:flags=lanczos,gblur=sigma=3",
            "-c:v", "libx264", "-preset", "fast", "-crf", "24",
            "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
            "/tmp/nature_bg.mp4"
          ], capture_output=True, text=True)

          if result.returncode != 0:
            print(f"❌ ffmpeg failed:\n{result.stderr[-2000:]}")
            sys.exit(1)

          os.remove("/tmp/nature_raw.mp4")
          print(f"✅ Nature bg ready: {os.path.getsize('/tmp/nature_bg.mp4')/1024/1024:.1f} MB")
          PYEOF
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}

      - name: Record ASMR canvas
        run: |
          python3 << 'PYEOF'
          import os, time, base64, sys
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          html_path = os.path.abspath("asmr.html")
          if not os.path.exists(html_path):
            print(f"❌ asmr.html not found at {html_path}")
            sys.exit(1)
          print(f"✅ Found: {html_path}")

          webm_file = "/tmp/asmr_canvas.webm"

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_argument("--disable-web-security")
          opts.add_argument("--disable-features=IsolateOrigins,site-per-process")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)

          print("🚀 Starting Chrome...")
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(1920, 1080)
          driver.set_script_timeout(180)

          print(f"📄 Loading file://{html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(5)
          
          # Check if audio context is working
          print("🔊 Checking audio...")
          audio_ok = driver.execute_script("""
            try {
              var ac = new (window.AudioContext || window.webkitAudioContext)();
              ac.resume();
              return ac.state === 'running';
            } catch(e) {
              return false;
            }
          """)
          print(f"Audio state: {audio_ok}")

          print("🎬 Starting recording...")
          driver.execute_script("window.startRecording(30);")
          time.sleep(2)

          print("⏳ Recording for 120 seconds...")
          for i in range(240):  # 120 seconds at 0.5s intervals
            done = driver.execute_script("return window._recordingDone;")
            if done:
              print(f"✅ Recording complete after {i*0.5:.0f}s")
              break
            if i % 20 == 0:
              print(f"  Still recording... {i*0.5:.0f}s elapsed")
            time.sleep(0.5)
          else:
            print("⏰ Timeout — forcing finalize")
            driver.execute_script("window.stopRecording();")
            time.sleep(3)
            driver.execute_script("window.forceFinalize();")
            time.sleep(2)

          # Verify recording is done
          if not driver.execute_script("return window._recordingDone;"):
            print("❌ Recording failed to finalize")
            driver.quit()
            sys.exit(1)

          print("📦 Extracting video data...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            if (window.getRecordingBase64) {
              window.getRecordingBase64().then(done).catch(function(e){ 
                console.error(e); 
                done(null); 
              });
            } else {
              done(null);
            }
          """)
          driver.quit()
          print("🖥️  Browser closed")

          if not b64 or len(b64) < 1000:
            print(f"❌ No valid video data returned (length: {len(b64) if b64 else 0})")
            sys.exit(1)

          with open(webm_file, "wb") as f:
            f.write(base64.b64decode(b64))
          size = os.path.getsize(webm_file)
          print(f"✅ Canvas webm: {size/1024/1024:.1f} MB")
          if size < 10000:
            print("❌ Webm too small — recording likely empty")
            sys.exit(1)
          PYEOF
        env:
          DISPLAY: ":99"

      - name: Merge canvas over nature footage
        run: |
          python3 << 'PYEOF'
          import subprocess, os, sys

          # Check if files exist
          for f in ["/tmp/nature_bg.mp4", "/tmp/asmr_canvas.webm"]:
            if not os.path.exists(f):
              print(f"❌ Missing file: {f}")
              sys.exit(1)
            print(f"✅ {f} exists ({os.path.getsize(f)/1024/1024:.1f} MB)")

          print("🎬 Merging canvas over nature footage...")
          result = subprocess.run([
            "ffmpeg", "-y",
            "-i", "/tmp/nature_bg.mp4",
            "-i", "/tmp/asmr_canvas.webm",
            "-filter_complex",
            "[0:v]scale=1920:1080[bg];"
            "[1:v]scale=1920:1080[fg];"
            "[bg][fg]overlay=0:0[outv];"
            "[0:a]volume=0.5[a1];"
            "[1:a]volume=0.5[a2];"
            "[a1][a2]amix=inputs=2:duration=first[outa]",
            "-map", "[outv]",
            "-map", "[outa]",
            "-c:v", "libx264", "-preset", "medium", "-crf", "18",
            "-pix_fmt", "yuv420p",
            "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
            "-movflags", "+faststart",
            "-t", "120",
            "/tmp/final_asmr.mp4"
          ], capture_output=True, text=True)

          if result.returncode != 0:
            print(f"❌ Merge failed:\n{result.stderr[-3000:]}")
            sys.exit(1)

          for f in ["/tmp/nature_bg.mp4", "/tmp/asmr_canvas.webm"]:
            try: os.remove(f)
            except: pass

          size = os.path.getsize("/tmp/final_asmr.mp4")
          print(f"✅ Final video: {size/1024/1024:.1f} MB")
          if size < 100000:
            print("❌ Final video too small")
            sys.exit(1)
          PYEOF

      - name: Upload to YouTube
        run: |
          python3 << 'PYEOF'
          import os, random, sys
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2.credentials import Credentials

          mp4_file = "/tmp/final_asmr.mp4"
          if not os.path.exists(mp4_file):
            print("❌ Final video not found")
            sys.exit(1)

          videos = [
            {"title":"EMDR Eye Movement Therapy for Anxiety Relief | Binaural Beats","description":"follow the moving circle with your eyes to activate your brain's natural stress relief response 👁\n\nthis technique is inspired by emdr therapy — used by therapists to help people process anxiety, overthinking, and stress\n\nbinaural beats playing in background to slow your brainwaves into a calm relaxed state 🎧\n\nuse headphones for best experience\n\n#emdr #anxietyrelief #binaural #brainwaves #stressrelief #asmr #mentalhealth #relax #overthinking #calm"},
            {"title":"Stop Overthinking in 2 Minutes | Eye Movement + Alpha Waves","description":"your brain can't overthink and follow a moving object at the same time 👁\n\nfollow the circle with your eyes and feel your thoughts slow down\n\nalpha waves (8-12hz) playing to bring your brain into a relaxed focused state\n\n#overthinking #anxietyrelief #alphawave #binaural #asmr #mentalhealth #stressrelief #calm #relax #brainwaves"},
            {"title":"Binaural Beats Eye Relaxation | Theta Waves for Deep Calm","description":"follow the movement with your eyes and let your mind quiet down 🌀\n\ntheta waves (4-8hz) playing to guide your brain into deep relaxation\n\ngreat for anxiety, stress, insomnia, and mental fatigue\n\n#theta #binaural #deeprelaxation #asmr #insomnia #anxietyrelief #mentalhealth #brainwaves #calm #stressrelief"},
            {"title":"528hz Healing Frequency + Eye Movement for Stress Relief","description":"follow the light with your eyes while 528hz plays in the background 👁\n\n528hz is known as the dna repair frequency — associated with healing, calm, and reducing cortisol\n\n#528hz #healingfrequency #stressrelief #asmr #calm #binaural #mentalhealth #relax #solfeggio #brainwaves"},
            {"title":"Calm Your Nervous System | Eye Movement + Brainwave Therapy","description":"when you're overwhelmed — just follow the circle 👁\n\nsmooth eye movement activates your vagus nerve and shifts your nervous system from fight-or-flight into rest-and-digest\n\n#nervoussystem #vagusnerve #anxietyrelief #asmr #stressrelief #brainwaves #mentalhealth #calm #relax #binaural"},
            {"title":"Schumann Resonance 7.83hz | Ground Your Mind and Body","description":"7.83hz — the earth's natural frequency 🌍\n\nfollow the movement with your eyes while it plays in both ears 🎧\n\n#schumannresonance #grounding #earthfrequency #binaural #asmr #mentalhealth #brainwaves #calm #stressrelief #relax"},
            {"title":"ASMR Eye Tracking for Anxiety | Bilateral Brain Stimulation","description":"your eyes follow the ball left and right — this bilateral movement activates both sides of your brain 👁\n\nbinaural beats playing to deepen the relaxation effect 🎧\n\n#asmr #bilateral #emdr #anxietyrelief #stressrelief #brainwaves #mentalhealth #calm #binaural #relax"},
          ]

          video = random.choice(videos)
          print(f"📹 Title: {video['title']}")

          creds = Credentials(
            token=os.environ.get("YT_ACCESS_TOKEN"),
            refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ.get("YT_CLIENT_ID"),
            client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)
          request = youtube.videos().insert(
            part="snippet,status",
            body={
              "snippet": {
                "title": video["title"],
                "description": video["description"],
                "tags": ["emdr","binaural beats","asmr","anxiety relief","stress relief","eye relaxation","brainwaves","alpha waves","theta waves","calm","overthinking","mental health","528hz","schumann resonance","nervous system"],
                "categoryId": "22",
                "defaultLanguage": "en"
              },
              "status": {
                "privacyStatus": "public",
                "madeForKids": False,
                "selfDeclaredMadeForKids": False
              }
            },
            media_body=MediaFileUpload(mp4_file, mimetype="video/mp4", resumable=True)
          )
          response = None
          while response is None:
            status, response = request.next_chunk()
            if status:
              print(f"⬆️  Upload {int(status.progress()*100)}%")

          print(f"✅ Done! Video ID: {response['id']}")
          os.remove(mp4_file)
          PYEOF
        env:
          YT_ACCESS_TOKEN:  ${{ secrets.YT_ACCESS_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}