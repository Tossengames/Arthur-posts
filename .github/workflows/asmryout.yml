            refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ.get("YT_CLIENT_ID"),
            client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)
          request = youtube.videos().insert(
            part="snippet,status",
            body={
              "snippet": {
                "title": video["title"],
                "description": video["description"],
                "tags": ["emdr","bilateral stimulation","eye movement therapy","anxiety relief","trauma healing","rapid emdr","brain hemispheres","stress relief","asmr","mental health","nervous system reset","panic attack relief","bilateral beats","overthinking","calm mind","healing frequency","brainwave entrainment","emdr therapy","bilateral music","mindfulness","meditation","trauma processing","ptsd recovery","mental wellness","relaxation","fast emdr","bilateral eye movement","emdr at home","emdr light therapy","brain synchronization"],
                "categoryId": "22",
                "defaultLanguage": "en"
              },
              "status": {
                "privacyStatus": "public",
                "madeForKids": False,
                "selfDeclaredMadeForKids": False
              }
            },
            media_body=MediaFileUpload(mp4_file, mimetype="video/mp4", resumable=True)
          )
          response = None
          while response is None:
            status, response = request.next_chunk()
            if status:
              print(f"Upload {int(status.progress()*100)}%")

          print(f"Done! Video ID: {response['id']}")
          os.remove(mp4_file)
          PYEOF
