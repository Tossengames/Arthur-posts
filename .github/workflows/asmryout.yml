name: 🧠 Post EMDR Shorts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  record:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb chromium-browser libnss3 libgbm1 libasound2 ffmpeg pulseaudio
          echo "✅ Dependencies installed"

      - name: Install Python deps
        run: |
          pip install selenium webdriver-manager requests google-auth google-auth-oauthlib google-api-python-client
          echo "✅ Python deps installed"

      - name: Start virtual display and audio
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          sleep 2
          pulseaudio --start --exit-idle-time=-1 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Display and audio started"

      - name: Record EMDR canvas
        run: |
          python3 << 'PYEOF'
          import os, time, base64, sys
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          html_path = os.path.abspath("asmr.html")
          if not os.path.exists(html_path):
            print(f"❌ asmr.html not found at {html_path}")
            sys.exit(1)
          print(f"✅ Found: {html_path}")

          webm_file = "/tmp/emdr_canvas.webm"

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--window-position=0,0")
          opts.add_argument("--force-device-scale-factor=1")
          opts.add_argument("--autoplay-policy=no-user-gesture-required")
          opts.add_argument("--disable-background-timer-throttling")
          opts.add_argument("--disable-renderer-backgrounding")
          opts.add_argument("--disable-backgrounding-occluded-windows")
          opts.add_argument("--no-first-run")
          opts.add_argument("--disable-infobars")
          opts.add_argument("--disable-notifications")
          opts.add_argument("--use-fake-ui-for-media-stream")
          opts.add_argument("--use-fake-device-for-media-stream")
          opts.add_argument("--allow-file-access-from-files")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option("useAutomationExtension", False)

          print("🚀 Starting Chrome...")
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.set_window_size(1920, 1080)
          driver.set_script_timeout(180)

          print(f"📄 Loading file://{html_path}")
          driver.get(f"file://{html_path}")
          time.sleep(3)
          driver.execute_script("if(typeof AC!=='undefined'&&AC)AC.resume().catch(()=>{});")
          time.sleep(1)

          driver.execute_script("window.startRecording(30);")
          print("🎬 Recording started — waiting ~28s...")

          for i in range(60):
            done = driver.execute_script("return window._recordingDone;")
            if done:
              print(f"✅ Done after {i*0.5:.0f}s")
              break
            if i % 10 == 0:
              print(f"  still recording... {i*0.5:.0f}s elapsed")
            time.sleep(0.5)
          else:
            print("⏰ Timeout — forcing finalize")
            driver.execute_script("window.stopRecording();")
            time.sleep(2)
            driver.execute_script("window.forceFinalize();")
            time.sleep(2)

          if not driver.execute_script("return window._recordingDone;"):
            driver.quit()
            print("❌ Recording failed to finalize")
            sys.exit(1)

          print("📦 Extracting video data...")
          b64 = driver.execute_async_script("""
            var done = arguments[0];
            window.getRecordingBase64().then(done).catch(function(e){ console.error(e); done(null); });
          """)
          driver.quit()
          print("🖥️  Browser closed")

          if not b64:
            print("❌ No video data returned")
            sys.exit(1)

          with open(webm_file, "wb") as f:
            f.write(base64.b64decode(b64))
          size = os.path.getsize(webm_file)
          print(f"✅ Canvas webm: {size/1024/1024:.1f} MB")
          if size < 10000:
            print("❌ Webm too small — recording likely empty")
            sys.exit(1)
          PYEOF
        env:
          DISPLAY: ":99"

      - name: Convert to YouTube Shorts (9:16)
        run: |
          python3 << 'PYEOF'
          import subprocess, os, sys

          print("📱 Converting to 9:16 portrait for YouTube Shorts...")
          
          # Crop and scale to 1080x1920
          result = subprocess.run([
            "ffmpeg", "-y",
            "-i", "/tmp/emdr_canvas.webm",
            "-vf", "crop=1080:1080:(iw-1080)/2:(ih-1080)/2,scale=1080:1920",
            "-c:v", "libx264", "-preset", "slow", "-crf", "18",
            "-pix_fmt", "yuv420p",
            "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
            "-movflags", "+faststart",
            "-t", "28",
            "/tmp/final_emdr.mp4"
          ], capture_output=True, text=True)

          if result.returncode != 0:
            print(f"❌ Conversion failed:\n{result.stderr[-2000:]}")
            sys.exit(1)

          os.remove("/tmp/emdr_canvas.webm")
          size = os.path.getsize("/tmp/final_emdr.mp4")
          print(f"✅ Final Shorts video: {size/1024/1024:.1f} MB")
          if size < 100000:
            print("❌ Final video too small")
            sys.exit(1)
          PYEOF

      - name: Upload to YouTube
        run: |
          python3 << 'PYEOF'
          import os, random, sys
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2.credentials import Credentials

          mp4_file = "/tmp/final_emdr.mp4"
          if not os.path.exists(mp4_file):
            print("❌ Final video not found")
            sys.exit(1)

          shorts = [
            {
              "title": "EMDR Self-Admin for Anxiety | Follow the Light",
              "description": "Self-administer EMDR in 25 seconds 👁\n\nFollow the movement with your eyes while bilateral brainwave sounds play.\n\n⚠️ DISCLAIMER: Contains flashing lights. Not for epilepsy or light sensitivity.\n\n🎧 Use headphones for best results\n\n#EMDR #AnxietyRelief #BilateralStimulation #Brainwaves #MentalHealth #StressRelief #TraumaHealing #EMDRtherapy #Calm #Overthinking"
            },
            {
              "title": "Stop Overthinking in 25 Seconds | EMDR Eye Movement",
              "description": "Your brain can't overthink and follow movement at the same time 👁\n\nEMDR self-administration with bilateral brainwave stimulation.\n\n⚠️ DISCLAIMER: Contains flashing lights. Not for epilepsy or light sensitivity.\n\n🎧 Use headphones\n\n#EMDR #Overthinking #AnxietyRelief #Brainwaves #MentalHealth #StressRelief #Calm #Focus #Bilateral"
            },
            {
              "title": "EMDR Bilateral Stimulation | 25 Second Brain Reset",
              "description": "Reset your nervous system in 25 seconds 🧠\n\nFollow the movement with your eyes for bilateral brain stimulation.\n\n⚠️ DISCLAIMER: Contains flashing lights. Not for epilepsy or light sensitivity.\n\n🎧 Headphones recommended\n\n#EMDR #BilateralStimulation #NervousSystem #BrainReset #AnxietyRelief #MentalHealth #StressRelief #Calm #Trauma #Healing"
            },
            {
              "title": "Heal Your Brain in 25 Seconds | EMDR Self-Admin",
              "description": "Simple EMDR technique you can do anywhere 👁\n\nFollow the light with your eyes while brainwave frequencies play.\n\n⚠️ DISCLAIMER: Contains flashing lights. Not for epilepsy or light sensitivity.\n\n🎧 Use headphones\n\n#EMDR #BrainHealing #AnxietyRelief #MentalHealth #StressRelief #Bilateral #TraumaHealing #Calm #Focus #Brainwaves"
            }
          ]

          video = random.choice(shorts)
          print(f"📹 Title: {video['title']}")

          creds = Credentials(
            token=os.environ.get("YT_ACCESS_TOKEN"),
            refresh_token=os.environ.get("YT_REFRESH_TOKEN"),
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ.get("YT_CLIENT_ID"),
            client_secret=os.environ.get("YT_CLIENT_SECRET"),
          )
          youtube = build("youtube", "v3", credentials=creds)
          request = youtube.videos().insert(
            part="snippet,status",
            body={
              "snippet": {
                "title": video["title"],
                "description": video["description"],
                "tags": ["EMDR","Anxiety Relief","Bilateral Stimulation","Brainwaves","Mental Health","Stress Relief","Trauma Healing","EMDR Therapy","Calm","Overthinking","Brain Reset","Nervous System"],
                "categoryId": "22",
                "defaultLanguage": "en"
              },
              "status": {
                "privacyStatus": "public",
                "madeForKids": False,
                "selfDeclaredMadeForKids": False
              }
            },
            media_body=MediaFileUpload(mp4_file, mimetype="video/mp4", resumable=True)
          )
          response = None
          while response is None:
            status, response = request.next_chunk()
            if status:
              print(f"⬆️  Upload {int(status.progress()*100)}%")

          print(f"✅ Done! Video ID: {response['id']}")
          os.remove(mp4_file)
          PYEOF
        env:
          YT_ACCESS_TOKEN:  ${{ secrets.YT_ACCESS_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}