name: abandoned-places-video x

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg bc jq python3 curl

      - name: fetch-images
        id: imgs
        timeout-minutes: 10
        run: |
          set -e
          mkdir -p images

          QUERIES=(
            "abandoned building"
            "ghost town"
            "derelict hospital"
            "ruins"
            "abandoned factory"
            "empty asylum"
            "forgotten town"
            "decayed interior"
            "urban decay"
            "abandoned school"
          )

          COUNT=0
          TARGET=5

          SHUFFLED=($(shuf -e "${QUERIES[@]}"))

          for QUERY in "${SHUFFLED[@]}"; do
            [ "$COUNT" -ge "$TARGET" ] && break

            echo "Searching Wikimedia for: $QUERY"
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$QUERY")

            RESP=$(timeout 15 curl -sf --max-time 15 \
              "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrsearch=${ENCODED}&gsrlimit=20&prop=imageinfo&iiprop=url|mime|size&format=json" \
              2>/dev/null) || continue

            URLS=$(echo "$RESP" | jq -r '
              .query.pages[]?
              | .imageinfo[]?
              | select(.mime == "image/jpeg" or .mime == "image/png")
              | select(.size > 50000 and .size < 10000000)
              | .url
            ' 2>/dev/null | shuf | head -3)

            while IFS= read -r URL; do
              [ "$COUNT" -ge "$TARGET" ] && break
              [ -z "$URL" ] && continue

              OUTFILE="images/img_$(printf '%02d' $COUNT).jpg"
              echo "Downloading: $URL"

              HTTP_CODE=$(timeout 20 curl -sf -L --max-time 20 -w "%{http_code}" \
                -o "$OUTFILE" "$URL" 2>/dev/null) || continue

              if [ "$HTTP_CODE" = "200" ] && [ -s "$OUTFILE" ]; then
                file "$OUTFILE" | grep -qiE "image|jpeg|png" || { rm -f "$OUTFILE"; continue; }
                echo "Saved image $COUNT: $OUTFILE"
                COUNT=$((COUNT + 1))
              else
                rm -f "$OUTFILE"
              fi
            done <<< "$URLS"
          done

          echo "Total images collected: $COUNT"

          if [ "$COUNT" -lt 3 ]; then
            echo "Not enough images found ($COUNT). Exiting."
            exit 1
          fi

          echo "image_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: pick-caption
        id: caption
        run: |
          CAPTIONS=(
            "Some places are better left forgotten."
            "Nature always wins in the end."
            "What stories do these walls hold?"
            "Time stops for no one."
            "Left behind and slowly fading."
            "Once full of life. Now silent."
            "The world moves on, but these places remain."
            "Forgotten but not gone."
          )
          IDX=$((RANDOM % ${#CAPTIONS[@]}))
          echo "caption=${CAPTIONS[$IDX]}" >> "$GITHUB_OUTPUT"

      - name: build-video
        timeout-minutes: 12
        run: |
          set -e
          mkdir -p processed

          FONT="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          SLIDE_DURATION=4

          IDX=0
          for IMG in images/img_*.jpg; do
            [ -f "$IMG" ] || continue
            OUT="processed/slide_$(printf '%02d' $IDX).mp4"

            timeout 60 ffmpeg -hide_banner -loglevel error -y \
              -loop 1 -t "$SLIDE_DURATION" -i "$IMG" \
              -vf "scale=1080:1920:force_original_aspect_ratio=decrease,\
                   pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,\
                   zoompan=z='min(zoom+0.0015,1.2)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=${SLIDE_DURATION}*25:s=1080x1920:fps=25" \
              -c:v libx264 -preset ultrafast -crf 23 -an \
              -r 25 "$OUT"

            IDX=$((IDX + 1))
          done

          ls processed/slide_*.mp4 | sort | while read f; do echo "file '$PWD/$f'"; done > concat_list.txt

          timeout 120 ffmpeg -hide_banner -loglevel error -y \
            -f concat -safe 0 -i concat_list.txt \
            -c copy slideshow_raw.mp4

          timeout 120 ffmpeg -hide_banner -loglevel error -y \
            -i slideshow_raw.mp4 \
            -vf "drawtext=text='ABANDONED':fontfile=${FONT}:fontcolor=white@0.6:fontsize=36:x=(w-text_w)/2:y=30" \
            -c:v libx264 -preset ultrafast -crf 23 -an -movflags +faststart final.mp4

          if [ ! -f final.mp4 ] || [ ! -s final.mp4 ]; then
            echo "Video build failed"
            exit 1
          fi

          ls -lh final.mp4

      - name: post-to-facebook
        timeout-minutes: 5
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          set -e
          FILE="final.mp4"
          API="https://graph.facebook.com/v19.0"

          for attempt in 1 2 3; do
            echo "Facebook post attempt $attempt..."

            RESP=$(timeout 60 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
              -F "access_token=${PAGE_TOKEN}" \
              -F "description=${CAPTION}" \
              -F "source=@${FILE}" \
              -F "published=true")

            VIDEO_ID=$(echo "$RESP" | jq -r '.id' 2>/dev/null)

            if [ -n "$VIDEO_ID" ] && [ "$VIDEO_ID" != "null" ]; then
              echo "Posted! Video ID: $VIDEO_ID"
              exit 0
            fi

            echo "Attempt $attempt failed: $RESP"
            sleep 15
          done

          echo "All post attempts failed"
          exit 1