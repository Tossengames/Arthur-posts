name: abandoned-places-slideshow

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-deps
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg bc jq python3

      - name: find-images
        id: images
        timeout-minutes: 8
        run: |
          set -e
          IMAGE_URLS=()
          
          # Use specific collections and items known to have abandoned place images
          KNOWN_ITEMS=(
            "detroiturbex"
            "abandoned-america"
            "ghosttowns"
            "urbanex"
            "abandoned_asylums"
            "ruins"
            "decay"
            "forgotten-places"
          )
          
          # Search for items that likely contain multiple images
          QUERIES=(
            "abandoned building photograph"
            "ghost town photograph"
            "deserted place history"
            "ruins architecture vintage"
            "abandoned factory historic"
            "vacant building documentary"
            "forgotten america photo"
            "derelict structure archive"
          )

          echo "Trying known collections first..."
          
          # First try: Search for items with multiple images
          for idx in $(seq 0 $((${#QUERIES[@]} - 1)) | shuf); do
            [ ${#IMAGE_URLS[@]} -ge 8 ] && break
            QUERY="${QUERIES[$idx]}"
            echo "Searching: $QUERY"
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$QUERY")

            RESP=$(timeout 15 curl -sf --max-time 15 \
              "https://archive.org/advancedsearch.php?q=${ENCODED}+AND+mediatype%3Acollection&fl[]=identifier&rows=30&page=1&output=json" \
              2>/dev/null) || continue

            COLLECTIONS=$(echo "$RESP" | jq -r '.response.docs[].identifier' 2>/dev/null | head -10)
            
            for COLLECTION in $COLLECTIONS; do
              [ ${#IMAGE_URLS[@]} -ge 8 ] && break
              
              echo "Checking collection: $COLLECTION"
              
              # Get items from this collection
              ITEMS_RESP=$(timeout 15 curl -sf --max-time 15 \
                "https://archive.org/advancedsearch.php?q=collection%3A${COLLECTION}+AND+mediatype%3Atexts&fl[]=identifier&rows=20&page=1&output=json" \
                2>/dev/null) || continue
              
              ITEMS=$(echo "$ITEMS_RESP" | jq -r '.response.docs[].identifier' 2>/dev/null | head -15)
              
              for ITEM in $ITEMS; do
                [ ${#IMAGE_URLS[@]} -ge 8 ] && break
                
                echo "  Looking in item: $ITEM"
                
                # Get metadata for this item
                META=$(timeout 10 curl -sf --max-time 10 \
                  "https://archive.org/metadata/${ITEM}" \
                  2>/dev/null) || continue
                
                # Find image files
                IMG_URLS=$(echo "$META" | jq -r '.files[] | select(.name | test("\\.(jpg|jpeg|png|gif)$"; "i")) | .name' 2>/dev/null | head -3)
                
                for IMG in $IMG_URLS; do
                  [ ${#IMAGE_URLS[@]} -ge 8 ] && break
                  
                  FULL_URL="https://archive.org/download/${ITEM}/${IMG}"
                  
                  # Check file size (under 5MB for speed)
                  FILE_SIZE=$(timeout 5 curl -sf -I "$FULL_URL" 2>/dev/null | grep -i content-length | awk '{print $2}' | tr -d '\r')
                  if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 5242880 ]; then
                    continue
                  fi
                  
                  IMAGE_URLS+=("$FULL_URL")
                  echo "Found image ${#IMAGE_URLS[@]}: $IMG"
                done
                
                # Small delay to avoid rate limiting
                sleep 1
              done
            done
          done

          # Second try: Direct Flickr Commons (has 2.6M public domain images)
          if [ ${#IMAGE_URLS[@]} -lt 5 ]; then
            echo "Trying Flickr Commons fallback..."
            
            # Use a known working Flickr Commons query for abandoned buildings
            FLICKR_QUERIES=(
              "abandoned+house"
              "ghost+town"
              "deserted+building"
              "ruins"
              "decay"
            )
            
            for FQ in "${FLICKR_QUERIES[@]}"; do
              [ ${#IMAGE_URLS[@]} -ge 8 ] && break
              
              # Flickr Commons API (Internet Archive's Flickr)
              FLICKR_RESP=$(timeout 15 curl -sf "https://www.flickr.com/services/rest/?method=flickr.photos.search&api_key=4e98f0c99099d4aa494ca01617317958&text=${FQ}&license=7,8,9&media=photos&per_page=20&format=json&nojsoncallback=1" 2>/dev/null) || continue
              
              PHOTOS=$(echo "$FLICKR_RESP" | jq -r '.photos.photo[] | "\(.id) \(.secret) \(.server)"' 2>/dev/null | head -15)
              
              while read -r ID SECRET SERVER; do
                [ -z "$ID" ] && continue
                [ ${#IMAGE_URLS[@]} -ge 8 ] && break
                
                # Construct direct image URL
                IMG_URL="https://live.staticflickr.com/${SERVER}/${ID}_${SECRET}_b.jpg"
                IMAGE_URLS+=("$IMG_URL")
                echo "Found Flickr image ${#IMAGE_URLS[@]}"
              done <<< "$PHOTOS"
            done
          fi

          # Third try: Direct Archive.org item search with file type
          if [ ${#IMAGE_URLS[@]} -lt 5 ]; then
            echo "Trying direct file search..."
            
            DIRECT_QUERIES=(
              "abandoned filetype:jpg"
              "ghosttown filetype:jpg"
              "urbex filetype:jpg"
            )
            
            for DQ in "${DIRECT_QUERIES[@]}"; do
              [ ${#IMAGE_URLS[@]} -ge 8 ] && break
              
              ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$DQ")
              RESP=$(timeout 15 curl -sf "https://archive.org/advancedsearch.php?q=${ENC}&fl[]=identifier&rows=30&page=1&output=json" 2>/dev/null) || continue
              
              IDS=$(echo "$RESP" | jq -r '.response.docs[].identifier' 2>/dev/null | head -20)
              
              for ID in $IDS; do
                [ ${#IMAGE_URLS[@]} -ge 8 ] && break
                
                # Try common image filename patterns
                for PATTERN in "jpg" "jpeg" "png"; do
                  TEST_URL="https://archive.org/download/${ID}/${ID}_orig.${PATTERN}"
                  STATUS=$(timeout 5 curl -sf -o /dev/null -w "%{http_code}" "$TEST_URL" 2>/dev/null || echo "000")
                  if [ "$STATUS" = "200" ]; then
                    IMAGE_URLS+=("$TEST_URL")
                    echo "Found direct image: $TEST_URL"
                    break
                  fi
                done
                
                sleep 1
              done
            done
          fi

          if [ ${#IMAGE_URLS[@]} -lt 5 ]; then
            echo "Found only ${#IMAGE_URLS[@]} images, need at least 5"
            exit 1
          fi

          # Save URLs
          echo "image_urls=$(printf '%s\n' "${IMAGE_URLS[@]}" | head -12 | jq -R . | jq -s .)" >> "$GITHUB_OUTPUT"
          echo "count=${#IMAGE_URLS[@]}" >> "$GITHUB_OUTPUT"

      - name: download-images
        timeout-minutes: 5
        run: |
          mkdir -p images
          echo '${{ steps.images.outputs.image_urls }}' | jq -r '.[]' | while read -r url; do
            if [ -z "$url" ] || [ "$url" = "null" ]; then
              continue
            fi
            idx=$((idx + 1))
            # Get file extension from URL
            ext="${url##*.}"
            ext=$(echo "$ext" | cut -d'?' -f1 | tr '[:upper:]' '[:lower:]')
            if [ "$ext" != "jpg" ] && [ "$ext" != "jpeg" ] && [ "$ext" != "png" ] && [ "$ext" != "gif" ]; then
              ext="jpg"
            fi
            filename=$(printf "images/img_%03d.%s" $idx "$ext")
            echo "Downloading: $url"
            timeout 30 curl -s -o "$filename" "$url" || echo "Failed: $url"
          done
          
          echo "Downloaded $(ls images/ 2>/dev/null | wc -l) images"

      - name: create-slideshow
        timeout-minutes: 10
        run: |
          # Check if we have images
          IMG_COUNT=$(ls images/ 2>/dev/null | wc -l)
          if [ "$IMG_COUNT" -lt 3 ]; then
            echo "Not enough images downloaded ($IMG_COUNT)"
            exit 1
          fi
          
          # Create a file list for ffmpeg
          > ffmpeg_list.txt
          for img in images/img_*.*; do
            [ -f "$img" ] || continue
            echo "file '$img'" >> ffmpeg_list.txt
            echo "duration 3" >> ffmpeg_list.txt
          done
          
          # Add last image with longer duration
          LAST_IMG=$(ls images/img_*.* 2>/dev/null | tail -1)
          if [ -n "$LAST_IMG" ]; then
            echo "file '$LAST_IMG'" >> ffmpeg_list.txt
            echo "duration 4" >> ffmpeg_list.txt
          fi

          # Create slideshow video
          timeout 300 ffmpeg -hide_banner -loglevel error -y \
            -f concat -safe 0 -i ffmpeg_list.txt \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,fps=30,drawtext=text='🏚️ ABANDONED PLACES':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:fontcolor=white:fontsize=42:x=(w-text_w)/2:y=20,drawtext=text='Follow for more 🏚️':fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf:fontcolor=white:fontsize=30:x=(w-text_w)/2:y=h-50" \
            -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -movflags +faststart \
            slideshow.mp4

          ls -lh slideshow.mp4

      - name: pick-caption
        id: caption
        run: |
          COUNT=$(ls images/ 2>/dev/null | wc -l)
          [ "$COUNT" -lt 1 ] && COUNT="several"
          
          CAPTIONS=(
            "🏚️ ${COUNT} abandoned places frozen in time... which one is creepiest? 👇"
            "😱 Would you spend a night in any of these? 🏚️"
            "📍 Tag someone who loves abandoned places 👻"
            "🔦 Every building has a story... what happened here? 🤔"
            "🕯️ Forgotten and decaying. Follow for more 🏚️"
            "🏚️ ${COUNT} places you should NEVER explore alone ❄️"
            "👻 Which one gave you chills? Comment below! 👇"
          )
          IDX=$((RANDOM % ${#CAPTIONS[@]}))
          CAPTION="${CAPTIONS[$IDX]}"
          echo "caption=$CAPTION" >> "$GITHUB_OUTPUT"

      - name: post-to-facebook
        timeout-minutes: 5
        env:
          PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CAPTION: ${{ steps.caption.outputs.caption }}
        run: |
          set -e
          FILE="slideshow.mp4"
          SIZE=$(stat -c%s "$FILE")
          API="https://graph.facebook.com/v19.0"

          for attempt in 1 2 3; do
            echo "Facebook post attempt $attempt..."
            INIT=$(timeout 30 curl -sf -X POST "${API}/${PAGE_ID}/video_reels" \
              -H "Content-Type: application/json" \
              -d "{\"upload_phase\":\"start\",\"access_token\":\"${PAGE_TOKEN}\"}") || true
            SESSION=$(echo "$INIT" | jq -r '.upload_session_id' 2>/dev/null)
            VID_ID=$(echo "$INIT" | jq -r '.video_id' 2>/dev/null)

            if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
              INIT=$(timeout 30 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
                -H "Content-Type: application/json" \
                -d "{\"upload_phase\":\"start\",\"file_size\":${SIZE},\"access_token\":\"${PAGE_TOKEN}\"}") || true
              SESSION=$(echo "$INIT" | jq -r '.upload_session_id' 2>/dev/null)
              VID_ID=$(echo "$INIT" | jq -r '.video_id' 2>/dev/null)
              S_OFF=$(echo "$INIT" | jq -r '.start_offset' 2>/dev/null)
              if [ "$SESSION" = "null" ] || [ -z "$SESSION" ]; then
                echo "Session failed: $INIT"
                sleep 15
                continue
              fi
              timeout 120 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
                -F "upload_phase=transfer" \
                -F "upload_session_id=${SESSION}" \
                -F "start_offset=${S_OFF}" \
                -F "video_file_chunk=@${FILE};type=video/mp4" \
                -F "access_token=${PAGE_TOKEN}" > /dev/null || true
              FINISH=$(timeout 30 curl -sf -X POST "${API}/${PAGE_ID}/videos" \
                -H "Content-Type: application/json" \
                -d "{\"upload_phase\":\"finish\",\"upload_session_id\":\"${SESSION}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}") || true
            else
              UPLOAD_URL=$(echo "$INIT" | jq -r '.upload_url' 2>/dev/null)
              timeout 120 curl -sf -X POST "$UPLOAD_URL" \
                -H "Authorization: OAuth ${PAGE_TOKEN}" \
                -H "offset: 0" \
                -H "file_size: ${SIZE}" \
                --data-binary "@${FILE}" > /dev/null || true
              FINISH=$(timeout 30 curl -sf -X POST "${API}/${PAGE_ID}/video_reels" \
                -H "Content-Type: application/json" \
                -d "{\"upload_phase\":\"finish\",\"video_id\":\"${VID_ID}\",\"description\":\"${CAPTION}\",\"published\":true,\"access_token\":\"${PAGE_TOKEN}\"}") || true
            fi

            OK=$(echo "$FINISH" | jq -r '.success // .id // empty' 2>/dev/null)
            if [ -n "$OK" ]; then
              echo "Posted! Video ID: $VID_ID"
              exit 0
            fi

            echo "Post failed attempt $attempt: $FINISH"
            sleep 15
          done

          echo "All post attempts failed"
          exit 1