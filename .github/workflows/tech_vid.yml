name: Generate Tech News Video

on:
  schedule:
    #- cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:       # Allow manual triggering

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # Increased timeout to 45 minutes for TTS and processing

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libimage-exiftool-perl
        sudo apt-get install -y libsndfile1 portaudio19-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install google-generativeai requests pillow feedparser TTS
        pip install protobuf==3.20.*  # Specific protobuf version for compatibility

    - name: Create output directories
      run: |
        mkdir -p tech_news_videos
        mkdir -p tech_news_videos/images
        mkdir -p tech_news_videos/audio
        mkdir -p tech_news_videos/cache

    - name: Run video generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Set safe paths and environment variables
        export FFMPEG_SAFE_PATHS=1
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python tech_vid.py --gemini-key "$GEMINI_API_KEY"

    - name: Upload generated video
      uses: actions/upload-artifact@v4
      with:
        name: tech-news-video
        path: tech_news_videos/*.mp4
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload generated assets
      uses: actions/upload-artifact@v4
      with:
        name: tech-news-assets
        path: tech_news_videos/
        if-no-files-found: ignore
        retention-days: 3

    - name: Clean up old artifacts (optional)
      run: |
        # Clean up to save space
        rm -rf tech_news_videos/images/*
        rm -rf tech_news_videos/audio/*
        rm -rf tech_news_videos/cache/*