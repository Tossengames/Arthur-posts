<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>90s/2000s Nostalgia Reel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee&family=VT323&family=Russo+One&family=Rubik:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--headline-font:'Bungee',cursive;--sub-font:'Rubik',sans-serif;--label-font:'VT323',monospace;}
html,body{width:100%;height:100%;overflow:hidden;background:#04080f;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 48%,transparent 30%,rgba(0,5,15,0.5) 100%);}

#ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 8vw;gap:3.6vw;
}

/* Top label */
#label{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:7vw 6vw 2vw;z-index:11;
  opacity:0;transform:translateY(-16px);
  transition:opacity .5s ease,transform .5s ease;
}
#label-eyebrow{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.4vw,1rem);
  letter-spacing:0.35em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.5px rgba(4,10,20,0.6);
}
#label-rule{width:46px;height:1px;background:#f4d35e;opacity:0.55;margin-top:1.4vw;}

/* Quote lines */
#quote-wrap{display:flex;flex-direction:column;align-items:center;gap:1.8vw;width:100%;}
.qline{
  font-family:var(--headline-font);font-weight:400;
  font-size:clamp(1.6rem,6.8vw,2.4rem);
  color:#fff;text-align:center;line-height:1.2;
  opacity:0;letter-spacing:0.01em;
  -webkit-text-stroke:0.045em rgba(6,6,10,0.85);
  paint-order:stroke fill;
  text-shadow:0 3px 16px rgba(0,0,0,0.4);
  max-width:100%;min-width:0;white-space:normal;word-break:keep-all;
}
.qline.small{
  font-family:var(--sub-font);font-weight:700;
  font-size:clamp(1rem,4.6vw,1.45rem);
  color:rgba(255,255,255,0.93);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  text-shadow:0 2px 8px rgba(0,0,0,0.35);
  line-height:1.32;
}
.qline.ref{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.2vw,1rem);
  letter-spacing:0.28em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.04em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  margin-top:0.8vw;
}

/* Divider under headline */
#underbar{height:2px;width:0;max-width:60vw;background:linear-gradient(90deg,transparent,#f4d35e,transparent);transition:width .6s cubic-bezier(.22,1,.36,1);margin-top:0.4vw;}

/* Bottom CTA */
#bottom{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:3vw 6vw 8vw;z-index:11;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
#cta{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.2vw,1rem);
  letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.6);
}

/* ───────── PER-THEME REVEAL ANIMATIONS ───────── */

/* crt — rises and settles with a slight flicker-snap */
.s-crt .qline{transform:translateY(22px) scale(0.96);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-crt .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* vhs — glitchy snap with horizontal jump */
.s-vhs .qline{transform:translateX(46px);transition:opacity .25s ease,transform .35s cubic-bezier(.34,1.56,.64,1);}
.s-vhs .qline.in{opacity:1;transform:translateX(0);}

/* chrome — glossy slide up */
.s-chrome .qline{transform:translateY(26px) scale(0.97);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-chrome .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* holo — iridescent fade-scale */
.s-holo .qline{transform:scale(0.85);transition:opacity .6s ease,transform .75s cubic-bezier(.22,1,.36,1);}
.s-holo .qline.in{opacity:1;transform:scale(1);}

/* matrix — snappy digital materialize */
.s-matrix .qline{transform:translateY(-10px) scale(1.05);transition:opacity .22s ease,transform .32s ease;}
.s-matrix .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* polaroid — drifts down like a photo falling into frame */
.s-polaroid .qline{transform:translateY(-30px) rotate(-1.5deg);transition:opacity .6s ease,transform .8s cubic-bezier(.16,1,.3,1);}
.s-polaroid .qline.in{opacity:1;transform:translateY(0) rotate(0deg);}

/* arcade — stately rise */
.s-arcade .qline{transform:translateY(38px);transition:opacity .6s ease,transform .75s cubic-bezier(.16,1,.3,1);}
.s-arcade .qline.in{opacity:1;transform:translateY(0);}

/* boombox — emerges with bounce */
.s-boombox .qline{transform:scale(0.9) translateY(14px);transition:opacity .55s ease,transform .7s ease;}
.s-boombox .qline.in{opacity:1;transform:scale(1) translateY(0);}

/* wrestling — crest and settle */
.s-wrestling .qline{transform:translateY(50px) rotate(-2deg);transition:opacity .5s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.s-wrestling .qline.in{opacity:1;transform:translateY(0) rotate(0deg);}

/* messenger — unfolds open like a chat bubble */
.s-messenger .qline{transform:scaleX(0);transform-origin:left center;transition:opacity .4s ease,transform .55s cubic-bezier(.34,1.56,.64,1);}
.s-messenger .qline.in{opacity:1;transform:scaleX(1);}

/* disposable — flash-pop */
.s-disposable .qline{transform:scale(1.08);transition:opacity .3s ease,transform .45s cubic-bezier(.22,1,.36,1);}
.s-disposable .qline.in{opacity:1;transform:scale(1);}

/* universal settle flash — a brief brightness pop layered on every theme's own transform */
@keyframes qSettle{0%{filter:brightness(1.7);}100%{filter:brightness(1);}}
.qline.in{animation:qSettle .5s ease-out;}

/* ───────── PER-THEME TEXT COLOUR (light backgrounds need dark ink) ───────── */
.s-chrome .qline{color:#1a2230;-webkit-text-stroke:0.05em rgba(255,255,255,0.9);text-shadow:none;}
.s-chrome .qline.small{color:#2c3a4d;-webkit-text-stroke:0.03em rgba(255,255,255,0.85);text-shadow:none;}
.s-chrome .qline.ref{color:#3d7ea6;-webkit-text-stroke:0.035em rgba(255,255,255,0.85);}

.s-polaroid .qline{color:#4a3528;-webkit-text-stroke:0.045em rgba(255,255,255,0.9);text-shadow:none;}
.s-polaroid .qline.small{color:#5c4232;-webkit-text-stroke:0.03em rgba(255,255,255,0.85);text-shadow:none;}
.s-polaroid .qline.ref{color:#b8763f;-webkit-text-stroke:0.035em rgba(255,255,255,0.85);}

.s-disposable .qline{color:#3a2a1a;-webkit-text-stroke:0.045em rgba(255,244,220,0.92);text-shadow:none;}
.s-disposable .qline.small{color:#4a3624;-webkit-text-stroke:0.03em rgba(255,244,220,0.88);text-shadow:none;}
.s-disposable .qline.ref{color:#c2622f;-webkit-text-stroke:0.035em rgba(255,244,220,0.88);}

.s-crt .qline.ref{color:#e0552f;}
.s-vhs .qline.ref{color:#ff3b8e;}
.s-holo .qline.ref{color:#9fe8e0;}
.s-matrix .qline.ref{color:#3bff5e;}
.s-arcade .qline.ref{color:#ff2fd6;}
.s-boombox .qline.ref{color:#ffb84d;}
.s-wrestling .qline.ref{color:#ffd23b;}
.s-messenger .qline.ref{color:#5cc4ff;}

/* ───────── LEGIBILITY SCRIM — guarantees contrast behind text on any scene ───────── */
#text-scrim{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:94vw;max-width:680px;height:50vh;
  border-radius:32px;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  filter:blur(1px);
  z-index:-1;
}
#text-scrim.dark{background:radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.22) 50%, rgba(0,0,0,0) 78%);}
#text-scrim.light{background:radial-gradient(ellipse at center, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 78%);}
</style>
