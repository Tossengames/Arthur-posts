<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>90s/2000s Nostalgia Reel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anton&family=VT323&family=Russo+One&family=Rubik:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--headline-font:'Anton',sans-serif;--sub-font:'Rubik',sans-serif;--label-font:'VT323',monospace;}
html,body{width:100%;height:100%;overflow:hidden;background:#04080f;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 48%,transparent 30%,rgba(0,5,15,0.5) 100%);}

#ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 8vw;gap:3.6vw;
}

/* Top label */
#label{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:7vw 6vw 2vw;z-index:11;
  opacity:0;transform:translateY(-16px);
  transition:opacity .5s ease,transform .5s ease;
}
#label-eyebrow{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.4vw,1rem);
  letter-spacing:0.35em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.5px rgba(4,10,20,0.6);
}
#label-rule{width:46px;height:1px;background:#f4d35e;opacity:0.55;margin-top:1.4vw;}

/* Quote lines */
#quote-wrap{display:flex;flex-direction:column;align-items:center;gap:1.8vw;width:100%;}
.qline{
  font-family:var(--headline-font);font-weight:400;
  font-size:clamp(1.9rem,8.2vw,2.9rem);
  color:#fff;text-align:center;line-height:1.22;
  opacity:0;letter-spacing:0.02em;
  -webkit-text-stroke:0.035em rgba(6,6,10,0.85);
  paint-order:stroke fill;
  text-shadow:0 3px 16px rgba(0,0,0,0.4);
  max-width:100%;min-width:0;white-space:normal;word-break:keep-all;
}
.qline.small{
  font-family:var(--sub-font);font-weight:700;
  font-size:clamp(1rem,4.6vw,1.45rem);
  color:rgba(255,255,255,0.93);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  text-shadow:0 2px 8px rgba(0,0,0,0.35);
  line-height:1.32;
}
.qline.ref{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.2vw,1rem);
  letter-spacing:0.28em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.04em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  margin-top:0.8vw;
}

/* Divider under headline */
#underbar{height:2px;width:0;max-width:60vw;background:linear-gradient(90deg,transparent,#f4d35e,transparent);transition:width .6s cubic-bezier(.22,1,.36,1);margin-top:0.4vw;}

/* Bottom CTA */
#bottom{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:3vw 6vw 8vw;z-index:11;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
#cta{
  font-family:var(--label-font);font-weight:400;
  font-size:clamp(0.7rem,3.2vw,1rem);
  letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.6);
}

/* ───────── PER-THEME REVEAL ANIMATIONS ───────── */

/* crt — rises and settles with a slight flicker-snap */
.s-crt .qline{transform:translateY(22px) scale(0.96);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-crt .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* vhs — glitchy snap with horizontal jump */
.s-vhs .qline{transform:translateX(46px);transition:opacity .25s ease,transform .35s cubic-bezier(.34,1.56,.64,1);}
.s-vhs .qline.in{opacity:1;transform:translateX(0);}

/* hudcyan — sci-fi panel snap-in */
.s-hudcyan .qline{transform:translateY(18px) scale(0.97);transition:opacity .4s ease,transform .5s cubic-bezier(.22,1,.36,1);}
.s-hudcyan .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* hudred — alert-style sharp snap */
.s-hudred .qline{transform:scale(0.92);transition:opacity .3s ease,transform .4s cubic-bezier(.34,1.56,.64,1);}
.s-hudred .qline.in{opacity:1;transform:scale(1);}

/* matrix — snappy digital materialize */
.s-matrix .qline{transform:translateY(-10px) scale(1.05);transition:opacity .22s ease,transform .32s ease;}
.s-matrix .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* polaroid — drifts down like a photo falling into frame */
.s-polaroid .qline{transform:translateY(-30px) rotate(-1.5deg);transition:opacity .6s ease,transform .8s cubic-bezier(.16,1,.3,1);}
.s-polaroid .qline.in{opacity:1;transform:translateY(0) rotate(0deg);}

/* arcade — stately rise */
.s-arcade .qline{transform:translateY(38px);transition:opacity .6s ease,transform .75s cubic-bezier(.16,1,.3,1);}
.s-arcade .qline.in{opacity:1;transform:translateY(0);}

/* boombox — emerges with bounce */
.s-boombox .qline{transform:scale(0.9) translateY(14px);transition:opacity .55s ease,transform .7s ease;}
.s-boombox .qline.in{opacity:1;transform:scale(1) translateY(0);}

/* wwe — crest and settle */
.s-wwe .qline{transform:translateY(50px) rotate(-2deg);transition:opacity .5s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.s-wwe .qline.in{opacity:1;transform:translateY(0) rotate(0deg);}

/* ps2 — calm menu-style fade and rise */
.s-ps2 .qline{transform:translateY(20px) scale(0.97);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-ps2 .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* xbox — pulse in from center */
.s-xbox .qline{transform:scale(0.88);transition:opacity .45s ease,transform .55s cubic-bezier(.34,1.56,.64,1);}
.s-xbox .qline.in{opacity:1;transform:scale(1);}

/* messenger — unfolds open like a chat bubble */
.s-messenger .qline{transform:scaleX(0);transform-origin:left center;transition:opacity .4s ease,transform .55s cubic-bezier(.34,1.56,.64,1);}
.s-messenger .qline.in{opacity:1;transform:scaleX(1);}

/* disposable — flash-pop */
.s-disposable .qline{transform:scale(1.08);transition:opacity .3s ease,transform .45s cubic-bezier(.22,1,.36,1);}
.s-disposable .qline.in{opacity:1;transform:scale(1);}

/* songguess — bouncy beat-drop entrance */
.s-songguess .qline{transform:scale(0.8);transition:opacity .35s ease,transform .45s cubic-bezier(.34,1.56,.64,1);}
.s-songguess .qline.in{opacity:1;transform:scale(1);}

/* gameguess — pixel-snap entrance */
.s-gameguess .qline{transform:translateY(-12px);transition:opacity .25s ease,transform .35s steps(4,end);}
.s-gameguess .qline.in{opacity:1;transform:translateY(0);}

/* rememberwhen — slow warm fade, like flipping through a photo album */
.s-rememberwhen .qline{transform:translateY(14px);transition:opacity .7s ease,transform .8s ease;}
.s-rememberwhen .qline.in{opacity:1;transform:translateY(0);}

/* wherewereyou — urgent breaking-news snap */
.s-wherewereyou .qline{transform:translateX(-30px);transition:opacity .3s ease,transform .4s cubic-bezier(.34,1.56,.64,1);}
.s-wherewereyou .qline.in{opacity:1;transform:translateX(0);}

/* nickcn — bouncy, playful kids-TV style pop */
.s-nickcn .qline{transform:scale(0.8) rotate(-2deg);transition:opacity .35s ease,transform .45s cubic-bezier(.34,1.56,.64,1);}
.s-nickcn .qline.in{opacity:1;transform:scale(1) rotate(0deg);}

/* engagement — gentle chat-bubble float-in */
.s-engagement .qline{transform:translateY(16px);transition:opacity .45s ease,transform .55s ease;}
.s-engagement .qline.in{opacity:1;transform:translateY(0);}

/* chartfacts — sharp data snap-in */
.s-chartfacts .qline{transform:translateY(-14px) scale(0.96);transition:opacity .3s ease,transform .4s cubic-bezier(.22,1,.36,1);}
.s-chartfacts .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* universal settle flash — a brief brightness pop layered on every theme's own transform */
@keyframes qSettle{0%{filter:brightness(1.7);}100%{filter:brightness(1);}}
.qline.in{animation:qSettle .5s ease-out;}

/* ───────── PER-THEME TEXT COLOUR (light backgrounds need dark ink) ───────── */
.s-polaroid .qline{color:#4a3528;-webkit-text-stroke:0.035em rgba(255,255,255,0.9);text-shadow:none;}
.s-polaroid .qline.small{color:#5c4232;-webkit-text-stroke:0.03em rgba(255,255,255,0.85);text-shadow:none;}
.s-polaroid .qline.ref{color:#b8763f;-webkit-text-stroke:0.035em rgba(255,255,255,0.85);}

.s-disposable .qline{color:#3a2a1a;-webkit-text-stroke:0.035em rgba(255,244,220,0.92);text-shadow:none;}
.s-disposable .qline.small{color:#4a3624;-webkit-text-stroke:0.03em rgba(255,244,220,0.88);text-shadow:none;}
.s-disposable .qline.ref{color:#c2622f;-webkit-text-stroke:0.035em rgba(255,244,220,0.88);}

.s-crt .qline.ref{color:#e0552f;}
.s-vhs .qline.ref{color:#ff3b8e;}
.s-hudcyan .qline.ref{color:#4be8ff;}
.s-hudred .qline.ref{color:#ff3b4a;}
.s-matrix .qline.ref{color:#3bff5e;}
.s-arcade .qline.ref{color:#ff2fd6;}
.s-boombox .qline.ref{color:#ffb84d;}
.s-wwe .qline.ref{color:#ffd23b;}
.s-ps2 .qline.ref{color:#8fb4ff;}
.s-xbox .qline.ref{color:#5cff8a;}
.s-messenger .qline.ref{color:#5cc4ff;}
.s-songguess .qline.ref{color:#ff2fd6;}
.s-gameguess .qline.ref{color:#2fe0ff;}
.s-rememberwhen .qline.ref{color:#ffb86c;}
.s-wherewereyou .qline.ref{color:#ff3b4a;}
.s-nickcn .qline.ref{color:#ffd23b;}
.s-engagement .qline.ref{color:#c084fc;}
.s-chartfacts .qline.ref{color:#4be8ff;}

/* ───────── LEGIBILITY SCRIM — guarantees contrast behind text on any scene ───────── */
#text-scrim{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:94vw;max-width:680px;height:50vh;
  border-radius:32px;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  filter:blur(1px);
  z-index:-1;
}
#text-scrim.dark{background:radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.22) 50%, rgba(0,0,0,0) 78%);}
#text-scrim.light{background:radial-gradient(ellipse at center, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 78%);}
</style>

// ── shared point-star helper ──
function star(ctx,cx,cy,outerR,points,innerRatio){
  points=points||5; innerRatio=innerRatio||0.382;
  const innerR=outerR*innerRatio;
  ctx.beginPath();
  for(let k=0;k<points*2;k++){
    const ang=(Math.PI/points)*k - Math.PI/2;
    const rad=(k%2===0)?outerR:innerR;
    const x=cx+Math.cos(ang)*rad,y=cy+Math.sin(ang)*rad;
    if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();
}

// ── shared sci-fi HUD panel frame helper ──────────────────
// Draws an angular, cut-corner HUD panel border (inspired by common
// futuristic UI kits: notched corners, glow line, small tick marks).
// x,y,w,h = bounding box. notch = size of the corner cut. color/glowColor
// control the line + outer glow. tickSide: 'top'|'bottom'|null adds a row
// of small dashes along that edge.
function drawHUDFrame(ctx,x,y,w,h,opts){
  opts=opts||{};
  const notch=opts.notch||Math.min(w,h)*0.12;
  const color=opts.color||'#4be8ff';
  const lineW=opts.lineWidth||2;
  const alpha=opts.alpha!=null?opts.alpha:1;
  const glow=opts.glow!=null?opts.glow:10;
  const corners=opts.corners||['tl','br']; // which corners get cut

  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;
  ctx.lineWidth=lineW;
  ctx.shadowColor=color;
  ctx.shadowBlur=glow;
  ctx.beginPath();

  const cut=(c)=>corners.includes(c);
  // build path clockwise from top-left, cutting requested corners
  ctx.moveTo(x+(cut('tl')?notch:0), y);
  ctx.lineTo(x+w-(cut('tr')?notch:0), y);
  if(cut('tr'))ctx.lineTo(x+w,y+notch);
  ctx.lineTo(x+w, y+h-(cut('br')?notch:0));
  if(cut('br'))ctx.lineTo(x+w-notch,y+h);
  ctx.lineTo(x+(cut('bl')?notch:0), y+h);
  if(cut('bl'))ctx.lineTo(x,y+h-notch);
  ctx.lineTo(x, y+(cut('tl')?notch:0));
  if(cut('tl'))ctx.lineTo(x+notch,y);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // small corner tick accent (filled triangle on one cut corner)
  if(opts.accentCorner){
    const ac=opts.accentCorner;
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=glow*0.6;
    ctx.beginPath();
    if(ac==='tl'){ctx.moveTo(x,y);ctx.lineTo(x+notch,y);ctx.lineTo(x,y+notch);}
    else if(ac==='tr'){ctx.moveTo(x+w,y);ctx.lineTo(x+w-notch,y);ctx.lineTo(x+w,y+notch);}
    else if(ac==='br'){ctx.moveTo(x+w,y+h);ctx.lineTo(x+w-notch,y+h);ctx.lineTo(x+w,y+h-notch);}
    else{ctx.moveTo(x,y+h);ctx.lineTo(x+notch,y+h);ctx.lineTo(x,y+h-notch);}
    ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // optional tick-mark row (small evenly spaced dashes) along top or bottom edge
  if(opts.tickSide){
    const tickY=opts.tickSide==='top'?y-8:y+h+8;
    const tickCount=Math.max(4,Math.floor(w/(opts.tickGap||14)));
    ctx.save();ctx.globalAlpha=alpha*0.8;ctx.strokeStyle=color;ctx.lineWidth=1.4;
    for(let i=0;i<tickCount;i++){
      const tx=x+w*0.06+(w*0.88)*(i/(tickCount-1));
      ctx.beginPath();ctx.moveTo(tx,tickY-4);ctx.lineTo(tx,tickY+4);ctx.stroke();
    }
    ctx.restore();
  }
}

// small circular HUD gauge/dial decoration (segmented ring, like the
// reference corner dials) — purely decorative, drifts/rotates with t
function drawHUDDial(ctx,t,cx,cy,r,color,segments){
  segments=segments||14;
  ctx.save();
  ctx.translate(cx,cy);ctx.rotate(t*0.4);
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.globalAlpha=0.8;
  for(let i=0;i<segments;i++){
    const a0=(Math.PI*2/segments)*i+0.05;
    const a1=a0+(Math.PI*2/segments)*0.6;
    ctx.beginPath();ctx.arc(0,0,r,a0,a1);ctx.stroke();
  }
  ctx.restore();
  ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=0.5;
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,0,r*0.6,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// 1. CRT — boxy TV frame, scanlines, slight curve distortion
// ════════════════════════════════════════════════════════
function drawCRT(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#2a2118');g.addColorStop(1,'#0c0906');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const sx=w*0.08,sy=h*0.16,sw=w*0.84,sh=h*0.68;
  const p=easeOutCubic(Math.min(1,st/1.0));
  const screenGlow=ctx.createRadialGradient(w/2,sy+sh/2,0,w/2,sy+sh/2,safeR(Math.max(sw,sh)*0.7));
  screenGlow.addColorStop(0,`rgba(60,80,40,${0.5*p})`);screenGlow.addColorStop(1,'rgba(20,30,15,0)');
  ctx.save();ctx.fillStyle=screenGlow;ctx.fillRect(0,0,w,h);ctx.restore();

  ctx.save();
  ctx.fillStyle='#16140f';
  ctx.beginPath();ctx.roundRect?ctx.roundRect(sx-14,sy-14,sw+28,sh+28,18):ctx.rect(sx-14,sy-14,sw+28,sh+28);ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.fillStyle='#1d2b14';
  ctx.beginPath();ctx.roundRect?ctx.roundRect(sx,sy,sw,sh,10):ctx.rect(sx,sy,sw,sh);ctx.clip();
  ctx.fillRect(sx,sy,sw,sh);

  ctx.save();ctx.globalAlpha=0.18;ctx.fillStyle='#000';
  for(let y=sy;y<sy+sh;y+=4){ctx.fillRect(sx,y,sw,1.4);}
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.05+0.03*Math.sin(t*30);ctx.fillStyle='#9fffb0';
  for(let i=0;i<60;i++){
    ctx.fillRect(sx+Math.random()*sw,sy+Math.random()*sh,2,1);
  }
  ctx.restore();

  const rollY=sy+((t*60)%(sh+60))-30;
  ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#fff';
  ctx.fillRect(sx,rollY,sw,16);
  ctx.restore();
  ctx.restore();

  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect?ctx.roundRect(sx-14,sy-14,sw+28,sh+28,18):ctx.rect(sx-14,sy-14,sw+28,sh+28);ctx.stroke();
  ctx.restore();

  ctx.save();ctx.strokeStyle='#5a5248';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(w*0.42,sy-14);ctx.lineTo(w*0.32,sy-70);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w*0.58,sy-14);ctx.lineTo(w*0.7,sy-70);ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 2. VHS — tracking glitch, chromatic aberration, REC indicator
// ════════════════════════════════════════════════════════
function drawVHS(ctx,t,w,h,st){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,w,h);

  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#1a0e22');grad.addColorStop(1,'#05030a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);

  for(let i=0;i<3;i++){
    const off=(i-1)*3;
    ctx.save();ctx.globalAlpha=0.08;ctx.globalCompositeOperation='screen';
    ctx.fillStyle=i===0?'#ff2f7e':i===1?'#2fe0ff':'#fff';
    ctx.fillRect(off,0,w,h);
    ctx.restore();
  }

  for(let i=0;i<5;i++){
    const yy=(i*171+t*240)%h;
    const lh=4+Math.random()*10;
    ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#fff';
    ctx.fillRect(0,yy,w,lh);
    ctx.restore();
  }

  if(Math.sin(t*3)>0.92){
    ctx.save();
    const jy=h*0.4+Math.sin(t*50)*20;
    ctx.drawImage(ctx.canvas,0,jy,w,30,8,jy,w,30);
    ctx.restore();
  }

  ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle='#000';
  for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1);}
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.05;ctx.fillStyle='#fff';
  for(let i=0;i<200;i++){ctx.fillRect(Math.random()*w,Math.random()*h,1.5,1.5);}
  ctx.restore();

  const p=Math.min(1,st/0.6);
  ctx.save();ctx.globalAlpha=p*(0.6+0.4*Math.sin(t*6));
  ctx.fillStyle='#ff2f4d';
  ctx.beginPath();ctx.arc(w*0.12,h*0.1,6,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.save();ctx.globalAlpha=p*0.8;ctx.fillStyle='#fff';
  ctx.font=`16px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('REC',w*0.15,h*0.105);
  ctx.fillText('00:'+String(Math.floor(t)%60).padStart(2,'0'),w*0.78,h*0.105);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 3. HUD-CYAN — sci-fi tech panel frames, cyan glow, corner dials
//    (direct nod to common HUD UI kits: angular cut-corner panels,
//    thin glowing borders, tick marks, small gauge dials)
// ════════════════════════════════════════════════════════
function drawHudCyan(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#040b14');g.addColorStop(1,'#000308');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // faint grid backdrop
  ctx.save();ctx.globalAlpha=0.08;ctx.strokeStyle='#2fd9ff';ctx.lineWidth=1;
  const gridStep=Math.min(w,h)*0.07;
  for(let x=0;x<w;x+=gridStep){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=gridStep){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.restore();

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#4be8ff';

  // main central panel frame, cut corners top-left and bottom-right
  const px=w*0.07,py=h*0.18,pw=w*0.86,ph=h*0.64;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.85*p,notch:Math.min(w,h)*0.05,corners:['tl','br'],accentCorner:'tl',glow:14});

  // secondary inner accent frame, slightly inset, cut differently
  drawHUDFrame(ctx,px+10,py+10,pw-20,ph-20,{color,alpha:0.35*p,notch:Math.min(w,h)*0.03,corners:['tr','bl'],glow:8,lineWidth:1.2});

  // small corner dials, like the reference gauge icons
  drawHUDDial(ctx,t,px-6,py-6,16*p,color,12);
  drawHUDDial(ctx,t*-1,px+pw+6,py+ph+6,16*p,color,10);

  // tick row along the top edge of the panel
  if(p>0.3){
    ctx.save();ctx.globalAlpha=(p-0.3)*0.9;ctx.strokeStyle=color;ctx.lineWidth=1.3;
    const tickY=py-14;
    for(let i=0;i<24;i++){
      const tx=px+pw*0.04+(pw*0.92)*(i/23);
      ctx.beginPath();ctx.moveTo(tx,tickY-3);ctx.lineTo(tx,tickY+3);ctx.stroke();
    }
    ctx.restore();
  }

  // sweeping scan-line glow moving down the panel
  const scanY=py+((t*0.5)%1)*ph;
  ctx.save();ctx.globalAlpha=0.18*p;ctx.globalCompositeOperation='screen';
  const scanG=ctx.createLinearGradient(0,scanY-14,0,scanY+14);
  scanG.addColorStop(0,'rgba(75,232,255,0)');scanG.addColorStop(0.5,'rgba(75,232,255,0.8)');scanG.addColorStop(1,'rgba(75,232,255,0)');
  ctx.fillStyle=scanG;ctx.fillRect(px,scanY-14,pw,28);
  ctx.restore();

  // small data readout text in the corner, purely decorative
  ctx.save();ctx.globalAlpha=0.55*p;ctx.fillStyle=color;ctx.font=`14px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('SYS://ARCHIVE_2000',px+14,py-20);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 4. HUD-RED — warning/hazard-style tech panel, angular red frames
//    (nod to hazard-style HUD kits: warning chevrons, biohazard-style
//    corner icons rendered abstractly as glowing rings, red glow)
// ════════════════════════════════════════════════════════
function drawHudRed(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a0508');g.addColorStop(1,'#080203');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  ctx.save();ctx.globalAlpha=0.07;ctx.strokeStyle='#ff3b4a';ctx.lineWidth=1;
  const gridStep=Math.min(w,h)*0.07;
  for(let x=0;x<w;x+=gridStep){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=gridStep){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.restore();

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#ff3b4a';

  // top warning chevron bar, like the reference "WARNING" banner
  const barY=h*0.12, barW=w*0.7, barX=w*0.5-barW/2, barH=h*0.045;
  ctx.save();ctx.globalAlpha=0.8*p;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.shadowColor=color;ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(barX+18,barY);ctx.lineTo(barX+barW-18,barY);ctx.lineTo(barX+barW,barY+barH/2);
  ctx.lineTo(barX+barW-18,barY+barH);ctx.lineTo(barX+18,barY+barH);ctx.lineTo(barX,barY+barH/2);ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // hazard stripe ticks under the warning bar
  ctx.save();ctx.globalAlpha=0.5*p;ctx.strokeStyle=color;ctx.lineWidth=3;
  for(let i=0;i<18;i++){
    const tx=barX+barW*0.04+(barW*0.92)*(i/17);
    ctx.beginPath();ctx.moveTo(tx,barY+barH+8);ctx.lineTo(tx-6,barY+barH+16);ctx.stroke();
  }
  ctx.restore();

  // main content panel, cut corners, red glow
  const px=w*0.08,py=h*0.24,pw=w*0.84,ph=h*0.56;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.8*p,notch:Math.min(w,h)*0.05,corners:['tr','bl'],accentCorner:'tr',glow:14});

  // small glowing ring "alert icon" decorations near top corners,
  // abstracted from the reference hazard-symbol circles (no literal
  // hazard iconography drawn, just the circular HUD ring treatment)
  [[px+pw*0.12,py-8],[px+pw*0.88,py-8]].forEach(([rx,ry])=>{
    drawHUDDial(ctx,t,rx,ry,14*p,color,10);
  });

  // pulsing alert glow behind everything
  const pulse=0.5+Math.sin(t*2.4)*0.5;
  ctx.save();ctx.globalAlpha=0.06*pulse*p;ctx.fillStyle=color;ctx.fillRect(0,0,w,h);ctx.restore();

  ctx.save();ctx.globalAlpha=0.5*p;ctx.fillStyle=color;ctx.font=`14px 'VT323',monospace`;ctx.textAlign='right';
  ctx.fillText('ARCHIVE_ALERT//Y2K',px+pw-10,py+ph+22);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 5. MATRIX — digital rain (numbers/symbols, green)
// ════════════════════════════════════════════════════════
const MATRIX_SET=['0','1','#','$','%','&','@','*','+','=','?'];
let _rainCols=[];
function initRain(w,h){
  const colWidth=Math.max(16,Math.min(w,h)*0.04);
  const colCount=Math.ceil(w/colWidth)+1;
  _rainCols=[];
  for(let i=0;i<colCount;i++){
    _rainCols.push({
      x:i*colWidth+colWidth/2,
      y:Math.random()*-h,
      speed:90+Math.random()*130,
      char:MATRIX_SET[Math.floor(Math.random()*MATRIX_SET.length)],
      changeTimer:Math.random()*0.5,
      size:colWidth*0.78,
    });
  }
}
function drawMatrix(ctx,t,w,h,st){
  ctx.fillStyle='rgba(2,4,2,0.16)';
  ctx.fillRect(0,0,w,h);

  if(!_rainCols.length) initRain(w,h);
  ctx.textAlign='center';ctx.textBaseline='middle';

  _rainCols.forEach(col=>{
    col.y+=col.speed*0.016;
    col.changeTimer-=0.016;
    if(col.changeTimer<=0){
      col.char=MATRIX_SET[Math.floor(Math.random()*MATRIX_SET.length)];
      col.changeTimer=0.15+Math.random()*0.35;
    }
    if(col.y>h+40){col.y=-40-Math.random()*200;col.speed=90+Math.random()*130;}

    for(let k=2;k>=1;k--){
      const ty=col.y-k*col.size*1.05;
      if(ty<-40)continue;
      ctx.save();
      ctx.globalAlpha=Math.max(0,0.45-k*0.16);
      ctx.font=`700 ${col.size}px 'VT323',monospace`;
      ctx.fillStyle='#1fae3f';
      ctx.fillText(col.char,col.x,ty);
      ctx.restore();
    }

    ctx.save();
    ctx.font=`700 ${col.size}px 'VT323',monospace`;
    ctx.fillStyle='#3bff5e';
    ctx.shadowColor='rgba(60,255,90,0.8)';ctx.shadowBlur=col.size*0.4;
    ctx.fillText(col.char,col.x,col.y);
    ctx.restore();
  });
}

// ════════════════════════════════════════════════════════
// 6. POLAROID — white photo border frame, light leak, film grain
// ════════════════════════════════════════════════════════
function drawPolaroid(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#fbeede');g.addColorStop(1,'#e8d5be');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));
  const bx=w*0.06,by=h*0.1,bw=w*0.88,bh=h*0.72;
  ctx.save();ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(bx-10,by-10,bw+20,bh+50);
  ctx.restore();

  ctx.save();
  ctx.beginPath();ctx.rect(bx,by,bw,bh);ctx.clip();
  ctx.fillStyle='#cbb89c';ctx.fillRect(bx,by,bw,bh);

  const lkx=bx+bw*(0.7+0.2*Math.sin(t*0.3));
  const lg=ctx.createRadialGradient(lkx,by,0,lkx,by,safeR(bh*0.9));
  lg.addColorStop(0,'rgba(255,160,90,0.55)');lg.addColorStop(1,'rgba(255,160,90,0)');
  ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=lg;ctx.fillRect(bx,by,bw,bh);ctx.restore();

  ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#000';
  for(let i=0;i<250;i++){ctx.fillRect(bx+Math.random()*bw,by+Math.random()*bh,1.2,1.2);}
  ctx.restore();
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.06*p;ctx.fillStyle='#000';
  ctx.fillRect(bx,by+bh-4,bw,4);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 7. ARCADE — neon grid floor, perspective lines
// ════════════════════════════════════════════════════════
function drawArcade(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a0420');g.addColorStop(0.5,'#1a0830');g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const hzY=h*0.55;
  const sg=ctx.createRadialGradient(w*0.5,hzY,0,w*0.5,hzY,safeR(w*0.5));
  sg.addColorStop(0,'rgba(255,47,214,0.4)');sg.addColorStop(1,'rgba(255,47,214,0)');
  ctx.save();ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);ctx.restore();

  ctx.save();ctx.strokeStyle='rgba(255,47,214,0.8)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,hzY);ctx.lineTo(w,hzY);ctx.stroke();
  ctx.restore();

  ctx.save();ctx.strokeStyle='rgba(47,224,255,0.5)';ctx.lineWidth=1.4;
  const vanishX=w*0.5;
  for(let i=-10;i<=10;i++){
    const xBase=vanishX+i*w*0.09;
    ctx.beginPath();ctx.moveTo(vanishX,hzY);ctx.lineTo(xBase,h);ctx.stroke();
  }
  const speed=(t*0.4)%1;
  for(let j=0;j<8;j++){
    const frac=(j/8+speed/8)%1;
    const yy=hzY+(h-hzY)*Math.pow(frac,1.6);
    ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(w,yy);ctx.stroke();
  }
  ctx.restore();

  const p=Math.min(1,st/0.8);
  for(let i=0;i<3;i++){
    const sx=w*(0.2+i*0.3), sy=hzY*0.3+Math.sin(t*1.2+i)*14;
    ctx.save();ctx.globalAlpha=0.8*p;ctx.fillStyle=i%2===0?'#2fe0ff':'#ff2fd6';
    star(ctx,sx,sy,Math.min(w,h)*0.025,5,0.45);
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 8. BOOMBOX — cassette tape, equalizer bars, warm palette
// ════════════════════════════════════════════════════════
function drawBoombox(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#3a2414');g.addColorStop(1,'#160d08');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));
  const cx=w*0.5,cy=h*0.34,cw=w*0.62,ch=h*0.22;
  ctx.save();ctx.globalAlpha=p;ctx.fillStyle='#1c1410';
  ctx.beginPath();ctx.roundRect?ctx.roundRect(cx-cw/2,cy-ch/2,cw,ch,14):ctx.rect(cx-cw/2,cy-ch/2,cw,ch);ctx.fill();
  ctx.strokeStyle='rgba(255,184,77,0.4)';ctx.lineWidth=2;ctx.stroke();

  [-1,1].forEach(side=>{
    const rx=cx+side*cw*0.22, ry=cy;
    ctx.save();ctx.translate(rx,ry);ctx.rotate(t*2*side);
    ctx.fillStyle='#caa05a';
    ctx.beginPath();ctx.arc(0,0,ch*0.28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1c1410';
    ctx.beginPath();ctx.arc(0,0,ch*0.1,0,Math.PI*2);ctx.fill();
    for(let s=0;s<6;s++){
      ctx.save();ctx.rotate((Math.PI/3)*s);ctx.fillStyle='#1c1410';
      ctx.fillRect(-2,-ch*0.26,4,ch*0.16);ctx.restore();
    }
    ctx.restore();
  });
  ctx.restore();

  const barCount=14, bw=w*0.7/barCount, baseY=h*0.74;
  ctx.save();
  for(let i=0;i<barCount;i++){
    const bh=Math.abs(Math.sin(t*4+i*0.7))*h*0.16+h*0.02;
    const bx=w*0.15+i*bw;
    ctx.fillStyle=i%2===0?'#ffb84d':'#ff7b54';
    ctx.fillRect(bx,baseY-bh,bw*0.7,bh);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 9. WWE — ring ropes, turnbuckle colors, entrance pyro sparks
// ════════════════════════════════════════════════════════
function drawWWE(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a0606');g.addColorStop(0.6,'#0c0303');g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // arena spotlight beams sweeping slowly
  [w*0.25,w*0.75].forEach((sx,i)=>{
    ctx.save();
    const sway=Math.sin(t*0.4+i*2)*26;
    ctx.translate(sx+sway,0);
    ctx.globalAlpha=0.16;
    const beam=ctx.createLinearGradient(0,0,0,h);
    beam.addColorStop(0,'rgba(255,210,59,0.55)');beam.addColorStop(1,'rgba(255,210,59,0)');
    ctx.fillStyle=beam;
    ctx.beginPath();ctx.moveTo(-26,0);ctx.lineTo(26,0);ctx.lineTo(w*0.28,h);ctx.lineTo(-w*0.28,h);ctx.closePath();ctx.fill();
    ctx.restore();
  });

  // pyro sparks bursting up from the bottom edge
  for(let i=0;i<26;i++){
    const seed=i*53.7;
    const life=(t*1.4+seed)%2.2;
    if(life>1.6)continue;
    const sx=(seed*37)%w + Math.sin(seed)*20;
    const sy=h-(life*h*0.5);
    const fade=1-life/1.6;
    ctx.save();ctx.globalAlpha=fade*0.85;
    ctx.fillStyle=i%2===0?'#ffd23b':'#ff7b1a';
    ctx.beginPath();ctx.arc(sx,sy,1.8+fade*1.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  const p=easeOutCubic(Math.min(1,st/1.0));

  // top rope line across the very top, with turnbuckle corner pads
  ctx.save();ctx.globalAlpha=0.85*p;ctx.strokeStyle='#e8e8e8';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(0,h*0.1);ctx.lineTo(w,h*0.1);ctx.stroke();
  ctx.restore();

  // turnbuckles, alternating red/yellow/black like classic ring corners
  const buckleColors=['#c8102e','#ffd23b','#101010'];
  [0,1,2].forEach((i)=>{
    const bx=w*(0.12+i*0.38);
    ctx.save();ctx.globalAlpha=0.9*p;ctx.fillStyle=buckleColors[i%buckleColors.length];
    ctx.fillRect(bx,h*0.08,w*0.05,h*0.05);
    ctx.restore();
  });

  // bottom ring ropes
  ctx.save();ctx.globalAlpha=0.5*p;ctx.strokeStyle='#ffd23b';ctx.lineWidth=4;
  for(let i=0;i<3;i++){
    const ry=h*(0.84+i*0.045);
    ctx.beginPath();ctx.moveTo(0,ry);ctx.lineTo(w,ry);ctx.stroke();
  }
  ctx.restore();

  // crowd camera-flash sparkle
  for(let i=0;i<12;i++){
    const fx=(i*71)%w, fy=h*0.9+((i*37)%((h*0.08)));
    if(Math.random()>0.94){
      ctx.save();ctx.globalAlpha=0.8;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(fx,fy,2.2,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
}

// ════════════════════════════════════════════════════════
// 9b. PS2 — floating cubes with light-trail streaks on deep blue,
//    a direct nod to the iconic PS2 browser/startup aesthetic
// ════════════════════════════════════════════════════════
const PS2_CUBES=[];
const PS2_PARTICLES=[];
const PS2_TRAIL_COLORS=['#3bd16f','#ff3b6e','#a23bff','#3b8fff'];
function initPS2(w,h){
  PS2_CUBES.length=0;
  for(let i=0;i<7;i++){
    PS2_CUBES.push({
      x:Math.random()*w, y:Math.random()*h,
      size:Math.min(w,h)*(0.08+Math.random()*0.07),
      rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.4,
      driftX:(Math.random()-0.5)*8, driftY:(Math.random()-0.5)*6,
      depth:0.4+Math.random()*0.6,
    });
  }
  // each particle does a slow random walk and keeps a short history of
  // its own past positions, which we draw as a fading trail behind it —
  // this is what produces the curved colored-streak look from the
  // reference image, rather than a fixed pre-baked arc
  PS2_PARTICLES.length=0;
  PS2_TRAIL_COLORS.forEach((col)=>{
    PS2_PARTICLES.push({
      x:Math.random()*w, y:Math.random()*h,
      vx:(Math.random()-0.5)*1.2, vy:(Math.random()-0.5)*1.2,
      color:col,
      history:[],
    });
  });
}
function drawPS2(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,w,h*1.2);
  g.addColorStop(0,'#070b2e');g.addColorStop(0.5,'#0c1450');g.addColorStop(1,'#040716');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  if(!PS2_CUBES.length)initPS2(w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));

  // soft ambient glow drifting behind everything
  const gx=w*0.5+Math.sin(t*0.2)*w*0.12, gy=h*0.42+Math.cos(t*0.15)*h*0.08;
  const ag=ctx.createRadialGradient(gx,gy,0,gx,gy,safeR(Math.max(w,h)*0.5));
  ag.addColorStop(0,'rgba(70,110,220,0.3)');ag.addColorStop(1,'rgba(70,110,220,0)');
  ctx.save();ctx.fillStyle=ag;ctx.fillRect(0,0,w,h);ctx.restore();

  // floating cubes, faceted with simple shaded top/side/front like the reference
  PS2_CUBES.forEach((c,i)=>{
    const cx=(c.x+t*c.driftX*c.depth)%(w+200)-100;
    const cy=(c.y+t*c.driftY*c.depth)%(h+200)-100;
    const s=c.size*c.depth;
    ctx.save();
    ctx.globalAlpha=(0.5+0.3*c.depth)*p;
    ctx.translate(cx,cy);ctx.rotate(c.rot+t*c.rotSpeed);
    // top face
    ctx.fillStyle='#b9c8ec';
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.3);ctx.lineTo(0,-s*0.5);ctx.lineTo(s*0.5,-s*0.3);ctx.lineTo(0,-s*0.1);ctx.closePath();ctx.fill();
    // front face
    ctx.fillStyle='#5c72ad';
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.3);ctx.lineTo(0,-s*0.1);ctx.lineTo(0,s*0.4);ctx.lineTo(-s*0.5,s*0.2);ctx.closePath();ctx.fill();
    // side face
    ctx.fillStyle='#2f3d6e';
    ctx.beginPath();ctx.moveTo(s*0.5,-s*0.3);ctx.lineTo(0,-s*0.1);ctx.lineTo(0,s*0.4);ctx.lineTo(s*0.5,s*0.2);ctx.closePath();ctx.fill();
    ctx.restore();
  });

  // colored light-trail particles: each does a gentle random walk and
  // bounces softly off the edges, with a fading trail of its recent
  // positions drawn behind it — same curved-streak look as the reference
  PS2_PARTICLES.forEach((pt)=>{
    // gentle steering: nudge velocity randomly, then clamp speed
    pt.vx+=(Math.random()-0.5)*0.18;
    pt.vy+=(Math.random()-0.5)*0.18;
    const speed=Math.hypot(pt.vx,pt.vy);
    const maxSpeed=1.6;
    if(speed>maxSpeed){pt.vx=(pt.vx/speed)*maxSpeed;pt.vy=(pt.vy/speed)*maxSpeed;}
    pt.x+=pt.vx;pt.y+=pt.vy;

    // soft bounce off edges (with margin) so particles stay on screen
    const margin=w*0.06;
    if(pt.x<margin){pt.vx+=0.08;} if(pt.x>w-margin){pt.vx-=0.08;}
    if(pt.y<margin){pt.vy+=0.08;} if(pt.y>h-margin){pt.vy-=0.08;}
    pt.x=Math.max(0,Math.min(w,pt.x));
    pt.y=Math.max(0,Math.min(h,pt.y));

    pt.history.push({x:pt.x,y:pt.y});
    if(pt.history.length>26)pt.history.shift();

    // draw the trail as a fading polyline behind the particle's head
    ctx.save();ctx.globalAlpha=0.7*p;ctx.strokeStyle=pt.color;ctx.lineWidth=1.8;
    ctx.shadowColor=pt.color;ctx.shadowBlur=7;
    ctx.lineJoin='round';ctx.lineCap='round';
    for(let i=1;i<pt.history.length;i++){
      const a=pt.history[i-1],b=pt.history[i];
      const fade=i/pt.history.length;
      ctx.globalAlpha=fade*0.65*p;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    ctx.restore();

    // glowing head dot
    ctx.save();ctx.globalAlpha=0.95*p;ctx.fillStyle=pt.color;ctx.shadowColor=pt.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(pt.x,pt.y,2.8,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // small readout text, corner, like the system-config screen reference,
  // explicitly labeled so the theme reads clearly even out of context
  ctx.save();ctx.globalAlpha=0.65*p;ctx.fillStyle='#bcd4ff';ctx.font=`14px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('PS2 SYSTEM CONFIGURATION',w*0.06,h*0.08);
  ctx.textAlign='right';
  ctx.fillText('MEMORY CARD [SLOT 1]',w*0.94,h*0.93);
  ctx.restore();

  // faint scanline texture for that CRT-via-console feel
  ctx.save();ctx.globalAlpha=0.05;ctx.fillStyle='#000';
  for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1);}
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 9c. XBOX — glowing orb logo silhouette, radial circuit backdrop,
//    glass dashboard menu rows (direct nod to the original Xbox UI)
// ════════════════════════════════════════════════════════
function drawXbox(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#031a0c');g.addColorStop(1,'#000a04');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));
  const cx=w*0.28, cy=h*0.4;

  // radial circuit-line backdrop, like the dashboard background
  ctx.save();ctx.globalAlpha=0.12;ctx.strokeStyle='#3bff5e';ctx.lineWidth=1;
  for(let i=0;i<10;i++){
    const r=Math.min(w,h)*(0.06+i*0.05);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  }
  for(let i=0;i<10;i++){
    const a=(Math.PI/5)*i+t*0.1;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*Math.min(w,h)*0.5,cy+Math.sin(a)*Math.min(w,h)*0.5);ctx.stroke();
  }
  ctx.restore();

  // glowing orb (abstracted Xbox logo sphere — soft green/yellow glow,
  // not a literal logo reproduction)
  const baseR=Math.min(w,h)*0.16;
  const pulse=1+Math.sin(t*1.4)*0.04;
  const og=ctx.createRadialGradient(cx-baseR*0.2,cy-baseR*0.2,0,cx,cy,safeR(baseR*pulse*1.3*p));
  og.addColorStop(0,'rgba(220,255,150,0.9)');og.addColorStop(0.35,'rgba(110,220,90,0.7)');og.addColorStop(0.7,'rgba(40,160,70,0.3)');og.addColorStop(1,'rgba(20,100,50,0)');
  ctx.save();ctx.fillStyle=og;ctx.beginPath();ctx.arc(cx,cy,baseR*pulse*p,0,Math.PI*2);ctx.fill();ctx.restore();

  ctx.save();ctx.globalAlpha=0.6*p;ctx.strokeStyle='#9fffb0';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,baseR*pulse*p,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // small orbiting nodes around the orb, echoing the dashboard menu dots
  const nodeCount=4;
  for(let i=0;i<nodeCount;i++){
    const a=(Math.PI*2/nodeCount)*i+t*0.5;
    const nx=cx+Math.cos(a)*baseR*1.5, ny=cy+Math.sin(a)*baseR*1.5;
    ctx.save();ctx.globalAlpha=0.7*p;ctx.fillStyle='#3bff5e';
    ctx.beginPath();ctx.arc(nx,ny,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // glass dashboard menu rows on the right, like MEMORY / MUSIC / XBOX LIVE / SETTINGS
  const rows=4, rowW=w*0.46, rowH=h*0.052, rowX=w*0.5, rowGapY=h*0.07, rowStartY=h*0.28;
  const activeRow=Math.floor((t*0.5)%rows);
  for(let i=0;i<rows;i++){
    const ry=rowStartY+i*rowGapY;
    const isActive=i===activeRow;
    ctx.save();ctx.globalAlpha=p*(isActive?0.9:0.5);
    const rg=ctx.createLinearGradient(rowX,ry,rowX+rowW,ry);
    if(isActive){rg.addColorStop(0,'#c8e86a');rg.addColorStop(1,'#6fae2f');}
    else{rg.addColorStop(0,'#0f3a1c');rg.addColorStop(1,'#0a2814');}
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.moveTo(rowX,ry);ctx.lineTo(rowX+rowW-12,ry);ctx.lineTo(rowX+rowW,ry+rowH/2);ctx.lineTo(rowX+rowW-12,ry+rowH);ctx.lineTo(rowX,ry+rowH);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=isActive?'#e8ffb0':'#1f5c30';ctx.lineWidth=1.4;ctx.stroke();
    ctx.restore();
  }

  // faint grid texture
  ctx.save();ctx.globalAlpha=0.05;ctx.strokeStyle='#3bff5e';ctx.lineWidth=1;
  for(let x=0;x<w;x+=w/12){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  ctx.restore();

  // floating particle sparks, green
  for(let i=0;i<14;i++){
    const sx=(i*61+t*8)%w, sy=(i*97+t*14)%h;
    const tw=0.3+Math.sin(t*1.5+i)*0.3;
    ctx.save();ctx.globalAlpha=0.25*tw;ctx.fillStyle='#5cff8a';
    ctx.beginPath();ctx.arc(sx,sy,1.4,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 9d. SONG-GUESS — cassette deck with glowing waveform/equalizer,
//    framed like a "name that tune" guess card
// ════════════════════════════════════════════════════════
function drawSongGuess(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a0f2e');g.addColorStop(1,'#0a0616');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#ff2fd6';

  // top "GUESS THE SONG" style frame
  const px=w*0.08,py=h*0.1,pw=w*0.84,ph=h*0.16;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.7*p,notch:Math.min(w,h)*0.04,corners:['tl','tr'],glow:12});
  ctx.save();ctx.globalAlpha=0.85*p;ctx.fillStyle=color;ctx.font=`22px 'VT323',monospace`;ctx.textAlign='center';
  ctx.fillText('▶ NAME THAT TUNE',w/2,py+ph/2+6);
  ctx.restore();

  // animated waveform/equalizer bars, center band
  const barCount=22, bandY=h*0.58, bandW=w*0.74, barX0=w*0.13;
  ctx.save();
  for(let i=0;i<barCount;i++){
    const bh=(Math.abs(Math.sin(t*3.2+i*0.6))*0.6+0.15)*h*0.18*p;
    const bx=barX0+(bandW/barCount)*i;
    const grad=ctx.createLinearGradient(0,bandY-bh,0,bandY+bh);
    grad.addColorStop(0,'#ff2fd6');grad.addColorStop(1,'#2fe0ff');
    ctx.fillStyle=grad;
    ctx.fillRect(bx,bandY-bh,bandW/barCount*0.6,bh*2);
  }
  ctx.restore();

  // spinning cassette reel icon, bottom
  const rcx=w*0.5, rcy=h*0.82, rr=Math.min(w,h)*0.05*p;
  ctx.save();ctx.translate(rcx,rcy);ctx.rotate(t*2.2);
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.globalAlpha=0.7*p;
  ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<3;i++){ctx.save();ctx.rotate((Math.PI*2/3)*i);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-rr);ctx.stroke();ctx.restore();}
  ctx.restore();

  // floating music-note style dots drifting up
  for(let i=0;i<14;i++){
    const seed=i*53.1;
    const life=(t*0.6+seed)%3;
    const sx=(seed*37)%w;
    const sy=h*0.95-(life*h*0.3);
    const fade=Math.max(0,1-life/3);
    ctx.save();ctx.globalAlpha=fade*0.4*p;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx,sy,1.6,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 9e. GAME-GUESS — retro guess-the-game HUD panel, pixel-grid backdrop
// ════════════════════════════════════════════════════════
function drawGameGuess(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a1a2e');g.addColorStop(1,'#040b16');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#2fe0ff';

  // pixel-grid backdrop, faint
  ctx.save();ctx.globalAlpha=0.07;ctx.fillStyle=color;
  const cell=Math.min(w,h)*0.045;
  for(let y=0;y<h;y+=cell){
    for(let x=0;x<w;x+=cell){
      if(((Math.floor(x/cell)+Math.floor(y/cell))%2)===0)ctx.fillRect(x,y,cell,cell);
    }
  }
  ctx.restore();

  // top guess-prompt frame
  const px=w*0.08,py=h*0.1,pw=w*0.84,ph=h*0.15;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.75*p,notch:Math.min(w,h)*0.04,corners:['tr','bl'],accentCorner:'tr',glow:12});
  ctx.save();ctx.globalAlpha=0.85*p;ctx.fillStyle=color;ctx.font=`22px 'VT323',monospace`;ctx.textAlign='center';
  ctx.fillText('🎮 GUESS THE GAME',w/2,py+ph/2+6);
  ctx.restore();

  // blinking "PRESS START" style cursor block, bottom
  if(Math.sin(t*4)>0){
    ctx.save();ctx.globalAlpha=0.8*p;ctx.fillStyle=color;
    ctx.font=`18px 'VT323',monospace`;ctx.textAlign='center';
    ctx.fillText('PRESS START ▮',w/2,h*0.88);
    ctx.restore();
  }

  // corner dials echoing a controller d-pad abstractly
  drawHUDDial(ctx,t,px+pw+10,py+ph*0.5,14*p,color,8);
  drawHUDDial(ctx,t*-0.7,px-10,py+ph*0.5,14*p,color,8);

  // floating pixel sparkles
  for(let i=0;i<16;i++){
    const sx=(i*61+t*16)%w, sy=(i*97)%h;
    const tw=0.3+Math.sin(t*2+i)*0.3;
    ctx.save();ctx.globalAlpha=0.35*tw*p;ctx.fillStyle=color;
    ctx.fillRect(sx,sy,3,3);
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 9f. REMEMBER-WHEN — warm nostalgic photo-frame style, soft glow
// ════════════════════════════════════════════════════════
function drawRememberWhen(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#3a2418');g.addColorStop(1,'#1a0f0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));

  // soft warm vignette glow, center
  const wg=ctx.createRadialGradient(w/2,h*0.42,0,w/2,h*0.42,safeR(Math.max(w,h)*0.5));
  wg.addColorStop(0,'rgba(255,180,110,0.22)');wg.addColorStop(1,'rgba(255,180,110,0)');
  ctx.save();ctx.fillStyle=wg;ctx.fillRect(0,0,w,h);ctx.restore();

  // faint film-strip holes along edges, evoking old home movies
  ctx.save();ctx.globalAlpha=0.18*p;ctx.fillStyle='#f4d9b8';
  const holeR=Math.min(w,h)*0.012, gap=h*0.05;
  for(let y=gap/2;y<h;y+=gap){
    ctx.beginPath();ctx.arc(w*0.04,y,holeR,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*0.96,y,holeR,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // drifting warm dust particles
  for(let i=0;i<20;i++){
    const sx=(i*53+t*6)%w, sy=(i*97+t*4)%h;
    const tw=0.3+Math.sin(t*1.2+i)*0.3;
    ctx.save();ctx.globalAlpha=0.25*tw*p;ctx.fillStyle='#ffd9a8';
    ctx.beginPath();ctx.arc(sx,sy,1.4,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // gentle scalloped frame border
  ctx.save();ctx.globalAlpha=0.3*p;ctx.strokeStyle='#ffb86c';ctx.lineWidth=2;
  ctx.strokeRect(w*0.07,h*0.12,w*0.86,h*0.68);
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.07;ctx.fillStyle='#000';
  for(let i=0;i<200;i++){ctx.fillRect(Math.random()*w,Math.random()*h,1.2,1.2);}
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 9g. WHERE-WERE-YOU — broadcast/news-ticker style HUD, breaking-news feel
// ════════════════════════════════════════════════════════
function drawWhereWereYou(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#160a0a');g.addColorStop(1,'#050202');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#ff3b4a';

  // top "BREAKING" style bar
  const barY=h*0.12, barW=w*0.7, barX=w*0.5-barW/2, barH=h*0.05;
  ctx.save();ctx.globalAlpha=0.85*p;ctx.fillStyle=color;
  ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle='#fff';ctx.font=`18px 'VT323',monospace`;ctx.textAlign='center';
  ctx.fillText('FLASHBACK BULLETIN',w/2,barY+barH/2+6);
  ctx.restore();

  // bottom scrolling ticker bar
  const tickerY=h*0.88, tickerH=h*0.045;
  ctx.save();ctx.globalAlpha=0.8*p;ctx.fillStyle='rgba(255,59,74,0.15)';
  ctx.fillRect(0,tickerY,w,tickerH);
  ctx.strokeStyle=color;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(0,tickerY);ctx.lineTo(w,tickerY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,tickerY+tickerH);ctx.lineTo(w,tickerY+tickerH);ctx.stroke();
  ctx.restore();

  const tickerX=w-((t*120)%(w+400));
  ctx.save();ctx.globalAlpha=0.7*p;ctx.fillStyle='#ffb0b6';ctx.font=`16px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('WHERE WERE YOU WHEN THIS HAPPENED · TAG A FRIEND · TELL US BELOW ·',tickerX,tickerY+tickerH*0.68);
  ctx.restore();

  // pulsing alert dot, like a live broadcast indicator
  const pulse=0.5+Math.sin(t*4)*0.5;
  ctx.save();ctx.globalAlpha=(0.5+0.5*pulse)*p;ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(w*0.12,h*0.12+barH+18,5,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.save();ctx.globalAlpha=0.6*p;ctx.fillStyle='#fff';ctx.font=`13px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('LIVE',w*0.12+12,h*0.12+barH+22);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 9h. NICK-CN-TV — channel-block style, orange/green TV nostalgia
//    (evokes classic kids' TV channel branding blocks generically,
//    no logos or copyrighted marks reproduced)
// ════════════════════════════════════════════════════════
function drawNickCN(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#ff7a1a');g.addColorStop(0.5,'#e8550f');g.addColorStop(1,'#7a2a06');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));

  // splat-style blob backdrop shape, evoking playful kids-TV branding
  // generically (organic blob, not any specific logo)
  ctx.save();ctx.globalAlpha=0.18*p;ctx.fillStyle='#fff';
  ctx.beginPath();
  const blobCx=w*0.5, blobCy=h*0.42, blobR=Math.min(w,h)*0.42;
  for(let i=0;i<10;i++){
    const a=(Math.PI*2/10)*i;
    const r=blobR*(0.85+0.15*Math.sin(t*0.5+i*1.3));
    const x=blobCx+Math.cos(a)*r, y=blobCy+Math.sin(a)*r;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();
  ctx.restore();

  // TV scanline texture, ties it back to the "watching TV" feel
  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#000';
  for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1);}
  ctx.restore();

  // bouncy channel-block squares drifting at the edges, like classic
  // kids-TV bumpers between shows
  const colors=['#3bb24a','#ffd23b','#2fc6ff','#ff3b6e'];
  colors.forEach((col,i)=>{
    const bx=w*(0.12+i*0.25)+Math.sin(t*0.8+i)*10;
    const by=h*0.86+Math.cos(t*1.1+i)*6;
    ctx.save();ctx.globalAlpha=0.8*p;ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect?ctx.roundRect(bx-14,by-14,28,28,8):ctx.rect(bx-14,by-14,28,28);ctx.fill();
    ctx.restore();
  });

  // small "ON AIR" style readout
  ctx.save();ctx.globalAlpha=0.55*p;ctx.fillStyle='#fff';ctx.font=`14px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('AFTER-SCHOOL BLOCK',w*0.06,h*0.1);
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 9i. ENGAGEMENT — poll/chat-style HUD prompting a comment
// ════════════════════════════════════════════════════════
function drawEngagement(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a1430');g.addColorStop(1,'#0a0718');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#c084fc';

  // soft glow backdrop
  const gx=w*0.5, gy=h*0.4;
  const ag=ctx.createRadialGradient(gx,gy,0,gx,gy,safeR(Math.max(w,h)*0.5));
  ag.addColorStop(0,'rgba(192,132,252,0.18)');ag.addColorStop(1,'rgba(192,132,252,0)');
  ctx.save();ctx.fillStyle=ag;ctx.fillRect(0,0,w,h);ctx.restore();

  // top "POLL" style frame
  const px=w*0.1,py=h*0.1,pw=w*0.8,ph=h*0.14;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.7*p,notch:Math.min(w,h)*0.04,corners:['tl','tr'],glow:10});
  ctx.save();ctx.globalAlpha=0.85*p;ctx.fillStyle=color;ctx.font=`20px 'VT323',monospace`;ctx.textAlign='center';
  ctx.fillText('💬 TELL US BELOW',w/2,py+ph/2+6);
  ctx.restore();

  // chat-bubble style decorative rows, bottom area, like comments coming in
  for(let i=0;i<3;i++){
    const bx=w*(0.12+ (i%2)*0.4), by=h*(0.66+i*0.08);
    const bw2=w*0.4, bh2=h*0.045;
    ctx.save();ctx.globalAlpha=p*(0.5-i*0.1);
    ctx.fillStyle='rgba(192,132,252,0.18)';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(bx,by,bw2,bh2,10):ctx.rect(bx,by,bw2,bh2);ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }

  // small floating heart/like style dots drifting up
  for(let i=0;i<10;i++){
    const seed=i*53.1;
    const life=(t*0.5+seed)%3;
    const sx=w*(0.2+((seed*37)%w)/w*0.6);
    const sy=h*0.95-(life*h*0.35);
    const fade=Math.max(0,1-life/3);
    ctx.save();ctx.globalAlpha=fade*0.5*p;ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 9j. CHART-FACTS — bar chart / stat readout HUD style
// ════════════════════════════════════════════════════════
function drawChartFacts(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a1420');g.addColorStop(1,'#040a12');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const color='#4be8ff';

  // faint grid backdrop
  ctx.save();ctx.globalAlpha=0.06;ctx.strokeStyle=color;ctx.lineWidth=1;
  const gridStep=Math.min(w,h)*0.08;
  for(let x=0;x<w;x+=gridStep){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=gridStep){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.restore();

  // top "CHART" frame
  const px=w*0.08,py=h*0.08,pw=w*0.84,ph=h*0.12;
  drawHUDFrame(ctx,px,py,pw,ph,{color,alpha:0.7*p,notch:Math.min(w,h)*0.035,corners:['tr','bl'],glow:10});
  ctx.save();ctx.globalAlpha=0.85*p;ctx.fillStyle=color;ctx.font=`18px 'VT323',monospace`;ctx.textAlign='center';
  ctx.fillText('📊 ARCHIVE STATS',w/2,py+ph/2+6);
  ctx.restore();

  // animated bar chart, bottom band — bars rise on scene start, then idle-pulse
  const barCount=8, bandY=h*0.78, bandW=w*0.7, barX0=w*0.15;
  for(let i=0;i<barCount;i++){
    const targetH=(0.3+((i*37)%70)/100)*h*0.34;
    const bh=targetH*p*(0.9+0.1*Math.sin(t*2+i));
    const bx=barX0+(bandW/barCount)*i;
    const grad=ctx.createLinearGradient(0,bandY-bh,0,bandY);
    grad.addColorStop(0,'#4be8ff');grad.addColorStop(1,'#1a5c70');
    ctx.save();ctx.globalAlpha=0.85;
    ctx.fillStyle=grad;
    ctx.fillRect(bx,bandY-bh,bandW/barCount*0.6,bh);
    ctx.restore();
  }
  // baseline
  ctx.save();ctx.globalAlpha=0.5*p;ctx.strokeStyle=color;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(barX0,bandY);ctx.lineTo(barX0+bandW,bandY);ctx.stroke();
  ctx.restore();

  // small corner dial
  drawHUDDial(ctx,t,px+pw+10,py+ph*0.5,14*p,color,10);
}

// ════════════════════════════════════════════════════════
// 10. MESSENGER — chat window aesthetic, early internet
// ════════════════════════════════════════════════════════
function drawMessenger(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#dce9f7');g.addColorStop(1,'#aecbe8');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/0.9));
  const wx=w*0.08,wy=h*0.14,ww=w*0.84,wh=h*0.62;
  ctx.save();ctx.globalAlpha=p;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(wx,wy,ww,wh);
  const tg=ctx.createLinearGradient(wx,wy,wx,wy+24);
  tg.addColorStop(0,'#5cc4ff');tg.addColorStop(1,'#2a7fd1');
  ctx.fillStyle=tg;ctx.fillRect(wx,wy,ww,24);
  ctx.fillStyle='#fff';ctx.font=`14px 'VT323',monospace`;ctx.textAlign='left';
  ctx.fillText('buddy_chat.exe',wx+10,wy+16);
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=2;ctx.strokeRect(wx,wy,ww,wh);
  ctx.restore();

  for(let i=0;i<3;i++){
    const bx=wx+20+((i%2)*ww*0.3), by=wy+50+i*38;
    const bw2=ww*0.4, bh2=24;
    ctx.save();ctx.globalAlpha=p*0.9;
    ctx.fillStyle=i%2===0?'#cfe8ff':'#e8f3d8';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(bx,by,bw2,bh2,8):ctx.rect(bx,by,bw2,bh2);ctx.fill();
    ctx.restore();
  }

  const inY=wy+wh-26;
  ctx.save();ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1.5;
  ctx.strokeRect(wx+10,inY,ww-20,20);
  if(Math.sin(t*6)>0){
    ctx.fillStyle='#333';ctx.fillRect(wx+16,inY+4,1.5,12);
  }
  ctx.restore();

  for(let i=0;i<8;i++){
    const dx=(i*61+t*16)%w, dy=(i*97)%h;
    ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(dx,dy,3,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 11. DISPOSABLE — flash pop, desaturated grain, timestamp
// ════════════════════════════════════════════════════════
function drawDisposable(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#caa97c');g.addColorStop(1,'#7d6448');

  ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#fff3dc';ctx.fillRect(0,0,w,h);ctx.restore();

  ctx.save();ctx.globalAlpha=0.1;ctx.fillStyle='#000';
  for(let i=0;i<300;i++){ctx.fillRect(Math.random()*w,Math.random()*h,1.3,1.3);}
  ctx.restore();

  const vg=ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.2,w/2,h/2,safeR(Math.max(w,h)*0.7));

  ctx.save();ctx.globalAlpha=0.85;ctx.fillStyle='#ff7b1a';
  ctx.font=`16px 'VT323',monospace`;ctx.textAlign='right';
  ctx.fillText("'99  8 14",w*0.93,h*0.91);

}

function pickWeightedStyleIdx(){
  const total=STYLES.reduce((sum,s)=>sum+(s.weight||1),0);
  let r=Math.random()*total;
  for(let i=0;i<STYLES.length;i++){
    r-=(STYLES[i].weight||1);
    if(r<=0)return i;
  }
  return STYLES.length-1;
}

// ── AUDIO ─────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
const master=AC.createGain();master.gain.value=0.85;master.connect(AC.destination);
let _recDest=null,_audioOn=false;
function unlockAC(){if(_audioOn)return;AC.resume().then(()=>{_audioOn=true;startPad();});}

let _pads=[];
function startPad(){
  stopPad();
  try{
    [293.66,349.23,392.00,440.00].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain(),lfo=AC.createOscillator(),lg2=AC.createGain();
      o.type='sine';o.frequency.value=f;lfo.type='sine';lfo.frequency.value=0.07+i*0.02;lg2.gain.value=1.2;
      lfo.connect(lg2);lg2.connect(o.frequency);
      const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.026-i*0.003,t+2.2);
      o.connect(g);g.connect(master);o.start(t);lfo.start(t);_pads.push({o,g,lfo});
    });
  }catch(e){}
}
function stopPad(){
  _pads.forEach(p=>{try{p.g.gain.setTargetAtTime(0,AC.currentTime,0.35);setTimeout(()=>{try{p.o.stop();p.lfo.stop();}catch(e){}},900);}catch(e){}});_pads=[];
}
function sfxChime(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(587.33,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(783.99,AC.currentTime+0.12);
    g.gain.setValueAtTime(0.055,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.75);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.85);
  }catch(e){}
}
function sfxSoft(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(440,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(349.23,AC.currentTime+0.18);
    g.gain.setValueAtTime(0.04,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.6);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.65);
  }catch(e){}
}
function sfxTick(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';o.frequency.setValueAtTime(1200,AC.currentTime);
    g.gain.setValueAtTime(0.05,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.12);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.15);
  }catch(e){}
}
function sfxWhoosh(){
  if(!_audioOn)return;

    o.type='sine';o.frequency.setValueAtTime(900,AC.currentTime);

}

// ── SCENE ─────────────────────────────────────────────────
// Separate shuffled pool per category, so each scene's visuals only ever
// surface facts that match its own theme.
let _pools={},_pidxs={};
function nextC(cat){
  if(!_pools[cat]||_pidxs[cat]>=_pools[cat].length){
    _pools[cat]=CONTENT.filter(c=>c.cat===cat).sort(()=>Math.random()-0.5);
    _pidxs[cat]=0;
  }
  return _pools[cat][_pidxs[cat]++];
}

let _timers=[];
function clearT(){_timers.forEach(clearTimeout);_timers=[];}

function showScene(){
  clearT();
  unlockAC();

  _styleIdx=pickWeightedStyleIdx();
  const style=STYLES[_styleIdx];
  document.body.className=style.bodyClass;
  window._lastCategory=style.category;

  _sceneStart=_t;
  style.onScene(W,H);

  const C=nextC(style.category);

  const wrap=document.getElementById('quote-wrap');
  wrap.innerHTML='';
  const els=[];
  C.lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='qline';
    d.innerHTML=wrapToLines(l,3).join('<br>');
    wrap.appendChild(d);els.push(d);
  });
  if(C.sub){
    const d=document.createElement('div');
    d.className='qline small';
    d.innerHTML=wrapToLines(C.sub,3).join('<br>');
    wrap.appendChild(d);els.push(d);
  }
  if(C.ref){
    const d=document.createElement('div');
    d.className='qline ref';
    d.textContent=C.ref;wrap.appendChild(d);els.push(d);
  }

  const label=document.getElementById('label');
  const bottom=document.getElementById('bottom');
  const ubar=document.getElementById('underbar');
  const scrim=document.getElementById('text-scrim');
  label.style.opacity='0';label.style.transform='translateY(-16px)';
  bottom.style.opacity='0';bottom.style.transform='translateY(12px)';
  ubar.style.width='0';
  ubar.style.display=style.showUnderline?'':'none';

  const isLight=LIGHT_THEMES.includes(style.id);
  scrim.classList.toggle('light',isLight);
  scrim.classList.toggle('dark',!isLight);
  scrim.style.opacity='0';

  sfxChime();

  _timers.push(setTimeout(()=>{
    label.style.opacity='1';label.style.transform='translateY(0)';
  },220));
  _timers.push(setTimeout(()=>{
    scrim.style.opacity='1';
  },340));

  let delay=420;
  els.forEach((el)=>{
    el.classList.remove('in');
    _timers.push(setTimeout(()=>{
      el.classList.add('in');
      if(el.classList.contains('ref'))sfxTick();
      else if(el.classList.contains('small'))sfxSoft();
      else sfxChime();
    },delay));
    delay+=(el.classList.contains('small')||el.classList.contains('ref'))?560:420;
  });

  if(style.showUnderline){
    _timers.push(setTimeout(()=>{ubar.style.width=Math.min(W*0.55,220)+'px';},delay-100));
  }

  _timers.push(setTimeout(()=>{
    bottom.style.opacity='1';bottom.style.transform='translateY(0)';
    sfxWhoosh();
  },delay+280));
}

// ── RECORDING ─────────────────────────────────────────────
let _compC=null,_compCtx=null;
window._recActive=false;
window._recordingDone=false;
window._recordingBlob=null;
let _recChunks=[],_recorder=null;

function drawOutlinedText(ctx,text,x,y,fillColor,strokeColor,strokeWidth){
  ctx.lineJoin='round';
  ctx.miterLimit=2;
  ctx.lineWidth=strokeWidth;
  ctx.strokeStyle=strokeColor;
  ctx.strokeText(text,x,y);
  ctx.fillStyle=fillColor;
  ctx.fillText(text,x,y);
}

function _drawComposite(){
  if(!_compCtx)return;
  const ctx=_compCtx,cW=_compC.width,cH=_compC.height;
  ctx.clearRect(0,0,cW,cH);

  try{ctx.drawImage(bgC,0,0,cW,cH);}catch(e){}

  const vg=ctx.createRadialGradient(cW/2,cH*0.48,cH*0.1,cW/2,cH*0.48,safeR(cH*0.78));
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,5,15,0.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,cW,cH);

  const currentId=STYLES[_styleIdx].id;
  const textCfg=getStyleText(currentId);
  const isLightTheme=LIGHT_THEMES.includes(currentId);

  const scrimEl=document.getElementById('text-scrim');
  const scrimOp=parseFloat(window.getComputedStyle(scrimEl).opacity)||0;
  if(scrimOp>0.01){
    const sr=scrimEl.getBoundingClientRect();
    const sgrad=ctx.createRadialGradient(sr.left+sr.width/2,sr.top+sr.height/2,0,sr.left+sr.width/2,sr.top+sr.height/2,safeR(Math.max(sr.width,sr.height)*0.55));
    if(isLightTheme){
      sgrad.addColorStop(0,'rgba(255,255,255,0.55)');sgrad.addColorStop(0.5,'rgba(255,255,255,0.3)');sgrad.addColorStop(1,'rgba(255,255,255,0)');
    }else{
      sgrad.addColorStop(0,'rgba(0,0,0,0.42)');sgrad.addColorStop(0.5,'rgba(0,0,0,0.22)');sgrad.addColorStop(1,'rgba(0,0,0,0)');
    }
    ctx.save();ctx.globalAlpha=scrimOp;ctx.fillStyle=sgrad;ctx.fillRect(sr.left,sr.top,sr.width,sr.height);ctx.restore();
  }

  const labelEl=document.getElementById('label');
  const labelOp=parseFloat(window.getComputedStyle(labelEl).opacity)||0;
  if(labelOp>0.01){
    const ebEl=document.getElementById('label-eyebrow');
    const ebR=ebEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=labelOp;
    ctx.font=`400 ${Math.max(11,ebR.height)}px 'VT323',monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    drawOutlinedText(ctx,ebEl.textContent,cW/2,ebR.top+ebR.height/2,textCfg.refFill,textCfg.refStroke,Math.max(2,ebR.height*0.09));
    ctx.restore();

    const ruleEl=document.getElementById('label-rule');
    const rr=ruleEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=labelOp*0.55;ctx.strokeStyle=textCfg.refFill;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cW/2-23,rr.top+rr.height/2);ctx.lineTo(cW/2+23,rr.top+rr.height/2);ctx.stroke();
    ctx.restore();
  }

  document.querySelectorAll('.qline').forEach(el=>{
    const op=parseFloat(window.getComputedStyle(el).opacity)||0;
    if(op<0.01)return;
    const r=el.getBoundingClientRect();
    if(r.width<1||r.height<1)return;
    const cs=window.getComputedStyle(el);
    const fs=parseFloat(cs.fontSize)||32;
    ctx.save();ctx.globalAlpha=op;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    if(el.classList.contains('ref')){
      ctx.font=`400 ${fs}px 'VT323',monospace`;
      drawOutlinedText(ctx,el.textContent,cx,cy,textCfg.refFill,textCfg.refStroke,Math.max(1.5,fs*0.07));
    }else if(el.classList.contains('small')){
      ctx.font=`700 ${fs}px 'Rubik',sans-serif`;
      const lines=el.innerHTML.split('<br>');
      const lh=r.height/lines.length;
      lines.forEach((line,li)=>{
        const ly=r.top+lh*(li+0.5);
        drawOutlinedText(ctx,line,cx,ly,textCfg.smallFill,textCfg.smallStroke,Math.max(1.5,fs*0.065));
      });
    }else{
      ctx.font=`400 ${fs}px 'Anton',sans-serif`;
      ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=14;
      const lines=el.innerHTML.split('<br>');
      const lh=r.height/lines.length;
      lines.forEach((line,li)=>{
        const ly=r.top+lh*(li+0.5);
        drawOutlinedText(ctx,line,cx,ly,textCfg.headFill,textCfg.headStroke,Math.max(2,fs*0.09));
      });
    }
    ctx.restore();
  });

  const ub=document.getElementById('underbar');
  if(ub.style.display!=='none'){
    const ubW=parseFloat(ub.style.width)||0;
    if(ubW>2){
      const ubR=ub.getBoundingClientRect();
      const lg=ctx.createLinearGradient(cW/2-ubW/2,0,cW/2+ubW/2,0);
      lg.addColorStop(0,'rgba(244,211,94,0)');lg.addColorStop(0.5,'rgba(244,211,94,0.9)');lg.addColorStop(1,'rgba(244,211,94,0)');
      ctx.save();ctx.fillStyle=lg;
      ctx.fillRect(cW/2-ubW/2,ubR.top,ubW,2);
      ctx.restore();
    }
  }

  const botEl=document.getElementById('bottom');
  const botOp=parseFloat(window.getComputedStyle(botEl).opacity)||0;
  if(botOp>0.01){
    const botR=botEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=botOp*0.7;
    ctx.font=`400 ${Math.max(10,cW*0.023)}px 'VT323',monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const isLight=isLightTheme;
    drawOutlinedText(ctx,'TAG SOMEONE WHO REMEMBERS',cW/2,botR.top+botR.height*0.4,isLight?'#241407':'#ffffff','rgba(5,11,22,0.7)',Math.max(1.5,cW*0.023));
    ctx.restore();
  }
}

// the click that picks a new scene runs synchronously, but the background
// canvas only repaints on the next animation frame — so if we start
// recording immediately, the very first captured frame can still show the
// previous scene's last-drawn pixels. Waiting two real paint frames first
// guarantees the canvas has caught up before anything is captured.
window.startRecordingFreshScene=function(fps){
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.startRecording(fps);
    });
  });
};
window.startRecording=function(fps){
  fps=fps||30;
  try{
    AC.resume().catch(()=>{});
    _compC=document.createElement('canvas');
    _compC.width=W;_compC.height=H;
    _compCtx=_compC.getContext('2d');
    window._recActive=true;
    window._recordingDone=false;
    _recChunks=[];
    _drawComposite(); // prime the canvas now, so captureStream's first frame is already correct
    _recDest=AC.createMediaStreamDestination();
    master.connect(_recDest);
    const vs=_compC.captureStream(fps);
    const combined=new MediaStream([...vs.getVideoTracks(),..._recDest.stream.getAudioTracks()]);
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _recorder=new MediaRecorder(combined,{mimeType:mime,videoBitsPerSecond:8000000,audioBitsPerSecond:192000});
    _recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)_recChunks.push(e.data);};
    _recorder.onstop=()=>{
      window._recActive=false;
      try{master.disconnect(_recDest);}catch(e){}
      window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
      window._recordingDone=true;
    };
    _recorder.start(200);
    console.log('Recording started');
  }catch(e){console.error('startRecording error:',e);}
};
window.stopRecording=function(){try{if(_recorder&&_recorder.state!=='inactive')_recorder.stop();}catch(e){}};
window.forceFinalize=function(){
  window._recActive=false;
  if(_recChunks.length>0&&!window._recordingDone){
    window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
    window._recordingDone=true;
  }
};
window.getRecordingBase64=function(){
  return new Promise((resolve,reject)=>{
    const chk=()=>{
      if(!window._recordingBlob){setTimeout(chk,100);return;}
      const r=new FileReader();
      r.onloadend=()=>resolve(r.result.split(',')[1]);
      r.onerror=reject;
      r.readAsDataURL(window._recordingBlob);
    };chk();
  });
};

// ── LOOP ──────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  _t+=0.016;
  const st=Math.max(0,_t-_sceneStart);
  STYLES[_styleIdx].draw(bgCtx,_t,W,H,st);
  if(window._recActive)_drawComposite();
})();

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  bgC.width=W;bgC.height=H;
  _rainCols=[];
});
document.body.addEventListener('click',showScene);
document.body.addEventListener('touchend',e=>{e.preventDefault();showScene();},{passive:false});
showScene();
})();
</script>
