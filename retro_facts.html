<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Japan Facts Reel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@600;900&family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--headline-font:'Zen Old Mincho',serif;--sub-font:'Shippori Mincho',serif;--label-font:'Noto Sans JP',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#04080f;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 48%,transparent 30%,rgba(0,5,15,0.5) 100%);}

#ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 8vw;gap:3.6vw;
}

/* Top label */
#label{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:7vw 6vw 2vw;z-index:11;
  opacity:0;transform:translateY(-16px);
  transition:opacity .5s ease,transform .5s ease;
}
#label-eyebrow{
  font-family:var(--label-font);font-weight:600;
  font-size:clamp(0.5rem,2.5vw,0.7rem);
  letter-spacing:0.45em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.5px rgba(4,10,20,0.6);
}
#label-rule{width:46px;height:1px;background:#f4d35e;opacity:0.55;margin-top:1.4vw;}

/* Quote lines */
#quote-wrap{display:flex;flex-direction:column;align-items:center;gap:1.8vw;width:100%;}
.qline{
  font-family:var(--headline-font);font-weight:900;
  font-size:clamp(1.7rem,7.2vw,2.5rem);
  color:#fff;text-align:center;line-height:1.16;
  opacity:0;letter-spacing:0.01em;
  -webkit-text-stroke:0.045em rgba(6,6,10,0.85);
  paint-order:stroke fill;
  text-shadow:0 3px 16px rgba(0,0,0,0.4);
  max-width:100%;min-width:0;white-space:normal;word-break:keep-all;
}
.qline.small{
  font-family:var(--sub-font);font-weight:700;
  font-size:clamp(1rem,4.6vw,1.45rem);
  color:rgba(255,255,255,0.93);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  text-shadow:0 2px 8px rgba(0,0,0,0.35);
  line-height:1.32;
}
.qline.ref{
  font-family:var(--label-font);font-weight:600;
  font-size:clamp(0.58rem,2.8vw,0.82rem);
  letter-spacing:0.3em;text-transform:uppercase;
  color:#f4d35e;
  -webkit-text-stroke:0.04em rgba(6,6,10,0.75);
  paint-order:stroke fill;
  margin-top:0.8vw;
}

/* Divider under headline */
#underbar{height:2px;width:0;max-width:60vw;background:linear-gradient(90deg,transparent,#f4d35e,transparent);transition:width .6s cubic-bezier(.22,1,.36,1);margin-top:0.4vw;}

/* Bottom CTA */
#bottom{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:3vw 6vw 8vw;z-index:11;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
#cta{
  font-family:var(--label-font);font-weight:600;
  font-size:clamp(0.5rem,2.4vw,0.72rem);
  letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  -webkit-text-stroke:0.03em rgba(6,6,10,0.6);
}

/* ───────── PER-THEME REVEAL ANIMATIONS ───────── */

/* flag — rises and settles */
.s-flag .qline{transform:translateY(22px) scale(0.96);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-flag .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* samurai — calm, dignified rise */
.s-samurai .qline{transform:translateY(26px) scale(0.97);transition:opacity .5s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.s-samurai .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* ninja — quick stealth slide */
.s-ninja .qline{transform:translateX(46px);transition:opacity .3s ease,transform .4s cubic-bezier(.34,1.56,.64,1);}
.s-ninja .qline.in{opacity:1;transform:translateX(0);}

/* shinobi — emerges from the fog */
.s-shinobi .qline{transform:translateY(16px) scale(0.96);transition:opacity .55s ease,transform .65s ease;}
.s-shinobi .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* kanji ink — ink-wash fade up */
.s-kanji-ink .qline{transform:scale(0.85);transition:opacity .6s ease,transform .75s cubic-bezier(.22,1,.36,1);}
.s-kanji-ink .qline.in{opacity:1;transform:scale(1);}

/* kanji rain — snappy digital materialize */
.s-kanji-rain .qline{transform:translateY(-10px) scale(1.05);transition:opacity .22s ease,transform .32s ease;}
.s-kanji-rain .qline.in{opacity:1;transform:translateY(0) scale(1);}

/* sakura — drifts down like a falling petal */
.s-sakura .qline{transform:translateY(-30px);transition:opacity .6s ease,transform .8s cubic-bezier(.16,1,.3,1);}
.s-sakura .qline.in{opacity:1;transform:translateY(0);}

/* torii — stately rise */
.s-torii .qline{transform:translateY(38px);transition:opacity .6s ease,transform .75s cubic-bezier(.16,1,.3,1);}
.s-torii .qline.in{opacity:1;transform:translateY(0);}

/* fuji — emerges through mist */
.s-fuji .qline{transform:scale(0.9) translateY(14px);transition:opacity .55s ease,transform .7s ease;}
.s-fuji .qline.in{opacity:1;transform:scale(1) translateY(0);}

/* wave — crest and settle */
.s-wave .qline{transform:translateY(50px) rotate(-2deg);transition:opacity .5s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.s-wave .qline.in{opacity:1;transform:translateY(0) rotate(0deg);}

/* origami — unfolds open */
.s-origami .qline{transform:scaleX(0);transform-origin:left center;transition:opacity .4s ease,transform .55s cubic-bezier(.34,1.56,.64,1);}
.s-origami .qline.in{opacity:1;transform:scaleX(1);}

/* universal settle flash — a brief brightness pop layered on every theme's own transform */
@keyframes qSettle{0%{filter:brightness(1.7);}100%{filter:brightness(1);}}
.qline.in{animation:qSettle .5s ease-out;}

/* ───────── PER-THEME TEXT COLOUR (light backgrounds need dark ink) ───────── */
.s-flag .qline{color:#241407;-webkit-text-stroke:0.05em rgba(255,255,255,0.9);text-shadow:none;}
.s-flag .qline.small{color:#3a2210;-webkit-text-stroke:0.03em rgba(255,255,255,0.85);text-shadow:none;}
.s-flag .qline.ref{color:#BC002D;-webkit-text-stroke:0.035em rgba(255,255,255,0.85);}

.s-sakura .qline{color:#5b2545;-webkit-text-stroke:0.045em rgba(255,255,255,0.9);text-shadow:none;}
.s-sakura .qline.small{color:#7a3a5c;-webkit-text-stroke:0.03em rgba(255,255,255,0.85);text-shadow:none;}
.s-sakura .qline.ref{color:#c2487a;-webkit-text-stroke:0.035em rgba(255,255,255,0.85);}

.s-origami .qline{color:#7a1620;-webkit-text-stroke:0.045em rgba(243,230,210,0.92);text-shadow:none;}
.s-origami .qline.small{color:#5c3a1a;-webkit-text-stroke:0.03em rgba(243,230,210,0.88);text-shadow:none;}
.s-origami .qline.ref{color:#b3122e;-webkit-text-stroke:0.035em rgba(243,230,210,0.88);}

.s-samurai .qline.ref{color:#e0552f;}
.s-ninja .qline.ref{color:#9fb3d9;}
.s-shinobi .qline.ref{color:#d9495a;}
.s-kanji-ink .qline.ref{color:#9fb3d9;}
.s-kanji-rain .qline.ref{color:#ff3b4a;}
.s-torii .qline.ref{color:#ff7b54;}
.s-fuji .qline.ref{color:#ffd9a0;}
.s-wave .qline.ref{color:#bfe8f5;}

/* ───────── LEGIBILITY SCRIM — guarantees contrast behind text on any scene ───────── */
#text-scrim{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:94vw;max-width:680px;height:50vh;
  border-radius:32px;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  filter:blur(1px);
  z-index:-1;
}
#text-scrim.dark{background:radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.22) 50%, rgba(0,0,0,0) 78%);}
#text-scrim.light{background:radial-gradient(ellipse at center, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 78%);}
</style>

// ── shared point-star helper (5-point stars, 4-point shuriken, etc.) ──
function star(ctx,cx,cy,outerR,points,innerRatio){
  points=points||5; innerRatio=innerRatio||0.382;
  const innerR=outerR*innerRatio;
  ctx.beginPath();
  for(let k=0;k<points*2;k++){
    const ang=(Math.PI/points)*k - Math.PI/2;
    const rad=(k%2===0)?outerR:innerR;
    const x=cx+Math.cos(ang)*rad,y=cy+Math.sin(ang)*rad;
    if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();
}

// ════════════════════════════════════════════════════════
// 1. FLAG — waving Hinomaru (built the same way as the original
//    American-flag scene: an oversampled buffer sampled with a
//    per-column sine offset to fake waving fabric)
// ════════════════════════════════════════════════════════
const HINO_SCALE=3;
let _hinoBuf=null,_hinoBufW=0,_hinoBufH=0;
function buildHinomaruBuffer(w,h){
  const bw=w*HINO_SCALE, bh=h*HINO_SCALE;
  const cv=document.createElement('canvas');cv.width=bw;cv.height=bh;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,bw,bh);
  // official Hinomaru proportions: disk diameter = 3/5 of the flag's height, centered
  const cx=bw/2, cy=bh/2, r=bh*0.3;
  ctx.fillStyle='#BC002D';
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.globalAlpha=0.035;ctx.fillStyle='#000000';
  for(let i=0;i<400;i++){ctx.fillRect(Math.random()*bw,Math.random()*bh,1,1);}
  ctx.restore();
  return cv;
}
function getHinoBuf(w,h){
  if(!_hinoBuf||_hinoBufW!==w||_hinoBufH!==h){_hinoBuf=buildHinomaruBuffer(w,h);_hinoBufW=w;_hinoBufH=h;}
  return _hinoBuf;
}
function drawFlag(ctx,t,w,h,st){
  ctx.fillStyle='#03060c';ctx.fillRect(0,0,w,h);
  const buf=getHinoBuf(w,h);
  const bufH=buf.height;
  const revealH=Math.min(h,easeOutCubic(Math.min(1,st/1.0))*h*1.05);

  ctx.save();
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.beginPath();ctx.rect(0,0,w,revealH);ctx.clip();

  const amp=h*0.012, freq=0.018, speed=1.1, step=3;
  for(let x=0;x<w;x+=step){
    const dy=Math.sin(x*freq+t*speed)*amp;
    ctx.drawImage(buf,x*HINO_SCALE,0,step*HINO_SCALE,bufH,x,dy,step,h);
  }
  ctx.restore();

  if(revealH<h-2){
    const g=ctx.createLinearGradient(0,revealH-18,0,revealH+18);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(0.5,'rgba(255,255,255,0.55)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();ctx.globalAlpha=0.8;ctx.fillStyle=g;ctx.fillRect(0,revealH-18,w,36);ctx.restore();
  }

  const sweepX=((t*0.12)%2)-0.5;
  const lg=ctx.createLinearGradient(w*sweepX,0,w*sweepX+w*0.5,h);
  lg.addColorStop(0,'rgba(255,255,255,0)');lg.addColorStop(0.5,'rgba(255,255,255,0.06)');lg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=lg;ctx.fillRect(0,0,w,revealH);ctx.restore();
}

// ════════════════════════════════════════════════════════
// 2. SAMURAI — kabuto helmet with crescent crest
// ════════════════════════════════════════════════════════
function drawSamurai(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#1a0a0a');g.addColorStop(1,'#050203');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // faint ensō brush-circle behind, a calm Zen counterpoint
  ctx.save();ctx.globalAlpha=0.10;ctx.strokeStyle='#b3122e';ctx.lineWidth=w*0.016;
  ctx.beginPath();ctx.arc(w*0.5,h*0.46,Math.min(w,h)*0.36,0.15,Math.PI*1.75);ctx.stroke();
  ctx.restore();

  const p=easeOutCubic(Math.min(1,st/1.0));
  const cx=w*0.5, cy=h*0.52;
  const u=Math.min(w,h)*0.0014; // base unit, scales with screen

  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(u*(0.88+0.12*p),u*(0.88+0.12*p));
  ctx.globalAlpha=p;

  // shikoro — layered neck-guard plates fanning both sides
  for(let side=-1;side<=1;side+=2){
    for(let i=0;i<4;i++){
      ctx.save();
      ctx.translate(side*40,70+i*22);
      ctx.rotate(side*0.05*(i+1));
      ctx.fillStyle='#2a1010';
      ctx.beginPath();
      ctx.moveTo(-55,0);ctx.lineTo(55,0);ctx.lineTo(45,18);ctx.lineTo(-45,18);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.45)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }
  }

  // kabuto bowl
  const bowlGrad=ctx.createLinearGradient(-90,-90,90,40);
  bowlGrad.addColorStop(0,'#3a1414');bowlGrad.addColorStop(0.5,'#1c0a0a');bowlGrad.addColorStop(1,'#0a0404');
  ctx.fillStyle=bowlGrad;
  ctx.beginPath();ctx.ellipse(0,-30,95,80,0,Math.PI,0);ctx.closePath();ctx.fill();

  // front brim
  ctx.fillStyle='#150707';
  ctx.beginPath();
  ctx.moveTo(-95,-30);ctx.quadraticCurveTo(0,8,95,-30);
  ctx.quadraticCurveTo(0,-8,-95,-30);ctx.closePath();ctx.fill();

  // soft gold glow behind the crest
  const crestGlow=ctx.createRadialGradient(0,-110,0,0,-110,safeR(60));
  crestGlow.addColorStop(0,'rgba(244,211,94,0.22)');crestGlow.addColorStop(1,'rgba(244,211,94,0)');
  ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=crestGlow;ctx.fillRect(-200,-250,400,250);ctx.restore();

  // crescent moon crest (maedate), via subtractive overlap
  ctx.save();
  ctx.translate(0,-100+Math.sin(t*0.6)*1.5);
  ctx.fillStyle='#f4d35e';
  ctx.beginPath();ctx.arc(0,0,36,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();ctx.arc(15,-4,32,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.restore();

  // floating embers
  for(let i=0;i<22;i++){
    const ex=(i*61+t*14)%w;
    const ey=h-((i*97+t*40)%h);
    ctx.save();ctx.globalAlpha=0.2+0.16*Math.sin(t+i);ctx.fillStyle='#e0552f';
    ctx.beginPath();ctx.arc(ex,ey,1.4,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// 3. NINJA — night, moon, shuriken
// ════════════════════════════════════════════════════════
function drawNinja(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#070912');g.addColorStop(1,'#000000');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const mx=w*0.78,my=h*0.2,mr=Math.min(w,h)*0.085;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,safeR(mr*2.4));
  mg.addColorStop(0,'rgba(220,225,240,0.32)');mg.addColorStop(1,'rgba(220,225,240,0)');
  ctx.save();ctx.fillStyle=mg;ctx.fillRect(0,0,w,h);ctx.restore();
  ctx.save();ctx.fillStyle='#dde2f0';ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();ctx.restore();

  for(let i=0;i<40;i++){
    const sx=(i*53)%w, sy=(i*97)%(h*0.6);
    const tw=0.4+Math.sin(t*1.1+i)*0.4;
    ctx.save();ctx.globalAlpha=0.5*tw;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx,sy,1.1,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  for(let i=0;i<3;i++){
    const sx=w*(0.2+i*0.3), sy=h*0.92;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy-Math.sin(t*0.5+i)*30,safeR(h*0.32));
    sg.addColorStop(0,'rgba(120,130,150,0.12)');sg.addColorStop(1,'rgba(120,130,150,0)');
    ctx.save();ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);ctx.restore();
  }

  const p=Math.min(1,st/0.8);
  const sx=lerp(-80,w+80,(t*0.25)%1.4);
  const sy=h*0.42+Math.sin(t*1.6)*30;
  ctx.save();ctx.translate(sx,sy);ctx.rotate(t*6);ctx.globalAlpha=0.85*p;ctx.fillStyle='#b9c2cf';
  star(ctx,0,0,Math.min(w,h)*0.045,4,0.32);
  ctx.restore();
}

// 4. SHINOBI — Tenchu-inspired rooftops, fog, and a crouched figure
// ════════════════════════════════════════════════════════
function drawRoofline(ctx,w,baseY,height,seedOffset,segCount){
  ctx.beginPath();
  ctx.moveTo(-2,baseY+height);
  for(let i=0;i<=segCount;i++){
    const x=(i/segCount)*(w+4)-2;
    const peak=baseY-height*(0.35+0.65*Math.abs(Math.sin((i+seedOffset)*1.3)));
    ctx.lineTo(x,peak);
    ctx.lineTo(Math.min(w+2,x+w*0.025),peak+height*0.12);
  }
  ctx.lineTo(w+2,baseY+height);
  ctx.closePath();
  ctx.fill();
}
function drawShinobi(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a0e1a');g.addColorStop(0.55,'#121a2e');g.addColorStop(1,'#04050a');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  for(let i=0;i<30;i++){
    const sx=(i*53)%w, sy=(i*97)%(h*0.45);
    const tw=0.3+Math.sin(t*1.0+i)*0.3;
    ctx.save();ctx.globalAlpha=0.35*tw;ctx.fillStyle='#c7d4e8';
    ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  const mx=w*0.74,my=h*0.16,mr=Math.min(w,h)*0.065;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,safeR(mr*3.2));
  mg.addColorStop(0,'rgba(190,205,230,0.3)');mg.addColorStop(1,'rgba(190,205,230,0)');
  ctx.save();ctx.fillStyle=mg;ctx.fillRect(0,0,w,h);ctx.restore();
  ctx.save();ctx.fillStyle='#cfdaee';ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();ctx.restore();

  // parallax rooftop silhouettes
  const layers=[
    {baseY:h*0.55,height:h*0.12,alpha:0.4,seg:6},
    {baseY:h*0.66,height:h*0.14,alpha:0.65,seg:7},
    {baseY:h*0.80,height:h*0.18,alpha:0.92,seg:8},
  ];
  layers.forEach((l,li)=>{
    ctx.save();ctx.globalAlpha=l.alpha;ctx.fillStyle='#05060a';
    drawRoofline(ctx,w,l.baseY,l.height,li*1.7,l.seg);
    ctx.restore();
  });

  // drifting fog bands
  for(let i=0;i<3;i++){
    const fy=h*(0.58+i*0.09)+Math.sin(t*0.3+i)*6;
    const alpha=Math.max(0,0.07+0.03*Math.sin(t*0.4+i*2));
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#8ca0be';
    ctx.fillRect(0,fy,w,h*0.05);
    ctx.restore();
  }

  // crouched shinobi silhouette on the nearest roof edge
  const p=easeOutCubic(Math.min(1,st/0.9));
  ctx.save();
  ctx.translate(w*0.28,h*0.79-(1-p)*20);
  ctx.globalAlpha=p;
  const fScale=Math.min(w,h)*0.0011;
  ctx.scale(fScale,fScale);

  const rg=ctx.createRadialGradient(0,-40,0,0,-40,safeR(140));
  rg.addColorStop(0,'rgba(200,30,40,0.18)');rg.addColorStop(1,'rgba(200,30,40,0)');
  ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=rg;ctx.fillRect(-160,-160,320,200);ctx.restore();

  ctx.fillStyle='#04050a';
  ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-30,-40);ctx.lineTo(-8,-46);ctx.lineTo(4,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(30,-44);ctx.lineTo(10,-50);ctx.lineTo(-2,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-14,-44);ctx.quadraticCurveTo(0,-90,16,-46);ctx.lineTo(8,-40);ctx.lineTo(-8,-40);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(2,-98,13,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(-4,-70);ctx.rotate(-0.7);ctx.fillStyle='#1a1a1a';ctx.fillRect(-3,-50,6,100);ctx.restore();
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 5. SAKURA — falling cherry blossoms
// ════════════════════════════════════════════════════════
function drawSakura(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#ffe6ef');g.addColorStop(1,'#f3e3f0');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  ctx.save();ctx.strokeStyle='rgba(90,50,55,0.32)';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(0,h*0.02);ctx.quadraticCurveTo(w*0.18,h*0.08,w*0.34,h*0.05);ctx.stroke();
  ctx.restore();

  for(let i=0;i<36;i++){
    const seed=i*137.5;
    const px=(seed*1.7+t*22)%w;
    const py=((seed*2.3)+t*(40+(i%5)*8))%h;
    const sway=Math.sin(t*1.2+i)*14;
    const rot=t*1.5+i;
    ctx.save();ctx.translate(px+sway,py);ctx.rotate(rot);
    ctx.fillStyle='rgba(232,150,176,0.8)';
    ctx.beginPath();ctx.ellipse(0,0,5,3,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  const p=Math.max(0,1-st/0.6);
  if(p>0){ctx.save();ctx.globalAlpha=p*0.4;ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.restore();}
}

// ════════════════════════════════════════════════════════
// 6. TORII — gate at dusk, with depth and an authentic curved kasagi
// ════════════════════════════════════════════════════════
function drawTorii(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#ffb27a');g.addColorStop(0.32,'#ff8d6b');g.addColorStop(0.6,'#7a4a8f');g.addColorStop(1,'#160c2e');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // sun glow disc behind the gate
  ctx.save();
  const sg=ctx.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.4,safeR(Math.min(w,h)*0.3));
  sg.addColorStop(0,'rgba(255,230,180,0.85)');sg.addColorStop(0.4,'rgba(255,200,140,0.35)');sg.addColorStop(1,'rgba(255,200,140,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);
  ctx.restore();
  ctx.save();ctx.globalAlpha=0.85;ctx.fillStyle='#ffe1b0';
  ctx.beginPath();ctx.arc(w*0.5,h*0.4,Math.min(w,h)*0.13,0,Math.PI*2);ctx.fill();ctx.restore();

  // distant hill silhouette for depth
  ctx.save();ctx.globalAlpha=0.5;ctx.fillStyle='#2a1840';
  ctx.beginPath();ctx.moveTo(0,h*0.62);
  ctx.quadraticCurveTo(w*0.25,h*0.52,w*0.5,h*0.6);
  ctx.quadraticCurveTo(w*0.75,h*0.68,w,h*0.58);
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
  ctx.restore();

  // birds
  for(let i=0;i<5;i++){
    const bx=(w*0.15+i*w*0.16+t*10)%w;
    const by=h*0.22+Math.sin(t*1.3+i)*10;
    ctx.save();ctx.strokeStyle='rgba(20,10,30,0.55)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx-8,by);ctx.quadraticCurveTo(bx,by-6,bx+8,by);ctx.stroke();
    ctx.restore();
  }

  // fireflies drifting near ground level
  for(let i=0;i<16;i++){
    const fx=(i*61+Math.sin(t*0.5+i)*20+w)%w;
    const fy=h*0.74+Math.sin(t*0.8+i*1.7)*h*0.07;
    const tw=0.4+Math.sin(t*2+i)*0.4;
    ctx.save();ctx.globalAlpha=Math.max(0,0.5*tw);ctx.fillStyle='#ffe9a8';
    ctx.beginPath();ctx.arc(fx,fy,1.4,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // flanking tree silhouettes
  ctx.save();ctx.fillStyle='#0e0818';
  [[w*0.06,1],[w*0.94,-1]].forEach(([tx,sgn])=>{
    ctx.beginPath();
    ctx.moveTo(tx,h);
    ctx.quadraticCurveTo(tx+sgn*w*0.05,h*0.55,tx+sgn*w*0.02,h*0.4);
    ctx.quadraticCurveTo(tx+sgn*w*0.09,h*0.5,tx+sgn*w*0.05,h*0.62);
    ctx.quadraticCurveTo(tx+sgn*w*0.1,h*0.78,tx,h);
    ctx.closePath();ctx.fill();
  });
  ctx.restore();

  // stone steps leading up to the gate
  ctx.save();ctx.fillStyle='rgba(10,5,15,0.85)';
  for(let i=0;i<4;i++){
    const sy=h*(0.86+i*0.035), sw=w*(0.5-i*0.06);
    ctx.fillRect(w/2-sw/2,sy,sw,h*0.03);
  }
  ctx.restore();

  // gate, with tapered legs and a curved kasagi top beam
  const p=easeOutCubic(Math.min(1,st/1.0));
  ctx.save();ctx.translate(w/2,h*0.82);ctx.scale(1,Math.max(0.02,p));
  ctx.fillStyle='#1c1019';
  const gw=w*0.58, legW=w*0.045, legH=h*0.4;

  ctx.beginPath();
  ctx.moveTo(-gw/2,0);ctx.lineTo(-gw/2+legW,0);ctx.lineTo(-gw/2+legW*1.3,-legH);ctx.lineTo(-gw/2-legW*0.3,-legH);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(gw/2,0);ctx.lineTo(gw/2-legW,0);ctx.lineTo(gw/2-legW*1.3,-legH);ctx.lineTo(gw/2+legW*0.3,-legH);
  ctx.closePath();ctx.fill();

  // nuki — lower horizontal brace
  ctx.fillRect(-gw/2+4,-legH-46,gw-8,12);

  // kasagi — top beam with the classic upward-curling ends
  ctx.beginPath();
  ctx.moveTo(-gw/2-22,-legH-2);
  ctx.quadraticCurveTo(-gw/2-30,-legH-26,-gw/2-6,-legH-30);
  ctx.lineTo(gw/2+6,-legH-30);
  ctx.quadraticCurveTo(gw/2+30,-legH-26,gw/2+22,-legH-2);
  ctx.lineTo(gw/2+10,-legH-6);
  ctx.quadraticCurveTo(gw/2+18,-legH-20,gw/2,-legH-22);
  ctx.lineTo(-gw/2,-legH-22);
  ctx.quadraticCurveTo(-gw/2-18,-legH-20,-gw/2-10,-legH-6);
  ctx.closePath();ctx.fill();

  // gakuzuka — center support pillar between the beams
  ctx.fillRect(-6,-legH-30,12,26);

  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 7. FUJI — mountain at sunrise, with pines and a lake reflection
// ════════════════════════════════════════════════════════
function drawFuji(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#ffe2b0');g.addColorStop(0.35,'#ffb27a');g.addColorStop(0.6,'#e98f6e');g.addColorStop(1,'#1f2c52');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // hazy distant hills
  ctx.save();ctx.fillStyle='rgba(60,70,110,0.35)';
  ctx.beginPath();ctx.moveTo(0,h*0.6);ctx.quadraticCurveTo(w*0.25,h*0.52,w*0.5,h*0.6);
  ctx.quadraticCurveTo(w*0.75,h*0.66,w,h*0.56);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
  ctx.restore();

  const p=easeOutCubic(Math.min(1,st/1.1));
  const peakX=w*0.5, peakY=h*(0.3-(1-p)*0.06), baseY=h*0.74;

  // Fuji's iconic, gently concave slopes
  ctx.save();ctx.globalAlpha=p;ctx.fillStyle='#27305a';
  ctx.beginPath();
  ctx.moveTo(peakX,peakY);
  ctx.bezierCurveTo(peakX+w*0.08,peakY+h*0.12,peakX+w*0.22,baseY-h*0.08,peakX+w*0.32,baseY);
  ctx.lineTo(peakX-w*0.32,baseY);
  ctx.bezierCurveTo(peakX-w*0.22,baseY-h*0.08,peakX-w*0.08,peakY+h*0.12,peakX,peakY);
  ctx.closePath();ctx.fill();

  // snow cap with a jagged, naturalistic snowline
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(peakX,peakY);
  [[0.07,0.065],[0.045,0.05],[0.025,0.085],[0,0.045],[-0.03,0.075],[-0.05,0.045],[-0.075,0.07]]
    .forEach(pt=>ctx.lineTo(peakX+w*pt[0],peakY+h*pt[1]));
  ctx.closePath();ctx.fill();
  ctx.restore();

  // mist bands at the base
  for(let i=0;i<3;i++){
    const my=h*(0.68+i*0.06)+Math.sin(t*0.4+i)*6;
    ctx.save();ctx.globalAlpha=0.16;ctx.fillStyle='#fff';ctx.fillRect(0,my,w,h*0.035);ctx.restore();
  }

  // foreground pine row
  ctx.save();ctx.fillStyle='#101526';
  for(let i=0;i<7;i++){
    const tx=w*(i/6), th=h*(0.1+((i*53)%17)/100);
    ctx.beginPath();
    ctx.moveTo(tx,h);ctx.lineTo(tx-th*0.18,h-th*0.55);ctx.lineTo(tx,h-th);ctx.lineTo(tx+th*0.18,h-th*0.55);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();

  // still lake with a soft reflection of the peak
  ctx.save();ctx.globalAlpha=0.22*p;ctx.fillStyle='#27305a';
  ctx.beginPath();
  ctx.moveTo(peakX,baseY);
  ctx.lineTo(peakX+w*0.32,baseY+(baseY-peakY)*0.4);
  ctx.lineTo(peakX-w*0.32,baseY+(baseY-peakY)*0.4);
  ctx.closePath();ctx.fill();
  ctx.restore();
  for(let i=0;i<4;i++){
    const ry=baseY+10+i*8+Math.sin(t*0.6+i)*2;
    ctx.save();ctx.globalAlpha=0.12;ctx.strokeStyle='#cfd8ff';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(peakX-w*0.3,ry);ctx.lineTo(peakX+w*0.3,ry);ctx.stroke();
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 8. WAVE — Hokusai-style swell
// ════════════════════════════════════════════════════════
function drawWave(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#9fd0e0');g.addColorStop(0.4,'#1c5c82');g.addColorStop(1,'#062032');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const p=easeOutCubic(Math.min(1,st/1.0));
  const layers=[
    {y:h*0.55,color:'#0a3c5c',amp:h*0.05,speed:0.5},
    {y:h*0.68,color:'#0d4d72',amp:h*0.045,speed:0.4},
    {y:h*0.82,color:'#125f87',amp:h*0.04,speed:0.34},
  ];
  layers.forEach((l,li)=>{
    ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,p*1.2-li*0.15));
    ctx.beginPath();ctx.moveTo(0,l.y);
    for(let x=0;x<=w;x+=14){
      const y=l.y+Math.sin(x*0.02+t*l.speed)*l.amp;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
    ctx.fillStyle=l.color;ctx.fill();ctx.restore();
  });

  ctx.save();ctx.globalAlpha=0.8*p;ctx.fillStyle='#eaf6fb';
  for(let x=0;x<w;x+=26){
    const y=h*0.55+Math.sin(x*0.02+t*0.5)*h*0.05;
    ctx.beginPath();ctx.moveTo(x,y);
    ctx.quadraticCurveTo(x+8,y-14,x+16,y-2);
    ctx.quadraticCurveTo(x+8,y+2,x,y);ctx.fill();
  }
  ctx.restore();

  for(let i=0;i<24;i++){
    const sx=(i*47+t*60)%w;
    const sy=h*0.5-((i*31+t*70)%(h*0.2));
    ctx.save();ctx.globalAlpha=0.5*p;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx,sy,1.6,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 10. KANJI INK — glowing brushed 忍 (nin — stealth/endurance,
//     the root character of "ninja"), moonlit ink-wash backdrop
// ════════════════════════════════════════════════════════
function drawKanjiInk(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0c0e16');g.addColorStop(1,'#020203');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  const mx=w*0.78,my=h*0.18,mr=Math.min(w,h)*0.07;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,safeR(mr*3));
  mg.addColorStop(0,'rgba(200,210,230,0.25)');mg.addColorStop(1,'rgba(200,210,230,0)');
  ctx.save();ctx.fillStyle=mg;ctx.fillRect(0,0,w,h);ctx.restore();
  ctx.save();ctx.fillStyle='#cfd6ea';ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();ctx.restore();

  for(let i=0;i<3;i++){
    const fy=h*(0.2+i*0.25)+Math.sin(t*0.25+i)*10;
    ctx.save();ctx.globalAlpha=0.05;ctx.fillStyle='#9fb3d9';
    ctx.fillRect(0,fy,w,h*0.12);ctx.restore();
  }

  const p=easeOutCubic(Math.min(1,st/1.1));
  const cx=w*0.5, cy=h*0.5, size=Math.min(w,h)*0.46;

  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,safeR(size*0.9));
  glow.addColorStop(0,'rgba(159,179,217,0.28)');glow.addColorStop(1,'rgba(159,179,217,0)');
  ctx.save();ctx.globalAlpha=p;ctx.globalCompositeOperation='screen';ctx.fillStyle=glow;ctx.fillRect(0,0,w,h);ctx.restore();

  ctx.save();
  ctx.globalAlpha=0.85*p;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`700 ${size}px 'Noto Sans JP', sans-serif`;
  ctx.fillStyle='#e3e9f7';
  ctx.shadowColor='rgba(159,179,217,0.5)';ctx.shadowBlur=size*0.06;
  ctx.fillText('忍',cx,cy+size*0.04);
  ctx.restore();

  for(let i=0;i<26;i++){
    const ix=(i*53+t*8)%w;
    const iy=(i*97+t*6)%h;
    const tw=0.3+Math.sin(t*0.8+i)*0.3;
    ctx.save();ctx.globalAlpha=0.18*tw;ctx.fillStyle='#9fb3d9';
    ctx.beginPath();ctx.arc(ix,iy,1.1,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
// 11. ORIGAMI — folded paper crane
// ════════════════════════════════════════════════════════
function drawOrigami(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#f3e6d2');g.addColorStop(1,'#e6d0a3');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  ctx.save();ctx.strokeStyle='rgba(120,90,50,0.08)';ctx.lineWidth=1;
  for(let i=0;i<14;i++){
    ctx.beginPath();ctx.moveTo(0,h*(i/14));ctx.lineTo(w,h*(i/14)+30);ctx.stroke();
  }
  ctx.restore();

  const p=easeOutCubic(Math.min(1,st/1.0));
  ctx.save();ctx.translate(w*0.5,h*0.5);ctx.scale(Math.max(0.02,p),1);
  const s=Math.min(w,h)*0.5;
  const facets=[
    {pts:[[0,-s*0.5],[s*0.3,0],[0,s*0.1]],c:'#b3122e'},
    {pts:[[0,-s*0.5],[-s*0.3,0],[0,s*0.1]],c:'#8a0f24'},
    {pts:[[0,s*0.1],[s*0.3,0],[s*0.55,s*0.4]],c:'#c9304a'},
    {pts:[[0,s*0.1],[-s*0.3,0],[-s*0.55,-s*0.25]],c:'#9c1c34'},
    {pts:[[0,s*0.1],[s*0.1,s*0.45],[-s*0.1,s*0.45]],c:'#7a0e21'},
  ];
  facets.forEach(f=>{
    ctx.beginPath();
    f.pts.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt[0],pt[1]);else ctx.lineTo(pt[0],pt[1]);});
    ctx.closePath();ctx.fillStyle=f.c;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// 12. KANJI RAIN — Matrix-style falling kanji, red on black
// ════════════════════════════════════════════════════════
const KANJI_RAIN_SET=['日','本','道','力','心','風','山','水','火','侍','忍','和','龍','桜','武','刀','空','夢'];
let _rainCols=[];
function initRain(w,h){
  const colWidth=Math.max(18,Math.min(w,h)*0.045);
  const colCount=Math.ceil(w/colWidth)+1;
  _rainCols=[];
  for(let i=0;i<colCount;i++){
    _rainCols.push({
      x:i*colWidth+colWidth/2,
      y:Math.random()*-h,
      speed:80+Math.random()*120,
      char:KANJI_RAIN_SET[Math.floor(Math.random()*KANJI_RAIN_SET.length)],
      changeTimer:Math.random()*0.5,
      size:colWidth*0.78,
    });
  }
}
function drawKanjiRain(ctx,t,w,h,st){
  // translucent overlay (rather than a full clear) so previous glyphs fade into trails
  ctx.fillStyle='rgba(2,2,4,0.16)';
  ctx.fillRect(0,0,w,h);

  if(!_rainCols.length) initRain(w,h);
  ctx.textAlign='center';ctx.textBaseline='middle';

  _rainCols.forEach(col=>{
    col.y+=col.speed*0.016;
    col.changeTimer-=0.016;
    if(col.changeTimer<=0){
      col.char=KANJI_RAIN_SET[Math.floor(Math.random()*KANJI_RAIN_SET.length)];
      col.changeTimer=0.15+Math.random()*0.35;
    }
    if(col.y>h+40){col.y=-40-Math.random()*200;col.speed=80+Math.random()*120;}

    for(let k=2;k>=1;k--){
      const ty=col.y-k*col.size*1.05;
      if(ty<-40)continue;
      ctx.save();
      ctx.globalAlpha=Math.max(0,0.45-k*0.16);
      ctx.font=`700 ${col.size}px 'Noto Sans JP',sans-serif`;
      ctx.fillStyle='#b3122e';
      ctx.fillText(col.char,col.x,ty);
      ctx.restore();
    }

    ctx.save();
    ctx.font=`700 ${col.size}px 'Noto Sans JP',sans-serif`;
    ctx.fillStyle='#ff3b4a';
    ctx.shadowColor='rgba(255,40,60,0.8)';ctx.shadowBlur=col.size*0.4;
    ctx.fillText(col.char,col.x,col.y);
    ctx.restore();
  });
}
// ── STYLES REGISTRY ─────────────────────────────────────
// category controls which fact pool ('samurai' | 'ninja' | 'japan') a scene draws from
const STYLES=[
  {id:'flag',category:'japan',bodyClass:'s-flag',showUnderline:true,weight:2,onScene(){}, draw:drawFlag},
  {id:'samurai',category:'samurai',bodyClass:'s-samurai',showUnderline:true,weight:2,onScene(){}, draw:drawSamurai},
  {id:'ninja',category:'ninja',bodyClass:'s-ninja',showUnderline:true,weight:2,onScene(){}, draw:drawNinja},
  {id:'shinobi',category:'ninja',bodyClass:'s-shinobi',showUnderline:true,weight:2,onScene(){}, draw:drawShinobi},
  {id:'kanjiInk',category:'ninja',bodyClass:'s-kanji-ink',showUnderline:true,weight:1,onScene(){}, draw:drawKanjiInk},
  {id:'sakura',category:'japan',bodyClass:'s-sakura',showUnderline:true,weight:1,onScene(){}, draw:drawSakura},
  {id:'torii',category:'japan',bodyClass:'s-torii',showUnderline:true,weight:1,onScene(){}, draw:drawTorii},
  {id:'fuji',category:'japan',bodyClass:'s-fuji',showUnderline:true,weight:1,onScene(){}, draw:drawFuji},
  {id:'wave',category:'japan',bodyClass:'s-wave',showUnderline:true,weight:1,onScene(){}, draw:drawWave},
  {id:'kanjiRain',category:'ninja',bodyClass:'s-kanji-rain',showUnderline:true,weight:2,onScene(w,h){initRain(w,h);}, draw:drawKanjiRain},
  {id:'origami',category:'japan',bodyClass:'s-origami',showUnderline:true,weight:1,onScene(){}, draw:drawOrigami},
];

// themes with a pale background, where text needs to render as dark ink instead of light
const LIGHT_THEMES=['flag','sakura','origami'];

function pickWeightedStyleIdx(){
  const total=STYLES.reduce((sum,s)=>sum+(s.weight||1),0);
  let r=Math.random()*total;
  for(let i=0;i<STYLES.length;i++){
    r-=(STYLES[i].weight||1);
    if(r<=0)return i;
  }
  return STYLES.length-1;
}

// ── PER-STYLE TEXT COLOUR CONFIG (used when baking the recorded video) ──
const DEFAULT_TEXT={headFill:'#ffffff',headStroke:'rgba(6,6,10,0.85)',smallFill:'rgba(255,255,255,0.92)',smallStroke:'rgba(6,6,10,0.75)',refFill:'#f4d35e',refStroke:'rgba(6,6,10,0.8)'};
const STYLE_TEXT={
  flag:{headFill:'#241407',headStroke:'rgba(255,255,255,0.9)',smallFill:'#3a2210',smallStroke:'rgba(255,255,255,0.85)',refFill:'#BC002D',refStroke:'rgba(255,255,255,0.85)'},
  samurai:{headFill:'#ffffff',headStroke:'rgba(6,6,10,0.85)',smallFill:'rgba(255,255,255,0.92)',smallStroke:'rgba(6,6,10,0.75)',refFill:'#e0552f',refStroke:'rgba(6,6,10,0.8)'},
  ninja:{headFill:'#e8ecf5',headStroke:'rgba(2,4,10,0.9)',smallFill:'rgba(220,225,240,0.92)',smallStroke:'rgba(2,4,10,0.8)',refFill:'#9fb3d9',refStroke:'rgba(2,4,10,0.8)'},
  shinobi:{headFill:'#e8ecf5',headStroke:'rgba(2,4,10,0.9)',smallFill:'rgba(220,225,240,0.92)',smallStroke:'rgba(2,4,10,0.8)',refFill:'#d9495a',refStroke:'rgba(2,4,10,0.8)'},
  kanjiInk:{headFill:'#e3e9f7',headStroke:'rgba(2,4,10,0.9)',smallFill:'rgba(220,225,240,0.92)',smallStroke:'rgba(2,4,10,0.8)',refFill:'#9fb3d9',refStroke:'rgba(2,4,10,0.8)'},
  sakura:{headFill:'#5b2545',headStroke:'rgba(255,255,255,0.9)',smallFill:'#7a3a5c',smallStroke:'rgba(255,255,255,0.85)',refFill:'#c2487a',refStroke:'rgba(255,255,255,0.85)'},
  torii:{headFill:'#fff3df',headStroke:'rgba(20,10,15,0.85)',smallFill:'rgba(255,243,223,0.92)',smallStroke:'rgba(20,10,15,0.75)',refFill:'#ff7b54',refStroke:'rgba(20,10,15,0.8)'},
  fuji:{headFill:'#ffffff',headStroke:'rgba(15,20,40,0.85)',smallFill:'rgba(255,255,255,0.92)',smallStroke:'rgba(15,20,40,0.75)',refFill:'#ffd9a0',refStroke:'rgba(15,20,40,0.8)'},
  wave:{headFill:'#ffffff',headStroke:'rgba(5,15,25,0.88)',smallFill:'rgba(255,255,255,0.92)',smallStroke:'rgba(5,15,25,0.78)',refFill:'#bfe8f5',refStroke:'rgba(5,15,25,0.8)'},
  kanjiRain:{headFill:'#ffffff',headStroke:'rgba(2,2,4,0.9)',smallFill:'rgba(255,255,255,0.92)',smallStroke:'rgba(2,2,4,0.8)',refFill:'#ff3b4a',refStroke:'rgba(2,2,4,0.85)'},
  origami:{headFill:'#7a1620',headStroke:'rgba(243,230,210,0.92)',smallFill:'#5c3a1a',smallStroke:'rgba(243,230,210,0.88)',refFill:'#b3122e',refStroke:'rgba(243,230,210,0.88)'},
};
function getStyleText(id){return STYLE_TEXT[id]||DEFAULT_TEXT;}

// ── AUDIO ─────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
const master=AC.createGain();master.gain.value=0.85;master.connect(AC.destination);
let _recDest=null,_audioOn=false;
function unlockAC(){if(_audioOn)return;AC.resume().then(()=>{_audioOn=true;startPad();});}

let _pads=[];
function startPad(){
  stopPad();
  try{
    // gentle in-scale-flavoured pad (D, F, G, A)
    [293.66,349.23,392.00,440.00].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain(),lfo=AC.createOscillator(),lg2=AC.createGain();
      o.type='sine';o.frequency.value=f;lfo.type='sine';lfo.frequency.value=0.07+i*0.02;lg2.gain.value=1.2;
      lfo.connect(lg2);lg2.connect(o.frequency);
      const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.026-i*0.003,t+2.2);
      o.connect(g);g.connect(master);o.start(t);lfo.start(t);_pads.push({o,g,lfo});
    });
  }catch(e){}
}
function stopPad(){
  _pads.forEach(p=>{try{p.g.gain.setTargetAtTime(0,AC.currentTime,0.35);setTimeout(()=>{try{p.o.stop();p.lfo.stop();}catch(e){}},900);}catch(e){}});_pads=[];
}
function sfxChime(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(587.33,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(783.99,AC.currentTime+0.12);
    g.gain.setValueAtTime(0.055,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.75);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.85);
  }catch(e){}
}
function sfxSoft(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(440,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(349.23,AC.currentTime+0.18);
    g.gain.setValueAtTime(0.04,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.6);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.65);
  }catch(e){}
}
function sfxTick(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';o.frequency.setValueAtTime(1200,AC.currentTime);
    g.gain.setValueAtTime(0.05,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.12);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.15);
  }catch(e){}
}
function sfxWhoosh(){
  if(!_audioOn)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.setValueAtTime(900,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(260,AC.currentTime+0.28);
    g.gain.setValueAtTime(0.035,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.4);
    o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+0.45);
  }catch(e){}
}

// ── SCENE ─────────────────────────────────────────────────
// Separate shuffled pool per category, so e.g. the ninja-styled
// scenes never surface a samurai or general-Japan fact, and vice versa.
// The generic scenic themes (category 'japan') draw from all four
// general-flavored fact categories below; samurai/ninja stay untouched.
const CATEGORY_GROUPS={
  samurai:['samurai'],
  ninja:['ninja'],
  japan:['japan','tourism','inventions','didyouknow'],
};
let _pools={},_pidxs={};
function nextC(cat){
  if(!_pools[cat]||_pidxs[cat]>=_pools[cat].length){
    const cats=CATEGORY_GROUPS[cat]||[cat];
    _pools[cat]=CONTENT.filter(c=>cats.includes(c.cat)).sort(()=>Math.random()-0.5);
    _pidxs[cat]=0;
  }
  return _pools[cat][_pidxs[cat]++];
}

let _timers=[];
function clearT(){_timers.forEach(clearTimeout);_timers=[];}

function showScene(){
  clearT();
  unlockAC();

  _styleIdx=pickWeightedStyleIdx();
  const style=STYLES[_styleIdx];
  document.body.className=style.bodyClass;
  window._lastCategory=style.category;

  _sceneStart=_t;
  style.onScene(W,H);

  const C=nextC(style.category);

  const wrap=document.getElementById('quote-wrap');
  wrap.innerHTML='';
  const els=[];
  C.lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='qline';
    d.innerHTML=wrapToLines(l,3).join('<br>');
    wrap.appendChild(d);els.push(d);
  });
  if(C.sub){
    const d=document.createElement('div');
    d.className='qline small';
    d.innerHTML=wrapToLines(C.sub,3).join('<br>');
    wrap.appendChild(d);els.push(d);
  }
  if(C.ref){
    const d=document.createElement('div');
    d.className='qline ref';
    d.textContent=C.ref;wrap.appendChild(d);els.push(d);
  }

  const label=document.getElementById('label');
  const bottom=document.getElementById('bottom');
  const ubar=document.getElementById('underbar');
  const scrim=document.getElementById('text-scrim');
  label.style.opacity='0';label.style.transform='translateY(-16px)';
  bottom.style.opacity='0';bottom.style.transform='translateY(12px)';
  ubar.style.width='0';
  ubar.style.display=style.showUnderline?'':'none';

  // legibility scrim: light panel behind dark ink, dark panel behind light text
  const isLight=LIGHT_THEMES.includes(style.id);
  scrim.classList.toggle('light',isLight);
  scrim.classList.toggle('dark',!isLight);
  scrim.style.opacity='0';

  sfxChime();

  _timers.push(setTimeout(()=>{
    label.style.opacity='1';label.style.transform='translateY(0)';
  },220));
  _timers.push(setTimeout(()=>{
    scrim.style.opacity='1';
  },340));

  let delay=420;
  els.forEach((el)=>{
    el.classList.remove('in');
    _timers.push(setTimeout(()=>{
      el.classList.add('in');
      if(el.classList.contains('ref'))sfxTick();
      else if(el.classList.contains('small'))sfxSoft();
      else sfxChime();
    },delay));
    delay+=(el.classList.contains('small')||el.classList.contains('ref'))?560:420;
  });

  if(style.showUnderline){
    _timers.push(setTimeout(()=>{ubar.style.width=Math.min(W*0.55,220)+'px';},delay-100));
  }

  _timers.push(setTimeout(()=>{
    bottom.style.opacity='1';bottom.style.transform='translateY(0)';
    sfxWhoosh();
  },delay+280));
}

// ── RECORDING ─────────────────────────────────────────────
let _compC=null,_compCtx=null;
window._recActive=false;
window._recordingDone=false;
window._recordingBlob=null;
let _recChunks=[],_recorder=null;

function drawOutlinedText(ctx,text,x,y,fillColor,strokeColor,strokeWidth){
  ctx.lineJoin='round';
  ctx.miterLimit=2;
  ctx.lineWidth=strokeWidth;
  ctx.strokeStyle=strokeColor;
  ctx.strokeText(text,x,y);
  ctx.fillStyle=fillColor;
  ctx.fillText(text,x,y);
}

function _drawComposite(){
  if(!_compCtx)return;
  const ctx=_compCtx,cW=_compC.width,cH=_compC.height;
  ctx.clearRect(0,0,cW,cH);

  try{ctx.drawImage(bgC,0,0,cW,cH);}catch(e){}

  const vg=ctx.createRadialGradient(cW/2,cH*0.48,cH*0.1,cW/2,cH*0.48,safeR(cH*0.78));
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,5,15,0.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,cW,cH);

  const currentId=STYLES[_styleIdx].id;
  const textCfg=getStyleText(currentId);
  const isLightTheme=LIGHT_THEMES.includes(currentId);

  // legibility scrim — must match the live CSS panel so the recorded video stays readable too
  const scrimEl=document.getElementById('text-scrim');
  const scrimOp=parseFloat(window.getComputedStyle(scrimEl).opacity)||0;
  if(scrimOp>0.01){
    const sr=scrimEl.getBoundingClientRect();
    const sgrad=ctx.createRadialGradient(sr.left+sr.width/2,sr.top+sr.height/2,0,sr.left+sr.width/2,sr.top+sr.height/2,safeR(Math.max(sr.width,sr.height)*0.55));
    if(isLightTheme){
      sgrad.addColorStop(0,'rgba(255,255,255,0.55)');sgrad.addColorStop(0.5,'rgba(255,255,255,0.3)');sgrad.addColorStop(1,'rgba(255,255,255,0)');
    }else{
      sgrad.addColorStop(0,'rgba(0,0,0,0.42)');sgrad.addColorStop(0.5,'rgba(0,0,0,0.22)');sgrad.addColorStop(1,'rgba(0,0,0,0)');
    }
    ctx.save();ctx.globalAlpha=scrimOp;ctx.fillStyle=sgrad;ctx.fillRect(sr.left,sr.top,sr.width,sr.height);ctx.restore();
  }

  const labelEl=document.getElementById('label');
  const labelOp=parseFloat(window.getComputedStyle(labelEl).opacity)||0;
  if(labelOp>0.01){
    const ebEl=document.getElementById('label-eyebrow');
    const ebR=ebEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=labelOp;
    ctx.font=`600 ${Math.max(11,ebR.height)}px 'Noto Sans JP',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    drawOutlinedText(ctx,ebEl.textContent,cW/2,ebR.top+ebR.height/2,textCfg.refFill,textCfg.refStroke,Math.max(2,ebR.height*0.09));
    ctx.restore();

    const ruleEl=document.getElementById('label-rule');
    const rr=ruleEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=labelOp*0.55;ctx.strokeStyle=textCfg.refFill;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cW/2-23,rr.top+rr.height/2);ctx.lineTo(cW/2+23,rr.top+rr.height/2);ctx.stroke();
    ctx.restore();
  }

  document.querySelectorAll('.qline').forEach(el=>{
    const op=parseFloat(window.getComputedStyle(el).opacity)||0;
    if(op<0.01)return;
    const r=el.getBoundingClientRect();
    if(r.width<1||r.height<1)return;
    const cs=window.getComputedStyle(el);
    const fs=parseFloat(cs.fontSize)||32;
    ctx.save();ctx.globalAlpha=op;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    if(el.classList.contains('ref')){
      ctx.font=`600 ${fs}px 'Noto Sans JP',sans-serif`;
      drawOutlinedText(ctx,el.textContent,cx,cy,textCfg.refFill,textCfg.refStroke,Math.max(1.5,fs*0.07));
    }else if(el.classList.contains('small')){
      ctx.font=`700 ${fs}px 'Shippori Mincho',serif`;
      const lines=el.innerHTML.split('<br>');
      const lh=r.height/lines.length;
      lines.forEach((line,li)=>{
        const ly=r.top+lh*(li+0.5);
        drawOutlinedText(ctx,line,cx,ly,textCfg.smallFill,textCfg.smallStroke,Math.max(1.5,fs*0.065));
      });
    }else{
      ctx.font=`900 ${fs}px 'Zen Old Mincho',serif`;
      ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=14;
      const lines=el.innerHTML.split('<br>');
      const lh=r.height/lines.length;
      lines.forEach((line,li)=>{
        const ly=r.top+lh*(li+0.5);
        drawOutlinedText(ctx,line,cx,ly,textCfg.headFill,textCfg.headStroke,Math.max(2,fs*0.09));
      });
    }
    ctx.restore();
  });

  const ub=document.getElementById('underbar');
  if(ub.style.display!=='none'){
    const ubW=parseFloat(ub.style.width)||0;
    if(ubW>2){
      const ubR=ub.getBoundingClientRect();
      const lg=ctx.createLinearGradient(cW/2-ubW/2,0,cW/2+ubW/2,0);
      lg.addColorStop(0,'rgba(244,211,94,0)');lg.addColorStop(0.5,'rgba(244,211,94,0.9)');lg.addColorStop(1,'rgba(244,211,94,0)');
      ctx.save();ctx.fillStyle=lg;
      ctx.fillRect(cW/2-ubW/2,ubR.top,ubW,2);
      ctx.restore();
    }
  }

  const botEl=document.getElementById('bottom');
  const botOp=parseFloat(window.getComputedStyle(botEl).opacity)||0;
  if(botOp>0.01){
    const botR=botEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=botOp*0.7;
    ctx.font=`600 ${Math.max(10,cW*0.023)}px 'Noto Sans JP',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const isLight=isLightTheme;
    drawOutlinedText(ctx,'SHARE THIS JAPAN FACT',cW/2,botR.top+botR.height*0.4,isLight?'#241407':'#ffffff','rgba(5,11,22,0.7)',Math.max(1.5,cW*0.023));
    ctx.restore();
  }
}

// the click that picks a new scene runs synchronously, but the background
// canvas only repaints on the next animation frame — so if we start
// recording immediately, the very first captured frame can still show the
// previous scene's last-drawn pixels. Waiting two real paint frames first
// guarantees the canvas has caught up before anything is captured.
window.startRecordingFreshScene=function(fps){
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.startRecording(fps);
    });
  });
};
window.startRecording=function(fps){
  fps=fps||30;
  try{
    AC.resume().catch(()=>{});
    _compC=document.createElement('canvas');
    _compC.width=W;_compC.height=H;
    _compCtx=_compC.getContext('2d');
    window._recActive=true;
    window._recordingDone=false;
    _recChunks=[];
    _drawComposite(); // prime the canvas now, so captureStream's first frame is already correct
    _recDest=AC.createMediaStreamDestination();
    master.connect(_recDest);
    const vs=_compC.captureStream(fps);
    const combined=new MediaStream([...vs.getVideoTracks(),..._recDest.stream.getAudioTracks()]);
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _recorder=new MediaRecorder(combined,{mimeType:mime,videoBitsPerSecond:8000000,audioBitsPerSecond:192000});
    _recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)_recChunks.push(e.data);};
    _recorder.onstop=()=>{
      window._recActive=false;
      try{master.disconnect(_recDest);}catch(e){}
      window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
      window._recordingDone=true;
    };
    _recorder.start(200);
    console.log('Recording started');
  }catch(e){console.error('startRecording error:',e);}
};
window.stopRecording=function(){try{if(_recorder&&_recorder.state!=='inactive')_recorder.stop();}catch(e){}};
window.forceFinalize=function(){
  window._recActive=false;
  if(_recChunks.length>0&&!window._recordingDone){
    window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
    window._recordingDone=true;
  }
};
window.getRecordingBase64=function(){
  return new Promise((resolve,reject)=>{
    const chk=()=>{
      if(!window._recordingBlob){setTimeout(chk,100);return;}
      const r=new FileReader();
      r.onloadend=()=>resolve(r.result.split(',')[1]);
      r.onerror=reject;
      r.readAsDataURL(window._recordingBlob);
    };chk();
  });
};

// ── LOOP ──────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  _t+=0.016;
  const st=Math.max(0,_t-_sceneStart);
  STYLES[_styleIdx].draw(bgCtx,_t,W,H,st);
  if(window._recActive)_drawComposite();
})();

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  bgC.width=W;bgC.height=H;
  _hinoBuf=null;
  _rainCols=[];
});
document.body.addEventListener('click',showScene);
document.body.addEventListener('touchend',e=>{e.preventDefault();showScene();},{passive:false});
showScene();
})();
</script>
