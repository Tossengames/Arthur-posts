<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASMR Eye Movement</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:100vw; height:100vh; overflow:hidden; background:#000; }
canvas { position:fixed; inset:0; width:100%; height:100%; }

<body>
<canvas id="c"></canvas>
<script>
'use strict';

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, CX, CY;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; CX=W/2; CY=H/2; }
resize();

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
let AC=null, MG=null, RD=null;
let wNoise=null, wOsc=null, wFilter=null, wGain=null, wPan=null;
let binL=null, binR=null, padList=[], audioReady=false;

function initAudio(){
  if(audioReady) return;
  audioReady=true;
  AC = new(window.AudioContext||window.webkitAudioContext)();
  MG = AC.createGain(); MG.gain.value=1.0; MG.connect(AC.destination);
  RD = AC.createMediaStreamDestination(); MG.connect(RD);
  startWhoosh();
  startBinaural();
  startPad();
}

function startWhoosh(){
  if(!AC) return;
  const sr=AC.sampleRate, len=sr*4;
  // Layer 1 — mid hiss
  const b1=AC.createBuffer(1,len,sr); const d1=b1.getChannelData(0);
  for(let i=0;i<len;i++) d1[i]=Math.random()*2-1;
  wNoise=AC.createBufferSource(); wNoise.buffer=b1; wNoise.loop=true;
  wFilter=AC.createBiquadFilter(); wFilter.type='bandpass'; wFilter.frequency.value=600; wFilter.Q.value=0.8;
  wGain=AC.createGain(); wGain.gain.value=1.2;
  wPan=AC.createStereoPanner ? AC.createStereoPanner() : null;
  wNoise.connect(wFilter); wFilter.connect(wGain);
  if(wPan){ wGain.connect(wPan); wPan.connect(MG); } else wGain.connect(MG);
  wNoise.start();
  // Layer 2 — low rumble
  const b2=AC.createBuffer(1,len,sr); const d2=b2.getChannelData(0);
  for(let i=0;i<len;i++) d2[i]=Math.random()*2-1;
  wOsc=AC.createBufferSource(); wOsc.buffer=b2; wOsc.loop=true;
  const f2=AC.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=180; f2.Q.value=1.2;
  const g2=AC.createGain(); g2.gain.value=0.55;
  wOsc.connect(f2); f2.connect(g2);
  if(wPan) g2.connect(wPan); else g2.connect(MG);
  wOsc.start();
}

function setWhoosh(xFrac, spd){
  if(!wGain||!AC) return;
  const pan=Math.max(-1,Math.min(1,xFrac*2-1));
  if(wPan) wPan.pan.setTargetAtTime(pan,AC.currentTime,0.04);
  const vol=Math.max(0.8,Math.min(1.8,0.8+spd*0.08));
  wGain.gain.setTargetAtTime(vol,AC.currentTime,0.04);
  if(wFilter) wFilter.frequency.setTargetAtTime(380+spd*18,AC.currentTime,0.04);
}

function startBinaural(){
  if(!AC||!CUR_WAVE) return;
  stopBinaural();
  const w=CUR_WAVE, merger=AC.createChannelMerger(2);
  const oL=AC.createOscillator(), gL=AC.createGain();
  oL.type='sine'; oL.frequency.value=w.base; gL.gain.value=0.22;
  oL.connect(gL); gL.connect(merger,0,0);
  const oR=AC.createOscillator(), gR=AC.createGain();
  oR.type='sine'; oR.frequency.value=w.base+w.hz; gR.gain.value=0.22;
  oR.connect(gR); gR.connect(merger,0,1);
  merger.connect(MG); oL.start(); oR.start();
  binL=oL; binR=oR;
}
function stopBinaural(){ try{if(binL)binL.stop();}catch(e){} try{if(binR)binR.stop();}catch(e){} binL=null;binR=null; }

function startPad(){
  if(!AC||!CUR_WAVE) return;
  stopPad();
  CUR_WAVE.pad.forEach(function(freq){
    try{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=freq;
      const t=AC.currentTime;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.055,t+2);
      o.connect(g); g.connect(MG); o.start();
      padList.push(o,g);
    }catch(e){}
  });
}
function stopPad(){ padList.forEach(function(n){try{n.stop&&n.stop();}catch(e){}}); padList=[]; }

// ═══════════════════════════════════════════════════════
// RECORDING
// ═══════════════════════════════════════════════════════
let _mr=null,_rc=[],_rb=null;
window._recordingDone=false;
window.startRecording=function(fps){
  initAudio();
  try{
    _rc=[];_rb=null;window._recordingDone=false;
    const vs=cv.captureStream(fps||30), at=RD?RD.stream.getAudioTracks():[];
    const ms=new MediaStream([...vs.getVideoTracks(),...at]);
    const mt=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(function(m){return MediaRecorder.isTypeSupported(m);})||'video/webm';
    _mr=new MediaRecorder(ms,{mimeType:mt,videoBitsPerSecond:8000000});
    _mr.ondataavailable=function(e){if(e.data&&e.data.size>0)_rc.push(e.data);};
    _mr.onstop=function(){_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;};
    _mr.start(200);
  }catch(e){console.error(e);}
};
window.stopRecording=function(){try{if(_mr&&_mr.state!=='inactive')_mr.stop();}catch(e){}};
window.forceFinalize=function(){try{if(_rc.length>0&&!window._recordingDone){_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;}}catch(e){}};
window.getRecordingBase64=function(){return new Promise(function(res,rej){var chk=function(){if(!_rb){setTimeout(chk,100);return;}var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(_rb);};chk();});};

// ═══════════════════════════════════════════════════════
// BRAINWAVES
// ═══════════════════════════════════════════════════════

  {name:'Alpha', hz:9,   base:195, help:'Anxiety relief',        pad:[125,188,250]},

  {name:'Theta', hz:5,   base:170, help:'Meditative state',      pad:[100,150,200]},
  {name:'Theta', hz:4,   base:160, help:'Sleep onset',           pad:[96,144,192]},
  {name:'Theta', hz:7,   base:185, help:'Creative flow',         pad:[112,168,224]},
  {name:'Delta', hz:2,   base:150, help:'Deep rest & healing',   pad:[90,135,180]},
  {name:'528 Hz',hz:0,   base:528, help:'Healing frequency',     pad:[264,396,528]},
  {name:'432 Hz',hz:0,   base:432, help:'Natural harmony',       pad:[216,324,432]},

  {name:'Gamma', hz:40,  base:300, help:'Clarity & presence',    pad:[150,225,300]},

var CUR_WAVE = WAVES[0];

// ═══════════════════════════════════════════════════════
// THEME PARTICLE POOLS — one set per session, no `this`
// ═══════════════════════════════════════════════════════
var _stars=null, _clouds=null, _bubbles=null, _oceanBubs=null,
    _blobs=null, _flies=null, _galaxySt=null, _petals=null,
    _rain=null;

function clearPools(){
  _stars=null;_clouds=null;_bubbles=null;_oceanBubs=null;
  _blobs=null;_flies=null;_galaxySt=null;_petals=null;_rain=null;
}

// ═══════════════════════════════════════════════════════
// THEMES — 15 styles, no `this` state
// ═══════════════════════════════════════════════════════

  },
  // 5. Neon Grid
  {
    ball:'#ff00cc', tr:255, tg:0, tb:204,
    init:function(){},
    draw:function(ctx,w,h,T,bx,by){
      ctx.fillStyle='#010810'; ctx.fillRect(0,0,w,h);
      var off=T*0.5%40; ctx.strokeStyle='rgba(0,200,255,0.09)'; ctx.lineWidth=1;
      for(var x2=-off;x2<w;x2+=40){ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,h);ctx.stroke();}
      for(var y2=-off;y2<h;y2+=40){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(w,y2);ctx.stroke();}
      var hg=ctx.createLinearGradient(0,h*0.45,0,h); hg.addColorStop(0,'rgba(255,0,160,0.12)'); hg.addColorStop(1,'transparent'); ctx.fillStyle=hg; ctx.fillRect(0,0,w,h);
    }
  },

  {
    ball:'#ffdd55', tr:255, tg:220, tb:80,

    draw:function(ctx,w,h,T,bx,by){
      ctx.fillStyle='#faf5ee'; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle='rgba(160,130,100,0.12)'; ctx.lineWidth=1;
      for(var i=0;i<6;i++){var rv=(Math.min(w,h)*0.06+i*Math.min(w,h)*0.07)*(0.9+Math.sin(T*0.008+i)*0.1); ctx.beginPath(); ctx.ellipse(bx,by,rv,rv*0.38,0,0,Math.PI*2); ctx.stroke();}
      var vg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*0.7); vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.05)'); ctx.fillStyle=vg; ctx.fillRect(0,0,w,h);
    }
  },
  // 13. Galaxy
  {
    ball:'#cc88ff', tr:204, tg:136, tb:255,
    init:function(w,h){ _galaxySt=Array.from({length:300},function(){return{x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5,a:0.2+Math.random()*0.7,p:Math.random()*Math.PI*2};}); },
    draw:function(ctx,w,h,T,bx,by){
      ctx.fillStyle='#02010a'; ctx.fillRect(0,0,w,h);
      var angle=T*0.004;
      [[0.5,0.5,180,'rgba(80,0,180,0.12)'],[0.3,0.4,160,'rgba(0,80,200,0.10)'],[0.7,0.6,140,'rgba(180,0,80,0.08)']].forEach(function(arr){ ctx.save(); ctx.translate(arr[0]*w,arr[1]*h); ctx.rotate(angle); var ng=ctx.createRadialGradient(0,0,0,0,0,arr[2]); ng.addColorStop(0,arr[3]); ng.addColorStop(1,'transparent'); ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(0,0,arr[2],0,Math.PI*2); ctx.fill(); ctx.restore(); });
      if(_galaxySt)_galaxySt.forEach(function(s){ var a=s.a*(0.5+Math.sin(T*0.05+s.p)*0.5); ctx.fillStyle='rgba(255,240,200,'+a+')'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
    }
  },
  // 14. Tropical
  {
    ball:'#ff4466', tr:255, tg:68, tb:102,
    init:function(w,h){ _petals=Array.from({length:16},function(){return{x:Math.random()*w,y:Math.random()*h,hue:20+Math.random()*60,pr:6+Math.random()*14,rot:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*0.5,vy:-0.4-Math.random()*0.6};}); },
    draw:function(ctx,w,h,T,bx,by){
      var g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#ffe080'); g.addColorStop(0.5,'#ffb040'); g.addColorStop(1,'#ff7030'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      if(_petals)_petals.forEach(function(p){ p.x+=p.vx; p.y+=p.vy; p.rot+=0.02; if(p.y<-p.pr*2)p.y=h+p.pr*2; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle='hsla('+p.hue+',90%,65%,0.35)'; ctx.beginPath(); ctx.ellipse(0,0,p.pr,p.pr*0.4,0,0,Math.PI*2); ctx.fill(); ctx.restore(); });
    }
  },
  // 15. Rain Night
  {
    ball:'#88ccff', tr:136, tg:204, tb:255,
    init:function(w,h){ _rain=Array.from({length:90},function(){return{x:Math.random()*w,y:Math.random()*h,len:10+Math.random()*22,sp:5+Math.random()*7,al:0.07+Math.random()*0.13};}); },
    draw:function(ctx,w,h,T,bx,by){
      var g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#001828'); g.addColorStop(1,'#000c14'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      if(_rain)_rain.forEach(function(drop){ drop.y+=drop.sp; if(drop.y>h+drop.len)drop.y=-drop.len; ctx.strokeStyle='rgba(140,200,255,'+drop.al+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(drop.x,drop.y); ctx.lineTo(drop.x,drop.y+drop.len); ctx.stroke(); });
      var pg=ctx.createRadialGradient(w/2,h*0.3,0,w/2,h*0.3,h*0.4); pg.addColorStop(0,'rgba(60,120,255,0.08)'); pg.addColorStop(1,'transparent'); ctx.fillStyle=pg; ctx.fillRect(0,0,w,h);
    }
  },
];

// ═══════════════════════════════════════════════════════
// BALL STYLES — 8 designs, all using explicit hex colors
// ═══════════════════════════════════════════════════════
var BALL_STYLES=[
  // 0. Glowing sphere
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    var bg=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.05,x,y,r);
    bg.addColorStop(0,'rgba(255,255,255,0.65)');
    bg.addColorStop(0.45,col);
    bg.addColorStop(1,gHex);
    ctx.fillStyle=bg; ctx.shadowColor=col; ctx.shadowBlur=28;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.3,r*0.22,0,Math.PI*2); ctx.fill();
  },
  // 1. Ring
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    ctx.strokeStyle=col; ctx.lineWidth=r*0.38; ctx.shadowColor=gHex; ctx.shadowBlur=22; ctx.globalAlpha=0.9;
    ctx.beginPath(); ctx.arc(x,y,r*0.72,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1;
    var pulse=0.5+Math.sin(T*0.12)*0.5; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=pulse*0.4;
    ctx.beginPath(); ctx.arc(x,y,r*1.2,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
  },
  // 2. Star
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    ctx.save(); ctx.translate(x,y); ctx.rotate(T*0.03);
    ctx.fillStyle=col; ctx.shadowColor=gHex; ctx.shadowBlur=25;
    ctx.beginPath();
    for(var i=0;i<10;i++){var a=i/10*Math.PI*2-Math.PI/2, rd=i%2===0?r:r*0.42; i===0?ctx.moveTo(rd*Math.cos(a),rd*Math.sin(a)):ctx.lineTo(rd*Math.cos(a),rd*Math.sin(a));}
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
  },
  // 3. Pulsing bubble
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    var pr=r*(0.85+Math.sin(T*0.14)*0.22);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=0.4;
    ctx.beginPath(); ctx.arc(x,y,pr*1.35,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    var bg=ctx.createRadialGradient(x,y,0,x,y,pr);
    bg.addColorStop(0,'rgba(255,255,255,0.3)');
    bg.addColorStop(0.7,col);
    bg.addColorStop(1,gHex);
    ctx.fillStyle=bg; ctx.shadowColor=gHex; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  },
  // 4. Diamond
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    ctx.save(); ctx.translate(x,y); ctx.rotate(T*0.02);
    ctx.fillStyle=col; ctx.shadowColor=gHex; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*0.7,0); ctx.lineTo(0,r); ctx.lineTo(-r*0.7,0); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.beginPath(); ctx.arc(x-r*0.2,y-r*0.25,r*0.18,0,Math.PI*2); ctx.fill();
  },
  // 5. Comet
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    var ang=Math.atan2(vy||0,vx||0.001);
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
    var cg=ctx.createRadialGradient(-r*0.1,0,r*0.05,0,0,r);
    cg.addColorStop(0,'rgba(255,255,255,0.85)'); cg.addColorStop(0.4,col); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.shadowColor=gHex; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.ellipse(0,0,r,r*0.55,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
  },
  // 6. Neon outline
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    ctx.shadowColor=gHex; ctx.shadowBlur=35; ctx.strokeStyle=col; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(x,y,r*0.15,0,Math.PI*2); ctx.fill();
  },
  // 7. Bullseye rings
  function(ctx,x,y,r,col,gHex,T,vx,vy){
    [1.0,0.68,0.38].forEach(function(fr,i){ ctx.strokeStyle=i===1?'rgba(255,255,255,0.5)':col; ctx.lineWidth=i===1?2:3; ctx.shadowColor=gHex; ctx.shadowBlur=i===0?20:8; ctx.beginPath(); ctx.arc(x,y,r*fr,0,Math.PI*2); ctx.stroke(); }); ctx.shadowBlur=0;
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,r*0.14,0,Math.PI*2); ctx.fill();
  },
];

// ═══════════════════════════════════════════════════════
// PATTERNS
// ═══════════════════════════════════════════════════════
var PATTERNS=[
  {name:'Left · Right',    fn:function(t){return{x:0.5+Math.sin(t)*0.42,       y:0.50};}},
  {name:'Up · Down',       fn:function(t){return{x:0.50,                         y:0.50+Math.sin(t)*0.34};}},
  {name:'Slow Circle',     fn:function(t){return{x:0.5+Math.cos(t)*0.38,        y:0.50+Math.sin(t)*0.34};}},
  {name:'Figure 8',        fn:function(t){return{x:0.5+Math.sin(t)*0.40,        y:0.50+Math.sin(t*2)*0.20};}},
  {name:'Infinity Loop',   fn:function(t){return{x:0.5+0.40*Math.cos(t)/(1+Math.sin(t)*Math.sin(t)),y:0.50+0.22*Math.sin(t)*Math.cos(t)/(1+Math.sin(t)*Math.sin(t))};}},
  {name:'Pendulum',        fn:function(t){return{x:0.5+Math.sin(t)*0.44,        y:0.46+Math.abs(Math.sin(t))*0.08};}},
  {name:'Diagonal',        fn:function(t){return{x:0.5+Math.sin(t)*0.38,        y:0.50+Math.sin(t)*0.30};}},
  {name:'Gentle Wave',     fn:function(t){return{x:0.5+Math.sin(t*0.8)*0.38,    y:0.50+Math.sin(t*0.4)*0.20};}},
  {name:'Wide 8',          fn:function(t){return{x:0.5+Math.sin(t)*0.44,        y:0.50+Math.sin(t*2)*0.14};}},
  {name:'Ellipse Wide',    fn:function(t){return{x:0.5+Math.cos(t)*0.44,        y:0.50+Math.sin(t)*0.22};}},
  {name:'Vertical Oval',   fn:function(t){return{x:0.5+Math.cos(t)*0.26,        y:0.50+Math.sin(t)*0.40};}},
  {name:'Corner Sweep',    fn:function(t){return{x:0.5+Math.sin(t)*0.40,        y:0.50+Math.cos(t*1.3)*0.28};}},
  {name:'Rose Curve',      fn:function(t){return{x:0.5+Math.cos(t*2)*Math.cos(t)*0.40,y:0.50+Math.cos(t*2)*Math.sin(t)*0.36};}},
  {name:'EMDR',            fn:function(t){return{x:0.5+Math.sin(t)*0.44,        y:0.50+Math.sin(t*0.1)*0.05};}},
  {name:'Slow Drift',      fn:function(t){return{x:0.5+Math.sin(t*0.7)*0.40,    y:0.50+Math.cos(t*0.5)*0.26};}},
  {name:'Arc Sweep',       fn:function(t){return{x:0.5+Math.sin(t)*0.44,        y:0.38+Math.cos(t)*0.10};}},
  {name:'Breath Wave',     fn:function(t){return{x:0.5+Math.sin(t)*0.36,        y:0.50+Math.sin(t*0.5)*0.28};}},
  {name:'Slow Clover',     fn:function(t){return{x:0.5+Math.cos(t*3)*Math.cos(t)*0.38,y:0.50+Math.cos(t*3)*Math.sin(t)*0.34};}},
];

// ═══════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════
var CUR_THEME=null, CUR_PAT=null, CUR_SPEED=0.035;
var BALLS=[], TF=0, RAF=null;
var MAX_F=600; // 10s

function rndInt(n){return Math.floor(Math.random()*n);}

function pickSession(){
  clearPools();
  CUR_THEME = THEMES[rndInt(THEMES.length)];
  CUR_WAVE  = WAVES[rndInt(WAVES.length)];
  CUR_PAT   = PATTERNS[rndInt(PATTERNS.length)];
  CUR_SPEED = 0.030+Math.random()*0.040;
  CUR_THEME.init(W,H);
  // 1-4 balls
  BALLS=[];
  var nb=1+rndInt(4);
  for(var i=0;i<nb;i++){
    var pat=i===0?CUR_PAT:PATTERNS[rndInt(PATTERNS.length)];
    var phase=i*Math.PI*0.5;
    var baseR=Math.min(W,H)*(0.038+Math.random()*0.045);
    BALLS.push({
      pat:pat, phase:phase,
      baseR:baseR, styleIdx:rndInt(BALL_STYLES.length),
      cx:W/2,cy:H/2,prevCx:W/2,prevCy:H/2,
      trail:[],
      pulsing:Math.random()<0.4,
      pulseAmt:0.15+Math.random()*0.25,
      spd:CUR_SPEED*(0.7+Math.random()*0.6),
    });
  }
}

function startSession(){
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  stopBinaural(); stopPad();
  pickSession();
  TF=0;
  if(!audioReady) initAudio();
  else{startBinaural();startPad();}
  loop();
}

// ═══════════════════════════════════════════════════════
// DRAW TRAIL
// ═══════════════════════════════════════════════════════
function drawTrail(ball){
  var tr=CUR_THEME.tr, tg=CUR_THEME.tg, tb=CUR_THEME.tb;
  var br=ball.baseR;
  for(var i=1;i<ball.trail.length;i++){
    var p=ball.trail[i], pp=ball.trail[i-1];
    var frac=i/ball.trail.length;
    ctx.strokeStyle='rgba('+tr+','+tg+','+tb+','+(frac*0.60)+')';
    ctx.lineWidth=br*0.5+frac*br*1.2;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(pp.x,pp.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════
// DRAW UI
// ═══════════════════════════════════════════════════════
function drawUI(){
  var wave=CUR_WAVE;
  var px=ctx.getImageData(10,10,1,1).data;
  var bright=(px[0]+px[1]+px[2])/3;
  var isDark=bright<100;
  var textCol=isDark?'rgba(255,255,255,0.96)':'rgba(15,15,15,0.92)';
  var pillCol=isDark?'rgba(0,0,0,0.62)':'rgba(255,255,255,0.78)';
  var subCol=isDark?'rgba(220,210,255,0.98)':'rgba(40,30,80,0.90)';
  var shadowC=isDark?'rgba(0,0,0,1)':'rgba(255,255,255,0.9)';
  var fs=Math.floor(H*0.030);

  // Top — two lines
  ctx.save();
  ctx.fillStyle=pillCol; ctx.beginPath(); ctx.roundRect(W*0.12,H*0.022,W*0.76,H*0.108,H*0.036); ctx.fill();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold '+fs+'px -apple-system,Arial,sans-serif';
  ctx.fillStyle=textCol; ctx.shadowColor=shadowC; ctx.shadowBlur=8;
  ctx.fillText('👁  Follow the circle',CX,H*0.047);
  ctx.font=Math.floor(H*0.025)+'px -apple-system,Arial,sans-serif';
  ctx.fillText('with your eyes to relax',CX,H*0.082);
  ctx.restore();

  // Bottom — wave
  ctx.save();
  ctx.fillStyle=pillCol; ctx.beginPath(); ctx.roundRect(W*0.08,H*0.898,W*0.84,H*0.072,H*0.036); ctx.fill();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold '+Math.floor(H*0.024)+'px -apple-system,Arial,sans-serif';
  ctx.fillStyle=subCol; ctx.shadowColor=shadowC; ctx.shadowBlur=8;
  ctx.fillText(wave.name+' waves'+(wave.hz>0?' '+wave.hz+'Hz':'')+'  ·  '+wave.help,CX,H*0.934);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════
function loop(){
  RAF=requestAnimationFrame(loop);
  TF++;

  // Update balls
  var primaryX=0.5, primarySpd=0;
  BALLS.forEach(function(ball,idx){
    ball.phase+=ball.spd;
    var pos=ball.pat.fn(ball.phase);
    ball.prevCx=ball.cx; ball.prevCy=ball.cy;
    ball.cx+=(pos.x*W-ball.cx)*0.14;
    ball.cy+=(pos.y*H-ball.cy)*0.14;
    ball.trail.push({x:ball.cx,y:ball.cy});
    if(ball.trail.length>40)ball.trail.shift();
    if(idx===0){ primarySpd=Math.hypot(ball.cx-ball.prevCx,ball.cy-ball.prevCy); primaryX=ball.cx/W; }
  });

  setWhoosh(primaryX,primarySpd);

  // Background
  CUR_THEME.draw(ctx,W,H,TF,BALLS[0].cx,BALLS[0].cy);

  // Balls
  BALLS.forEach(function(ball){
    drawTrail(ball);
    var spd=Math.hypot(ball.cx-ball.prevCx,ball.cy-ball.prevCy);
    var r=ball.baseR;
    if(ball.pulsing) r*=(1+Math.sin(TF*0.14)*ball.pulseAmt);
    if(spd>2) r*=(1+Math.min(spd*0.018,0.25));
    var tr=CUR_THEME.tr, tg=CUR_THEME.tg, tb=CUR_THEME.tb;
    var gHex='#'+[tr,tg,tb].map(function(v){return Math.min(255,v).toString(16).padStart(2,'0');}).join('');
    // Outer glow
    ctx.save();
    var glowR=r*2.0;
    var glowG=ctx.createRadialGradient(ball.cx,ball.cy,r*0.1,ball.cx,ball.cy,glowR);
    glowG.addColorStop(0,'rgba('+tr+','+tg+','+tb+',0.35)');
    glowG.addColorStop(1,'transparent');
    ctx.fillStyle=glowG; ctx.beginPath(); ctx.arc(ball.cx,ball.cy,glowR,0,Math.PI*2); ctx.fill();
    // Ball style
    var vx=ball.cx-ball.prevCx, vy=ball.cy-ball.prevCy;
    BALL_STYLES[ball.styleIdx](ctx,ball.cx,ball.cy,r,CUR_THEME.ball,gHex,TF,vx,vy);
    ctx.restore();
  });

  drawUI();

  if(TF>=MAX_F){
    stopBinaural(); stopPad();
    try{if(wNoise)wNoise.stop();}catch(e){}
    try{if(wOsc)wOsc.stop();}catch(e){}
    window.stopRecording();
    cancelAnimationFrame(RAF); RAF=null;
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function onTap(){
  if(!audioReady){initAudio();startSession();return;}
  startSession();
}
cv.addEventListener('click',onTap);
cv.addEventListener('touchstart',function(e){e.preventDefault();onTap();},{passive:false});
window.addEventListener('DOMContentLoaded',function(){
  resize();
  pickSession();
  TF=0;
  try{initAudio();}catch(e){}
  loop();
});
window.addEventListener('resize',function(){resize();});
</script>
