<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASMR</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{width:100vw;height:100vh;overflow:hidden;background:#000;}canvas{position:fixed;inset:0;width:100%;height:100%;}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,CX,CY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;CX=W/2;CY=H/2;}
resize();
function rnd(a,b){return a+Math.random()*(b-a);}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ═══════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════
const AC=new(window.AudioContext||window.webkitAudioContext)();
AC.resume().catch(()=>{});
['touchstart','click'].forEach(e=>document.addEventListener(e,()=>{if(AC.state==='suspended')AC.resume();},{once:true}));
const MG=AC.createGain();MG.gain.value=0.85;MG.connect(AC.destination);
const RD=AC.createMediaStreamDestination();MG.connect(RD);

let wN=null,wG=null,wP=null,wF=null,wN2=null;
function startWhoosh(vol){
  if(wN){try{wN.stop();}catch(e){}}
  if(wN2){try{wN2.stop();}catch(e){}}
  const sr=AC.sampleRate,len=sr*4;
  function mkNoise(freq,q,gain){
    const buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
    const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
    const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;
    const g=AC.createGain();g.gain.value=gain*(vol||1);
    src.connect(f);f.connect(g);return{src,g};
  }
  const h=mkNoise(480,1.0,0.85),l=mkNoise(150,1.2,0.40);
  wN=h.src;wF=null;wG=h.g;wN2=l.src;
  wP=AC.createStereoPanner?AC.createStereoPanner():null;
  if(wP){h.g.connect(wP);l.g.connect(wP);wP.connect(MG);}
  else{h.g.connect(MG);l.g.connect(MG);}
  h.src.start();l.src.start();
}
function setWhoosh(xFrac,spd,vol){
  if(!wG||!AC)return;
  if(wP)wP.pan.setTargetAtTime(Math.max(-1,Math.min(1,xFrac*2-1)),AC.currentTime,0.04);
  wG.gain.setTargetAtTime(Math.max((vol||0.5)*0.5,Math.min((vol||1)*1.5,(vol||0.85)*0.5+spd*0.05)),AC.currentTime,0.04);
}
function stopWhoosh(){try{if(wN)wN.stop();}catch(e){}try{if(wN2)wN2.stop();}catch(e){}}

let binL=null,binR=null,padNodes=[];
function startBinaural(base,hz,vol){
  stopBinaural();
  try{
    const merger=AC.createChannelMerger(2);
    const oL=AC.createOscillator(),gL=AC.createGain();oL.type='sine';oL.frequency.value=base;gL.gain.value=vol||0.20;oL.connect(gL);gL.connect(merger,0,0);
    const oR=AC.createOscillator(),gR=AC.createGain();oR.type='sine';oR.frequency.value=base+(hz||0);gR.gain.value=vol||0.20;oR.connect(gR);gR.connect(merger,0,1);
    merger.connect(MG);oL.start();oR.start();binL=oL;binR=oR;
  }catch(e){}
}
function stopBinaural(){try{if(binL)binL.stop();}catch(e){}try{if(binR)binR.stop();}catch(e){}binL=null;binR=null;}
function startPad(freqs,vol){
  stopPad();
  (freqs||[]).forEach(f=>{try{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.05,t+2);o.connect(g);g.connect(MG);o.start();padNodes.push(o,g);}catch(e){}});
}
function stopPad(){padNodes.forEach(n=>{try{n.stop&&n.stop();}catch(e){}});padNodes=[];}

function playScratch(freq,vol,pan){
  try{
    const sr=AC.sampleRate,len=Math.floor(sr*0.07),buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const e=Math.pow(1-i/len,0.5);d[i]=(Math.random()*2-1)*e;}
    const src=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();
    f.type='bandpass';f.frequency.value=freq;f.Q.value=1.6;g.gain.value=Math.min(0.65,vol);
    const p=pan!==undefined&&AC.createStereoPanner?AC.createStereoPanner():null;
    src.buffer=buf;src.connect(f);f.connect(g);
    if(p){g.connect(p);p.pan.value=Math.max(-1,Math.min(1,pan));p.connect(MG);}else g.connect(MG);
    src.start();src.stop(AC.currentTime+0.09);
  }catch(e){}
}
function playPong(freq,vol,pan){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    const p=pan!==undefined&&AC.createStereoPanner?AC.createStereoPanner():null;
    o.type='sine';o.frequency.value=freq;
    const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(g);if(p){g.connect(p);p.pan.value=pan;p.connect(MG);}else g.connect(MG);
    o.start(t);o.stop(t+0.2);
  }catch(e){}
}
function playFlash(vol,freq){
  try{
    const sr=AC.sampleRate,len=Math.floor(sr*0.06),buf=AC.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const e=Math.pow(1-i/len,2.0);d[i]=(Math.random()*2-1)*e;}
    const src=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();
    f.type='highpass';f.frequency.value=freq||800;g.gain.value=Math.min(0.8,vol||0.4);
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(MG);src.start();src.stop(AC.currentTime+0.07);
  }catch(e){}
}

// ═══════════════════════════════════════════════════
// RECORDING
// ═══════════════════════════════════════════════════
let _mr=null,_rc=[],_rb=null;
window._recordingDone=false;
window.startRecording=function(fps){
  try{
    _rc=[];_rb=null;window._recordingDone=false;AC.resume().catch(()=>{});
    const vs=cv.captureStream(fps||30),at=RD.stream.getAudioTracks();
    const ms=new MediaStream([...vs.getVideoTracks(),...at]);
    const mt=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _mr=new MediaRecorder(ms,{mimeType:mt,videoBitsPerSecond:8000000});
    _mr.ondataavailable=e=>{if(e.data&&e.data.size>0)_rc.push(e.data);};
    _mr.onstop=()=>{_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;};
    _mr.start(200);
  }catch(e){console.error(e);}
};
window.stopRecording=function(){try{if(_mr&&_mr.state!=='inactive')_mr.stop();}catch(e){}};
window.forceFinalize=function(){try{if(_rc.length>0&&!window._recordingDone){_rb=new Blob(_rc,{type:'video/webm'});window._recordingDone=true;}}catch(e){}};
window.getRecordingBase64=function(){return new Promise((res,rej)=>{const chk=()=>{if(!_rb){setTimeout(chk,100);return;}const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(_rb);};chk();});};

// ═══════════════════════════════════════════════════
// SHARED DRAW HELPERS
// ═══════════════════════════════════════════════════
function drawBall(bx,by,r,h,s,l,gh,gs,gl){
  if(r<1)return;
  const col=`hsl(${h},${s}%,${l}%)`;
  const glow=ctx.createRadialGradient(bx,by,r*0.1,bx,by,r*2.0);
  glow.addColorStop(0,`hsla(${gh},${gs}%,${gl}%,0.30)`);glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(bx,by,r*2.0,0,Math.PI*2);ctx.fill();
  const bg=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.05,bx,by,r);
  bg.addColorStop(0,'rgba(255,255,255,0.60)');bg.addColorStop(0.5,col);bg.addColorStop(1,`hsl(${gh},${gs}%,${gl}%)`);
  ctx.fillStyle=bg;ctx.shadowColor=col;ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.72)';ctx.beginPath();ctx.arc(bx-r*0.28,by-r*0.28,r*0.20,0,Math.PI*2);ctx.fill();
}
function drawTrailArr(trail,r,h,s,l){
  for(let i=1;i<trail.length;i++){
    const p=trail[i],pp=trail[i-1],frac=i/trail.length;
    ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${frac*0.50})`;
    ctx.lineWidth=r*0.3+frac*r*0.9;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(pp.x,pp.y);ctx.lineTo(p.x,p.y);ctx.stroke();
  }
}
function mkBallProps(){
  const h=rndInt(0,359),s=rndInt(55,95),l=rndInt(45,72);
  const gh=(h+40)%360,gs=s,gl=Math.min(85,l+18),th=(h+20)%360;
  const base=Math.min(W,H)*rnd(0.038,0.080);
  return{h,s,l,gh,gs,gl,th,ts:s,tl:l,base,pulsing:Math.random()<0.5,
    minR:base*rnd(0.50,0.78),maxR:base*rnd(1.15,1.60),pulseSpd:rnd(0.04,0.16)};
}
function getBR(b,TF){if(!b.pulsing)return b.base;return b.minR+(b.maxR-b.minR)*(0.5+Math.sin(TF*b.pulseSpd)*0.5);}

const WAVES=[
  {name:'Alpha 10Hz',help:'Relaxed & calm',base:200,hz:10,pad:[130,196,261]},
  {name:'Theta 6Hz',help:'Deep relaxation',base:180,hz:6,pad:[108,162,216]},
  {name:'Alpha 8Hz',help:'Stress relief',base:210,hz:8,pad:[132,198,264]},
  {name:'432 Hz',help:'Natural harmony',base:432,hz:0,pad:[216,324,432]},
  {name:'528 Hz',help:'Healing tone',base:528,hz:0,pad:[264,396,528]},
  {name:'Schumann',help:'Earth resonance',base:185,hz:7.83,pad:[111,166,222]},
];

const BG_STYLES=[
  (T)=>{ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);},
  (T)=>{ctx.fillStyle='#0a0505';ctx.fillRect(0,0,W,H);},
  (T)=>{ctx.fillStyle='#030a03';ctx.fillRect(0,0,W,H);},
  (T)=>{ctx.fillStyle='#080010';ctx.fillRect(0,0,W,H);},
  (T)=>{const h=rndInt(0,359);const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,`hsl(${h},30%,6%)`);g.addColorStop(1,`hsl(${(h+30)%360},30%,10%)`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);},
  (T)=>{ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W,H);},
  (T)=>{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#e8f4ff');g.addColorStop(1,'#c8e0ff');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);},
];
let bgFn=BG_STYLES[0];

// ═══════════════════════════════════════════════════
// PATTERNS (shared pool, no side-scratch)
// ═══════════════════════════════════════════════════
function mkPatterns(){return[
  function(){const cx=rnd(0.25,0.75),cy=rnd(0.25,0.75),rx=rnd(0.14,0.38),ry=rnd(0.12,0.32);const dir=Math.random()<0.5?1:-1,spd=rnd(0.025,0.070);let t=rnd(0,Math.PI*2);return{label:'Circle',lerpSpd:rnd(0.10,0.22),getTarget(){t+=spd*dir;return{x:cx+Math.cos(t)*rx,y:cy+Math.sin(t)*ry};}}; },
  function(){const cy=rnd(0.25,0.75),yw=rnd(0.02,0.10),spd=rnd(0.055,0.130);let t=0;return{label:'Side to Side',lerpSpd:rnd(0.15,0.30),getTarget(){t+=spd;return{x:0.5+Math.sin(t)*0.44,y:cy+Math.sin(t*2.1)*yw};}};},
  function(){const cx=rnd(0.25,0.75),xw=rnd(0.02,0.09),spd=rnd(0.055,0.130);let t=0;return{label:'Up Down',lerpSpd:rnd(0.15,0.30),getTarget(){t+=spd;return{x:cx+Math.sin(t*1.7)*xw,y:0.5+Math.sin(t)*0.42};}};},
  function(){const aUp=Math.random()<0.5,gR=Math.random()<0.5,sy=rnd(0.35,0.65),ey=rnd(0.35,0.65),pY=aUp?rnd(0.06,0.22):rnd(0.78,0.94);let t=0;const spd=rnd(0.015,0.045);return{label:'Arch',lerpSpd:rnd(0.08,0.20),getTarget(){t=(t+spd)%1;const u=t,sx=gR?0.04:0.96,ex=gR?0.96:0.04,mx=(sx+ex)/2;return{x:(1-u)*(1-u)*sx+2*(1-u)*u*mx+u*u*ex,y:(1-u)*(1-u)*sy+2*(1-u)*u*pY+u*u*ey};}};},
  function(){const bCX=rnd(0.30,0.70),bCY=rnd(0.30,0.70),bRX=rnd(0.18,0.35),bRY=rnd(0.14,0.28);const bSpd=rnd(0.012,0.028)*(Math.random()<0.5?1:-1),sR=rnd(0.05,0.14),sSpd=rnd(0.045,0.130)*(Math.random()<0.5?1:-1);let bT=rnd(0,Math.PI*2),sT=rnd(0,Math.PI*2);return{label:'Orbital',lerpSpd:rnd(0.10,0.22),getTarget(){bT+=bSpd;sT+=sSpd;return{x:Math.max(0.02,Math.min(0.98,bCX+Math.cos(bT)*bRX+Math.cos(sT)*sR)),y:Math.max(0.02,Math.min(0.98,bCY+Math.sin(bT)*bRY+Math.sin(sT)*sR))};} };},
  function(){let tx=rnd(0.1,0.9),ty=rnd(0.1,0.9),timer=0,interval=rndInt(3,10);return{label:'Aggressive',lerpSpd:rnd(0.28,0.48),getTarget(){timer++;if(timer>=interval){timer=0;interval=rndInt(3,10);tx=rnd(0.05,0.95);ty=rnd(0.05,0.95);}return{x:tx,y:ty};}};},
  function(){let tx=rnd(0.1,0.9),ty=rnd(0.1,0.9),timer=0,interval=rndInt(20,60);return{label:'Drift',lerpSpd:rnd(0.04,0.10),getTarget(){timer++;if(timer>=interval){timer=0;interval=rndInt(18,55);tx=rnd(0.08,0.92);ty=rnd(0.08,0.92);}return{x:tx,y:ty};}};},
  function(){const cx=rnd(0.25,0.75),cy=rnd(0.25,0.75),spd=rnd(0.04,0.10);let t=rnd(0,Math.PI*2);return{label:'Figure8',lerpSpd:rnd(0.12,0.25),getTarget(){t+=spd;return{x:0.5+Math.sin(t)*0.42,y:0.5+Math.sin(t*2)*0.22};}};},
].map(f=>f());}

// ═══════════════════════════════════════════════════
// SCENE 1 — SMOOTH FOLLOW (binaural + follow patterns)
// ═══════════════════════════════════════════════════
function makeScene1(){
  const wave=pick(WAVES);
  const b=mkBallProps();
  const pats=mkPatterns();
  const pat=pick(pats);
  const speed=rnd(0.025,0.065);
  bgFn=pick(BG_STYLES.slice(0,5));
  return{
    type:1,b,pat,speed,wave,
    cx:0.5,cy:0.5,prevCx:0.5,prevCy:0.5,trail:[],TF:0,
    ui:{l1:'👁  Follow the circle',l2:'with your eyes to relax',wl:`${wave.name}  ·  ${wave.help}`}
  };
}
function initScene1(sc){
  startWhoosh(0.9);startBinaural(sc.wave.base,sc.wave.hz,0.20);startPad(sc.wave.pad,0.050);
}
function runScene1(sc,TF){
  sc.TF++;const tgt=sc.pat.getTarget();
  sc.prevCx=sc.cx;sc.prevCy=sc.cy;
  sc.cx+=(tgt.x-sc.cx)*sc.pat.lerpSpd;sc.cy+=(tgt.y-sc.cy)*sc.pat.lerpSpd;
  const spd=Math.hypot((sc.cx-sc.prevCx)*W,(sc.cy-sc.prevCy)*H);
  setWhoosh(sc.cx,spd,0.9);
  sc.trail.push({x:sc.cx*W,y:sc.cy*H});if(sc.trail.length>42)sc.trail.shift();
  bgFn(TF);
  const r=getBR(sc.b,sc.TF);
  drawTrailArr(sc.trail,r,sc.b.th,sc.b.ts,sc.b.tl);
  drawBall(sc.cx*W,sc.cy*H,r,sc.b.h,sc.b.s,sc.b.l,sc.b.gh,sc.b.gs,sc.b.gl);
  drawUI(sc.ui.l1,sc.ui.l2,sc.ui.wl,true);
}

// ═══════════════════════════════════════════════════
// SCENE 2 — PONG BOUNCE
// ═══════════════════════════════════════════════════
function makeScene2(){
  const b=mkBallProps();
  const ang=rnd(0.3,1.2),spd=rnd(4.0,11.0);
  const hasBgBall=Math.random()<0.6;
  const bg2=mkBallProps();bg2.h=(b.h+150+rndInt(-30,30)+360)%360;bg2.gh=(bg2.h+40)%360;
  bgFn=pick(BG_STYLES);
  return{
    type:2,b,bg2,hasBgBall,
    cx:W/2,cy:H/2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    bgCx:0.5,bgCy:0.5,bgPat:pick(mkPatterns()),bgPhase:rnd(0,Math.PI*2),bgSpd:rnd(0.010,0.022),
    trail:[],TF:0,basePitch:rnd(200,600),baseVol:rnd(0.12,0.30),
    accel:Math.random()<0.4,accelAmt:rnd(0.002,0.008),accelDir:1,baseSpd:spd,
    colorShift:Math.random()<0.4,
    ui:{l1:'👁  Follow the ball',l2:'it will bounce off the edges',wl:''}
  };
}
function initScene2(sc){startWhoosh(0.6);}
function runScene2(sc,TF){
  sc.TF++;
  const r=getBR(sc.b,sc.TF);
  const pad=r;
  sc.cx+=sc.vx;sc.cy+=sc.vy;
  if(sc.cx-pad<0){sc.cx=pad;sc.vx=Math.abs(sc.vx);playPong(sc.basePitch*rnd(0.6,1.8),Math.min(0.6,sc.baseVol*rnd(0.5,1.4)),(sc.cx/W)*2-1);}
  if(sc.cx+pad>W){sc.cx=W-pad;sc.vx=-Math.abs(sc.vx);playPong(sc.basePitch*rnd(0.6,1.8),Math.min(0.6,sc.baseVol*rnd(0.5,1.4)),(sc.cx/W)*2-1);}
  if(sc.cy-pad<0){sc.cy=pad;sc.vy=Math.abs(sc.vy);playPong(sc.basePitch*rnd(0.6,1.8),Math.min(0.6,sc.baseVol*rnd(0.5,1.4)),(sc.cx/W)*2-1);}
  if(sc.cy+pad>H){sc.cy=H-pad;sc.vy=-Math.abs(sc.vy);playPong(sc.basePitch*rnd(0.6,1.8),Math.min(0.6,sc.baseVol*rnd(0.5,1.4)),(sc.cx/W)*2-1);}
  if(sc.accel){const cs=Math.hypot(sc.vx,sc.vy);if(cs>sc.baseSpd*1.8)sc.accelDir=-1;if(cs<sc.baseSpd*0.4)sc.accelDir=1;const ns=cs*(1+sc.accelAmt*sc.accelDir);sc.vx=sc.vx/cs*ns;sc.vy=sc.vy/cs*ns;}
  if(sc.hasBgBall){sc.bgPhase+=sc.bgSpd;const bp=sc.bgPat.getTarget();sc.bgCx+=(bp.x-sc.bgCx)*0.06;sc.bgCy+=(bp.y-sc.bgCy)*0.06;}
  setWhoosh(sc.cx/W,Math.hypot(sc.vx,sc.vy),0.6);
  sc.trail.push({x:sc.cx,y:sc.cy});if(sc.trail.length>38)sc.trail.shift();
  bgFn(TF);
  if(sc.hasBgBall){ctx.save();ctx.globalAlpha=0.35;drawBall(sc.bgCx*W,sc.bgCy*H,getBR(sc.bg2,sc.TF),sc.bg2.h,70,60,sc.bg2.gh,70,75);ctx.restore();}
  drawTrailArr(sc.trail,r,sc.b.th,sc.b.ts,sc.b.tl);
  drawBall(sc.cx,sc.cy,r,sc.b.h,sc.b.s,sc.b.l,sc.b.gh,sc.b.gs,sc.b.gl);
  drawUI(sc.ui.l1,sc.ui.l2,'',true);
}

// ═══════════════════════════════════════════════════
// SCENE 3 — SCRATCH (single ball, fast patterns)
// ═══════════════════════════════════════════════════
function makeScene3(){
  const b=mkBallProps();
  const pats=mkPatterns();
  bgFn=pick(BG_STYLES.slice(0,5));
  return{
    type:3,b,curPat:pick(pats),patDur:rndInt(600,1800),patTimer:0,
    cx:0.5,cy:0.5,prevCx:0.5,prevCy:0.5,trail:[],TF:0,scCool:0,lastDirX:0,
    ui:{l1:'👁  Watch the movement',l2:'let your eyes follow',wl:''}
  };
}
function initScene3(sc){startWhoosh(0.85);}
function runScene3(sc,TF){
  sc.TF++;sc.patTimer++;
  if(sc.patTimer>=sc.patDur){sc.patTimer=0;sc.patDur=rndInt(600,1800);sc.curPat=pick(mkPatterns());if(Math.random()<0.3){const b2=mkBallProps();Object.assign(sc.b,b2);}}
  const tgt=sc.curPat.getTarget();
  sc.prevCx=sc.cx;sc.prevCy=sc.cy;
  sc.cx+=(tgt.x-sc.cx)*sc.curPat.lerpSpd;sc.cy+=(tgt.y-sc.cy)*sc.curPat.lerpSpd;

  function(){const spd=rnd(0.04,0.10);let t=rnd(0,Math.PI*2);return{fn(){t+=spd;return{x:0.5+Math.sin(t)*0.40,y:0.5+Math.sin(t*2)*0.20};} };},

function makeScene6(){
  const modes=['strobe','single','flicker','slow_pulse','burst'];
  const flashMode=pick(modes);

  const ms={timer:0};
  if(flashMode==='strobe'){ms.interval=rndInt(4,18);ms.onF=rndInt(1,5);ms.on=false;}
  else if(flashMode==='single'){ms.phase='dark';ms.darkDur=rndInt(20,90);ms.holdDur=rndInt(5,40);ms.fadeDur=rndInt(10,50);}
  else if(flashMode==='flicker'){ms.interval=rndInt(2,8);ms.minB=rnd(0.0,0.3);}
  else if(flashMode==='slow_pulse'){ms.spd=rnd(0.012,0.040);ms.minB=rnd(0.0,0.15);ms.t=0;}
  else if(flashMode==='burst'){ms.phase='dark';ms.darkDur=rndInt(40,120);ms.burstCount=0;ms.burstMax=rndInt(3,10);ms.burstInterval=rndInt(2,8);}

}

  const s=sc.ms;s.timer++;

    else if(s.phase==='flash'){sc.brightness=1.0;if(s.timer>=3){s.phase='hold';s.timer=0;}}
    else if(s.phase==='hold'){sc.brightness=1.0;if(s.timer>=s.holdDur){s.phase='fade';s.timer=0;}}
    else if(s.phase==='fade'){sc.brightness=1.0-s.timer/s.fadeDur;if(s.timer>=s.fadeDur){s.phase='dark';s.timer=0;sc.brightness=0;s.darkDur=rndInt(20,90);}}
  } else if(sc.flashMode==='flicker'){

  }
}

const SCENE_RUNS=[runScene1,runScene2,runScene3,runScene4,runScene5,runScene6];

let SESSION=null, TF=0, RAF=null;
const TOTAL_F=20*60; // 20 seconds
const FADE_IN_F=60;  // 1s fade in
const FADE_OUT_F=90; // 1.5s fade out

function startSession(){
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  stopBinaural();stopPad();stopWhoosh();
  TF=0;
  const idx=rndInt(0,SCENE_MAKERS.length-1);
  SESSION=SCENE_MAKERS[idx]();
  SCENE_INITS[idx](SESSION);
  loop();
}

function loop(){
  RAF=requestAnimationFrame(loop);TF++;
  const runFn=SCENE_RUNS[SESSION.type-1];
  runFn(SESSION,TF);

  // Fade in
  if(TF<=FADE_IN_F){
    const a=1-(TF/FADE_IN_F);
    ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.fillRect(0,0,W,H);
  }
  // Fade out + stop
  if(TF>=TOTAL_F-FADE_OUT_F){
    const a=(TF-(TOTAL_F-FADE_OUT_F))/FADE_OUT_F;
    ctx.fillStyle=`rgba(0,0,0,${Math.min(1,a)})`;ctx.fillRect(0,0,W,H);
  }
  if(TF>=TOTAL_F){
    stopBinaural();stopPad();stopWhoosh();
    window.stopRecording();
    cancelAnimationFrame(RAF);RAF=null;
  }
}

window.addEventListener('DOMContentLoaded',()=>{resize();startSession();});
cv.addEventListener('click',()=>startSession());
cv.addEventListener('touchstart',e=>{e.preventDefault();startSession();},{passive:false});
window.addEventListener('resize',()=>resize());
</script>
