<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Gospel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation;}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
#fxCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none}
#flash{position:fixed;inset:0;z-index:50;opacity:0;pointer-events:none}
#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8vw 8vw 10vw;cursor:pointer;}
.corn{position:fixed;width:52px;height:52px;z-index:11;pointer-events:none;opacity:0;transition:opacity 1.2s ease}
.corn.tl{top:10px;left:10px}
.corn.tr{top:10px;right:10px;transform:scaleX(-1)}
.corn.bl{bottom:10px;left:10px;transform:scaleY(-1)}
.corn.br{bottom:10px;right:10px;transform:scale(-1)}

/* TOP HEADER */
#top-header{display:flex;flex-direction:column;align-items:center;gap:2vw;opacity:0;transition:opacity 1.4s ease;width:100%;padding-top:4vw;}
#top-eyebrow{font-family:'Cinzel',serif;font-size:clamp(0.45rem,2.4vw,0.65rem);letter-spacing:0.55em;text-transform:uppercase;color:var(--accent);opacity:0.6;text-align:center;}
#top-divider{width:40px;height:1px;background:var(--accent);opacity:0.4;margin:1vw auto;}
#top-title{font-family:'Cinzel',serif;font-size:clamp(1.05rem,5.2vw,1.55rem);font-weight:600;letter-spacing:0.12em;color:var(--accent);text-align:center;text-shadow:0 0 28px var(--glow2);line-height:1.3;}
#top-divider2{width:60px;height:1px;background:var(--accent);opacity:0.3;margin:1vw auto;}

/* CARD */
#card{width:100%;background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:7vw 7vw 6vw;position:relative;box-shadow:0 0 40px var(--glow2),0 8px 32px rgba(0,0,0,0.55);opacity:0;transition:opacity 1.4s ease;flex-shrink:0;}
#card::before,#card::after{content:'';position:absolute;width:20px;height:20px;border-style:solid;border-color:var(--accent);}
#card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
#card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
#content-type{font-family:'Cinzel',serif;font-size:clamp(0.5rem,2.6vw,0.7rem);letter-spacing:0.5em;text-transform:uppercase;color:var(--accent);margin-bottom:4vw;opacity:0.65;text-align:center;}
#main-text{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(1.05rem,4.8vw,1.45rem);line-height:1.9;color:var(--text-color);text-align:center;min-height:3em;}
.word{display:inline;opacity:0;transition:opacity 0.38s ease}
#ref{font-family:'Cinzel',serif;font-size:clamp(0.5rem,2.5vw,0.7rem);letter-spacing:0.35em;text-transform:uppercase;color:var(--accent);display:block;margin-top:4vw;text-align:center;opacity:0;transition:opacity 1s ease;}

/* BOTTOM */
#bottom{display:flex;flex-direction:column;align-items:center;gap:2.5vw;opacity:0;transition:opacity 1.2s ease;width:100%;}
#bottom-verse{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(0.72rem,3.3vw,0.98rem);letter-spacing:0.04em;color:var(--accent);text-align:center;text-shadow:0 0 14px var(--glow2);max-width:90%;line-height:1.6;}
#tap-hint{font-family:'Cinzel',serif;font-size:clamp(0.4rem,2vw,0.55rem);letter-spacing:0.45em;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-top:1vw;}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<div id="vig"></div>
<div id="flash"></div>

<div class="corn tl"><svg viewBox="0 0 52 52" fill="none"><path d="M2 50L2 2L50 2" class="cs" stroke-width="1.4"/><circle cx="2" cy="2" r="2.2" class="cf"/><circle cx="26" cy="2" r="1.2" class="cf" opacity=".4"/></svg></div>
<div class="corn tr"><svg viewBox="0 0 52 52" fill="none"><path d="M2 50L2 2L50 2" class="cs" stroke-width="1.4"/><circle cx="2" cy="2" r="2.2" class="cf"/><circle cx="26" cy="2" r="1.2" class="cf" opacity=".4"/></svg></div>
<div class="corn bl"><svg viewBox="0 0 52 52" fill="none"><path d="M2 50L2 2L50 2" class="cs" stroke-width="1.4"/><circle cx="2" cy="2" r="2.2" class="cf"/><circle cx="26" cy="2" r="1.2" class="cf" opacity=".4"/></svg></div>
<div class="corn br"><svg viewBox="0 0 52 52" fill="none"><path d="M2 50L2 2L50 2" class="cs" stroke-width="1.4"/><circle cx="2" cy="2" r="2.2" class="cf"/><circle cx="26" cy="2" r="1.2" class="cf" opacity=".4"/></svg></div>

<div id="ui">
  <div id="top-header">
    <div id="top-eyebrow">✦ Daily Word ✦</div>
    <div id="top-divider"></div>
    <div id="top-title"></div>
    <div id="top-divider2"></div>
  </div>

  <div id="card">
    <div id="content-type"></div>
    <div id="main-text"></div>
    <span id="ref"></span>
  </div>

  <div id="bottom">
    <div id="bottom-verse"></div>
    <div id="tap-hint">Tap for a new word</div>
  </div>
</div>

<script>
(()=>{
'use strict';

function safeR(v){return Math.max(0.01,isFinite(v)?v:0.01);}
function rg(ctx,x,y,r0,x2,y2,r1){return ctx.createRadialGradient(x,y,safeR(r0),x2,y2,safeR(r1));}
function lg(ctx,x1,y1,x2,y2){return ctx.createLinearGradient(x1,y1,x2,y2);}

// ── AUDIO ────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
const _masterGain=AC.createGain();
_masterGain.gain.value=1.0;
_masterGain.connect(AC.destination);
let _recDest=null;
let _au=false;
function unlockAC(){if(_au)return;AC.resume().then(()=>{_au=true;startPad();});}

let _rev=null;
function getRev(){
  if(_rev)return _rev;
  try{
    const l=AC.sampleRate*3,b=AC.createBuffer(2,l,AC.sampleRate);
    for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,1.6);}
    const cv=AC.createConvolver(),g=AC.createGain();g.gain.value=0.3;
    cv.buffer=b;cv.connect(g);g.connect(_masterGain);_rev=cv;return cv;
  }catch(e){return null;}
}

let _pads=[];
function startPad(){
  stopPad();
  try{
    [196,246.94,293.66,369.99].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain(),lfo=AC.createOscillator(),lg2=AC.createGain();
      o.type='sine';o.frequency.value=f;lfo.type='sine';lfo.frequency.value=0.07+i*0.025;lg2.gain.value=1.4;
      lfo.connect(lg2);lg2.connect(o.frequency);
      const t=AC.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.024-i*0.003,t+2.8);
      const rv=getRev();o.connect(g);if(rv)g.connect(rv);g.connect(_masterGain);
      o.start(t);lfo.start(t);_pads.push({o,g,lfo});
    });
    const bl=AC.sampleRate*2,nb=AC.createBuffer(1,bl,AC.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<bl;i++)nd[i]=Math.random()*2-1;
    const loop=()=>{const s=AC.createBufferSource(),gn=AC.createGain(),f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=4200;gn.gain.value=0.003;s.buffer=nb;s.connect(f);f.connect(gn);gn.connect(_masterGain);s.onended=loop;s.start();};loop();
  }catch(e){}
}
function stopPad(){
  _pads.forEach(({o,g,lfo})=>{try{g.gain.setTargetAtTime(0,AC.currentTime,0.4);setTimeout(()=>{try{o.stop();lfo.stop();}catch(e){}},1200);}catch(e){}});_pads=[];
}

const SCALES={warm:[196,220,246.94,261.63,293.66,329.63,392],cool:[174.61,196,220,261.63,293.66,349.23,392],bright:[261.63,293.66,329.63,392,440,523.25,587.33]};
let _sk='warm',_ms=[],_mi=0,_mt=null;
function initMel(k){
  _sk=k||'warm';const sc=SCALES[_sk];
  const pp=[[0,2,4,3,2,1],[2,4,5,4,2,0],[0,1,3,4,3,1],[4,3,2,0,2,3]];
  _ms=pp[Math.floor(Math.random()*pp.length)].map(i=>sc[i]);_mi=0;
}
function playNote(){
  if(!_au)return;
  try{
    const f=_ms[_mi%_ms.length],v=0.042+Math.random()*0.024,d=3+Math.random()*1.5;
    const g=AC.createGain(),rv=getRev();g.connect(_masterGain);if(rv)g.connect(rv);
    [1,2,3].forEach((h,i)=>{
      const o=AC.createOscillator(),og=AC.createGain();o.type=i===0?'sine':'triangle';o.frequency.value=f*h;
      const hv=v*[1,.15,.04][i],t=AC.currentTime;
      og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(hv,t+0.012);og.gain.exponentialRampToValueAtTime(hv*0.2,t+0.5);og.gain.exponentialRampToValueAtTime(0.0001,t+d);
      o.connect(og);og.connect(g);o.start(t);o.stop(t+d+0.1);
    });
    _mi++;if(_mi%3===0&&Math.random()<0.38)setTimeout(()=>playNote(),700);
  }catch(e){}
}
function startMel(){clearInterval(_mt);_mt=setInterval(()=>playNote(),2500+Math.random()*900);}
function sfxTap(){if(!_au)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(880,AC.currentTime);o.frequency.exponentialRampToValueAtTime(440,AC.currentTime+0.22);const t=AC.currentTime;g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);o.connect(g);g.connect(_masterGain);o.start(t);o.stop(t+0.3);}catch(e){}}
function sfxReveal(){if(!_au)return;try{const o=AC.createOscillator(),g=AC.createGain(),rv=getRev();o.type='sine';o.frequency.value=528;const t=AC.currentTime;g.gain.setValueAtTime(0.038,t);g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);o.connect(g);if(rv)g.connect(rv);g.connect(_masterGain);o.start(t);o.stop(t+1.2);}catch(e){}}

// ── THEMES ────────────────────────────────────────────────
const THEMES=[
  {name:'Cloudy Heaven',melKey:'warm',
   cardBg:'rgba(255,255,255,0.16)',cardBorder:'rgba(255,255,255,0.4)',
   accent:'#ffffff',textColor:'#ffffff',glow:'rgba(255,255,255,0.8)',glow2:'rgba(200,220,255,0.4)',
   corner:'#cce0ff',vig:'rgba(120,160,220,0.45)',pt:{r:220,g:235,b:255},
   bv:'Heaven and earth will pass away, but my words will never pass away.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#90b8f0');g.addColorStop(0.4,'#b8d8ff');g.addColorStop(0.7,'#d8eeff');g.addColorStop(1,'#eef8ff');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawClouds(ctx,w,h,t);drawRays(ctx,w,h,t,'rgba(255,255,255,');}},
  {name:'Black & Gold',melKey:'warm',
   cardBg:'rgba(4,2,0,0.9)',cardBorder:'rgba(212,175,55,0.45)',
   accent:'#d4af37',textColor:'#f0d070',glow:'rgba(255,200,0,0.9)',glow2:'rgba(180,130,0,0.4)',
   corner:'#d4af37',vig:'rgba(0,0,0,0.75)',pt:{r:255,g:210,b:60},
   bv:'The Lord is my light and my salvation.',
   draw(ctx,w,h,t){ctx.fillStyle='#04020a';ctx.fillRect(0,0,w,h);drawGoldPat(ctx,w,h);drawRays(ctx,w,h,t,'rgba(255,200,50,');}},
  {name:'Deep Sky',melKey:'cool',
   cardBg:'rgba(4,12,36,0.86)',cardBorder:'rgba(100,160,255,0.4)',
   accent:'#88bbff',textColor:'#c0d8ff',glow:'rgba(100,160,255,0.8)',glow2:'rgba(50,100,220,0.4)',
   corner:'#6699ff',vig:'rgba(0,4,18,0.65)',pt:{r:120,g:180,b:255},
   bv:'For I know the plans I have for you, plans for peace and not disaster.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#020510');g.addColorStop(0.5,'#040a26');g.addColorStop(1,'#081840');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawStars(ctx,w,h,t,false);drawRays(ctx,w,h,t,'rgba(100,160,255,');}},
  {name:'Cosmos',melKey:'cool',
   cardBg:'rgba(3,0,12,0.88)',cardBorder:'rgba(160,100,255,0.4)',
   accent:'#cc88ff',textColor:'#e0c8ff',glow:'rgba(160,80,255,0.8)',glow2:'rgba(100,30,200,0.4)',
   corner:'#aa66ff',vig:'rgba(0,0,6,0.7)',pt:{r:180,g:120,b:255},
   bv:'He determines the number of the stars and calls them each by name.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,w,h);g.addColorStop(0,'#02000a');g.addColorStop(0.5,'#080018');g.addColorStop(1,'#020008');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawNebula(ctx,w,h,t);drawStars(ctx,w,h,t,true);drawRays(ctx,w,h,t,'rgba(160,80,255,');}},
  {name:'Golden Sunset',melKey:'bright',
   cardBg:'rgba(10,3,0,0.86)',cardBorder:'rgba(255,160,50,0.4)',
   accent:'#ffaa44',textColor:'#ffd090',glow:'rgba(255,150,50,0.9)',glow2:'rgba(200,100,20,0.4)',
   corner:'#ffaa44',vig:'rgba(4,0,0,0.5)',pt:{r:255,g:160,b:60},
   bv:'The steadfast love of the Lord never ceases; his mercies never come to an end.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#080204');g.addColorStop(0.2,'#380600');g.addColorStop(0.45,'#b84000');g.addColorStop(0.65,'#ee7c00');g.addColorStop(0.82,'#ffbc38');g.addColorStop(1,'#ffde78');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);const sg=rg(ctx,w/2,h*.62,0.01,w/2,h*.62,safeR(h*.55));sg.addColorStop(0,`rgba(255,240,180,${0.2+Math.sin(t*.3)*.06})`);sg.addColorStop(.4,'rgba(255,160,30,0.08)');sg.addColorStop(1,'transparent');ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);ctx.restore();drawRays(ctx,w,h,t,'rgba(255,200,80,');}},
  {name:'Purple Mystical',melKey:'cool',
   cardBg:'rgba(5,0,10,0.88)',cardBorder:'rgba(180,80,255,0.4)',
   accent:'#cc66ff',textColor:'#ddb0ff',glow:'rgba(180,60,255,0.85)',glow2:'rgba(120,20,200,0.45)',
   corner:'#bb55ff',vig:'rgba(2,0,5,0.68)',pt:{r:200,g:100,b:255},
   bv:'Oh, the depth of the riches of the wisdom and knowledge of God!',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#030008');g.addColorStop(0.5,'#0a001e');g.addColorStop(1,'#04000c');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawAurora(ctx,w,h,t,'rgba(160,0,255,');drawRays(ctx,w,h,t,'rgba(160,60,255,');}},
  {name:'Emerald',melKey:'bright',
   cardBg:'rgba(0,7,2,0.88)',cardBorder:'rgba(40,200,100,0.4)',
   accent:'#44ee99',textColor:'#aaffcc',glow:'rgba(40,220,110,0.85)',glow2:'rgba(10,160,70,0.45)',
   corner:'#33cc88',vig:'rgba(0,3,1,0.65)',pt:{r:60,g:240,b:150},
   bv:'He makes me lie down in green pastures. He leads me beside still waters.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#000902');g.addColorStop(0.5,'#001306');g.addColorStop(1,'#000b03');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawAurora(ctx,w,h,t,'rgba(20,200,80,');drawRays(ctx,w,h,t,'rgba(50,220,130,');}},
  {name:'Rose Dawn',melKey:'bright',
   cardBg:'rgba(10,2,5,0.87)',cardBorder:'rgba(255,100,160,0.4)',
   accent:'#ff88bb',textColor:'#ffc0d8',glow:'rgba(255,80,150,0.85)',glow2:'rgba(200,40,100,0.4)',
   corner:'#ff6699',vig:'rgba(4,0,2,0.58)',pt:{r:255,g:120,b:180},
   bv:'We love because He first loved us.',
   draw(ctx,w,h,t){const g=lg(ctx,0,0,0,h);g.addColorStop(0,'#070007');g.addColorStop(0.35,'#260010');g.addColorStop(0.65,'#5e0026');g.addColorStop(1,'#160007');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawAurora(ctx,w,h,t,'rgba(255,50,120,');drawRays(ctx,w,h,t,'rgba(255,100,160,');}},
  {name:'Holy Light',melKey:'bright',
   cardBg:'rgba(255,255,255,0.22)',cardBorder:'rgba(180,200,255,0.55)',
   accent:'#334499',textColor:'#1a2266',glow:'rgba(180,200,255,0.7)',glow2:'rgba(150,180,255,0.3)',
   corner:'#7788cc',vig:'rgba(180,200,240,0.28)',pt:{r:200,g:220,b:255},
   bv:'Your word is a lamp to my feet and a light to my path.',
   draw(ctx,w,h,t){const g=rg(ctx,w/2,h*.3,0.01,w/2,h*.5,safeR(h*.8));g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#eeeeff');g.addColorStop(0.7,'#d8e4ff');g.addColorStop(1,'#c0d0f8');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);drawRays(ctx,w,h,t,'rgba(220,230,255,');drawClouds(ctx,w,h,t);}},
  {name:'Dark Marble',melKey:'warm',
   cardBg:'rgba(5,4,7,0.92)',cardBorder:'rgba(200,190,170,0.32)',
   accent:'#c8b890',textColor:'#e0d4b8',glow:'rgba(200,180,120,0.7)',glow2:'rgba(150,130,80,0.35)',
   corner:'#b8a870',vig:'rgba(0,0,0,0.74)',pt:{r:220,g:200,b:150},
   bv:'One thing I ask from the Lord — to dwell in His house all the days of my life.',
   draw(ctx,w,h,t){ctx.fillStyle='#07060c';ctx.fillRect(0,0,w,h);drawMarble(ctx,w,h);drawRays(ctx,w,h,t,'rgba(200,180,120,');}},
];

// ── BG HELPERS ────────────────────────────────────────────
function drawClouds(ctx,w,h,t){
  const defs=[{x:.14,y:.1,s:1.2},{x:.7,y:.07,s:1},{x:.44,y:.2,s:1.5},{x:.04,y:.33,s:.8},{x:.8,y:.26,s:.9},{x:.28,y:.48,s:1.1},{x:.63,y:.43,s:.7},{x:.08,y:.58,s:1},{x:.78,y:.62,s:1.3}];
  defs.forEach((cd,i)=>{
    const drift=Math.sin(t*.1+i*.7)*w*.025;
    const cx=(cd.x*w+drift+w)%w,cy=cd.y*h;
    const r=Math.max(8,w*.13*cd.s);
    const alpha=0.52+Math.sin(t*.07+i)*.1;
    [[-r*.55,0,r*.7],[0,0,r],[r*.55,0,r*.7],[0,-r*.38,r*.56]].forEach(([dx,dy,cr])=>{
      const sr=safeR(cr);
      const g=rg(ctx,cx+dx,cy+dy,0.01,cx+dx,cy+dy,sr);
      g.addColorStop(0,`rgba(255,255,255,${alpha})`);g.addColorStop(.5,`rgba(240,248,255,${alpha*.5})`);g.addColorStop(1,`rgba(220,235,255,0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx+dx,cy+dy,sr,0,Math.PI*2);ctx.fill();
    });
  });
}
function drawRays(ctx,w,h,t,cb){
  const cx=w/2,cy=-h*.08;
  [-.44,-.24,-.09,0,.09,.24,.44,.6,-.6].forEach((a,i)=>{
    const p=.04+Math.sin(t*.38+i*.78)*.025;
    const len=Math.max(h,10);
    const g=lg(ctx,cx,cy,cx+Math.sin(a)*len*1.2,cy+len*1.2);
    g.addColorStop(0,cb+(.16+p)+')');g.addColorStop(.45,cb+'.04)');g.addColorStop(1,cb+'0)');
    ctx.save();ctx.globalCompositeOperation='screen';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.sin(a-.032)*len*1.45,h*1.05);ctx.lineTo(cx+Math.sin(a+.032)*len*1.45,h*1.05);ctx.closePath();ctx.fillStyle=g;ctx.fill();ctx.restore();
  });
}
let _stars=null;
function drawStars(ctx,w,h,t,dense){
  if(!_stars||_stars.w!==w||_stars.h!==h){_stars={w,h,list:[]};const n=dense?360:190;for(let i=0;i<n;i++)_stars.list.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8,a:.14+Math.random()*.86,ph:Math.random()*Math.PI*2});}
  _stars.list.forEach(s=>{const tw=.6+Math.sin(t*.055+s.ph)*.4;ctx.fillStyle=`rgba(255,255,230,${s.a*tw})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
}
function drawNebula(ctx,w,h,t){
  [[w*.2,h*.3,160,'rgba(80,0,160,'],[w*.8,h*.6,200,'rgba(0,60,180,'],[w*.5,h*.8,140,'rgba(160,0,80,']].forEach(([nx,ny,nr,nc])=>{
    const p=.1+Math.sin(t*.14)*.04;
    const g=rg(ctx,nx,ny,0.01,nx,ny,safeR(nr));g.addColorStop(0,nc+(.17+p)+')');g.addColorStop(1,nc+'0)');
    ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=g;ctx.beginPath();ctx.arc(nx,ny,nr,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}
function drawAurora(ctx,w,h,t,cb){
  for(let i=0;i<4;i++){
    const y=h*(.18+i*.17)+Math.sin(t*.09+i)*h*.04;
    const g=lg(ctx,0,y-55,0,y+55);const a=.058+Math.sin(t*.11+i*1.2)*.038;
    g.addColorStop(0,'transparent');g.addColorStop(.5,cb+a+')');g.addColorStop(1,'transparent');
    ctx.save();ctx.globalCompositeOperation='screen';ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.restore();
  }
}
function drawGoldPat(ctx,w,h){
  ctx.save();ctx.globalAlpha=.065;ctx.strokeStyle='#d4af37';ctx.lineWidth=.8;
  const s=30;for(let x=0;x<w;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.globalAlpha=.035;for(let d=-h;d<w+h;d+=s*2){ctx.beginPath();ctx.moveTo(d,0);ctx.lineTo(d+h,h);ctx.stroke();}
  ctx.restore();

  cg.addColorStop(0,'rgba(255,200,50,0.1)');cg.addColorStop(1,'transparent');

function initPts(T){
  _pts=[];for(let i=0;i<48;i++)_pts.push({x:Math.random()*_FW,y:_FH*.4+Math.random()*_FH*.6,r:.5+Math.random()*2,vy:-(0.28+Math.random()*.52),vx:(Math.random()-.5)*.16,life:Math.random(),spd:.004+Math.random()*.006,maxR:.5+Math.random()*2,ph:Math.random()*Math.PI*2,ptR:T.pt.r,ptG:T.pt.g,ptB:T.pt.b});

function tickPts(t){
  if(!_fxCtx)return;_fxCtx.clearRect(0,0,_FW,_FH);
  _pts.forEach(p=>{
    p.y+=p.vy;p.x+=p.vx+Math.sin(t*.48+p.ph)*.2;p.life+=p.spd;
    if(p.y<-12){p.y=_FH*.38+Math.random()*_FH*.62;p.x=Math.random()*_FW;p.life=0;}
    const ph2=p.life%1;let a=ph2<.15?ph2/.15:ph2>.7?(1-ph2)/.3:1;a*=.68;
    const rad=Math.max(.1,p.maxR*(.4+Math.sin(p.life*Math.PI)*.6));
    const gr=safeR(rad*4);
    const g=rg(_fxCtx,p.x,p.y,0.01,p.x,p.y,gr);
    g.addColorStop(0,`rgba(${p.ptR},${p.ptG},${p.ptB},${a})`);g.addColorStop(.5,`rgba(${p.ptR},${p.ptG},${p.ptB},${a*.22})`);g.addColorStop(1,`rgba(${p.ptR},${p.ptG},${p.ptB},0)`);
    _fxCtx.save();_fxCtx.globalCompositeOperation='screen';_fxCtx.beginPath();_fxCtx.arc(p.x,p.y,gr,0,Math.PI*2);_fxCtx.fillStyle=g;_fxCtx.fill();_fxCtx.restore();
    _fxCtx.fillStyle=`rgba(255,255,255,${a*.8})`;_fxCtx.beginPath();_fxCtx.arc(p.x,p.y,rad,0,Math.PI*2);_fxCtx.fill();
  });
}

// ── COMPOSITE RECORDER ────────────────────────────────────
let _compC=null,_compCtx=null;
window._recActive=false;
window._recordingDone=false;

function _rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// Wrap text utility for canvas
function _wrapText(ctx,text,maxW){
  const words=text.split(' ');let lines=[],line='';
  words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
  if(line)lines.push(line);return lines;
}

function _drawComposite(){
  if(!_compCtx||!_curT)return;
  const ctx=_compCtx,W=_compC.width,H=_compC.height;
  ctx.clearRect(0,0,W,H);

  // 1. BG canvas
  try{ctx.drawImage(document.getElementById('bgCanvas'),0,0,W,H);}catch(e){}

  // 2. Vignette
  const vg=ctx.createRadialGradient(W/2,H*0.42,H*0.08,W/2,H*0.42,H*0.78);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,_curT.vig||'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // 3. FX particles
  try{ctx.drawImage(document.getElementById('fxCanvas'),0,0,W,H);}catch(e){}

  // 4. Flash
  const flashOp=parseFloat(document.getElementById('flash').style.opacity)||0;
  if(flashOp>0.01){ctx.save();ctx.globalAlpha=flashOp;ctx.fillStyle=document.getElementById('flash').style.background||'#fff';ctx.fillRect(0,0,W,H);ctx.restore();}

  // 5. Corner decorations
  document.querySelectorAll('.corn').forEach(corn=>{
    const op=parseFloat(corn.style.opacity)||0;if(op<0.01)return;
    const r=corn.getBoundingClientRect();if(r.width<1)return;
    const color=_curT.corner||'#ffffff';
    ctx.save();ctx.globalAlpha=op;
    const isTR=corn.classList.contains('tr'),isBL=corn.classList.contains('bl'),isBR=corn.classList.contains('br');
    ctx.translate(r.left+r.width/2,r.top+r.height/2);
    if(isTR)ctx.scale(-1,1);else if(isBL)ctx.scale(1,-1);else if(isBR)ctx.scale(-1,-1);
    ctx.translate(-r.width/2,-r.height/2);
    ctx.strokeStyle=color;ctx.lineWidth=1.4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(2,r.height-2);ctx.lineTo(2,2);ctx.lineTo(r.width-2,2);ctx.stroke();
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(2,2,2.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=op*0.4;ctx.beginPath();ctx.arc(r.width/2,2,1.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // 6. TOP HEADER
  const hdrEl=document.getElementById('top-header');
  const hdrOp=parseFloat(hdrEl.style.opacity)||0;
  if(hdrOp>0.01){
    const accent=_curT.accent||'#ffffff';

    // eyebrow
    const ebEl=document.getElementById('top-eyebrow');
    const ebR=ebEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=hdrOp*0.6;
    ctx.font=`400 ${Math.max(11,ebR.height)}px 'Cinzel',serif`;
    ctx.fillStyle=accent;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ebEl.textContent,W/2,ebR.top+ebR.height/2);ctx.restore();

    // divider line
    ctx.save();ctx.globalAlpha=hdrOp*0.4;ctx.strokeStyle=accent;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W/2-20,ebR.bottom+ebR.height*0.5);ctx.lineTo(W/2+20,ebR.bottom+ebR.height*0.5);ctx.stroke();ctx.restore();

    // main title
    const ttEl=document.getElementById('top-title');
    const ttR=ttEl.getBoundingClientRect();
    if(ttEl.textContent&&ttR.width>1){
      const ttFs=Math.max(18,parseFloat(window.getComputedStyle(ttEl).fontSize)||28);
      ctx.save();ctx.globalAlpha=hdrOp;
      ctx.shadowColor=_curT.glow2||accent;ctx.shadowBlur=28;
      ctx.font=`600 ${ttFs}px 'Cinzel',serif`;
      ctx.fillStyle=accent;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ttEl.textContent,W/2,ttR.top+ttR.height/2);
      ctx.restore();
    }

    // divider2
    const d2=document.getElementById('top-divider2');
    if(d2){const d2R=d2.getBoundingClientRect();ctx.save();ctx.globalAlpha=hdrOp*0.3;ctx.strokeStyle=accent;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W/2-30,d2R.top+d2R.height/2);ctx.lineTo(W/2+30,d2R.top+d2R.height/2);ctx.stroke();ctx.restore();}
  }

  // 7. CARD
  const cardEl=document.getElementById('card');
  const cardOp=parseFloat(cardEl.style.opacity)||0;
  if(cardOp>0.01){
    const cr=cardEl.getBoundingClientRect();
    const accent=_curT.accent||'#ffffff';

    // card bg
    ctx.save();ctx.globalAlpha=cardOp;
    ctx.fillStyle=_curT.cardBg||'rgba(0,0,0,0.8)';
    _rrect(ctx,cr.left,cr.top,cr.width,cr.height,6);ctx.fill();
    ctx.strokeStyle=_curT.cardBorder||'rgba(255,255,255,0.3)';ctx.lineWidth=1;
    _rrect(ctx,cr.left,cr.top,cr.width,cr.height,6);ctx.stroke();
    // card corner accents
    ctx.strokeStyle=accent;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cr.left-1,cr.top+22);ctx.lineTo(cr.left-1,cr.top-1);ctx.lineTo(cr.left+22,cr.top-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cr.right+1,cr.bottom-22);ctx.lineTo(cr.right+1,cr.bottom+1);ctx.lineTo(cr.right-22,cr.bottom+1);ctx.stroke();
    ctx.restore();

    // content-type label
    const ctEl=document.getElementById('content-type');
    if(ctEl&&ctEl.textContent){
      const ctR=ctEl.getBoundingClientRect();
      ctx.save();ctx.globalAlpha=cardOp*0.65;
      ctx.font=`400 ${Math.max(11,ctR.height*0.85)}px 'Cinzel',serif`;
      ctx.fillStyle=accent;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ctEl.textContent.toUpperCase(),W/2,ctR.top+ctR.height/2);
      ctx.restore();
    }

    // main text — word by word with individual opacity
    const mtEl=document.getElementById('main-text');
    if(mtEl){
      const textColor=_curT.textColor||'#ffffff';
      const fs=Math.max(16,parseFloat(window.getComputedStyle(mtEl).fontSize)||18);
      mtEl.querySelectorAll('.word').forEach(sp=>{
        const spOp=parseFloat(sp.style.opacity)||0;if(spOp<0.01)return;
        const sr=sp.getBoundingClientRect();if(sr.width<1)return;
        ctx.save();ctx.globalAlpha=spOp*cardOp;
        ctx.font=`italic 400 ${fs}px 'IM Fell English',serif`;
        ctx.fillStyle=textColor;ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
        ctx.fillText(sp.textContent,sr.left,sr.top+sr.height/2);
        ctx.restore();
      });
    }

    // ref
    const refEl=document.getElementById('ref');
    if(refEl&&refEl.textContent){
      const refOp=parseFloat(refEl.style.opacity)||0;
      if(refOp>0.01){
        const rr=refEl.getBoundingClientRect();
        ctx.save();ctx.globalAlpha=refOp*cardOp;
        ctx.font=`400 ${Math.max(11,rr.height*0.85)}px 'Cinzel',serif`;
        ctx.fillStyle=accent;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(refEl.textContent,W/2,rr.top+rr.height/2);
        ctx.restore();
      }
    }
  }

  // 8. BOTTOM
  const botEl=document.getElementById('bottom');
  const botOp=parseFloat(botEl.style.opacity)||0;
  if(botOp>0.01){
    const accent=_curT.accent||'#ffffff';
    const bvEl=document.getElementById('bottom-verse');
    if(bvEl&&bvEl.textContent){
      const bvR=bvEl.getBoundingClientRect();
      const bvFs=Math.max(12,parseFloat(window.getComputedStyle(bvEl).fontSize)||14);
      ctx.save();ctx.globalAlpha=botOp;
      ctx.font=`italic 400 ${bvFs}px 'Playfair Display',serif`;
      ctx.fillStyle=accent;ctx.textAlign='center';ctx.textBaseline='top';
      ctx.shadowColor=_curT.glow2||accent;ctx.shadowBlur=14;
      const lines=_wrapText(ctx,bvEl.textContent,bvR.width);
      lines.forEach((l,i)=>ctx.fillText(l,W/2,bvR.top+i*bvFs*1.6));
      ctx.restore();
    }
    // tap hint
    const thEl=document.getElementById('tap-hint');
    const thOp=parseFloat(thEl?thEl.style.opacity:0)||0;
    if(thEl&&thOp>0.01){
      const thR=thEl.getBoundingClientRect();
      ctx.save();ctx.globalAlpha=botOp*thOp*0.22;
      ctx.font=`400 ${Math.max(9,parseFloat(window.getComputedStyle(thEl).fontSize)||10)}px 'Cinzel',serif`;
      ctx.fillStyle='#ffffff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(thEl.textContent.toUpperCase(),W/2,thR.top+thR.height/2);
      ctx.restore();
    }
  }
}

// ── RECORDING API ─────────────────────────────────────────
window._recordingDone=false;
window._recordingBlob=null;
let _recChunks=[],_recorder=null;

window.startRecording=function(fps){
  fps=fps||30;
  try{
    AC.resume().catch(()=>{});
    const W=window.innerWidth,H=window.innerHeight;
    _compC=document.createElement('canvas');
    _compC.width=W;_compC.height=H;
    _compCtx=_compC.getContext('2d',{willReadFrequently:false});
    window._recActive=true;
    window._recordingDone=false;
    _recChunks=[];

    _recDest=AC.createMediaStreamDestination();
    _masterGain.connect(_recDest);

    const videoStream=_compC.captureStream(fps);
    const combined=new MediaStream([...videoStream.getVideoTracks(),..._recDest.stream.getAudioTracks()]);
    const mimeType=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _recorder=new MediaRecorder(combined,{mimeType,videoBitsPerSecond:8000000,audioBitsPerSecond:192000});
    _recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)_recChunks.push(e.data);};
    _recorder.onstop=()=>{
      window._recActive=false;
      try{_masterGain.disconnect(_recDest);}catch(e){}
      window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
      window._recordingDone=true;
    };
    _recorder.onerror=e=>console.error('Recorder error:',e);
    _recorder.start(200);
    console.log('Recording started');
  }catch(e){console.error('startRecording error:',e);}
};

window.stopRecording=function(){try{if(_recorder&&_recorder.state!=='inactive')_recorder.stop();}catch(e){}};
window.forceFinalize=function(){
  window._recActive=false;
  if(_recChunks.length>0&&!window._recordingDone){window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});window._recordingDone=true;}
};
window.getRecordingBase64=function(){
  return new Promise((resolve,reject)=>{
    const chk=()=>{if(!window._recordingBlob){setTimeout(chk,100);return;}const r=new FileReader();r.onloadend=()=>resolve(r.result.split(',')[1]);r.onerror=reject;r.readAsDataURL(window._recordingBlob);};chk();
  });
};

// ── RESIZE ────────────────────────────────────────────────
function onResize(){
  _BW=Math.max(1,window.innerWidth);_BH=Math.max(1,window.innerHeight);
  if(_bgEl){_bgEl.width=_BW;_bgEl.height=_BH;}
  _FW=_BW;_FH=_BH;if(_fxC){_fxC.width=_FW;_fxC.height=_FH;}
}
window.addEventListener('resize',onResize);
document.body.addEventListener('click',()=>loadScene(false));
document.body.addEventListener('touchend',e=>{e.preventDefault();loadScene(false);},{passive:false});

// ── BOOT ─────────────────────────────────────────────────
initBg();initFX();loadScene(true);

})();
